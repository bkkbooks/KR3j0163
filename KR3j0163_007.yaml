body:
  text: 池北偶談卷七刑部尚書王士禎撰陳氏康熙十五年丙辰春甘肅撫臣疏稱會寧縣典史汪玉虹妻陳氏被執罵賊不辱投井死得旨給銀三十兩立貞烈碑畢孺人叔祖翰檢公諱象節字子度中萬厯壬辰進士選庶吉士第一元配畢孺人年甚少於邸中從容立嗣告於匶前自縊死奉旨旌表馮文敏公琦為傳比葬有雙鶴翔於墓所良久而去彈園雜志云萬厯乙未夏翰林檢討王象節病危妻畢氏皇迫自縊家人覺之救免夫卒竟閉户縊死辛亥夏户部主事陳原道卒妻計氏哀慟不食淚盡血出死於柩旁道臣皆請旌表從之卓哉兩烈婦事正相類紀之以勸天下之為人婦者偶閲此録附家乘馬文肅家書無錫馬文肅公世竒以崇禎辛未登進士報至日其父涵虛公夢人告曰忠臣不事二君又少時夢自吟從今别却江南日化作啼鵑帶血歸之句後果殉甲申之難其答成忠毅公德二柬云吾輩舍一死别無法吾不為其難誰為其難者國家大運一身大數總有天主之天豫我以成仁取義固無憾也勉之吾輩正不必遜古人耳又云讀教所謂是母是子羡之敬之成忠毅公德柬云慷慨仗節易從容就義難吾輩將為其難乎抑為其易乎又柬云弟幸老母舍妹俱在此老母爭欲先引決弟止之以從容慷慨二義為告弟志在為其難懼變起倉卒我輩無以自明故復以二義相商也文肅自跋云玄升忠毅字一門四人俱死吾一室三人庶可相匹妾朱氏李氏俱贈孺人士夫多有削髮為僧者雖於身體髮膚受之父母之義未免有礙然亦不得己之苦心彼念上猶在南也與兒書略云忠孝二字是吾家風好守之一姐先死朱氏玉潤後死李氏女流得之尤稱殊節吾可無憾矣玉潤父母可善視之又云吾少於夢中曾吟詩二句云云此文文山語也曾向汝母言之舊嵗又夢汝祖父語我曰汝六十一嵗羈星在命過不得或謂必無是以中年填起金星為恩星也今成我以千秋之節又有兩侍妾為我添此光彩何必非恩乎特與汝識之公孫翀字雲翎康熙壬子舉人年少有志節工詩文不愧家學與豫善惜早卒未見其止耳蘇門孫先生言行蘇門孫徵君鍾元先生竒逢以康熙乙卯卒年九十二矣其自贊云問爾為誰曰嵗寒氏嵗既云寒爾何為爾曰幼讀書妄意青紫長知立身頗愛亷恥雖困公車屢蒙薦起骨脆膽薄不慕榮仕衣厭文繡食甘粳粃隱不在山逸不在水隱於舉人七十年矣繞膝多男及門有士老而學易欲探厥旨聊以卒嵗如斯而已先生十四嵗謁楊愍忠子尚寶補庭補庭問設在圍城中內無糧芻外無救援當如何先生應聲曰效死勿去尚寶歎曰足卜子生平矣天啓中左浮丘魏廓園周蓼洲三公以璫禍被逮皆先生與鹿忠節善繼之父及其甥壻張于度果中周旋於患難之中左公弟光明魏公子學洢周公友朱祖文皆主其家又與髙陽孫文正公書曰左魏諸君子善類之宗橫被竒寃誰不扼腕昔盧次楩一莽男子耳謝茂秦以眇布衣行哭燕市曰諸君子不生為盧生地乃從千載下哀湘而弔賈乎李獻吉在獄何仲默致書楊邃菴求為引手康德涵義急同調至不自愛其名浮丘廓園之品固當直踞獻吉何次楩敢望某一介書生尚負慚於茂秦閣下功德前無邃菴憐才扶世之感諒必激於中豈無意乎及三公死各坐贓數千先生又與鹿太公醵金代上之先生晚年語門弟子云吾生平尚友凡三變乙丑丙寅之際則慕陳太丘郭林宗癸甲之間則管幼安田子春今耄矣其惟衛武公乎奉聖夫人客氏弟光先介所知以名馬貽先生以家貧不能具芻茭辭光先再致養馬之需以病軀不能乘辭先生常語門人曰讀有字底書要識無字底理又曰豫五十年始識得一貧字嘗有詩云為人百嵗只為子學道終身總學貧定力原從貧處得猿啼鬼嘯也成鄰先生家祭儀注略云晨起櫛沐後入祠三揖自入小學便不可廢朔望日焚香拜元旦昧爽設祭四拜四仲月用分至日各設祭行四拜禮子孫供職事凡佳辰令節寒食寒衣皆拜設時食忌日設食拜子孫素食不享客有事出門焚香拜歸亦如之吉慶事卜期設祭兒女婚姻焚香以告生辰彌月設食以獻新婦廟見設祭主婦率之行禮凡祭婦人另行禮各如儀先生嘗題壁云人生最繫戀者過去最冀望者未來最悠忽者見在夫過去已成逝水勿容繫也未來茫如捕風勿容冀也獨此見在之頃或窮或通時行時止自有當然之道應盡之心乃悠悠忽忽姑俟異日諉責他人嵗月虛擲良可浩歎先生孝友堂家規云邇來士大夫絶不講家規身範故子孫鮮克由禮不旋踵而辱身喪家者多矣祖父不能對子孫子孫不能對祖父皆其身多慙德者也家中之老老幼幼夫夫婦婦各無慙德此便是羲皇世界孝友為政政孰有大焉者乎先生前後廬墓六年常言少年妄意功名自雙親見背後哀痛窮苦中認取本來面目覺向來氣質之偏先生嘗言七十嵗工夫較六十而密八十嵗工夫較七十而密九十嵗工夫較八十而密湯孔伯斌云先生之學以慎獨為宗以體認天理為要以日用倫常為實際康熙甲辰先生以大難録一事牽連北上途中語門人曰憂患恐懼最怕有所一有所則我心無主古來忠臣孝子義士悌弟只是能自作主張學者正在此處著力先生病革時語學者云近得一語實為要訣但未敢拈以示人許平仲能化老僧還俗此語通徹天德王道一齊了貫王董兩烈婦王貞烈孔氏河南儀封人進士貞壇女適諸生王碧壺碧壺肅敏公七世孫也乙巳七月夫死自縊以殉死三日父母往哭之目忽開移時而瞑董烈婦孫氏山東福山人歸萊陽董樵子道廣道廣死亦自縊將死語其弟曰歸語父母勿悲我父母劬勞無以為報是所以報耳貞壇先兄門人刁蒙吉刁蒙吉先生包祁州人天啓丁卯舉人隱居講學曾見其潛室劄記二卷録二條於左為蓋世豪傑易為慊心聖賢難易言趨吉避凶蓋言趨正避邪也若認作趨福避禍便誤左翼宸左翼宸先生光圖應州人少失愛於繼母薄氏以孝聞後舉孝亷為嵩縣令闖賊寇其境竭力拒守城陷被執將殺之薄以身蔽先生泣曰我繼母也兒事我孝願以身代孝兒賊感而釋之居鄉一介不取冬常單衣有老蒼頭世寶者製絮衣以進曰主人義不他受此衣寶力所營願主人安之竟力却不受所著有知非集范吕二公范文忠公夢章景文甲申絶筆云坐卧小樓竟亦難耐故此決絶萬厯中文忠為東昌府推官時雒陽吕忠節公維祺為兗州府推官後同入為吏部郎天啓甲子乙丑間同以忤璫歸崇禎中又相繼為南京參贊兵部尚書文忠撰忠節太翁墓志謂豫與介孺生平行徑臭味無一不同卒皆以大節著吕公子兆琳字敬芝順治己亥進士官御史與豫善孫履恆康熙甲戌進士謙恆癸酉舉人長白先生元張慎與名臨讀書長白山中淹貫經史生徒千里負笈屢徵不起學者稱長白先生元明善完顔令去思記云與齊處士張臨善楊亷夫撰鮑孝子志又載先生至元間由丘園官至祭酒狀元張夢臣中丞張朴大參張誠等皆先生門人又鄒平縣北地名河溝有先生為其父阡表中自云為司業二上庠僅半載與亷夫言相近元太史與先生同時記稱處士不知何謂今長白山五龍池上有三賢祠祀伏生范文正公及先生也嘉靖中鄒平丞朱仲恩夢一丈夫冠服朴異不類時人自稱豫有名無爵世所稱長白先生者乃太學生張松逺祖也松嘗記其事姪孫中丞仁軒公一元曾孫尚書華東公延登建先生祠於縣東七里尚書為之記丘方山丘方山名鳯河南新安人以刀筆仕至南京龍驤衛經歷少讀小學大學中庸禮記躬行有德日以朱墨二圈記别理欲有弟蕪其田以為己分田多瘠先生即以己田易之已而沃弟田復蕪先生又易之初仕獻縣丞稱清官第一後自南京告老歸居方山下鄉黨以為錢宣靖公後一人先生與洛陽尤西川時熙友善西川門人孟雲浦化鯉狀其行吕忠節公維祺作諡議豫於纂修明史時曾以其行狀諡議送史館沈文端公家書歸德沈文端公鯉家書一通略云王父母賜扁曾央大哥往謝否爾已後只以不相見為主寧可禮節上差些勿要開了此端出入公門招惹是非且受勞苦拜客只可騎馬不可乘車家下凡百儉素恬淡不要做出富貴底氣象不惟俗樣且不可長久大抵盛極則衰月滿則虧日中則昃一定之理惟有自處退步不張氣焰不過享用不作威福雖處盛時可以保守近者江陵張老先生一敗塗地只為其榮寵至極而不能自抑反張氣焰以致有此可為明鑒我今雖做熱官自處常在冷處必不肯多積財貨廣置田宅使身終之日留下爭端自取辱名爾能體我此意凡百學好已知持滿之道只愁爾一向做得門面大了無富之實有富之名日後子孫不免受纍為今之計要減些田土損些受用衣服勿太華美器用寧可欠缺留些福量遺與後人此至理也秋夏糧及早上納多加與些火耗各莊上人常約束他莫要生事捨與窮人綿襖一百箇趁早預備親戚中貧者孤寡者闕暮年光景頃刻可過何苦如此只圖灑落為快也我求歸之意已與申老先生説過尚未見許沈埭近日頗知讀書坊牌既不能止隨府縣建在何處只是不可妨礙人家既有自備木料官木料不必用之又寄子域云昨相知有書云地氣自南而北今吾鄉人半入南中矣此段似為四明相而發豫跋之云右歸德沈文端公家書一通字字聖賢忠恕之旨豫欲續名臣言行録因從宋牧仲所借歸手録藏之然以文端公敬慎如此而猶不免四明之忌仕路真可畏哉公為先伯祖太師公隆慶辛未會試房師其文集正續稿皆太師序刻之施允升宣城施允升先生大猷愚山之祖也萬厯中倡明講學私淑盱江羅近溪與鄒南臯焦淡園諸公遊嘗有羅姓者兄弟鬩墻先生要之家反復勸譬聲淚俱下兄弟遂相抱而哭先生為之講學歌詩三日始散去其叔祖某絶産千餘金應歸先生一介不取捐為義田以贍族又置義學以教族之子弟所著有中明子集若干卷王端毅公遺事三原王端毅公遺事凡四十則公子康敏公所述夏日京邸偶得一編讀之因録一二則以自警公家法甚嚴子孫雖孩提無敢嬉笑於側盛暑中必使著衣襪始侍左右嘗曰教爾曹讀書非為利達計也正欲使知為人底道理公謝政後有一通家子在官寄茶一簍公受之後復寄二簍亦受之但答書云令先君為時名臣吾子宜清白律己勿替家聲何勞為老夫之故數數寄贈吾受之心甚不安此後勿再寄寄亦不受矣公門人蔡虛齋發志録一條云公嘗問今學者滿天下何故異才難得豫對云是固有由上之人所以養之者本未盡其道下之人又幸際時之升平而售之急耳以生所見言之如生稍知章句訓詁人便舉而進之於學宫矣未幾作經義甫成篇便得補廩又未幾作三場文字便期中舉人中進士矣一中進士則官已到手或無暇於學或自以為無用學矣其仕而能學者無幾蓋識見既淺踐履必薄規為必粗非所謂俟其熟而食之者也況自幼入小學所學多非學做人之實事人才之不如古以此公曰然吾兒子承裕今年二十三丙午年已中舉人然吾未欲其急於仕且令靜覽羣書間閲世務冀他日得實用爾承裕即康敏公仕至戶部尚書楊斛山先生富平忠介斛山楊公清節冠一時其以建言罷出都夫人乘一驢公自步從三原馬溪田光祿生日聲妓滿堂聞公至急揮去設虀鹽相對而已關中士大夫至今能言之公裔孫紹武順治己丑進士與豫友嘗遺公文集王東臯王東臯伯勉河南湯隂人丙戌進士久於銓曹一介不取恆居官廨雖胥吏亦服其清正同年范印心以平陽監司入覲念其貧懷金將遺之約同年館卿錢綎同往語久之卒不敢言而退寒冬惟一羊裘數年不易也御史李某過湯隂見其居室庳陋歎其清節特疏薦之時王已自選郎改御史內升京卿歸里上有意以都御史召竟未及用而卒海內惜之滿洲總憲某嘗歎鹽法之弊合肥龔端毅公曰古云有治人無治法但以兩淮付王伯勉兩浙付魏象樞各加僉都御史久任何患鹽政不肅清乎丘文莊丘文莊公濬著世史正綱持論嚴正至其為相則逐三原王端毅公惡莊定山欲誅之何其明於論古而暗於立身如此耿公祖孫館陶耿大參明成化丙午舉人𢎞治丙辰進士官御史以忤劉瑾謫官纍官山西參政其曾孫中丞如杞字楚材亦中萬厯丙午舉人丙辰進士廷對甲第悉同官遵化道副使以忤魏忠賢為閹黨巡撫劉詔所誣逮繫纍官山西巡撫干支狀貌無一不同中丞孫願魯亦中康熙丙午舉人庚戌進士今為翰林編修周將軍前明崇禎十五年本朝大兵入畿輔山東次年始北歸封疆大帥無敢一矢加遺周將軍遇吉時調防天津大兵至巡撫馮元揚令出戰周以五百騎伏楊柳青大兵至邀擊之自辰鏖戰及酉其夜大兵徙營北去聞滿洲諸公言壬癸入關之役往來數千里如入無人之境惟見此一戰耳周後與其夫人禦闖寇死偏關最烈三公薦人明𢎞治中聞托雲將入境孝宗召閣臣劉文靖謝李二文正三公議遣廷臣整理邊關糧草初擬顧佐王儼上云掌印須留管家當各衙門官先生輩知之可舉其有才力者三公退擬侍郎陳清李士實以進上改批用都御史劉仲宇通政司參議熊偉按士實南昌人武宗時佐宸濠為大逆不識當日三公何以薦之自比古人王儉自比謝文靖張濬自比裴文忠王昭逺自比諸葛忠武侯史閣部康熙二十年吳江吳漢槎兆騫自寧古塔歸京師駐防將軍安某者老將也語之曰子歸可語史館諸君昔王師下江南破揚州時吾在行間親見城破時一官人戴巾衣氅騎一驢詣軍營自云我史閣部也親王引與坐勸之降以洪承疇為比史但搖首云我此來只辦一死但慮死不明白耳王百方勸諭終不從乃就死此吾所目擊者史書不可屈却此人云乙將軍乙將軍邦才山東青州人以總兵官隨史相守廣陵同日授命任太守任民育山東濟寧人中甲子乙榜為揚州知府亦不屈死志皆軼之南尚書工部尚書渭南南公二太居益巡撫福建時紅毛番以明月珠珊瑚樹異香火馬諸珍寶物賄請互市公絶其使焚其貢物口占一詩云明月珊瑚貴莫言番書字字誑軍門牙前立下焚珠令不敢持將獻至尊授部將以方略討之繫其酋髙文律閩人立石平逺臺以紀公績此崇禎間事也康熙六年丁未五月荷蘭貢使卑獨攀呵閏等入貢時公姪廷鉉為主客郎中與豫共事為述之如此李忠定公從祀宋南渡人物李忠定公第一張魏公生平不強人意處甚多而為宋齊愈劾罷忠定尤南渡治亂之關豫往讀名臣言行録恆欲著論以明之頃見鄧左之履中張浚不當從祀歷代帝王廟議明白正大千古定案遂為閣筆其略云建功於中興之際首當聨絡公忠之人宋至靖康建炎之間人臣皆以緘默柔媚輸國於人為奉職而以恢復雪恥為不忠宋齊愈黃潛善汪伯彥之徒其尤也非李綱秉國整立規畫何以成朝廷哉浚乃甘以身為潛善客與齊愈厚而隱其書立邦昌之罪劾綱以私意殺侍從致綱罷黜綱罷而兩河相繼淪陷失身非類得罪君子雖有隨時幸立之功名而其虧喪已不可贖矣夫從祀重典也謂宜黜浚而陟綱云云鄧有仰止堂文集清峭可誦趙忠毅公擇言康熙丁未讀髙邑趙忠毅公間居擇言謹録數則於此太宰陳公有年典選豫為主事一日謂豫曰僕不敏必多過失幸教之豫曰人惟清淨日復一日安得有過陳公大笑曰是謂我不作事也因議用海公瑞何公以尚二公皆廢棄而剛直為天下所畏陳公力言於政府竟皆起之沈户部榜湖廣臨湘人嘗一再見豫豫癸巳春得罪歸户部送之郊豫抵里未幾而使人來書曰夏季領俸念大賢家居而碌碌如榜乃食祿於朝可恥也謹以原封奉上豫受之大臣以道事君不可則止非以位言也如是乃為大臣耳故魯兩生可為大臣近日如太宰孫公鑨陳公有年蔡公國珍可以為大臣矣孫太宰丕揚楊少宰時喬可惜也而楊更可惜以其亷慎耳近日講學者薛文清之外崔後渠而已所謂極髙明而道中庸者也論語之文和平沖雅如楚狂衰鳯之歌莊子所載乃其全文而論語刪之若迷陽迷陽等語斷不可溷入論語中知此則知文體矣宋災伯姬以待姆不至而死左傳謂其女而不婦女待人婦義事也是時伯姬六十矣以待姆不至寧死於火此婦德之至也而曰不婦以為婦與女不同可不待姆而逃火豈不謬哉荷蓧丈人遭亂世而農隱而子路以為無義以為亂倫然則孔子所謂無道則隱非耶論語之文此為難解寺人勃鞮晉文公之讎也及即位而見之初不肯見既而見之曰不見者是吾惡心也吾請去之人孰無惡心皆能去之則為善人矣宋鄂州知州羅願以父汝楫為御史時常附秦檜論嶽武穆不敢入武穆廟一日自念吾政善姑往祀之再拜遂卒鄂州廩廪為乾道淳熙間名臣其卒朱子尤痛惜之恨未見其止鄂人感其德為之圖像以祀歐陽宜諸曰願素行無愧於侯其卒也未必侯所為意者善惡之報不於其身則於其子孫欒盈非為汰而受欒黶之惡以殺其身亦理之或然者豫謂羅公賢者以其父之搆陷武穆而又近於其廟愧恨不敢入五內切剝久矣一旦瞻其遺像大命遂傾惜哉小人之子孫惟宜愚不肖耳稍賢智則其苦皆若鄂州求死不得也按元鄭師山玉序鄂州小集以為南渡後文章有先秦西漢之風者新安二羅大羅名頌嘗知郢州小羅名願即鄂州也字端良號存乾道二年進士爾雅翼即其所著也宋太祖出兵下江南後主遣其臣徐鉉來將以口舌勝趙普屢請擇館伴鉉乃中批差三班院下名使臣以往鉉反復問之其人聲喏言不識字而已鉉無如之何也即此一事太祖之智過普逺矣所謂無言誰敢酬可為處世之法王維王縉同名唐書宰相世系出琅邪文憲公儉後者有蘭州刺史景景子縉祕書郎好畤丞昱昱子維此别一維縉也又河東王氏始趙州司馬儒賢儒賢子揚州司馬知節知節子協律郎胄胄子汾州司馬處亷處亷子五人長維字摩詰尚書右丞次縉字夏卿相代宗又次繟江陵少尹次絃次紞太常少卿又太原王氏始右武衛大將軍靖靖子右金吾衛大將軍瓌瓌子縉太子詹事為雁門郡王智興之父太原節度使宰之祖又别一王縉也宋王縉嚴州人官右司諌忤秦檜者凡四王縉邢太僕吾鄉太僕邢公子願侗以書法文章名神宗朝然其行誼甚髙初知南宫縣同年渭南南公憲仲工書居益之父為棗強令會御史按真定皆在郡候察而南公病殁後事一無所備先生直入白御史曰南棗強死無為經紀後事者某願請旬日之假馳往治喪畢事後赴郡聽察幸甚御史素重公名許之竟為停察事聽往治喪至今南氏子孫感公髙誼不忘御史亦賢者惜逸其姓字左公逸事左公懋第居親喪至孝不出戶者三年拈慎終追逺題文讀者無不泣下一日縣令夢天帝榜其門云大孝格天又其從弟某家有狐為祟先生時在京師家書偶及之先生復書云邪不干正可善諭遣之書未至一日狐忽語家人云公在都諭我使去我何敢留遂無他公浩然之氣通乎鬼神如此左公母徐烈母寧海州儒家女萊陽左公母也知書有大節明崇禎甲申左公銜命督餉江左母居京師三月京師陷公從兄吏部郎懋泰以車載母間道東歸而身與張尚書欣郝侍郎晉徒步以從至白溝河仰天歎曰嗚呼此張公叔夜絶吭處也呼懋泰前責以不能死國吾婦人身受國恩不能草間偷活寄語吾兒勉之勿以我為念又見二公責之曰公大臣也除一死外無存身立命處二公勉之言訖而死蓋出都不食已數日矣與左公之死相距僅一載萊陽宋孝亷林寺璉為豫説朱子論蘇王孔文仲號正人而攻伊川至謗為五鬼之魁朱子以蜀洛之故甘心蘇氏更有甚焉其與汪尚書書云蘇氏之學害天理亂人心妨道術敗風教不在王氏之下其徒若秦觀李豸皆浮誕輕佻士類不齒云云至其推尊張浚全以南軒交誼甚矣不黨之難也可歎李忠定公周益公云淳熙末李忠定諸子皆不存其姪申之進公奏議請諡於朝孝宗似未習其人豫為歷陳本末上曰張浚比耶有司請以忠定易名制曰可嗚呼忠定豈浚之比哉孝宗賢君忠定名臣同時而不相知如此則忠定在紹興中其棄置屏斥不亦宜乎二蔡後文丞相云莆中有二蔡其一派出君謨其一派出京卞京卞子孫慚其先人所為多自詭為君謨後豫頃見江右齒録分宜相子孫中式者竟不列其髙祖名爵孝子慈孫百世不改可畏哉元人元名臣文士如伊喇楚才東丹王托雲孫也亷希憲貫裕實輝和爾人也趙世賢馬祖常雍古部人也富珠哩翀女直人也納新果囉羅人也薩都拉色目人也郝天挺多囉别族也余闕唐古氏也顔宗道哈喇婁氏也扎實大食國人也辛文房西域人也事功節義文章彬彬極盛雖齊魯吳越衣冠士胄何以過之康馬武功康狀元德涵三原馬光祿伯循相友善康詞鋒如雲馬言不出口或靳之伯循曰但聽德涵言論自足快意何待吾言孫太僕孫沙溪太僕緒故城人博雅有風調嘉靖間嘗著無用間談四卷頗足解頤然持論時有過偏如駁考亭陽明俱為己甚又載彭文憲時信星士談命言公百四十餘嵗當有腹疾彭謂家人曰爾曹謹識之是年勿進吾生冷按此乃五代王祚事載宋人小説何得駕言文憲以此推之其紀述未必盡實録也戴京兆戴京曽初名曾子京字型逺杭州人登順治己丑進士官山東提學清方孤峭人不可干以私所拔皆一時名士與施愚山閏章先後齊名內升大理寺丞豫告久之起補稍遷順天府丞再豫告歸幅巾野服參學徑山絶迹公府人品為武林第一康熙辛酉卒兩子亦相繼卒天之報施善人何如哉先兄子側為諸生戴拔第一復拔充貢賦最蒙擊賞每侍坐奉教如父兄焉重師漢人最重其師門生故吏至有棄官行服者荀爽師事李元禮貽書云久廢過庭不聞善誘陟岵瞻望惟日為嵗直如子事父矣薄俗要當知此膺以爽父淑為師抱松女宣城諸生羅愷妻孫氏年始笄遇兵亂從姑避山中松下兵獲姑將殺之孫亟出請以身代兵脅之去孫抱松大呼曰死耳義不可辱遂見害三日猶抱松不仆人呼為抱松女蘇少公葬地眉州蟇頤山有老翁泉葉石林云東坡晚亦號老泉居士墨莊漫録云蘇黃門薨於許王定國作挽詞云徒泣巴山路空悲蜀道程弟兄仁達意千古各垂名注云公與東坡常泊巴江夜雨相約伴還蜀竟不果歸今東坡葬汝公歸眉王祥有言歸葬仁也留葬達也又少公自作潁濱遺老傳云先君之葬在眉山之東昔嘗約祔於其廅雖逺不忍負也又卜居賦序云昔先君相彭眉之間指其庚壬曰此而兄弟之居也今子瞻不幸已藏郟山豫年七十有三異日當追蹈前約昔貢少翁為御史大夫年八十一家居琅邪一子年十二自憂不得歸葬元帝哀之許以王命辦護其喪譙允南年七十二終洛陽家在巴西遺令其子輕棺以歸今豫廢棄久矣少翁之寵非所敢望而允南舊事或可庶幾其賦云諸子送我歷井捫天庶幾百年歸掃故阡按長公葬汝州郟城縣釣臺鄉上瑞里嵩陽峨眉山少公祔焉今河南志并載二公墓而四川志止載老蘇墓不及少公定國之詩遺老傳卜居賦之語豈不果耶外兄徐東癡夜適書來訂此疑因書此復之白氏白氏許州人蘇宗之母潁濱先生五世孫婦也年二十餘即寡外家迎歸竊議改醮白氏微聞之牽車徑歸曰我為蘇學士家婦乃失身乎於宅東北為祭室畫兩先生像圖黃州龍川故事於壁香火嚴潔躬自灑掃金天興元年許州被兵白拜辭兩先生前曰兒子往京師老婦死無恨即自縊於室年七十餘見金史列女傳池北偶談卷七
