body:
  text: 池北偶談卷十二刑部尚書王士禎撰淅川二詩南陽淅川古商於地同年于道子先登嘗令其地為予言金人侵宋時伐香嚴寺木造舟木中有紋理成詩云栽松種栢興唐日解板乗舟破宋時可惜香嚴千載樹等閒零落歲寒枝又順治辛卯歲雷山道人伐松葺囘陽觀諸生李霽明者禱於神質明松上有絶句字如蟲蛀者云修廟還菑廟裏松廟成松去鶴巢空不如留却青松在待得長生老化龍衆異之遂止彭侍郎詩淅川志載縣人彭侍郎凌霄龍巢寺詩句云殘碑猶宋字逝水自秦川最佳侍郎字用沈萬厯甲辰進士先方伯公同年也新野馬仲良之駿有寄彭詩云春山春日好髙枕若為情窻户白雲裏朝昏芳草生把書看鳥滅捲釣數魚行云云三家店詞涿州三家店題壁一詞不注名氏甚工客面京塵登臨目送飛鴻絶不堪重説故國煙波濶一㸃孤燈一片朦朧月交明滅雙眉寸結忍聽秋蛩咽又上谷旅店有題壁云一將有餘魏武帝百身莫贖楚懷王語極豪健亦無名氏霍亮雅霍亮雅曲周人倜儻任俠喜酒好樗蒱之戲亦工文章卒後申和孟涵光為作傳其邑人劉津逮逢源哭以詩云門前債客雁行立屋内酒人魚貫眠或曰此十四字是敗家子弟小影耳丁野鶴詩徐東癡言少時於章丘逆旅見一客袴褶急裝據案大嚼旁若無人見徐年少呼就語曰吾東武丁野鶴也頃有詩數百篇苦無人知子為我定之因擲一巨編示徐尚記其一律云陶令兒郎諸葛妻妻能炊黍子蒸藜一家命薄皆躭𨼆十載形勞合靜栖野徑看雲雙屐蠟石田耕雨半犁泥誰須更洗臨流耳戛戞幽禽盡日啼野鶴晚遊京師與王文安鐸諸公倡和其詩亢厲無此風致矣新淦筆工宋岳侍郎珂玉楮集載唐世有刺郡江表者時宰囑以新淦出筆託製以相寄刺史至召佳手一老父應命百日才得二管馳貢相府既訝其遲又薄其鮮試之乃絶不堪大怒曰數千里勞寄兩管惡筆來刺史聞之懼欲罪老父老父訴曰使君勿草草我所製乃歐褚所用丐先示以相君翰墨再製茍不稱甘就鼎鑊既示之笑曰如此只消三十錢筆不日獻五十管馳上之相一試大喜優賜匠者夜窻偶試毘陵張顥筆因為賦詩云世間未必無臯夔九疑虞舜不可追武皇鋭意開絶漠摧鋒乃亦有衛霍嗟哉格物本一理顧人所用何如耳筆工在昔本市傭束毫傅管求售同誰云進伎不進道意匠輒與歐褚通䖍州刺史覓佳筆雙筦何堪須百日星馳一騎到長安試手鳳池隨棄擲老奴恂慄丞相嗔能用此筆能幾人願窺翰墨減工製必使揮毫誇入神斗柄初囘開電笑槖籥果符人所料中山聚族倘未殫束帛那容及年少是知人才用舍識别惟一心臯䕫衛霍無古今妍媸能否惟在上所使此筆區區正其比我生識字僅一丁眼前所見徒毘陵未知當年新淦定何若正恐鍾衛二王無合作君不見此老一去知幾年當時鑒裁無復傳紛紛鵝毛抱筩賣恰費書傭三十錢岳公忠武王孫所著有桯史金佗粹編等書此集凡八卷乃故衡王府鈔本也集中又有贈李微之秘監詩自注云微之以吏館牒來索予所撰東陲筆略此書不知尚傳於世否識其目當更訪之又學圃萱蘇載唐宣州陳氏世能作筆家傳右軍求筆帖至唐柳公權求筆於宣城先予二管語其子曰柳學士能書當留此筆不爾退還即可以常筆予之柳果以為不入用别求遂予常筆陳曰吾先予二筆非右軍不能用也與此絶相類滄溟蔡姬李滄溟先生身後最為寥落其寵姬蔡萬厯癸卯年七十餘矣在濟南西郊賣胡餅自給叔祖季木考功見之為賦詩云白雪髙埋一代文蔡姬典盡舊羅裙云云邢太僕子愿有與孫月峰巡撫書云竊見李滄溟先生攀龍葆真履素取則先民鎔古鑄今蔚為代寶而今五畝之宅已非文靖之舊襄陽之里空標孟亭之名侗毎詢訪人士皆云李駒淪喪有子繼亡止遺孽孫又復無母才離襁褓寄命嫠媪僦居竆巷托跡浮萍並日無粗糲之食經年鮮漿汁之饋伏願明公下記所司略損公帑為贖數椽之敝屋小復白雪之舊居月或給米一石布若干疋藉以長養壯髮綿延後昆一綫猶龍之緒實被如天之福斯文一脈其疇逆心觀二事滄溟清節可知矣二中字音中興中酒二中字音予嘗言之適讀王敬美集一段附著於後云中酒二字始見徐邈傳中聖人義如中著之中而音反從平聲樊噲傳項羽既饗軍士中酒顔注云飲酒之中也不醉不醒故謂之中義宜從平聲而音乃竹仲切何也然古人詩如氣味如中酒之類皆從平聲無竹仲一讀又宋王觀國學林云老杜新數中興年百年垂死中興時中并去聲烝民詩序曰任賢使能周室中興焉陸德明音義曰中丁仲反觀國按中字有鐘衆二音音鐘者當二者之中首尾均也音衆者首尾不必均但在二者之間爾此中興之中所以音衆又如中年中葉中天中塗中詘之類皆當從衆論五言詩作古詩須先辨體無論兩漢難至苦心摹倣時隔一塵即為建安不可墮落六朝一語為三謝不可雜入唐音小詩欲作王韋長篇欲作老杜便應全用其體不可虎頭蛇尾此王敬美論五言古詩法予向語同人譬如衣服錦則全體皆錦布則全體皆布無半錦半布之理即敬美此意又嘗論五言感興宜阮陳山水閒適宜王韋亂離行役鋪張敘述宜老杜未可限以一格亦與敬美旨同王奉常論詩話明詩本有古澹一派如徐昌國髙蘇門楊夢山華鴻山輩自王李專言格調清音中絶同時王奉常小美作萟圃擷餘有數條與其兄及濟南異者予特拈出如云今之作者但須真才實學本性求情且莫理論格調又云詩有必不能廢者雖衆體未備而獨擅一家之長如孟浩然洮洮易盡祇以五言雋永千載並稱王孟有明則徐昌國髙子業二君詩不同而皆巧於用短徐有蟬蜕軒舉之風髙有秋閨愁婦之態更千百年李何尚有廢興二君必無絶響此真髙識迥論令于鱗大美早聞此語當不開後人抨彈矣先兄考功曩有題襄陽集一絶云魚鳥雲沙見楚天清詩句句果堪傳一從時世矜髙唱誰識襄陽孟浩然用事作詩用事以不露痕跡為髙往董御史玉虬文驥外遷隴右道留别予輩詩云逐臣西北去河水東南流初謂常語後讀北史魏孝武帝西奔宇文泰循河西行流涕謂梁禦曰此水東流而朕西上乃悟董語本此深歎其用古之妙憶秦娥詞無錫秦檢討留仙松齡從軍荆州雨泊仙桃鎮中夜聞琴聲甚清越跡之乃一老書生也破簷數椽風貌朴野秦賦憶秦娥詞贈之云西風切雁聲凄斷重傷别重傷别水村孤棹雨絲殘葉天池雅調刪繁節亂離時候誰人説誰人説朱絃暗響茅堂清絶記觀宋子昭畫丙辰二月二十一日過商丘宋子昭炘戸部觀畫李伯時白描十八應真最為竒妙有友諒益之二小印巨然山水為賈秋壑故物有悦生小印首有宣和之寶又勾龍爽蠟屐圖呉仲圭山水卷為東原杜瓊家藏後歸沈恒吉恒吉即石田父後歸呉文定有石田跋郭忠恕雪景黄居寶花鳥胡廷暉山水沈石田秋林讀書宋元人畫二冊其髙房山小幅有鮮于伯機題云素有煙霞疾開圖見亂山何當謝塵跡縛屋住雲間趙松雪題云每愛侍郎山水絶與畫史離羣誰似髙懷如許曽看香爐曉雲展子䖍畫髙歡歸晉陽圖最竒子䖍髙齊宇文周時人即不必確出其手亦唐宋髙手所臨摹也范氏詩畫吳橋節孝范氏名景姒文忠公景文女弟也好讀書通經史尤工書畫繪大士像彷彿龍眠有冰玉齋詩若干卷歸同邑王世德二十而寡年三十九卒文忠撰墓誌見集中反錦左傳僖二十二年晉重耳及曹僖負羈饋盤飧寘璧焉受飧反璧今卻餽曰反璧本此又昭十三年衛人餽叔向羮與一篋錦叔向受羮反錦則以反錦為詞亦可而世無舉此者右見瀛南子瀛南子鄒平張松所著松字瀛涯博學好古讀書十行俱下固安楊狀元方城布政山東致先生於塾許以領解先生不可謝歸竟不遇後以太學生仕止祁縣令古刺水詩左公蘿石手書一帖云乙酉年五月客燕之太醫院從人有自市中買得古刺水者上鐫永樂十八年熬造古刺水一礶淨重八兩礶重三斤内府物也揮淚賦此玉泉山下水遠流帝陵前盧溝橋下水其流聲濺濺瓶中古刺水製自文皇年製之扃天府元石流清泉列皇飲祖澤旨之如羮然逆寇犯天紀守陴臣匪賢君不棄社稷鼎髯垂自天經筵赤金几斤斧生炊煙况兹天府水寧不落市廛小臣侍筵者睹水心如煎再拜嘗此水含之不忍咽心如南生柏自註子卿墓柏大小數百株枝皆南向在韓城子曽為文記之淚似東流川捧之以南旋跪詠豐芑篇記觀宋牧仲書畫丁巳四月初二日過宋牧仲犖刑部邸舍觀書畫洛神賦全圖卷長丈許山用礬頭餘皆丹碧上有元公主金閨小印是宋人臨閻立本筆世祖順治三年賜閣臣内府藏畫百軸此其一也一郭河陽江山雪霽卷長丈三尺首有政和印尾寶字小印振之印舊是睢州袁司馬樞家物一鍾馗小妹圖呉道子筆妹卓劔於地一鬼捧劔室旁侍一鬼在前按板而歌有元人喬簣山東成墨印喬中山印希世之寶印一宋人翎毛二十幅多雪景皆林椿吳炳馬遠作一宋元名人真蹟首有道君飛白看雲二大字米芾李之儀陳升之諸帖康里子山臨十七帖又無名氏臨十七帖後題建文己卯三月臨於海館牧仲又云在武昌某士夫家見呉道子水墨普賢像甚竒又京師愍忠寺有貫休畫羅漢十八軸世祖末呉人持以進御會崩遂粥寺中價七百金唐詩本六朝唐詩佳句多本六朝昔人拈出甚多略摘一二為昔人所未及者如王右丞積水不可極安知滄海東本謝康樂洪波不可極安知大壑東春草年年緑王孫歸不歸本庾肩吾何必游春草王孫自不歸還家劔鋒盡出塞馬蹄穿本呉均野戰劔鋒盡攻城才智貧結廬古城下時登古城上本何遜家本青山下好登青山上莫以今時寵能忘昔日恩本馮小憐雖蒙今日寵猶憶昔時憐颯颯秋雨中潺潺石溜瀉本王融潺湲石溜瀉緜蠻山雨聞白髮終難變黄金不可成本江淹丹砂信難學黄金不可成如何此時恨噭噭夜猿鳴本沈約噭噭夜猿鳴溶溶晨霧合孟襄陽木落雁南度北風江上寒本鮑明遠木落江渡寒雁還風送秋郎士元暮蟬不可聽落葉豈堪聞本吳均落葉思紛紛蟬聲猶可聞崔國輔長信宫中草年年愁處生故侵珠履迹不使玉階行則竟用庾詩全因履迹少併欲上堦生也杜詩本古謠漢桓帝時童謠云小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡吏買馬君具車請為諸君鼓嚨胡杜大麥行全襲其語兵車行句調亦本此能字能奴登切又乃帶切獸名熊屬足似鹿説文曰能獸堅中故稱賢能而彊壯稱能傑也音奴登切字書三足鼈曰能音乃帶切阮嗣宗詠懷詩誰云君子賢明達安可能與萊哉相叶阮瑀七哀詩身盡氣力索精魂靡所能與來萊相叶則是賢能之能亦乃帶切叶平罘罳顧太初説略引鄭康成顔師古崔豹諸説辨罘罳之制甚詳以為闕屏間刻鏤鳥獸雲氣疏通連綴之狀唐蘇鶚引子虚賦罘網彌山證罘當為網顧以為非是予按柏梁詩上林令云走狗逐張罘罳則罘罳之為網明甚罘罳之為網户正以其象類網而借用耳阿房宫賦杜牧之阿房宫賦文之竒不必言然於事實殊戾按史始皇三十五年營作朝宫渭南上林苑中先作前殿阿房阿房宫未成二世元年還至咸陽曰先帝為咸陽朝廷小故營阿房為堂室今釋阿房宫弗就是彰先帝舉事過也復作阿房宫二年冬右丞相去疾左丞相斯將軍馮刼諫止作阿房宫作者二世怒下去疾等吏去疾刼自殺斯就五刑是終秦之世阿房宫未成也又考史二十六年秦每破諸侯寫放其宫室作之咸陽北阪上南臨渭自雍門以東殿屋複道周閣相屬所得美人鐘鼓以充入之則牧之所賦妃嬪媵嬙王子皇孫辭樓下殿輦來於秦朝歌夜絃為秦宮人者指此此實不名阿房宫而謂有不見者三十六年非阿房事實矣予既辨此後讀程大昌雍錄趙與旹賓退錄皆已辨之大略相同聊存之皎然賈島詩唐文粹載皎然古意詩云一朝力士脱靴後玉上青蠅生一箇紫皇案前五色麟忽然掣斷黄金鎖才調集載賈島詩妻是九重天子女身為一品令公孫鴛鴦殿裏參皇后龍鳳樓前拜至尊其俚已甚予嘗合文粹及唐人選唐詩刪為一集今刻於崑山爾雅翼序體宋淳熙初羅端良願撰爾雅翼其自序皆四言間雜五六言叶韻文甚竒肆洪炎祖為之註序之變體也端良以淳安縣社壇陶令祠堂二記得名小集五卷宋景濂蘇平仲為序宋序亦仿爾雅翼序體而不及遠矣李王二公書畫丁巳秋嘉禾友人攜示宋李公芾手札六通云李君實太僕所藏也其一云芾皇恐頓首再拜上覆芾闒茸無能猥繼清獻之緒為貧所迫冒昧宦遊試吏於江陵司計之官甫幸善罷到侍郎選擬㑹稽征廛遲次罹罰繼而間闗淮壖竊儀真鹺庾之祿幾年又以内艱而去流離困躓無所告語靜思庸戇乃分之宜自此絶意榮望敢意字民復在畿邑斐然學製寧逃傷錦之譏曠敗必矣此芾之所甚懼也不圖夤縁幸㑹獲庇所天當賴餘光下照匿瑕之仁庶免於戾此心闕切私憙自幸芾皇恐頓首再拜又王巖叟畫梅一卷有南昌袁氏家藏珍玩子孫永保印忠徹印後有四明烏斯道十二絶句龜毛角龜毛角見楞嚴經然述異記亦云商紂之時大龜生毛生角乃兵甲將興之象也故宋呉淑事類賦云為商紂而生角杜秋詩解幼讀杜牧之杜秋娘詩考其始末略記之文宗太和五年春上與宰相宋申錫謀誅宦官申錫引吏部侍郎王璠為京兆尹以密旨諭之璠泄其謀鄭注王守澄隂為之備上弟漳王湊穆宗之子賢有人望注令豆盧著誣告申錫謀立漳王上怒罷申錫為右庶子命守澄捕著所告晏敬則王師文等於禁中鞫之誣服左常侍崔元亮等力爭於延英宰相牛僧孺亦言之乃貶漳王為巢縣公申錫為開州司馬九年巢公湊薨追贈齊王初李德裕為浙西觀察使漳王傅母杜仲陽坐宋申錫事放歸金陵詔德裕存處之㑹德裕離浙西牒留後李蟾如詔旨至是王璠李漢奏德裕厚賂仲陽隂結漳王圖為不軌上怒甚宰相路隋曰德裕不至有此果如所言臣亦應得罪乃以德裕為賓客分司秋娘即仲陽也燕禖得皇子謂漳王也江充喻鄭注豆盧著輩也王幽茅土削湊自漳王貶巢公也四朝三十載自憲宗元和二年誅李錡歴穆敬文凡四朝也又中字音中興中字去聲杜詩漢家新數中興年楊仲𢎞詩一代人才頗中衰此字槩無平聲中酒中字平聲如氣味如中酒濁賢清聖時中之皆平聲此字槩無去聲近人用二字往往交誤姚福云中酒作去聲於義為長蓋中有中傷之義又今兩京有治中呼作平聲非是周禮天官凡官府都鄉州及都鄙之制治中受而藏之鄭司農曰中者要也謂其職治簿書之要也閨秀畫徐元嘆落木菴集云訪江城毛休文於竺塢慧文菴出其母汝太君畫扇十八面山水草蟲無不臻妙三百年中大方名筆可與頡頏者不過二三而已近日閨秀如方維儀之大士倪仁吉山水周禧人物李因胡淨鬘陳洪綬妾草蟲花鳥皆入妙品安丘張杞園説曾見邢慈淨髮繡大士極工慈淨子愿之妹又崔子忠青蚓二女亦工畫女子善書膠州宋方伯子婦姜字淑齋自號廣平内史善臨十七帖筆力矯勁不類女子又髙密單某妾學右軍楷書似黄庭遺教二經二人皆髫齔女子也陳洪綬詩陳洪綬以畫名予嘗見其小詩頗有致今錄於此楓谿梅雨山樓醉竹塢茶香佛火眠清福不知今日憶神宗皇帝太平年陽關曲注坡公陽闗三絶其二云濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽闗腸斷聲龍山在濟南郡城東七十里章丘城西南四十里古平陵城唐之全節也次公注云龍山桓温九日所登之山按此龍山在今江南之太平府與濟南了不相涉詩意何縁及此可見注詩不易信如陸務觀語周益公云云也杜律細蕪湖蕭尺木雲從以畫擅名江左常作杜律細一卷以為杜律無拗體穿鑿可笑而援據甚博聊記一二條於此以資拊掌如江草日日喚愁生草音騷詩勞心慅慅又勞心草草皆牢騷之轉音也盤渦鷺浴底心性底即低説文下也隋薛道衡使江南作人日詩首二句人笑之曰是底言低同輕忽之也獨樹花發自分明發音飛左傳建而不斾音霏荀子議兵篇引作載發注發斾也分去聲爾疋律謂之分郭璞讀也此應作仄者若杜社日詩陳平亦分肉當作平然不合律亦作仄聲蓋此字元有二聲十年戎馬暗南國暗音庵書髙宗諒闇鄭注作梁菴小室曰庵閉户曰闇不明曰暗異域賓客老孤城客音開元曲凡如青雲客讀書客俱作平聲孤音故如姑作鼓沽作估箍作股例渭水秦川得見否得音登公羊傳登來也注登得也則得可云登易豫繇豫大有得勿疑朋盍簪簪音尊得叶之又一雙白魚不受釣白音杯七命燕脾猩脣髦殘象白靈淵之龜萊黄之駘叶魚音勇荀子禮論絲歶縷翣禮記作魚曰魚躍沸池歶亦音勇易貫魚叶宫人寵不平聲沈韻載十一尤受音收傅𤣥詩悠悠建平皇澤未流朝選於衆乃子之授未聞細柳散金甲散平聲生南反元詩酒户年年減山行漸漸難欲終心懶慢轉覺意䦨散潘岳笙賦輟張女之妙彈罷廣陵之清散散叶彈諸仿此崔孝廉予門人崔華孝廉字不凋太倉之直塘人性孤潔寡合畫翎毛花卉甚工尤工詩清迥自異吳梅村嘗目為直塘一崔其佳句云攲檣坐清晝薄冷出蘋間又一寺千松内飛泉屋上行又此中枕簟客初到半夜梧桐風起時又丹楓江冷人初去黄葉聲多酒不辭吳人目為崔黄葉云予論詩絶句云溪水碧於前渡日桃花紅是去年時江南腸斷何人㑹只有崔郎七字詩二句亦崔詩也宋林唐兩義士陶南村輟耕錄載唐義士珏玉潛林義士德𤾉景曦收葬宋陵骨事同異或謂昭陵玉匣走天涯等四首為唐作今考林集具載又冬青花一首亦載集中獨所謂馬箠問髐形一篇集無之似屬唐作耳考林集有答唐玉潛詩云畎畝孤心老未衰一籬瘦菊一瓢詩黄埃赤日漫多事蒼狗白雲能幾時山酒柏香春壽母按書芸冷夜呼兒横琴妙在無絃處何必知音有子期蓋二公同時友善同為義舉爾時各有詩紀事皆以冬青寄意而王筠菴國器鄭明德元祐二君所記傳聞異詞耳南村以東嘉去杭千里冬青豈易持去縱持去豈能不枯瘁疑是唐詩作林詩此則未取林集參互考證之也按林又有詩酬謝臯父云夜夢繞勾越落日冬青枝此尤可證又有精衛秦吉了南山有孤樹蔡琰歸漢圖等篇皆可互相發明草木子亦以為林景曦唐玉蟾二公事葉世傑去元未遠所記多元朝遺事聞見尤可據也明嘉靖初遼藩光澤王重刻霽山集序之甚詳呉畫余繡康熙丁未從同年徐敬菴旭齡處見秀水呉氏畫扇二一學李小將軍山水一洛神圖妙入毫髮呉字素聞其人亦天人也予在廣陵時有余氏女子字韞珠年甫笄工仿宋繡繡仙佛人物曲盡其妙不啻針神曽為予繡神女洛神浣紗諸圖又為西樵作須菩提像皆極工鄒程村彭羨門皆有詞詠之載倚聲集世祖御筆康熙丁未上元夜於禮部尚書王公崇簡青箱堂恭覩世祖章皇帝御筆山水小幅寫林巒向背水石明晦之狀真得宋元人三昧上以武功定天下萬幾之餘游藝翰墨時以奎藻頒賜部院大臣而胸中丘壑又有荆闗倪黄輩所不到者真天縱也汪靜宜劉公㦷吏部姬汪氏靜宜字稺嫺金陵人有詩云長信不知君意切相思猶隔兩重雲不須更買長門賦但畫蛾睂以待君六月髙風振海吹遙遙親舍白雲陲誰知天上芳菲淚濕却新愁似斷絲康熙丁未在京邸作也踰年歸潁至青縣覆舟死安問狐狸漢張綱曰豺狼當道安問狐狸西漢侯文署東部督郵對京兆尹孫寶曰豺狼當道不宜復問狐狸語在綱前唐才子傳楊文貞東里集載唐才子傳西域辛文房著十卷總三百九十七人皆有詩名當時其見於唐書者百人其行事不闗大體不足為勸戒者不錄研北雜志記王執謙伯益事云同時有辛文房良史西域人並稱能詩按全唐詩話唐詩紀事二書例皆以詩系人文房此書視二書當尤詳備惜今無傳矣元文類載文房蘇小小歌一篇云東流水底西飛魚銜得錢唐紋錦書幾囘錯認青驄馬著處閒乘油壁車鸚鵡杯殘春樹暗葡萄衾冷夜窻虚蓮子種成南北岸苦心相望欲何如黄媛介詩禾中閨秀黄媛介字皆令負詩名數十年近為予畫一小幅自題詩云懶登髙閣望青山愧我年來學閉闗澹墨遙傳縹緲意孤峰只在有無間皆令作小賦頗有魏晉風致少時太倉張西銘溥聞其名往求之皆令時已許字楊氏久客不歸父兄屢勸之改字不可聞張言即約某日㑹某所設屏幛觀之既罷語父兄曰吾以張公名士欲一見之今觀其人有才無命可惜也時張方入翰林有重名不逾年竟卒皆令卒歸楊氏豁堂詩錢塘正嵓禪師字豁堂賦詩清麗予於金陵靈谷寺見其同凡詩集二卷愛之略采數首於此御教塲中月直時下山全不道歸遲三松影落半湖水一路沿鐘到淨慈扁舟赤壁酹西風千古雄雌在眼中欲得周郎重迴顧銅絃鐵板唱江東晉人名理宗莊老剡縣風流説謝支雖為神州鍾紫氣惜君未見馬駒兒幾日春遊徧若耶入城滿面是煙霞正愁仙福難消受又喫人間御貢茶皆無香火氣唐𢎞秀集中所少記觀杜氏書畫偶過杜子靜編修鎮出書畫同觀記其尤者於左一郭河陽摹王宰平泉圖署臣郭忠恕奉旨摹有御府圖書後有東坡李氏園詩子由書書法類長公署紹聖二年十月二日按長公以元祐八年自定州南遷紹聖二年公在惠州少公亦在謫所而此乃御府所藏不知何從書之此為可疑又有洛陽富直柔紹興癸丑春題字景定壬戌重午臣賈似道敬觀題字襄陽李友真陳懋欽陸祖凱至正元年六月題字張渥叔厚至正壬辰跋呉興趙孟龥子俊跋商文毅公𢎞載跋子俊跋以為李文饒洛陽平泉且引隴右諸侯日南太守之句而卷首署李將軍畫中有偉丈夫設皋比亭中亭下壯士林立挾弓矢衣袴褶顧盼自雄按平泉為衛公别墅不應稱將軍若蘇詩乃為李茂貞園作鳳翔八觀之一也茂貞以僖宗光啓三年平李昌符尋為鳳翔節度使園正其時營造詩中所謂云昔李將軍負險乘衰叔者是也俗又稱皇后園蓋謂茂貞之妻然又不應稱平泉又杜子美有王宰山水歌所謂能事不受相促迫王宰始肯留真蹟云云則當是開元大厯間人與文饒茂貞皆不相及皆不可解然畫圖清麗非俗筆富趙諸題字尤精妙聊記於此俟博學君子辨之一趙文敏山水卷山濃水澹一小舟出没煙靄中舟上人小如蠅頭氣韻生動可愛江岸有牧人驅兩烏牛一嚙水草一前行昻首若有待而鳴喚其羣者署延祐庚申歲子昻七字後有陵陽牟巘漢東孟淳呉興周魯三詩又鄒立誠一詩云王孫去後草萋萋故國荒涼路欲迷夢入江南圖畫裏綠隂愁煞杜鵑啼呉僧妙才詩云前汀水暖新蒲綠鸂鶒鵁鶄日日來路入平湖半煙樹片帆何日雨中開二詩尤佳一米元章細楷黄庭内景經自署中岳外史首尾皆有紹興内殿秘賞御印及賈似道姓名小印柯九思印南宫墨蹟傳者多大字如此者尤為稀有聞孫退谷侍郎極賞之又元章行草奕棋圖長歌後署元豐二年為宏齋筆勢竒拔類黄魯直詩云神仙縹緲何年别忽此逢迎山石裂前溪練瀑派玉簾更後雲林霧痕缺聚頭磕額方外人擔肩抱蟾骨法新棋秤對奕環座看誰信樵斧忘青春我今髮雪三千丈尚要崑崙撐頂上爐心且養九轉丹拂刼銖衣記無恙宏齋出此卷皆方外一種閲世髙人面目相看皆三生歴刼中崑崙頂上聚首磕頟者劃然良覿喜不自勝為書其左方元豐二年米芾後有文休承王元美二跋又元章九月十一日曉渡揚子五言古詩墨蹟有孤嶼水中圓遙空海邊濶之語殊有隂何風致後有董宗伯跋一梅花道人山水上方有竹間題五言絶句詩八分書蘇黄詩品蘇文忠作詩嘗云效山谷體世因謂蘇極推黄而黄每不滿蘇詩非也黄集有云吾詩在東坡下文潛少游上雜文與無咎伯仲耳此可證俗論傅㑹之謬野老記聞載林季野目魯直詩未必篇篇佳但格制髙耳同父論曹瞞之非陳同父論曹操當合張魯之資乘漢中之勢整兵臨蜀則劉璋震恐欲召昭烈而無所及即昭烈至亦不能禦况荆州用武之國昭烈必不肯與人而徑入蜀則璋不得不降璋降蜀平然後命夏侯淵張郃守之躬自還鄴整兵向荆使許洛之兵衝其膺蜀漢之兵搗其脊絶呉之糧援則荆州破昭烈蹙然後傳檄江東雖有智者不能為呉謀矣云云近日臨川傳占衡平叔論劉曄云操破張魯劉曄説以乘勝取蜀操不聽説者咎操失此機事令蜀用法正計遂破淵郃軍得漢中予以為不然操既平張魯兵威已極士皆思歸若復規益州艱在轉運是强弩之末非所以保勝而自全也定河北討烏丸猶躊躇前却荆呉果謀襲許倖而未成耳烏林以來操有戒心於江東久矣安肯遠涉巴蜀操之用兵必顧萬全皆類此也二説殊相矛盾予嘗考其時昭烈入益州在建安十九年操破漢中在二十年是時昭烈已領益州牧有諸葛公為股肱法正為謀主趙張馬超之屬為爪牙劉巴彭羕之流皆處之顯任盡其器能綱舉目張蜀中已成磐石之勢安得謂蜀人懾操之威必不拒守且謂昭烈不入蜀璋必出降如矇者之道黒白耶陶詩甲子辨臨川人傅平叔占衡永初甲子辨云陶詩中凡題甲子者十皆是晉年最後丙辰安帝尚在琅邪未立雖知裕篡代形成何得先棄司馬家年號而豫題甲子乎自沈約李延壽并為此説顔魯公醉石詩亦云題詩庚子歲自謂羲皇人蓋始以集攷之謂庚子後不復題年矣不知陶公之出處大節豈在區區耶晉書陶傳削去甲子之説昭明靖節傳亦無是語一在南史前一在宋書後同時若此不妄附㑹云云及讀宋文憲公集乃知此論先發於潛溪平叔特踵其説耳宋跋淵明像云有謂淵明恥事二姓在晉所作皆題年號入宋之時惟書甲子則惑於傳記之説而其事不得不辨今淵明之集具在其詩題甲子者始於庚子而迄於丙辰凡十有七年皆晉安帝時所作初不聞題隆安元興義熙之號若九月閒居詩有空視時運傾擬古九章有忽值山河改之語雖未敢定於何年必宋受晉禪之後所作不知何故反不書甲子也其説蓋起於沈約而李延壽著南史五臣註文選皆因之雖有識如黄庭堅秦觀李燾真德秀亦踵其謬而弗之察獨蕭統撰本傳以曽祖晉世宰輔恥復屈身後代朱元晦述綱目遂本其説書曰晉徵士陶潛卒可謂得其實矣烏虖淵明之節其待書甲子而後見耶羽陽宫瓦橘軒雜錄鳳翔府古雍州秦穆公羽陽宫故基在焉其瓦有古篆羽陽千歲字昔雲中馬勝公得之隂字在硯之左竒古非銅雀所及東觀餘論云長安民獻秦穆公羽陽宫瓦十餘枚若今筩瓦然首有羽陽千歲萬歲字老學叢談云銅雀瓦皆陽字紀建安十三年造嘗聞其土著人云瓦甚大一片可為四硯池北偶談卷十二
