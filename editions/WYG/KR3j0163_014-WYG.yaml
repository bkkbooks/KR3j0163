body:
  text: 池北偶談卷十四刑部尚書王士禎撰孫氏陸務觀作孫夫人誌云夫人幼有淑質故趙建康明誠之配李氏以文詞名家欲以其學傳夫人時夫人方十餘歳謝曰才藻非婦人事也夫人威敏公沔四世孫李氏即易安也蘇子美雪詩往讀退之雪詩龍鳯交横飛及銀杯縞帶之句不覺失笑近讀蘇子美雪詩有云既以脂粉傅我面又以珠玉綴我腮天公似憐我貌古巧意裝㸃使莫偕欲令學此兒女態免使埋沒隨灰埃據鞍照水失舊惡容質潔白如嬰孩更為噴飰子美詩極為歐陽所推與石曼卿梅聖俞齊名而其俚惡乃至此何耶子美嘗自言平生作詩被人比梅堯臣寫字比周越可笑所謂人苦不自知耳歐陽詞今世所傳女郎朱淑真去年元夜時花市燈如晝生查子詞見歐陽文忠集一百三十一卷不知何以訛為朱氏之作世遂因此詞疑淑真失婦德紀載不可不慎也桃源詩唐宋以來作桃源行最傳者王摩詰韓退之王介甫三篇觀退之介甫二詩筆力意思甚可喜及讀摩詰詩多少自在二公便如努力挽强不免面赤耳熱此盛唐所以髙不可及􅭴字音全唐詩話唐詩紀事幷載馬彧贈韓定辭詩云燧林芳草綿綿思盡日相㩦陟麗譙别後巏􅭴山上望羨君時復見王喬按字書􅭴音務顔氏家訓云柏人城東北有孤山闞駰九州志以為舜納於大麓即此山世俗或呼為宣務山予嘗為趙州佐共太原王邵讀柏人城西門内碑碑是漢桓帝時縣人為令徐整所立銘云土有巏務山王喬所仙方知此巏務山也巏字遂無所出務字依諸字書即旄丘之旄也旄字字林一音忘付反今依附俗名當音權務耳入鄴為魏收道之收大嘉歎其作趙州莊嚴寺碑銘云權務之精即謂此也予按此則馬詩當作莫毫反耳定辭即忠獻曾祖行東坡書此詩乃云不知何許人豈一時失於考據即二金石録趙明誠與其婦李易安作金石録其書最傳曾子固亦集古篆刻作金石録五十卷見子開所撰行狀今元豐類稿第五十卷所載金石録跋尾僅十五條蓋未竟之書也曾書在趙前而世罕知者曾子固詩彭淵才恨曾子固不能詩今人以為口實今觀類稿中諸篇亦荆公之亞但天分微不及耳若皇甫持正蘇明允陳同父乃真不能詩也潞公詩文潞公承楊劉之後詩學西崑其妙處不減温李五言如雲淡天迷楚樓髙地占秦哀箏兩行雁小字数鈎銀巷陌三條月池塘十歩春府門初夜閉多少夜遊人見山樓蘅薄頻牽望楊林久駐鑣香囊徒叩叩雲月自苕苕翠佩傳情密微波託意遥翩鴻漸髙逝翻恨隔神霄蘅臯楊栁亭臺暮梨花院落深玉池波湛湛珠幌影沉沉逺思隨莊蝶春懐怯雍琴萱蘇不蠲忿擁鼻獨清吟深院小檻風驚葉幽庭露泫柯芳塵千里遠幽恨九逥多螢影穿簾押蛩聲出砌莎寸心無以寫望月但長歌秋夕七言如小閣登臨春暮時綺欄飛闥映游絲鶯喧曲檻韓馮樹蘚晦幽庭貢禹綦閒對碧雲吟桂水狂思長袂宿蘭池徘徊望斷江邉客采得瑶華寄與誰登通山閣獵徧蘭叢與桂枝巢居未必有先期靈臺十仞烏隨轉阿閣三重鳯豈知度栁暗催蟬嘒嘒出雲髙送雁離離漢宫玉樹知何限爭忍重吟畫扇詩秋風髙樓閒背夕陽登𣺌𣺌長懐不自勝錦瑟有時聞北里鈿車何日到西陵地寒萱草猶難種天遠瑶華豈易憑多謝蘇門清嘯客了無塵事染壺冰寓懐縹帙青箱次第開慨然英氣轉難裁莫言每事俱長徃須有清風屬後來彈鋏始知皆瑣旅枕戈方信是雄才平生自信真非薄只是休容楚鴆媒閲史有感蘇文忠公常稱潞公長律無一字無考據世猶未知其工妙如此明内鄉李子田撰藝圃集近石門吳孟舉撰宋詩鈔皆遺潞公予偶讀公集摘録如右地名容齋四筆載興國宰書稱瀲水有驅䇿云瀲水者彼邑一水耳郡中未嘗知之近時人自系鄉里多舉其地一山一水或一古蹟令人茫然不知何地甚有割裂古名如常州稱南蘭而去陵字江寧稱白鍾蓋合白門鍾山而各去其一字此何説也又嘗見諸城二士人詩卷一稱蘇臺一稱秦臺或問之則蘇臺者謂超然臺秦臺謂琅邪臺耳尤可絶倒王介甫詩王介甫白鶴吟云白鶴聲可憐紅鶴聲可惡白鶴靜無匹紅鶴喧無数白鶴招不來紅鶴揮不去長松受穢死乃以紅鶴故云云當介甫得政變法爭新法者白鶴也所謂招不來者是也呂惠卿之流乃紅鶴也所謂揮不去者是也介甫之受穢豈不以惠卿輩耶此老好惡顛倒至此可憐哉張伯成注杜懐麓堂詩話云杜律乃張注非虞注宣德初有刋本按張性字伯成江西金谿人元進士嘗著尚書補傳獨足翁吳伯慶有輓詩云箋疏空令傳杜律志銘誰與繼唐碑予在京師曾得張注舊本閻立本畫孝經閻立本畫孝經圖一卷褚河南書故明大内物後歸孫北海侍郎承澤家相傳明時東宫出閣例以此圖為賜吳祭酒梅村偉業詩每見丹青知聖孝累朝家法賜東宫是也壬戌冬杪於宋牧仲齋見之杜于皇語康熈三年予與杜于皇濬陳其年維崧輩同在如臯修禊於冒氏水繪園賦詩或問杜阮亭詩何如答曰興酣落筆揺五嶽詩成嘯傲凌滄洲又問君詩何如曰但覺髙歌有鬼神誰知餓死填溝壑吳皇后臨蘭亭唐文皇後惟宋髙宗最愛蘭亭序常御筆臨賜羣臣至宫闈亦化之按宋桑世昌蘭亭考云憲聖慈烈皇后嘗臨蘭亭帖佚在人間咸寧郡王韓世忠得之表獻上驗璽文知是中宫臨本賜保康軍節度使吳益刋於石時紹興十七年秋七月丙寅又云太后居中宫時嘗臨蘭亭山隂陸升之代劉珙春帖子云内仗朝初退朝曦滿翠屏硯池渾不凍端為寫蘭亭刻吳琚家琚亦善書北固寺天下第一江山六大字琚筆也劉後村跋髙宗宸翰云大將韓蘄王髙價得硬黄本以為逸少真蹟馳獻不知其為椒殿所書也周必大在翰苑時作太皇閣帖子云筆法似慈皇信哉應璩書語應璩與滿公琰書云髙樹翳朝雲文禽蔽緑水甚似魏晉間人五言舞馬杜詩舞馬既登牀珊瑚鈎詩話云舞馬藉之以榻也朱翌引樂府雜録云有馬舞者攏馬人著綵衣執鞭於牀上舞馬蹀躞蹄皆應節是登牀而舞乃馭者而馬應節於下也二説未知孰是漫興秀水朱竹垞簡討彜尊云杜詩老去詩篇渾漫與今本皆訛作漫興非也予考舊刻劉㑹孟本千家注本果皆作與字趙云躭佳句而語驚人言其平昔如此今老矣所為詩則漫與而已無復著意於驚人也劉後村集跋陳教授杜詩補注亦云或信筆漫與云云然近日所刋本仍作興字略無辨證又云倪雁園粲簡討有宋刻十家宫詞内王建太平天子朝元日作朝迎日亦新多父敦天馬鼎祁縣戴楓仲廷栻有多父敦一上有銘云多父作寶敦用祁睂壽萬年子子孫孫永寶用凡十八字又有天馬鼎一中凹處作馬鼠形或云吕氏春秋周鼎作鼠令馬履之據此當是周物祁工部詩工部主事祁珊洲文友予同年也廣東東莞人嘗知廬江縣有詩云一夜東風吹雨過滿江新水長魚蝦予每喜誦之二宋二程元宋本誠夫與弟褧顯夫文學齊名亦號二宋程端禮敬叔與弟端學時叔俱以道學著名亦號二程褧嘗輯國朝風雅見掲軌光岳英華序寇主簿葉石林詩話載吳縣寇主簿國寶一絶句云黄葉西陂水漫流籧篨風急滯扁舟夕陽暝色來千里人語雞聲共一丘語甚工且云寇徐州人嘗從陳無已學予考後山集有贈國寶二絶句云承家從昔如君少得士於今孰我先口擬説詩心已解世間快馬不須鞭又有和寇十一詩十數篇所謂畫樓著燕春風裏楊栁藏鴉白下東者是也又有贈寇荆山詩蓋寇之字陳又有寇叅軍集序稱寇氏兄弟曰元老元弼元弼名其仕許州叅軍蓋國寶諸父云謔對萊陽姜吏部如須垓南渡後流寓吳郡與徐孝廉昭法枋友善一日同行閶門市姜顧徐曰桓温一世之雄尚有枋頭之敗徐應聲曰項羽萬人之敵難逃垓下之誅相與抵掌大噱市人皆驚后山詩陳無已平生皈向蘇公而學詩於黄太史然其論坡詩謂如教坊雷大使舞又有詩云人言我語勝黄語扶豎夜燎齊朝光其自負不在二公之下然予反復其詩終落鈍根視蘇黄遠矣任淵云無已詩如曹洞禪不犯正位切忌死語恐未盡然予獨愛其二律云林廬煙不起城郭歳將窮雲日明松雪溪山進晚風人行圖畫裏鳥度醉吟中不盡山隂興天畱憶戴公又白下官楊小弄黄騎臺南路綠無央含紅破白連連好度水吹香故故長蹲滑踏青穿馬耳轉危緣險出羊腸熟知南杜風流在預怯排門有斷章后山集南陽王文莊公鴻儒𢎞治十二年刻於潞安有公序及魏衍集記元城王雲天社任淵二序詩十二卷六百七十九首雜文八卷一百六十九首談叢理究詩話長短句附焉共三十卷賀若琴曲有賀若最古澹相傳以為宋太宗酷愛宫詞中十小調子乃隋賀若弼所撰出湘山野錄朱翌猗覺寮雜記云賀若夷也夷善鼓琴見王涯傳又云東坡序武道士彈琴云賀若宣宗時待詔即若夷也魚上木元人竹枝詞云黄魚得上青松樹阿儂始是棄郎時然本草陶注鰻鱺魚能緣樹食藤花雜俎鯢魚能上樹贊曰有足若鯢大首長尾其啼如嬰緣木弗墜宋祁方物略曰魶魚出西山溪谷及雅江狀似鯢有足能緣木秦鏡詩淄川袁松籬藩孝廉得秦鏡髙念東侍郎為賦詩云河山歴歴看來空萬古消沉向此中便是秦時明月在可能還照櫟陽宫興亡轉轂見何頻照膽咸陽跡已陳多少人間怊悵事金人辭漢鏡辭秦炯如秋水了無塵曾照阿房宫裏人惟有玉姜今不死蓮花掌上五雲新唐年世總釋戚光注云唐天祐元年昭宗天復四年改元朱温滅帝立哀帝蜀仍稱天復二年蜀天復五年三年蜀天復六年四年蜀天復七年平朱温簒位稱梁開元年五年晉岐淮南蜀武成元年六年晉岐淮南七年晉岐吳岐王承制加淮南楊隆演嗣吳王八年晉岐吳梁蜀永平元年乾化元年九年晉岐吳十年晉岐吳十一年晉岐吳十二年晉岐吳年梁貞明元十三年晉岐吳年蜀通正元十四年晉岐吳元蜀天漢年漢乾亨元年十五年晉岐吳年蜀光天元十六年晉岐乾吳武義元年蜀徳元年十七年晉岐十八年晉岐龍吳武義元年梁德元年十九年晉岐同光元年晉莊宗復唐改元岐尋内屬二年三年天成元年明宗五改元吳越寶正元年二年吳乾貞元年三年漢大有元年四年吳太和元年長興元年二年三年四年應順元年閔帝立遇弑末帝立改元清泰清泰二年吳天祚元年蜀明德元年三年石敬瑭因契丹立號晉天福元年自天祐至是三十三年昇元元年烈祖即位古今之亂唐未絶天故清泰方絶昇元已建天命人心無改也孰謂五季無君哉二年蜀廣政元年三年閩永慶元年四年五年六年漢光天元年七年元宗立改元保太殷天德元年漢乾和元年保大二年晉開運元年三年四年五年晉亡六年漢乾祐元年七年八年漢亡九年周廣順元年十年十一年十二年周顯德元年十三年十四年十五年北漢天㑹元年中興元年再改交泰元宗十六年始奉周顯徳年去帝號德自昇元至是三十二年天祐至是則五十五年自武至是三百四十二年矣使元宗能安天命事大國以右宗祀周能世敦王道叨賔之則三代之意也周顯德六年元宗十七年己未周命城金陵七年元宗十八年庚申宋建隆元年宋建隆二年元宗十九年辛酉元宗殂後主即位仍奉其正朔宋又始稱詔於唐三年後主二年壬戌乾德元年後主三年癸亥二年後主四年甲子三年後主五年乙丑四年後主六年丙寅五年後主七年丁夘開寶元年後主八年戊辰二年後主九年己巳三年後主十年庚午四年後主十一年辛未五年後主十二年壬申六年後主十三年癸酉甲戌歲後主十四年宋開寶七年乙亥歲後主十五年祖宋開寶八年後主城陷被執唐亡自烈至是三主凡三十九年自髙祖至是凡三百五十九年殷周革命而把宋國後周隋之世梁猶祀焉宋之君度不逮世宗矣左傳竒文左傳竒文以上叛下亦曰叛如王叛王孫蘇是也男子喪妻亦曰寡崔杼生成及疆而寡是也男亦曰媵以井伯媵秦穆姬是也公羊謂昭公欲弑季氏則以上殺下亦可曰弑牛耳盟用牛耳卑者執之尊者蒞之鄟澤之盟衞侯請執牛耳發陽之役衞石魋蒙之盟魯孟武伯皆小國執牛耳惟鄫衍之役吳以大國執之不合盟禮故孟彘不從春秋諡春秋諡有三字者衞之貞惠文子是也有生賜者衞侯之於北宮貞子析朱成子是也有出奔而仍得諡者臧武仲中行文子是也有作亂被誅而仍得諡者崔武子欒懐子是也困學紀聞云衞侯賜北宮喜諡曰貞子析朱成諡曰成子是人臣生而諡也魏明帝時有司奏帝制作興治為魏烈祖是人君生而諡也左傳引尚書左傳引尚書以禹謨作夏書僖二十四年地平天成文七年戒之用休襄三年成允成功二十六年與其殺不辜哀十八年官占惟能蔽志皆大禹謨也臯陶謨亦作夏書莊八年臯陶邁種德臯陶謨也此二篇今虞書以太甲作夏書昭十年欲敗度太甲篇也今實商書以洪範作商書文五年沈潛剛克襄三年無偏無黨皆洪範也今實周書雖古今叙書或有不同而太甲之為夏書尤不可解旂音劉貢父詩話云司馬君實論九旗之名旗與旂相近緩急何以區别小雅庭燎夜向晨言觀其旂左傳龍尾伏辰取虢之旂當為芹音耳康熈己未御試博學鴻儒施愚山侍講閏章卷閣擬一等上親閲定名第以旗字押韻偶誤書旂遂改置二等亦由施素讀二字不甚分别故也白蓮詩陸魯望白蓮詩無情有恨何人見月白風清欲墮時語自傳神不可移易苕溪漁隱乃云移作白牡丹亦可謬矣予少時在揚州過露筋祠有句云行人繫纜月初墮門外野風開白蓮襲勗華鰲襲勗字克懋一字懋卿章邱人少貧牧豕年三十始補諸生時邑中李太常伯華袁西野崇冕方尚金元詞曲勗謂傷雅道獨與濟南殷正甫李于鱗許殿卿為古文辭相友善年六十以歲貢仕江都縣訓導遷威寧教諭開平衞教授歸五年卒所著有懋卿集太極圖解性命辨劉尚書白川稱為朱元晦功臣王伯安諍友云勗父彪嘗以輸租詣京師見遺錢百緡於道輦載而馳及前遺錢者付之徑去華鰲字空塵亦章邱人御史珩之孫邑諸生妙於繪事落筆輒題其上曰空塵詩畫人丐之畫輒瞪目不應當其意得迥出筆墨蹊徑之外詩亦如之五言尤超詣題王仁甫卜築云大隱不在山出處乃適意送呂中甫山人云秋老畱紅葉風輕轉白蘋宿惠上人院云愛此疎林月兼之一磬清孤坐云雨霽聞啼鳥風停數落花過楊九山川上居云罏頭畱宿火花徑閉秋雲人以擬浩然微雲疎雨之句鰲亦滄溟友予少見其集今無從購矣鰲姓字亦見楊升菴集勗有寄滄溟絶句云瓜田十畞濟城東雲外青山小苑通流水桃花迷處所㡬家春樹暮煙中鰲睡起自述云槐午睡方熟息肩者稚子老妻撼繩牀飯熟呼不起不能工磬折髮亂無人理我懶我自知不要旁人喜袁崇冕附髙應玘張國籌張自慎袁崇冕字西野進士弼之子兄公冕弟軒冕皆用科第起家崇冕獨以布衣終工金元詞曲所著春遊秋懐諸曲足叅康王之座與李中麓唱酬王渼陂曰雅俗相兼渢渢有餘音楊方城曰神聖工巧元人之儔中麓曰金石之音𤣥黄之色其為名流擊賞如此嘗有客以黄鶯學畫睂詞謁李太常坐客皆言佳西野後至太常曰翁素負知音試擇佳句㡬何予已有定評西野目畢應聲曰止起五字是詞家語餘無足取太常展手示之云止未老已投閒一句客皆大笑歎服同時有髙應玘者中麓弟子亦工詞曲以貢仕為元城丞見知王元美魏懋權所著有醉鄉歸田諸稿其北門鎖鑰雜劇論者以為詞人之雄又有張國籌者以貢仕為行唐知縣善金元詞曲所著有脱穎茅廬章臺栁韋蘇州申包胥等劇在袁西野李中麓伯仲間皆章邱人與太常同時又有張自慎者字敬叔商河人遊中麓之門著金元樂府三十餘種太原萬伯修曰北曲一派海内索解人不得眼中獨見張就山耳就山自慎别號也王魯翁篆宋穆賓廷秀墓在女郎山之陽有石表一王壽卿魯翁撰文并篆書有黄山谷贊云見魯翁用筆可以酒酹陽冰之墓云云今移置文昌祠中朱文公書朱文公與徐賡載書云放翁詩讀之爽然近代唯見此人為有詩人風致如此篇初不見其著意用力處而語意超然自是不凡令人三歎不能已近報又已去國不知所坐何事恐只是不合做此好詩罰令不得做好官也文公於詩頗􅃉故能識放翁詩佳處洛陽劉文靖公謂李杜只是酒徒真孟浪語三傳元盛庶齋如梓老學叢談云蕭何傳不言律令李邕傳無一字及筆札五代劉昫傳不書修唐史辛髙陸陸放翁晚年為韓􅇑胄作南園記為世所譏然當時文士實不止此辛稼軒詞用司馬昭假黄鉞異姓真王故事髙似孫獻詩九章每章用一錫字皆一時名人又葉紹翁四朝聞見錄云莆陽陳讜文士也輸靈壁石以壽韓刻金字於石至稱之曰我王陳宣慰詩元陳伯通宣慰雲中人跛而眇自述云肢傷一體婁師德目眇三分李雁門先兄西樵吏部甲辰歲以磨勘事下西曹鍛鍊良苦兄談笑賦詩有句云縱跛尚如習鑿齒有腸終類佛圖澄較陳句又勝之聯句聯句有人各賦四句分之自成絶句合之仍為一篇謝朓范雲何遜江革輩多有此體頃見朱太史騰笑集中有古藤書塢送吳徴君魏上舍聯句甚得齊梁之意今錄於此握手古藤下秋深旅愁積歸來西溪旁猶及種春麥吳雯我亦袖輕鞭明發辭紫陌倦鳥不同飛各自張旅翮魏坤二子澹雅才肯為時俗役英詞迭相應如以桐扣石陸嘉淑栁塘水潨潨蒲坂山驛驛改歲君到時古藤花滿格查嗣璉大房一斗泉釀酒冰雪白酒熟君不來落花良可惜朱彝尊益都董楠字孟才工部尚書可威之叔也常撰古今聯句詩集六卷與張之象回文類聚皆不可少之書人參詩人葠詩昔人甚少前已言之適讀唐詩紀事又得段成式求人葠詩云少賦令才猶强作衆醫多失不能呼九莖仙草真難得五葉靈根許惠無周繇遺柯古人葠詩云人形上品傳方志我得真英自紫團慙非叔子空持藥更請伯言當細看又髙麗采參讃云三椏五葉背陽向隂欲來求我椵樹相尋椵音賈葉似桐湖湘詩髙念東侍郎珩以康熈戊申奉命祭告南岳在湖湘間有詩數百篇予喜其絶句錄之如行人到武昌已作半途喜那識武昌南煙水五千里未入衡州郭先看衡州城城門垂薜荔大抵似巴陵綠淨不可唾此語足千古天水澹相涵中有數聲櫓花放不知名稻秀猶能長芳草隱清流但聽清流響兩岸層層嶂孤城面面山横襟憑一葉睥睨洞庭間幾月舟行乆今朝倦眼開千峯翔舞處一片大江來南岳雲中盡東流海上忙他年圖畫裏著我在瀟湘芋火夜經聲悲喜寒巖寺宰相世間人何與山僧事磨甎竟不成磨銅何不可寄語馬大師努力菴前坐髙又有送人詩云故園小圃又東風杏子櫻桃次第紅明日春明門外路清明消遣馬蹄中劉綺莊著書丹鉛錄極稱唐劉綺莊桂楫木蘭舟楓江竹箭流一篇其詩果不減太白升菴博雅亦未詳綺莊何許人也按吳中人物志劉綺莊崑山尉研窮古今博考傳記作類書一百卷號崑山編其平生著作最夥而所傳祇此一詩可惜也詩使本朝事或謂作詩使事必用六朝已上為古此説亦拘墟不足信要之唐宋事須選擇用之不失古雅乃可如劉後村詩専用本朝故實畢竟欠雅如鍊句豈非林處士鬻書莫是穆參軍艱虞夷甫方謀窟老懶堯夫少出窩未愛潘郎呼作友便教米老拜為兄山房惜未從公擇書局聞曾擬道原立志如歐母生兒似富公野人只識羮芹美相國安知食筍甘自注富鄭公事事先白傅求閒後銜似温公約史年公閒去伴种司諫我懶思尋靖長官清於坡老遊杭市儉似乖厓在劔州軍皆歌范老民各像乖厓賈董竒才無地立歐蘇精鑒與人同安知李廌揮門外不覺劉幾入彀中此類數十聨皆宋事也後見後村四六亦然樂天論詩樂天作劉白倡和集解獨舉夢得雪裏髙山頭白早海中仙果子生遲沈舟側畔千帆過病樹前頭萬木春以為神妙且云此等語在在處處應有靈物䕶之殊不可曉宜元白於盛唐諸家興象超詣之妙全未夢見樊川集予舊藏杜牧之樊川集二十卷後見徐健菴乾學所藏宋版本雕刻最精而多數卷考後村詩話云樊川有續别集三卷十八九皆許渾詩牧仕宦不至南海别集乃有南海府罷之作甚可笑朱新仲詩南宋朱舍人翌字新仲著猗覺寮雜記凡四百餘條言甚博辨劉後村嘗稱其讀杜詩云縱之逼説劔收之入檀弓二句未經他人道過人名字音崑山顧寧人炎武詩有云落日江頭送伍員秋風壠上别徐君偶來圯上逢黄石便向山中禮白雲竊疑員字舊作王問切唐人語曰令君四俊苗呂崔員是也後見吳曾引春秋左氏傳伍奢子員陸德明釋文音云平聲乃知顧詩用韻有據又如馬援援字作延絹切無作平聲者宋王景文詩云直翁謂史相浩自了生平事不了山隂陸務觀放翁見之笑曰我字務觀乃去聲如何把做平聲押了此雖謔語亦可為用字不詳出處者戒貞觀年號及陸務觀俱去聲今人皆讀平聲心太平菴硯有漁於道士洑者得一硯八角製作古雅背鐫心太平菴字蓋陸放翁故物也和州項副使得之今歸淄川畢載積州守際有唐舍人詩亡友唐耕塢允甲宣城人故明中書舍人工楷法詩最清婉嘗有句云殘花野蕨圍荒砦破帽疲驢避長官蓋本徐文長詩疲驢狹路愁官長破帽殘衫拜孝陵然宋王君玉已云疾風甚雨青春老瘦馬疲牛綠野深未央宫銅奩順治中渭南漁人於渭水中得秦時未央宮香奩一具銅綠如鸚鵡毛可愛溧陽狄秋水敬為潼關道兵備副使得之副使子億予辛未所取士今官翰林唐人工書唐人留意書學即不以書名者往往有歐虞顔栁風氣蘇絳作賈島墓誌云善攻筆法得鍾張之奥元王惲玉堂嘉話云李陽冰篆二十八字後有韋處厚李商隱題商隱字體絶類黄庭經然賈李不以書名予在京師所見元人諸題跋字畫多工過今人甚逺徐豐厓論詩海鹽徐豐厓咸詩談云本朝詩莫盛國初莫衰宣正至𢎞治西涯倡之空同大復繼之自是作者森起於今為烈當時前輩之論如此蓋空同大復皆及西涯之門乃撰列朝詩選者力分左右袒長沙何李界若鴻溝後生小子竟不知源流所自誤後學不淺商喜畫京師外城西南隅聖安寺寺殿有商喜畫壁康熈庚申冬髙念東刑侍將歸淄川予與施愚山宋牧仲諸詞人飲餞於寺共為聨句五十韻牧仲有句云畫壁商喜留按崑山劉璋圭甫明書畫史商喜善畫山水人物畫虎得勇猛之勢今大西天經厰殿壁龍神及大軸文殊普賢變相亦喜筆喜宣德中授錦衣衛指揮牧仲云内官誤也西華門内𤣥都勝境在𢎞仁寺西有元人劉蘭塑三清像甚竒毛傳如紀事孔文谷序唐詩紀事云詩三百篇毛傳蓋其紀事今為考亭所絀欲究遺經當必考之云云實名通之論宋王得臣麈史云關雎后妃之德也葛覃后妃之本也此一句孔子所題其下乃毛公發明之言耳其以為子夏所傳必有授受之自惜世逺莫得而見也升菴引朱子白鹿洞賦有曰廣青衿之遺問樂菁莪之長育或舉以為問先生曰舊説亦不可廢然則考亭之盡去小序終亦有不自安於心者乎歐陽子作詩本義其序問篇云毛詩諸序與孟子説詩多合故吾於詩常以序為證惟周南召南失者類多隨而正之歐陽子所見豈出朱子下也讀書臺濟南近有人耕田間掘得讀書臺三字石刻按此為宋侍郎張公掞讀書處蘇文忠公書也見元遺山濟南行紀漢甆銀槎宋荔裳琬觀察藏漢甆盞二内有魚藻文云在秦州時耕夫得之隗囂故宮中吾兄西樵為作歌又有元人所造銀槎最竒古腹有文曰至正壬寅吳門朱華玉甫製華玉號碧山武塘人見陶南村輟耕錄灌嬰廟瓦吉水李梅公侍郎元鼎有硯五瓣如梅花狀質如黄玉雜翡翠丹砂之色纍纍墳起云是灌嬰廟瓦一時文士多賦之故友鄒程村祇謨作硯考引洪文敏容齋隨筆灌瓦硯銘為證諸國墨元人陸友友仁墨史載外國製墨髙麗貢墨猛州為上順州次之其文曰平鹵城進貢或曰順州貢墨或曰猛州貢墨李公擇遺東坡墨半丸其印文曰張力剛云得之髙麗使者魏泰道輔云新羅墨有蠅飲其汁立死常戒人和藥勿用新羅墨日本墨遍肌印文如柿蒂形陸子履奉使契丹得墨銘曰陽巖鎮造者其國精品滕子濟有墨一大笏為龍鳯之文面曰鎮庫萬年不毁又西域僧為蘇太簡言彼國有佳墨中國不及是雞足山古松為之金有劉法字彦矩常山人自製墨銘曰栖神巖造楊文秀金時以善墨聞其法不用松炬而用燈煤子彬傳其法以授耶律文正楚材文正授子鑄造一萬丸銘曰玉泉萬笏中山狼傳中山狼傳見馬中錫東田集東田河間故城人正德間右都御史康德涵李獻吉皆其門生也按對山集有讀中山狼傳詩云平生愛物未籌量那記當年救此狼則此傳為馬刺空同作無疑今入唐人小説亦如天祿閣外史之類三劔孫北海承澤家藏三劔其一銅劔長尺餘有鳥篆十字云吳季子之子保之永用劔篆甚竒古其一玉劔長尺有二寸博三寸中鑿一孔剡其上若芒刃云有人得之成湯墓中其一魚腸秀水朱處士彛尊云疑鄭康成所謂大琰者也考之桃氏作劔未聞攻玉玉劔之載於六經者無之遂定以為圭因作釋圭司馬相如錢編修宫聲中諧有司馬相如小玉印因憶元陸友仁得衛青玉印翰林虞伯生諸公皆有詩友仁因著印史按衛宏曰秦以前民皆以金玉為印唯其所好自秦以來唯天子之印稱璽又以玉羣臣莫敢用按此宏説或不然又後世謂詔令為璽書按國語襄公在楚季武子取卞使季冶逆予之璽書注云古者大夫之印亦稱璽池北偶談卷十四
