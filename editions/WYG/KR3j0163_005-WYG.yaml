body:
  text: 池北偶談巻五刑部尚書王士禎撰朱公遣婢帖總河尚書義烏梅麓朱公之錫温然長者以清慎受知世祖皇帝後齎志以殁又無嗣子近見公遣婢帖真盛德事錄之以示後生知前輩用心如此帖云前送回張氏女子原無大過只是娃子氣好言教導不甚知省誠恐聲色相加流入婢子一類所以量給衣飾還其父母初時原是待年五六日後便有遣歸之意故自後并無半語諧謔猶然處子也而此女臨去時哭泣甚悲旣恐人笑又恐人不相信不肖甚憐之足下可將此女原無大過完璧歸趙一段緣由向其父母中媒昌言明白以便此女將來易於擇壻也康熙中徐兗淮揚間人盛傳朱公死為河神十一年總河王中丞徇民情疏請建祠濟寧下部議寢其事按公此事與宋張乖崖及明左都御史沂州王公璟事略同王事見西園雜記申殷張永年申和孟涵光節愍公長子有文章志行以詩名河朔間同學多為大官申獨隱居不出有故人自京師寄書申報以詩云日日秋隂命筍輿故人天上落雙魚荷花未老新醪熟為道無閒作報書其簡傲如此一時同隱廣羊山中者有殷岳宗山張蓋覆輿殷工五言古詩平生不解為近體常為睢寧令輒自罷歸張善草書通輕俠晚值亂離鑿坏以居不與人接人有偵之者或夜讀經傳達旦時或痛哭張贈申詩云草澤賢豪盡上書奎章閣外即公車我甘漁父因衰老獨有涵光是隱居後發狂死和孟為立傳刻其遺詩二巻韓計北平韓鼎業字子新流寓中州李空同墓在禹州山中為流賊所發韓收其骸骨𦵏之呉江計孝廉甫草東遊河北訪謝榛墓於鄴西門外為立碣表曰明詩人謝茂秦墓二事皆有古人之風按空同山在禹州與具茨接獻吉本扶溝人且生於汴故取為號殁即𦵏焉非平凉之空同山也駱金吾駱養性字泰如京師人崇禎朝為大金吾熊魚山開元姜如農埰二公俱以直言得罪下錦衣獄一日漏下二鼓一小中官持懷宗御筆至云諭駱某即取熊姜二犯絶命繳駱附奏繳㫖略云言官果有罪當明正典刑與天下共棄之今昏夜以片紙付臣殺二諌官臣不敢奉詔奏上帝怒為之霽二公皆得不死駱至順治中尚在宋荔裳嘗識之左良玉左良玉偃蹇武昌不奉朝命其東下以討馬阮為名實叛逆也侯方域為寧南侯傳以私恩語多失實論者猶以是予之董卓傳卓旣廢立乃與司徒黄琬司空楊彪俱帶鐵鑕詣闕上書追理陳蕃竇武及諸黨人以從人望古來奸賊依倚盜名類同一轍如此張黻廬陵張幹臣學士貞生世祖黻明成化時仕為後軍都督府經歴嘗以救林見素得罪與陳白沙交善予從學士處見白沙送别詩手蹟云草閣春風忽兩人坐臨江水看江雲尋常肝肺詩中寫六十頭顱鏡裏分落絮風驚還著樹行人日出又離羣布帆逺下南京道望斷梅闗不見君張氏以理學直諫為家學其淵源有自矣王烈女張秋王烈女名嬌諸生王碧侯女風姿絶世而駘宕不羈崇禎辛巳冬張秋被兵將犯烈女女大罵而死血凝河氷經春不化葛端肅公家訓德平葛端肅公為明嘉隆間名臣東阿于文定公稱大臣有德望者獨推公公與予家世姻婭先太師公長女公孫婦也嘗讀公家訓謹錄數則於左予初仕為彰德府推官視府篆遇冬至在趙王府慶賀畢王傳令㫖各官即以朝服見予謂朝王舊禮皆吉服今遽更變不敢從王令長史持一冊來云此書開載應朝服予謂旣非沿習又無素考一旦改度理不可從所持不知何典記未可遽信長史復啓王大怒將引禮官拷掠欲以恐喝長史復來云殿下盛怒不具朝服恐不容見予曰不見亦得即請於朝違令㫖之罪亦可認若不應服而服則闗係甚大各官罪不可測聞寧藩初令各官朝服惟李夢陽不肯事竟如何長史往復良久日已髙王遂令照常吉服朝見後見崔後渠公云不圖子有是識有是力也予在鄴三年餘毎公出必自齎盤費縣驛私餽下程俱不敢受嘗至汴城查盤事畢以餘金買銅茶壺一具遇大風雪黄河氷不可渡待於河上仍鬻壺以為途費今聞里甲驛逓之費至於不可紀極如之何民不貧困流亡也予遇急缺風憲行取時年二十九嵗限以十月到部舊例選科道三十以上方得與若遲兩月即合例予平生謂處事最不可用意纔用意便非順天命故依限赴部吕文選從周詫曰君年二十九例不得選臺省予曰自知無分居數日授兵部主事守山海闗冢宰汪誠齋語左都御史王浚川公曰葛君年二十九更兩月則及格矣渠不肯候是其人亦可取公曰是予山東提學時門生也在彰德甚有聲崔後渠亟稱之公又語予曰君不謀臺省良有見居官何必臺省能稱職即是好官耳予鄉平度李正夫以文選副郎改翰林部例一人出衙門則舉同鄉一人為代武城王舜渠及邢北原先薦予於正夫正夫遂告之冢宰文選皆曰可予素不識正夫特相過訪屏人曰今見鄉兄吾所舉可謂得人且曰吕東匯欲兄一見予有難色正夫又曰兄謂銓曹不易見耶我當同兄一往予曰否否旣已見矣則當有言是渉於求吾弗能也正夫曰今求者多以為事當出於某故皆不得而兄顧以一見為難乎予曰鄙志以為不可求故不能從正夫又曰昨王道思薦李中麓東匯謂某已薦兄今胡如此予曰中麓兩同年也素相厚得吏部猶我也況中麓不在京師豈可令士大夫謂某潛與之爭乎請鄉兄遂薦之正夫乃悵然罷去於是決用中麓矣予詣正夫謝相負之罪正夫曰予初不知兄之髙如是山東正氣也吾重之有加於代吾為吏部矣郭君弼亦稱道以為君子立身當如是後中麓以文選陞太常值予服闋以予前相讓之意仍欲薦予與冢宰許松臯公曁文選王象山嘉賓言皆允乃作書促予北上時以日淺不可遂行比至都有舊吏部林東城春周棗山卿皆以起復先至中麓甚憾予遲旣數日偶吏部有胡纓溪鯨者不為衆僚喜議欲出之於外以為予地中麓間來語予予曰擠人而奪其位此豈君子之心果如所云予當乞病歸必不忍就也且前日吾能讓兄今顧可攘人乎中麓曰迂哉葛子予曰誠然寧迂勿躁也中麓意乃止越數日祠祭主事缺補之予在山海時陶真人仲文以遼陽庫官任滿回夾帶軍妻至闗詰出予發巡捕指揮徐鳯儀問究軍妻解回原衛仲文家人依律問擬追問渠甚銜之渠妻與闗民張鸞妻結為姊妹仲文至京有真人之寵鸞與妻遂相往來徐是山緯守闗因盤詰武定侯郭勛家人被其誣奏至於逮係仲文語人曰山海主事亦可拿乎意蓋在予也時予以起復至京詹角山語予曰此人不可不防予曰禍福固有定數不能宛曲求解聽之而已予尋補禮部遷儀制郎中仲文時加禮部尚書擇日來部到任予與衆僚議不可相見是日當託故皆不入部衆以為然至日渠來見四司無人各留一名帖而去竟亦無如之何也寧府宸濠反同謀者郡王將軍而下若干人本犯皆令自盡家屬發髙墻禁錮後命科道官各一人至彼看議姑容回本府為庶人旣得脱禁輒復營謀請封夏桂洲掌禮部時為之題覆酌量俱准襲中尉女皆為鄉君已封若干人矣予在儀制有接踵奏請者予查刑部移來原題稿其祖若父皆親同謀反人遂具稿叅駁呈嚴介溪宗伯嚴曰此事桂洲久已准行今遽變易桂老在閣豈不取怪況予亦江西人先已准封我乃叅之人其謂我何予曰郎中亦知桂翁在閣翻異所行必當致怒然法不可行只得據正題覆意外之禍聽之而已旣具題桂洲竟擬㫖云某等你部裏旣查係謀反者子孫都不准襲今後再有奏擾的治罪不饒全無怒意蓋亦自知先題准之非得此一解永無後虞也寧藩逆廢只令弋陽王以本爵管理府事渠乃無涯之心萌初求審理刑吏部題覆與之旣以教授輔導職卑恥同各府奏欲以審理輔導予在儀司叅之以為郡王府止有教授親王乃有審理弋陽王雖理府事爵實郡王據稱添有審理已為非分今又卑薄教授欲以審理輔導理刑之官非可以兼輔導若如所請將來隴蜀之請又不知其如何所據弋陽王拱樻非望奏瀆祈天語嚴加戒飭雅宜安分恪守成憲無得仍前妄意奏擾自取罪愆奉㫖是拱樻屢有奏擾不務安靜著今後恪遵憲章保守祿位毋得聽信撥置自取罪愆明㫖昭然宜知警戒各衙門亦當稍知裁抑矣未幾奏乞長史吏部郎選與長史二人又乞校尉兵部又題與校尉五十名其校尉巾帶奏乞照例給與事在儀制司予諭其齎本人曰親郡王各有體制原不相同今弋陽王欲全比親王是入繼親王也何謂以本爵管理府事汝速歸啓王宜安分吾決不與渠曰兵部已與校尉校尉應有巾帶予曰此自兵部大錯校尉可有巾帶決不可得後長史亦竟被言官叅革云予自陜西布政使入覲帑羡一無所㩦有時相子官太常尚寶同衆邀飲亦只照常送一帕儀吏白他省藩司未嘗有以此送嚴管家者而顧以貽其主人恐嗔怪予曰厚則吾力實有不能相諒與否聽之而已嚴管家者分宜家人嚴年也巡撫培養一方元氣不比巡按專有發奸擿伏之任故貴寛簡長厚予在河南只重循良有司不奬喜事獵虚名者更嚴禁貪酷之吏常刻木榜曰爾之俸薪皆出於民更殘民以逞取充囊槖不有明罰必有幽責不於其身必於其子孫後予在吏部佐中外考察數四舊屬官鮮以貪墨敗者不可謂無所感孚也然待人而興猶屬庸士若豪傑則自知砥礪矣勉之勉之予在吏部四載餘兩推太宰一次相公各有所託且曰即以元輔次輔所薦為正陪予謂冢宰統百官均四海一遂柄用大闗君子小人之進退須從人望烏可徇人竟推南太宰周公延疏上大拂時相意得調㫖另推兩員來看二公復申前請謂閣中已秘揭薦過非此二人不可予不能從明日東闕會推更推總憲屠公僑一廷相顧不言而罷予徑出至端門楊虞坡兄趨來同行曰今日之舉正人增氣多矣兄不見環聽者悚然乎疏上相公大怒果各具揭薦所囑者且云吏部偏執意見越三日疏揭俱不發聞上共納袍袖中左右莫測又數日忽宣召吏部守禮趨至迎和門中官捧御筆特㫖出批部疏面云著黙復職之任黙者福建李古冲時家居故云聖明總攬乾斷不惑私議兩相受上眷知之深費許多心計竟不能用一私人豈尋常世主所及哉陶仲文旣荷寵異常入直萬夀宫時於便殿賜坐賜食從容談論聞上兩次詢大臣臧否至守禮則先發云此朕所素知是在禮部山陜河南有聲者聞他清操如故陶出輒恚憤累日語其徒曰葛與川公好造化上毎訪問諸大臣便先稱之蓋修舊怨不能遂其中傷也此自鬼神呵䕶然聖德髙明埒於大造吾子孫當世知所以報稱可也丙辰自南京謝政歸里舊宅已推與弟姪輩始自營第一區檢笥中得二百餘金查莊上畜糧僅數百石於是年期起室一進約數年竣工興作之費毎至稱貸爾輩其知締造之艱兢兢保守之此宅以有家廟家塾幾世未析百口同居勢不得不從闊大以後子孫出居毎宅寛只許五楹深約三四進勿妄扳援此宅規制其同爨弟姪輩欲析居時除爾曾祖見産𤓰分之外各與城宅一區鄉莊一所田二頃塋地數畝以稱予親親之誼予在仕途三十年今得優游林下於世味淡然相忘似皆得簡靜力士大夫但有為名使人喜之心做官就要矯激自炫以急人知煦煦行惠至違道以要虚譽居鄉必不能修己逺利表正風俗即知自好亦多甘為鄉愿之行俟命君子所謂無入而不自得蓋以立身行己自有法度對不自失而言耳顧居鄉無難只要在家讀書靜坐不管門事敦倫理屏嗜慾勿干請有司禁絶假託用勢者耳若做官要做人事事念念為義為公成敗利鈍皆無足計須先知内外檢㸃卓然自立不依阿淟涊附人持法公平宅心忠恕勿恃一守而輕儕慢民勿為宦成而肆志傲物兢兢翼翼作事謀始凡自我行務上有益於朝廷下有利於生民而無求赫赫之名其庶矣大凡人能清約即能秉正事無不可為夫出處一機爾輩自今即學亷靜無欲異日居官自當得力使人稱為清白吏子孫可矣又二則曰同年中天植忠直吾不如郭君弼嘉靖癸巳十月予行取至京君弼為御史暇則相見十二日夜星隕如雨無一人建言者五日後君弼過我曰兄能為程舜敷否予曰兄欲為楊實卿乎蓋楊曾論邵真人下獄追主使之人並逮舜敷不隱得謫故戲及君弼因曰星隕大變舉朝無言者我言官也數日來甚不得已已草奏矣兄為我討論之疏上三日不下君弼復過曰事不測矣少頃逮錦衣獄復奏上著拿來午門前打四十棍錦衣夾拶已近百矣兩腿露骨死而復甦予視之初無悔意旣而巡按蘇松釐奸剔弊臨滿止為朱玉峰建一坊題曰崇德為文衡山建一坊題曰表節雖顧味齋在閣中亦不及也後遷順天巡撫時夏桂洲起用南來各巡撫皆候境上保定巡撫蘇舜澤以書邀君弼君弼辭之未幾以地方小事票令閒住旣以太宰熊北源薦起督宣大總兵張達輕出犯敵營陣亡事出頃刻君弼駐陽和相去二百里比夜始知給事中唐禹劾其不救下錦衣械繫打一百謫戍鎮魯今十餘年矣行乎患難無所怨尤忠直之性挫而愈厲是吾所瞠若者也雅性恪介吾不如呉汝薦蓋其幼時性慕冲𤣥故於世味澹然無欲予在儀制時汝薦為户部郎中一日來司中見架上紙十餘刀問曰此何用予曰將以換書曰此官物換書則其私也予曰户部亦有之兄何所用曰公則用餘則貯司庫以待來者後守廬州府治對有山所出柴木舊供府用曰此官物也計其值皆入庫作正數他可知矣母卒於官扶䘮歸宅為水所壞借其族兄房三間停柩且居之不謂陋也繼補保定則宿於堂之東間十日始一入宅亷靜之風僚屬皆化時谷近滄為屬髙陽令深服之巡撫真保時山陜地震閣臣以考察京官應之李南渠任其事九卿以下皆列為等第汝薦以李同年得在一等與嚴世蕃徐陟陸煒趙文華輩同列渠甚病之時予免歸遺予書曰今次考察及九卿甚異事所謂一網打盡矣吾尚可久居此乎未幾竟引疾歸避居山寺數月不一至其家如此髙舉豈吾所及公隆萬間復起歴户部尚書左都御史功名氣節一代仰之如山斗及其殁後毎生忌日禱祀冢祠下輒千百人文集若干巻孫尚寳卿昕翰林編修曦刻之家塾薦隱逸康熙十年浙撫范中丞薦山林隱逸鄞縣葛世振明崇禎庚辰第二人翰林編修也旣以老疾辭不赴復奉温㫖敦迫再以疾辭遂允其請又薦布衣董漢䇿以科道試用尋為御史劾罷至下諸法司而秦督鄂善薦盩厔布衣李顒辭不至顒起田畯嘗一就科舉遂隱居讀書修明横渠藍田之學富平李天生因篤昔嘗為予言之蔡卞白敏中人有不可以一節取者宋史載蔡卞歴揚廣越潤陳五州廣州寳貝叢湊一無所取及徙越夷人清其去以薔薇露洒衣送之即此一事論之雖與沉香載石同稱可也而乃出於卞之巨姦白敏中在郎署李衛公器之多所延譽遺錢十萬俾㑹省閣諸公宴已有日時秋霖渉旬賀拔悳員外求官不得將欲出京來别悳與敏中同年閽人告以方候朝官悳駐車留書叙灞遊之困敏中得書歎曰士窮達當有時命豈有美饌上邀當路豪貴而反遺故人遂召悳先宴旣而朝貴聞與悳宴衆皆去異日敏中謝衛公以留故人負於推引衛公稱之曰此真古人所為以此一節觀之敏中過人逺甚然史稱敏中受知德裕薦知制誥尋為翰林學士至大用及德裕之貶詆之不遺餘力議者訾惡敏中相業略無足稱怙威肆行卒諡曰醜而黨附宗閔擯斥衛公尤為當世鄙薄秦太虚著論謂敏中不獨負德裕抑且負國家聨語張忠定公延登一為司空兩為總憲以功名著累朝又鄉㑹試得人最盛如劉文正理順呉忠節麟徵馮中丞元颺尚書元颷夏考功允彝及周挹齋延儒輩皆門生也少時見公㕔一聨云門多將相文中子身繫安危郭令公先忠勤公家訓先髙祖濼川公登嘉靖辛丑進士為貴州叅議以王事殁於黔贈太僕寺少卿子六人長贈布政使之翰次户部左侍郎贈尚書諱之垣即先曾祖也次户部員外郎之輔次淮安府同知之城次浙江按察使之猷次髙陽知縣之棟公教諸子最嚴家訓云所存者必皆道義之心非道義之心勿汝存也制之而已矣所行者必皆道義之事非道義之事勿汝行也慎之而已矣所友者必皆讀書之人非讀書之人勿汝友也逺之而已矣所言者必皆讀書之言非讀書之言勿汝言也諾之而已矣今刻石忠勤祠中先祖方伯公督不肖兄弟恒舉此訓㕔事屏壁間亦皆書之忠勤公諸孫髙祖忠勤公一日擁諸孫膝上時伯祖太師公象乾方伯公象坤光祿公象蒙皆方七八嵗公戲問太師曰汝將來中第幾應曰第二問方伯曰第一問光祿亦曰第二公喜其後方伯中嘉靖甲子解元光祿隆慶丁卯太師隆慶庚午皆第二人如其言四伯祖孝亷公象泰癸酉亦第二人其後叔祖户部公象斗翰林公象節中丞公象恒皆以戊子先祖方伯公象晉以甲午叔祖考功公象春初名象巽以癸卯相繼鄉薦皆成進士向見談薈諸書所載多訛舛詳述之司徒公歴仕錄曾祖大司徒公常自纂歴仕錄一卷謹錄數則於左以為家訓云予初選荆州府推官出京時即聞彼地士大夫有好請託者予槩不敢從時如江陵相公乃翁曹都憲年伯紀山公亦不徇從後遂絶無以竿牘來者鄉官薛太守雲澤自京師回傳江陵公語曰王公大有執持我甚服之楚撫某公陞任取荆州杉板二十副計費數百金太守趙公難之以問予予曰公政績甚著且屢登薦牘今送杉板是賄而求薦也不可趙公韙之已而薦竟居首趙公名賢汝陽人歴官南吏部尚書荆州府庫有王府故祿銀遼王差校尉取討未發時孫太守入覲通判王某署府事王提庫吏雷大夏立斃杖下其兄具告撫按俱行推官王三月不發犯人予欲報叅長史不得已始發下犯人十四名皆羈監王怒出府往道署署門閉遂至府前登鼓樓予與太守趙公同至鼓樓謁王王怒甚云王推官辱我我何面目管束諸宗儀趙公力辭罷去予隨以事至省過荆門州謁巡撫同鄉谷近滄公公曰王府事不可激予應曰亦不可徇公曰昔有神童見一老僧僧曰汝進一歩則死退一歩則亡神童應曰旁行一歩亦有何妨子正宜旁行時也予曰云何公曰子令家累且歸而身出查盤俟王稍氣平仍具文來我再添一官會鞫庶好擔當予曰諾歸即送家累杞縣令姪象坤處次日遂赴永州月餘回同岳州推官辛君㑹訊凡問軍一徒五王怒愈甚然竟無所施王素不道後發髙墻禁錮云予為舉人時以太僕府君忠勤死事入京乞卹時嚴世蕃用事賄賂公行予謂縱賂得之適足為先人辱遂竟歸歸督諸弟子姪晝夜閉户讀書相繼成立竟得卹典予以給事中充正使與禮部員外郎同年蹇理菴公冊封鄭府崇德王事完即日行餽謝甚腆一無所受理菴與予意同後理菴官至薊遼總督兵部侍郎穆宗時陳皇后出中宫外人心不安予具疏請皇后正位中宫以端治本奉㫖后侍朕久無子多病移居别宫以暢意耳汝不知内庭事妄言耶再上疏言皇后乃先帝選擇以遺陛下有闗雎樛木之德抑鬱成疾已為不可乃云别宫暢意豈有夫婦睽離而暢者哉奉㫖后疾調理稍愈即還本宫湖廣有大奸曰何心隱即何夫山即何兩川即梁無忌即梁光益的名梁汝元本江西永豐人以侵欺皇木銀兩犯罪拒捕殺傷呉善五等六人初擬死罪後得末減充貴州衛軍逃去各省及孝感縣倏往倏來假講學為名聚衆擾害地方種種不法各省歴年訪緝不獲皆有卷案萬厯七年新店把總朱心學於祁門縣獲之予發候按察使查卷問理已而心隱病死後數年臺省諸公尚有為何稱寃者蓋以假講學之名遂為所惑實不知其有各省訪拿卷案耳迄今公論始明予為户部侍郎管太倉見倉斛斗其一獨大異常問之云凡糧到倉該倉斗級毎人先支一斗此舊規也予曰是何言即照常私與亦是違法況另置大斗乎即禁革之是年修總督倉塲公署或云此銀例出各倉斗級予曰是烏可行宜乎大斗私索也乃與大司農張心齋公言部發帑金修之著為例予平日不囑託官府故入仕亦不徇人請託萬厯十八年太夫人夀日鄉人具軸禮來賀者餘三百人予曰某素不敢管人家閒事有何德於鄉黨敢勞諸君答曰正以公不説事不害人大家隂受其賜故來耳予初考選刑科即請益於掌科朱後菴公繪公曰切記不可聽人主使為他人報私仇壞自己名節予佩服之後果有具稿暗送欲書予名者急謝去之月餘同鄉一道長却持此本問予予以實告不可染但唯唯越數日竟上之識者駭異果以此敗官前輩渉歴事久多有髙見有疑難事不能自決不可不以咨問予曾有二事一請教兵部侍郎呉公望湖一請教兵部尚書張公心齋二公論甚透切予深服之予生平得朋友之益居多同學于公華峰等同僚吏部尚書趙公汝泉等同年兵部尚書劉公節齋等劉公在省尤相得予家居劉總督兩廣聞予病書來若疾痛之在其身寄桑寄生藥者再兵部尚書邯鄲張公𢎞軒總督薊遼書來林下者二毎自念未能酬報吾子孫記之報之業師魏雲汀先生諱智任知縣同僚荆州府知府趙公汝泉名賢河南汝陽人吏部尚書徐公思重名學謨直𨽻嘉定人禮部尚書孫公缺山名用福建人知府江公心源名一麟都御史省中何公來山名起鳴四川人韓公元川名楫滿州人通政梁公靜齋名問孟河南人都御史張公湖東名鹵儀封人都御史丁公觀峰名懋儒東昌人知府朱公後菴名繪平定人少卿温公一齋名純涇陽人尚書鴻臚寺賈公虚菴名儒雞澤人左少卿南太僕劉公仁軒名穩衡陽人少卿許公敬菴名孚逺海鹽人侍郎順天府丞朱公越崢名南雍山隂人太僕卿户部張公心齋名學顔肥鄉人兵部尚書劉公紫山名思問孟縣人南户部尚書楊公夢山名巍海豐人吏部尚書王公雲澤名廷瞻黄州人尚書王公後齋名友賢寧鄉人尚書公生平篤於師友魏嵗貢智公之師也公旣貴常遇諸塗讓其乘騎於魏扶持上下而身跨蹇驢以從鄉人至今稱之方伯公遺事先祖方伯公年九十餘讀書排纂不輟雖盛夏衣冠危坐未嘗見其科跣常揭一聨於㕔事云紹祖宗一脈真傳克勤克儉教子孫兩行正路惟讀惟耕齋中一聨云容人所不能容忍人所不可忍癸巳嵗作自祭文有云不敢䘮心不求滿意能甘澹泊能忍閒氣九十年來於心無愧可偕衆而同遊可含笑而長逝蓋實錄云公年雖大耋時時夜夢侍先曾祖司徒府君或跪受扑責如過庭時云方伯公同學方伯公少在京邸從青州張見堯先生學同學者臨胊馮文敏公琦蒙隂公文介公鼐馮與公同年生方伯少兩嵗兄事之後為諸生受知提學理菴蹇公達召入書院凡四人則公及濟寧于中丞若瀛臨清栁尚書佐其一即文介也公以萬厯辛丑進士改庶吉士時馮公以吏部侍郎教習庶吉士方伯公答人詩方伯公素不喜修煉之説恒掲寧靜澹泊四字於壁讀書眠食外惟瞑坐調息而已嘗有答侯晉陽大叅一絶句云問余何事容顔好曾受髙人秘法傳打疊身心無一事饑來喫飯倦時眠公殁時不肖年二十矣回憶公一言一行真羲皇以上人也按饑來喫飯倦時眠乃傳燈錄義海禪師語王陽明與人論學亦曾引之方伯公知人二伯祖方伯中宇公象坤年十八領解為嘉靖甲子明年乙丑成進士歴仕山西左布政使卒官貧至無以殮撫按以下為醵金治後事乃得歸清正名臣也公藻鑑尤精為河南提學時萬厯壬午鄉試榜將發直指問公曰解頭當屬何人公曰杞之周九臯否則汝陽李宗延耳已而周果領解李次之李公仕至户部尚書侍御公殉節伯父侍御百斯公與𦙍登崇禎元年戊辰進士入翰林改御史甲申公家食已八年矣聞三月十九日之變同妻子盡節於几案間得手書一紙云京師卒破聖主殉社稷予聞之雪涕沾衣不及攀龍髯而殉命遂偕妻于氏子士和併命寢室命也奈何葬從薄從速隨時也公清介忠信言笑不茍鬚眉若神𦵏日㑹者萬人莫不流涕南城陳伯璣允衡論次公遺集比之宋江文忠萬里云崑山歸莊元恭詩云鼎湖痛絶競攀龍城守諸公繼扈從誰是簡書無誚責獨捐頂踵又從容九泉骨近平原廟千古名齊日觀峰欣慕執鞭嗟隔世好憑詩句想遺蹤王劉二竒士予鄉王遵坦字太平益都人太僕少卿瀠之子劉孔和字節之長山人相國鴻訓之子二人皆負氣跅􅕟相友善王居家桑谷劉居長白皆有林泉之美崇禎間見天下將亂散財結客甲申嵗孔和殺闖賊偽令率精騎萬人南赴金陵至淮隂以兵屬劉澤清澤清與孔和素交時為藩鎮貴重無比然好為詩一日大會將吏廣坐朗吟賓佐交口譽之孔和仰視獨無語强問之曰公誠名將才然此事定復不急澤清怒罷酒賓客皆惶懼失次孔和傲然而出澤清益怒遣人追及舟中殺之已而金陵以為副總兵官則孔和死數日矣遵坦入本朝隨肅王平蜀為巡撫四川都御史卒於閬劉有奕棋贈丘將軍長歌云伏生之里大將出生來所志惟馬革幕中已多指視功疆埸血戰不勝筆堪嗟再謁典連敖不知三世還執㦸别君十載一瞬間歴盡鋒鏑與梏桎背貴那可入韓罪睛白聊足嘲呉刻多君談笑貫索中坐待明光銷蠧蝕昨聞廣武拜軍師聖主懷邦丈人吉如今驅戰真市人聒聒怒蛙誰與軾願君横臂障東海莫令桑梓生荆棘安有健兒把犁鉏但見春林巢小鳦從來外攘必内安隱憂不在河北賊夜凉浮白戒談事更向局中問刼急已知文偉能辦賊不待當塲辨白黑贊君斂手推棋枰論兵艾艾終羞吃君功定可勒燕然我詩空須錦罽織王有詩云怪鴟撲人山鬼叫草際幽燐舊年少古冢老貍夜宴賓髑髏為盤羅八珍𤣥熊文豹甘作使噤不敢言但相指夫君意氣不自持拔劔向風劔光死一身誰遣困蓬蒿呼天喝月未足豪驢脊如柴少韉勒小挫風期非我曹愁多歡少天白頭倒擲河水西向流一寸之心括千古元氣茫茫生百憂金盆濯足錦為厠以此相酬已堪恚寄語聽氷九尾兒鷓鴣啼上寒楓枝劉又有贈王詩云都無殺者黄江夏豈有食之嚴鄭公後竟死劉澤清手與黄祖事絶類云丘名磊鄒平人少為諸生有才名後走遼東詣軍門上書積功至總兵官佩鎮東將軍印亦死澤清之手節義王氏亳州人李殿機妻也殿機父死於法母張氏没官給配象房校尉王福殿機因冒王姓繼粥於紅旗厄爾庫家王氏在本籍年三十四嵗矣叔兄强之嫁誓死不從康熙二十八年覓夫至京師時殿機已配蕭氏矣南城御史阮爾詢具疏上聞竟為夫婦殿機蕭氏皆斷出為民同歸於亳封丘古蹟同年岳給事鎮九峰秀起家封丘知縣有古循良之風唐髙達夫嘗為縣尉向無專祠岳於西門外剏祠祀之縣南黄池北蟲牢皆春秋古蹟又有青陵臺韓憑妻冢岳皆為建祠立碑表之此事近今長吏所少池北偶談卷五
