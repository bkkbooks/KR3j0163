body:
  text: 池北偶談巻三刑部尚書王士禎撰太學題名碑予前記本朝國學進士題名碑未立為闕典官祭酒時欲疏請未果丁卯御史言之禮部覆疏允行按水東日記云内官阮安督工建太學時悉取前元進士碑磨去刻字今三年一立石皆是物也此雖與五代時劉鄩守長安取古碑甃城事微不同然古蹟湮没亦可惜也祭禹陵康熙己巳二月上巡幸武林因渡錢塘親謁大禹陵諭總督侍郎臣王隲曰朕巡行江表緬懐禹徳躬率羣臣展祭陵廟顧瞻殿宇圯傾禮器缺畧人役寥寥荒涼増嘆愚民風俗崇祀淫祠俎豆馨香奔走恐後宜祀之神反多輕忽朕甚慨焉自昔帝王陵寢理應隆重培䕶況大禹道冠百王身勞疏鑿奠寧率土至今攸賴豈可因循特書地平天成四字懸之宇下著地方官即加修理畢備儀物守祀人役亦宜増添俾規模𢎞整嵗時嚴肅兼賜銀二百兩給與守祀之人此後益令敬慎地方官亦須時為留心以副朕尊崇遐慕之懐其即遵諭行蓋是行原因視河故於禹陵特加崇重如此翰詹之長康熙二十七年掌詹事府事禮部尚書湯公斌改工書以禮部左侍郎張公英兼管詹事府事二十八年翰林院掌院學士李公光地調通政使以文華殿大學士兼户部尚書徐公元文兼管翰林院事皆不設正員其後張公以禮書兼掌翰詹二衙門事正副考試官舊例翰林給事中同為考試官則翰林為正給事為副吏部與五部同為考試官則吏部為正五部為副獨康熙壬子科户部郎中郭昌吏部主事彭襄同主廣東試以郭為正彭為副以郎中主事為序不論衙門辛酉科工科給事中許承宣予門人翰林院編修汪霦同主陜西試以許為正汪為副今丙子科福建鄉試亦以給事中党聲振為正檢討王者臣為副者臣予門人此出偶然非故事也七品銜宋制見任官得應制科文官許二次武官一次謂之鎖㕔國朝惟内閣中書舍人貢監出身者許應鄉試舉人出身者許應㑹試他即無之近江寧黄虞稷慈谿姜宸英以諸生薦入館修史特加七品服俸覃恩得以其品貤封父母而實未授官也狀元出典鄉試舊例詞林第一甲一名及第者止充㑹試同考官不出典各布政司鄉試自康熙己酉科己亥狀元徐元文以侍讀典陜西試甲辰狀元嚴我斯以修撰典山東試始變常例其後壬子科庚戌狀元蔡啓僔典順天試乙卯科癸丑狀元韓菼典順天試丁巳科丙辰狀元彭定求典順天試辛酉科己未狀元歸允肅典順天試丁卯科乙丑狀元陸肯堂典江西試遂沿為例閣學明殿閣詞林記有殿學閣學詹學翰學之名國朝閣臣大拜祇稱中堂或稱相公而内閣學士則稱閣學按葉石林避暑錄云宣和末陳亨伯以捕方賊功進龍圖閣直學士稱龍學顯謨徽猷二閣直學士欲效之而難於稱謨學猷學乃易為閣學此稱閣學之始廣文唐宋以來仕宦多乞鄉郡以便養猶有古意明代始不得官本籍至廣文寒官亦有越在萬里者本朝廣文皆銓本直省但不仕本郡耳印文明嘉靖中大同五堡之變失總兵官所佩征西前將軍印職方請給新印海鹽鄭端簡公時為主事議改印文柳葉篆或稱别將軍或増減其字以防詐偽且言胡忠安公在禮部失行在禮部之印改鑄易為行禮部印此在内衙門且然況邊鎮兵權又反側不靖時耶近用兵諸省恢復地方請印吏科給事中趙之符亦有此請部議未行然識者韙之癸未永樂癸未初即位天順癸未南省火皆改於明年㑹試至崇禎朝六㑹試竟以癸未終此亦數也八股康熙二年以八股制藝始於宋王安石詔廢不用科舉改三場為二場首場策五道二場四書五經各論一首表一道判語五條起甲辰㑹試迄丁未㑹試皆然㑹左都御史王公熙疏請酌復舊章予時為儀制員外郎乃條上應復者八事三場舊制其一也尚書錢塘黄公機善之而不能悉行乃止請復三場及寛民間女子裹足之禁教官㑹試五次不中者仍准㑹試三亊皆得俞㫖餘五事後為臺省次第條奏以漸皆復如寛科場處分條例復恩拔嵗貢復生童科嵗兩考等是也督捕督捕衙門始兵部兼攝之順治甲午尚書王公永吉奏増設兵部督捕衙門滿漢左右侍郎各一員滿漢司官各六員後以太僕寺少卿協理旋改左右理事官秩四品視常僕少卿夀光魏昭華琯以大理寺卿首遷督捕侍郎後以建言徙塞外卒至康熙三十八年復裁事歸刑部特㫖内陞順治初太子太保永昌王公𢎞祚以户部郎中修賦役全書加太僕寺卿書成陞本部侍郎至尚書其後工部營繕郎中霍叔瑾以大工加僕少至通政使順治乙未科予舉南宫之嵗洪士銘以經畧輔臣文襄公子耿效忠以靖南王子世祖特㫖留部又特㫖以京堂内陞洪以儀制郎中遷太常少卿至太常卿耿以武選郎中遷太僕少卿至順天府尹考選黄訓讀書一得云羅豫章文質公撰遵堯錄稱宋仁宗明道中宰相欲除二親故為正言司諫帝謂祖宗法度臺諫官須宸選若自大臣除則大臣過失誰敢言者仁宗此言可以為萬世法結銜輟耕錄云中書右丞相巴延所署官銜計二百四十二字明天啓中魏閹擅權倣縉紳為内官便覽首列已銜亦至二百許字古來權奸如出一轍勺中志畧云天啓中凡司禮監題本年月之下上層排臣王體乾臣魏忠賢下層排梁棟李永貞石元雅涂文輔諸人及刻内臣便覽體乾復讓忠賢居首特高一字義王孫可望與李定國皆張獻忠義子冒張姓號東府西府後獻忠敗死俱走入滇二人以爭權積不相能可望戰敗乃降世祖皇帝方以文徳柔逺封可望義王世襲賜第東長安門外可望死其子徴灝襲封康熙十二年臺省以為言下諸王大臣九卿㑹議降封義公改慕義公蜀綿州鹿頭闗龎士元祠可望重修有石坊大書偽銜柱國太師兵部尚書凡數百字猶稱張可望云義字諡明大學士高公穀諡文義二百七十年諡義者止此一人本朝順治初大學士徳州謝公陞卒諡清義閣諡本朝諡法閣臣不由翰林皆得諡文如洪公承疇諡文襄宋公權諡文康王公永吉金公之俊皆諡文通孫公廷銓諡文定衛公周祚諡文清李公之芳諡文襄皆非翰林也詹事府國朝順治中設詹事府皆以漢人翰林官兼之止設滿洲詹事一員康熙初省十四年十二月十三日復設自詹事至正字滿人漢人各一員而滿人不兼翰林官初詹事府與九卿議政之列初設時失考故事久之乃復詹事次通政使大理卿之下少詹事次左右通政大理少卿之下然故事詹事與學士俱為實錄等副總裁侍經筵今則有已遷正詹而仍為纂修者御史言之竟未釐正二十二年沈宫詹繹堂荃移文吏部爭之是年春講始侍經筵矣臣下私諱晉咸和三年拜王舒為撫軍將軍㑹稽内史舒疏父名㑹乞換他郡朝廷乃改㑹作鄶宜城有夷水以桓溫父名彞改蠻水後唐同光三年以郭崇韜父名𢎞改𢎞文館為崇文館長興四年以馬贇父名缺不欲斥其家諱改同平章事為同中書門下三品南唐元宗以董思安為漳州刺史思安辭以父名章特命改名南州又後主嗣位以鍾皇后父名太章尊后為聖尊后於禮君所無私諱為臣下諱失禮意矣宰輔編年錄宋宰輔編年錄宋太常博士永嘉徐自明撰起建隆庚申迄嘉定乙亥凡二十卷明吕邦耀又為續錄起嘉定九年迄祥興二年凡二十六卷明雷鄭王李諸公各撰公卿等表吳郡許重熙又為殿閣大臣年表近予從姊夫益都高梓嘗為續表迄南渡乙酉而止惜其無年著書散佚殊可惜也賜御筆康熙丁巳夏以御筆格物二大字清慎勤三大字石刻賜日講官翰林院學士陳廷敬侍讀學士葉方藹侍講學士張英尋又賜英忠恕存誠等墨蹟又賜詹事府詹事沈荃龍飛鳯舞忠恕等墨蹟大字講筵問答丁巳春夏上日御𢎞徳殿講書是時初進講通鑑講義上每先自講一過徳音清朗義理貫徹每有詰問皆出意表一日問諸葛孔明何如伊尹陳學士廷敬對以諸葛亮三代王佐伊尹之亞上問諸葛亮成就如何比得伊尹陳對以所遇之時不同葉讀學方藹對云伊尹聖人諸葛亮大賢大抵伊尹可比孔子諸葛亮可比顔淵上首肯一日講博學之節上云知行孰重葉對云宋臣朱熹之説以次序言則知先而行後以功夫言則知輕而行重上云畢竟行重若不能行則知亦空知耳又一日講一日暴之節上云古來君子小人不並立君子進則小人退小人進則君子退一定之理孟子此語説得最好于成龍陸龍其近日廉吏方面有黄州知府于成龍有司則嘉定知縣陸龍其于永寧人貢士陸平湖人庚戌進士陸後補靈夀知縣特召為御史于為上所深知數年中歴藩臬司使巡撫順天辛酉嵗入見賚予甚厚上親製詩賜之有郊圻王化始鎖鑰重臣膺之句尋擢兵部尚書總督江南江西宋官制宋初至元豐以前官制最為繁猥六部九寺皆為空官特以寄祿秩序班位而别以他官判職事如兵部事歸樞密院户部工部歸三司設審官院三班院流内銓判吏部之事設判禮部判貢院判禮部之事設判審刑院及詳議官判刑部之事又有使有權使有權發遣使之名他如太常歸判司禮院太僕歸羣牧司鴻臚歸客省之類官自官職自職名實舛互范文正公在政府奏言今六尚書九卿之職皆權知權判無一正官并是權假數易無定莫安其職如欲復三公九卿六尚書之任則體大難舉願且命兩地輔臣兼領綱要仿周官三公下兼六卿如召公領冢宰芮伯領司徒畢公領司馬遺意又雜引漢制三公分部九卿唐太宗時宰相兼職掌以為證又條列審官流内銓三司司農寺羣牧司國子監太常禮院三班院殿前馬步軍司審刑院大理寺刑部等職事并令兩府兼判云云然以宰執分判六卿九寺更為侵官至元豐新制行六部置尚書侍郎而各以郎官屬焉九寺各置卿少卿及丞簿之屬為寺監官國子監置祭酒司業及丞簿之屬為學官又有御史臺有兩省通謂職事官以唐文散階換部寺省監官歸釐本職如以金紫光祿大夫易吏部尚書銀青光祿大夫易五部尚書正議大夫易列曹侍郎之類通謂階官而食其俸即明制所本也但明制以六部合都察院通政司大理寺謂之九卿與詹事府俱得㑹議大政而太常太僕以下為小九卿本朝官制率沿明舊特於六部外設督捕𨽻兵部置滿漢侍郎各一員理藩院尚書一員侍郎二員又設宗人府正令以覺羅為之府丞一員以漢人或漢軍為之秩在副都御史下通政使大理卿上又設啓心郎二員以烏金超哈為之後裁即古之宗正也順治十六年裁去尚寶寺迄今未置震澤長語云宋制所謂官乃古之爵也所謂差遣乃古之官也所謂職乃古之加官也國朝官制國初内三院滿洲大學士謂之榜式烏金超哈官大學士亦稱榜式如范文肅公甯文毅公是也六部初不置尚書率以貝勒管部事置侍郎以佐之有滿洲漢軍即烏金超哈漢人各二員後置尚書久之又省去漢軍侍郎定為滿漢尚書各一員侍郎各二員漢軍亦有為漢侍郎者滿洲郎中員外郎初稱理事官副理事官後乃改從漢官之稱惟協理兵部督捕太僕寺漢少卿二員改稱理事官科道初亦稱理事後改同漢人俱稱給事中御史云宋四聖御押格物要論載王魯齋押字跋云予觀司馬文正公之押署名而小花精神風致自然見於誠意之表唐末五季諸人押字莫不怪詭飄揚傾攲放蕩宜亂亡之相尋也昔人重押字至有薈萃刻石以傳者孫文定公廷銓顔山雜記載鳯皇山玉皇宫宋藝祖以下四聖御押惟仁宗泐闕因摹於此藝祖太宗真宗宋祠祿宋士大夫多領宫觀食其祠祿予嘗以問葉讀學訒菴方藹葉云宋置宫觀官罷官者領之俾食其祿亦宋朝忠厚之一端也予考之不然神宗熙寧二年王安石為參知政事創制置三司條例司始行青苗均輸等法出吕誨范純仁錢公輔鄭獬等於外罷富韓公弼平章事是年始増置宫觀官丘文莊公世史正綱云王安石行新法而欲去異議者彼皆先朝舊臣素有聞望一旦去之無名乃為祠祿處之不知所為宫觀者所業何道為之使者所治何事而一時士大夫甘心受其豢養何耶此蓋安石増置之法非祖宗故事然終宋之世不改亦不典甚矣大學士兼尚書國朝入閣皆仍兼尚書銜惟康熙初益都孫文定公柏鄉魏公前後俱以吏部尚書大拜而不兼尚書其後復改内三院為内閣魏公得兼禮部尚書文定則告歸久矣學士大拜本朝以學士大拜者二人高陽李公丙戌進士戊戌大拜兼工部尚書孝感熊公戊戌進士乙卯大拜兼刑部尚書李年三十四熊年四十一學士兼侍郎瑣綴錄正統中陳高曹苗皆遙授各部侍郎仍供事翰林一時以為館閣盛事今内閣學士掌院學士例皆兼禮部侍郎不為異典矣讀卷今内閣九卿讀卷但擬十卷呈御覽各以首卷進呈候㫖命讀則讀不命則否水東日記載景泰辛未廷試日陳閣老得三卷向南房紙牕圏㸃云云則是明制讀卷官亦著丹黄今無此制矣又九卿但論衙門不論官之崇卑如己未魏雙鳯以督捕理事官壬戌科張鵬以通政司參議皆得讀卷而宗人府丞太常卿等三品例不與翰林講讀學士多為收掌官於事體殊未當也先授編檢科道世祖皇帝最重庶吉士每親自考較乙未館選丙申特先授漢書庶吉士王益朋王命岳等官六科給事中監察御史内劉祚逺授吏科給事中尋以族祖大學士正宗嫌改吏部主事戊戌館選己亥御試於南海子特先授清書庶吉士馬晉允富鴻業後改鴻基等十人為編修檢討而陳敬北通州人與今説巖禮侍同名皆同館也説巖尋奉廷字㫖加殷觀光二人革職皆非散館故事國朝狀元國朝狀元多不永年中間惟丙戌傅閣學以漸丁亥吕閣學宫大拜卒己丑劉修撰子壯壬辰鄒修撰忠倚戊戌孫修撰承恩辛丑馬侍讀世俊皆不數年而殁豈氣數為之耶孫修撰之殁世祖章皇帝深悼惜之賜白金三百兩歸其喪蓋曠典也三國貢物康熙丁未夏荷蘭國甲婁吧王油煩嗎綏極遣陪臣卑獨攀呵閏等入貢内有刀劍八枚其柔繞指旃檀樹四株各長二丈許西洋小白牛四高一尺七寸長二尺有奇白質斑文項有肉峰荷蘭馬四鋭頭卓耳形態殊異又玻璃箱牡丁香哆囉尼絨之屬是嵗暹羅國王森烈拍臘照古龍拍臘馬嘑陸坤遣貢使握坤司答喇耶邁低禮貢六足龜孔雀馴象等物囘囘國貢牛三角三目云試卷稱名宋吕申公試卷中自稱名王柏題其後謂古意尚存盛如梓云淳化中立糊名之法祥符中立謄錄之制則又在申公之前矣優老通政使司參議虞虞山世瓔雲南昆明人以書受知世祖皇帝特授光祿寺署正供奉内庭康熙十六年世瓔年八十餘上念其先朝舊臣特自光祿寺丞擢本寺少卿遷通參久之御史或言其老病不任職上特令以禮致仕仍給全俸二十一年雲南平世瓔疏辭俸祿且乞骸骨特賜白金三百兩馳驛囘籍途次貴州病卒賜宴褒忠康熙二十一年壬戌正月上元賜羣臣宴於乾清宫異數也凡賜御酒者二大學士尚書侍郎學士都御史皆上手賜通政使大理卿以下則十人為一班分左右列命近侍賜酒且諭醉者令宫監扶掖獨光祿卿馬世濟以文毅公雄鎮子右通政陳汝器以贈兵侍前福建巡海道副使啓泰子特召至御座側賜酒上之褒忠優厚如此翌日上首唱柏梁體昇平嘉讌詩詩别載羣臣繼和汝器句云勵節褒忠感賜觴蓋紀實云御製詩御製登城詩云城高千仞衛山川虎踞龍盤王氣全車馬往來雲霧裏民生休戚在當前真帝王詩也善果寺御書世祖御書賜𢎞覺禪師云洞房昨夜春風起遙憶美人湘江水枕上片時春夢中行盡江南數千里唐人岑參詩也在都城西善果寺乘肩輿本朝順治初漢人京官亦多乘馬予壬辰計偕入京師見高郵王文通公每入朝皆乘馬其後始易肩輿三品以上用四人肩輿四品以下則二人耳然旗下大官例乘馬無肩輿有之自近年始宋朝野類要云百司出局人從先報上馬者蓋舊禮只是乘騎自中興以來始得乘肩輿也建炎朝野雜記云東都舊制耆徳大臣或宗室屬近行尊者特㫖許乘肩輿建炎初上以維揚甎滑謂大臣曰君臣一體朕不忍使羣臣奔走危地可特許乘轎麈史謂唐時宰相乘馬五代始用擔子本朝近年惟文潞公以太師平章軍國重事司馬溫公始為門下侍郎尋卧疾就拜左相不可以騎二公並許乘檐子皆異恩也外官肩輿不用帷蓋蓋古褰帷之意今惟江寧開封督撫司道府㕔縣官皆用煖轎蓋沿宋明都城之制至今未改耳兼銜翰林官遷吏部侍郎例兼翰林院學士至尚書則否其特用為他部侍郎者亦不兼學士近如李容齋天馥遷户侍項眉山景襄遷兵侍皆不兼銜惟葉文敏訒菴方藹以翰林院掌院學士兼禮部侍郎加禮部尚書管刑部侍郎事前此未有也又杜肇餘臻以吏侍兼翰林學士服闋補刑侍遂不兼銜及再遷吏侍亦不復兼學士則銓部之疎也甲子秋冬嚴存菴我斯以詹事府少詹事董黙菴訥以翰林院侍講皆超遷禮部侍郎則兼翰林院侍讀學士其後王子言颺昌以正詹遷禮侍亦止兼侍讀學士庚午予自少詹遷副都御史又遷兵侍亦不復兼學士銜矣宫銜康熙元年已後大臣無加宫銜者惟閣臣高陽寶坻臨朐三公以世祖皇帝實錄成晉宫銜其後宛平漢陽長洲三公以太祖實錄聖訓告成亦晉宫銜甲子四月刑侍南宫宋公文運以老病乞休上嘉其廉慎特加太子少保致仕丁卯四月巡撫直隷僉都御史于公成龍亦加太子少保皆異數也謁陵詩康熙辛酉二月上謁孝陵諸公卿三品已上皆從多賦詩紀事刑書蔚州魏公環溪象樞一詩極令人感動詩曰薊門西望望皇畿共侍鑾輿展謁歸禮罷祾門雲自闔夢迴寢殿淚頻揮老臣將去填溝壑何日重來拜翠微廿載承恩無寸補鍾鳴漏盡尚依依予謂五六句最沁人心脾然是後漢宦者張讓語耳安南始末安南入本朝順治初莫敬耀來歸未受爵而卒授其子元清為都統使居高平黎維禔亦來歸未受封而卒康熙三年遣編修吳光禮部司務朱志逺諭祭維禔五年遣侍讀學士程芳朝禮部郎中張易賁冊封其子維禧為安南國王六年維禧奪元清高平地遣侍讀李仙根兵部主事楊兆傑諭還之粤西孫延齡馬雄叛元清負恩助逆病死其弟敬光為黎氏所討來奔令地方官送歸本國死於泗城土府爵除維禧死弟維䘺嗣維䘺死弟維禎嗣康熙二十二年遣侍讀明圖編修孫卓冊封維禎為安南國王仍賜御筆扁額忠孝守邦四大字又遣侍讀鄔黑禮部郎中周燦諭祭兩故王維禧維䘺二禮並舉稱盛事云周禮部使交趾詩周禮部星公燦陜西臨潼人自安南使歸有詩一卷頗見風土粗載數首於此諒山南去萬峰稠細雨深林石徑幽一水隨人千百折中宵勒馬問安州夜抵安州囘首燕臺不計程空山坐待月初生乾坤自是無遺照行盡天南一樣明屯糜見月一枝挺出森青玉兩葉分披展綠雲名是千秋兼可噉長栽籬落䕶山村千秋草四圍山色映晴嵐此地交人號格甘竹樹參差冬稻熟風光觸目似江南茶山早晴滄江岸上有荒祠栘葉棉枝近水湄短柱高龕雙錦鶴國俗祠廟以木雕雙鶴為侍報功異域禮同之黎英王交之功臣城鎮人宸翰親揮日月光龍書鳯篆照遐荒交人奉比羲文畫首出中天頌聖皇冊封其六才名奕奕世無雙三譯常思戴上邦别後懐君何處是寒風落日富良江留别阮司馬公望黎司空僖阮僉憲廷衮黄大參公寘闗門曉日拜天顔得識南交青瑣班記得深林風雨夜多君相伴出茶山留别阮廷柱武維匡宋儒陳璹四給事翠榦森森傍水涯梢垂雀尾亂紛挐秋來結就檳榔果交子逢人代煮茶檳榔樹衣冠文物重南疆何事闗名太不祥題曰畏天思此義萬年帶礪控炎荒易鬼門闗曰畏天闗周順治己亥進士庶吉士林舍人使琉球詩康熙甲子莆田林舍人玉巖麟焻使琉球歸有竹枝詞一卷與周禮部同時示予并錄數篇以誌本朝文物之盛云手持龍節渡滄溟璀璨宸章䕶百靈清比胡威臣所切觀風先到却金亭明使臣陳侃建徐福當年採藥餘傳聞島上子孫居每逢卉服蘭闍問欲乞嬴秦未火書日斜沙市趁虚多村婦青筐藉綠莎莫惜籌花無酒盞人歸買得小紅螺疋練明河牛斗横鼕鼕衙鼓欲三更思鄉坐擁黄紬被靜聽盤牕蜥蜴聲蜥蜴能鳴聲如麻雀三十六峰瀛海環怒潮日夜響潺湲樓西一抹青林裏露出烟蘿馬齒山射獵山頭望海雲割鮮挏酒醉斜曛紙錢挂道松楸老知是歡斯部落墳心齋生白室能虚棐几焚香把道書讀罷慿闌笑幽獨藤牆西角對棕櫚廟門斜映紅橋路海鳥高巢古柏枝自是島夷知向學三間瓦屋祀宣尼王居山第兔園開松櫪棕花倚石栽多少從官思授簡不知若箇是鄒枚奉神門内列鵷行乞把天書鎮大荒喚取金縢開舊詔侏􅍣感泣説先皇閟宫甍桷壓山原將享今看幾葉孫二十七王禋祀在釐圭錫卣見君恩譯章曽記莋都夷槃木白狼歸漢時何似島王懐聖徳工歌三拜鹿鳴詩宗臣清俊好兒郎學畫宫眉十樣糚翹袖招要小垂手簪花砑帽舞山香望仙樓閣倚崔嵬日看銀山十二囘笙鶴綵雲飛咫尺不教弱水隔蓬萊纖腰馬上側乘騎草圏銀釵折柳枝連臂哀歌上靈曲月明齊賽女君祠久稽異域嵗將徂自笑流連似賈胡三老亦知歸意速時時風色相銅烏林康熙庚戌進士與林同使者為汪檢討舟次楫别撰中山沿革志若干卷進呈御覽二君皆予門人也池北偶談卷三
