body:
  text: 池北偶談卷十刑部尚書王士禎撰崇禎五十相崇禎朝閣臣五十人韓爐孫承宗黄立極張瑞圖李國􅕠施鳳來來宗道楊景辰李標劉鴻訓周道登錢龍錫成基命周延儒何如寵錢象坤溫體仁吳宗達鄭以偉徐光啟錢士升王應熊何吾騶文震孟張至發始由外僚入閣林釬孔貞運黄士俊賀逢聖傅冠劉宇亮薛國觀楊嗣昌程國祥方逢年蔡國用范復粹姚明恭張四知魏照乘謝陞陳演蔣德璟黄景昉吳甡魏藻德李建泰方岳貢范景文丘瑜初夫人劉太夫人先始祖妣初夫人諸城人年始笄一日忽為大風吹至新城之曹村時始祖琅琊公方為某大姓傭作未婚遂作合焉三世至潁川公而讀書仕官四世至太僕公始大其門二百年來科甲蟬連不絶皆祖妣所出也萬厯中吳門伍袁萃著林居漫録記其事後嘉興賀燦然作漫録駁正於此條下云王氏之興必有隂德此類語恠云云不知此事乃實録也又先司徒公萬厯間以終養告歸舊有撫楚時銅瓜二命工鎔之忽成峰巒洞壑之狀及南極老人西王母八仙之形無不酷肖是日先高祖妣一品劉太夫人九十壽辰也觀者皆悚異此事載朱平涵相國國楨湧幢小品中伍以王氏發祥於司徒公而不云太僕公則誤也太僕公登嘉靖辛丑進士司徒公登嘉靖壬戌進士謂司徒公登丁未進士亦誤朱公小品又記先太師公宣大出粟事謂推之九邊皆可行然謂為王見菴中丞誤也先司徒公别字見峯太師公别字霽宇朱筆誤耳溪州銅柱記五代楚王馬希範復溪州銅柱記云天䇿上將軍江南諸道都統楚王希範天䇿府學士江南諸道都統掌書記通議大夫檢校尚書左僕射兼御史大夫上柱國賜紫金魚袋李宏臯撰粤以天福五年歲在庚子夏五月楚王凡空一字碑皆另行召天䇿府學士李宏臯謂曰我烈祖昭靈王漢建武十八年平徵側於龍編樹銅柱於象浦其銘曰金人汗出鐵馬蹄堅子孫相連九九百年是知吾祖宗之慶緒綿逺則九九百年昌於南夏者乎今五溪初寧郡帥内附古者天子銘德諸侯計功大夫稱伐必有刋勒垂諸簡編將立標題式昭恩信敢繼前烈為吾紀焉宏臯承教濡毫載叙厥事盖聞䍧牱接境盤瓠遺風因六子以分居入五溪而聚族上古謂之要服中古漸爾覊縻洎帥號精天相名姎氏漢則宋均置吏稍靜溪山唐則楊思興師遂開辰錦邇來豪右時恣陸梁去就在心否臧由已溪州彭士愁通鑑作仕愁五代史作士然吳任臣十國春秋作仕然世傳郡印家總州兵布惠立威識恩知勸故能歴三四代長千萬夫非德教之所加豈簡書而可畏亦無辜於大國亦不虐於小民多自生知因而善處無何忽承間隟俄至動揺我王每爾含宏常加姑息漸為邊患深入郊圻剽掠耕桑侵暴辰澧疆吏吿偪郡人失寧非萌作孽之心偶昧戢兵之法焉知縱火果至自焚時晉天子肇造丕基倚注雄德以文皇帝之徽號繼武穆王之令謨册命我王開天䇿府天人降止備物在庭方振聲明又當昭泰眷言僻陋可俟綏懐而邊鄙上言各請効命王乃以靜江軍都指揮使劉勍率諸部將付以偏師鉦鼓之聲震動溪谷彼乃棄州保險結砦憑高唯有鳥飛謂無人到而劉勍䖍遵廟􅄸宻運神機跨壑披崖臨危下瞰梯衝既合水泉無汲引之門樵采莫通糧糗乏轉輸之路固甘衿甲豈暇投戈彭師杲為父輸誠束身納款我王愍其通變爰降招攜崇侯感德以歸周孟獲畏威而事蜀王曰古者叛而伐之服而柔之不奪其財不貪其土前王典故後代蓍龜吾伐叛懷柔敢無師古奪財貪地實所不為乃依前奏授彭士愁溪州刺史就加檢校太保諸子將吏咸復職員錫命有差俾安其土仍頒廪粟大賑貧民乃遷州城於平岸溪之將佐感恩向化請立柱以誓焉於戲王者之師貴謀賤戰兵不染鍔士無告勞肅清五溪震讋百越底平疆理保乂邦家爾宜無擾耕桑無焚廬舍無害樵牧無阻川塗勿矜激瀬飛湍勿恃懸崖絶壁荷君親之厚施我不徵求感天地之至仁爾懷寧撫茍違誡誓是昧神祇垂於子孫底爾族類䥫碑可立敢忘賢哲之蹤銅柱堪銘願奉祖宗之德𢎞臯仰遵王命謹作頌焉其詞曰昭靈鑄柱垂英烈手執干戈征百越我王鑄柱庇黔黎指畫風雷開五溪五溪之嶮不足恃我旅爭先若平地五溪之衆不足憑我師輕躡如春氷溪人畏威仍感惠納質歸明求立誓誓山川兮告鬼神保子孫兮千萬春推誠奉節𢎞義功臣天䇿府都尉武安軍節度副使判内外諸司事永州團練使光禄大夫檢校太傅使持節永州諸軍事永州刺史兼御史大夫上柱國扶風縣開國侯食邑一千户馬希廣奉教監臨製造按希廣即廢王天福五年正月十九日溪州刺史彭士愁與五衆歸明衆具件狀飲血求誓楚王略其詞鐫於柱之一隅右據狀溪州靜邊都自古已來代無違背天福四年九月蒙王庭發軍收討不順之人當都頭將本營諸團百姓軍人及祖父本分田塲土産歸明王化當州大鄉三亭兩縣苦無税課歸順之後請祗舊額供輸不許管界團保軍人百姓亂入諸軍四界刼掠竝盜逃去户人凡是王庭差綱收買溪貨并都幕採伐土産不許輒有庇占其五姓主首州縣職掌有罪本州申上科懲如别無罪名請不降官軍攻討若有違誓約甘請准前差發大軍誅伐一心歸順王化永事明庭上對三十三天下將宣祗為證者王曰爾能恭順我無差徭本州賦租自為供贍本都兵士亦不抽差永無金革之虞克保農桑之業皇天后土山川鬼神吾之推誠可以元鑒靜邊都指揮使金紫光禄大夫檢校太保使持節溪州諸軍事守溪州刺史上柱國隴西縣開國男食邑三百户彭士愁武安軍節度左押衙金紫光禄大夫檢校司徒前溪州諸軍事守溪州刺史兼御史大夫上柱國彭師佐此下有檢校尚書左僕射龔明芝彦檢校尚書左僕射田宏贇檢校左散騎常侍覃仙檢校國子祭酒朱彦瑀允檢校太子賓客向宗彦檢校司徒彭瑫檢校司徒田偉暉武安軍節度左押衙充溪州副使銀青光禄大夫檢校尚書右僕射守溪州三亭縣令兼御史大夫上柱國彭師俗武安軍節度左押衙左義勝第三都將銀青光禄大夫檢校刑部尚書前守富州别駕兼御史大夫上柱國彭師杲此下有檢校太子賓客龔貴馬檢校左散騎常侍覃彦富檢校司田𢎞佑武安軍節度左押衙充砂井鎮遏使銀青光禄大夫檢校尚書左僕射兼御史大夫上柱國彭師椩武安軍節度討擊副使左歸義第三都將銀青光禄大夫檢校左散騎常侍兼御史大夫上柱國彭師晃此下有檢校尚書左僕射覃彦勝散試大理評事監察御史彭允臻檢校右騎常侍田彦道銅柱高一丈二尺内入地六尺重五千斤并石蓮花臺維天禧元年十一月十五日移到至十六日豎立記予按陸游南唐書謂彭師暠不知其世家希蕚與弟希崇爭國希蕚敗見執希崇避殺兄名於是命師暠幽希蕚於衡山使甘心焉師暠歎曰畱後欲使我弑君耶吾豈為是哉至衡山與廖偃䕶視甚謹遂築行府奉希蕚為衡山王請命金陵元宗為出師定楚亂希蕚遂入朝偃師暠俱從行馬令南唐書云希崇遣彭師暠廖偃囚希蕚於衡山師暠奉希蕚為衡山王臣於南唐十五國春秋云希蕚入府視事吳宏彭師暠見希蕚皆釋不殺賜希廣死師暠𦵏之瀏陽門外師暠疑即師杲也然則彭氏雖溪蠻乃馬氏之忠臣與周行逢據湖南時有謡云滿天太保滿地司空觀此碑所書盖自馬氏時已然矣杜公厚德寶坻杜文端公立德德器厚重人不見其喜愠之色京師有無頼子偶與騶卒鬨乘醉隨公輿後辱詈公若不聞無頼子隨至邸第詈不止乆之公遣問曰詈可已乎無頼子歸酒既醒或告以昨辱宰相倉皇詣第謝罪公慰遣之仍與二金令改行生理無頼子惑泣而去歲時必至公門叩拜卒為善人予鄉文定孫公廷銓司宼高公珩居鄉亦然皆可為士大夫法成給事初益都馮公薦起魏光禄象樞於田間并及成主事性於是魏授御史成授給事中成即魏己丑門生也曾以中書舍人假御史巡按福建有清聲在京師却掃絶交遊亦亷介之士然其著書自述有云不用磁器以木代之夫磁器非玉杯象箸之比詎可廢之亦矯矣在省中無他建白惟請遣官清丈蜀省田增加賦税會有兵事其説不行𤨏綴録尹直𤨏綴録極詆尹恭簡公旻予頃閲月山叢談已録其説二公邪正瞭然可見又駱兩溪文盛南埜雜談云吳康齋陳白沙卓然一代人物即有所短亦白璧微瑕而尹直𤨏綴録肆其醜詆所謂醜正惡直小人而無忌憚耳可見公論自在千古但駱議梅聖俞以私憾作碧雲騢毁范文正公則非是碧雲騢出魏泰之手假名聖俞耳泰即作東軒筆録者邊大綬明末任丘人邊大綬為米脂令發賊李自成祖父墓賊旋敗衂走死王氏聞見録載唐末巢宼犯闕一道人詣安康守崔某請斸黄巢谷金統水泉源中得窟窟中有黄腰人舉身自撲而死道人曰吾為天下破賊訖未幾巢滅大駕還京古今事相類乃如此歆向後書祭遵傳詔與驍騎將軍劉歆武威將軍劉向等伐公孫述按劉植傳歆植之從兄字細君與植弟喜皆繼植為驍騎將軍封浮陽侯向植之子嗣植為昌城侯徙封東武陽侯歆乃向之從伯父也周璆陳蕃傳蕃為樂安太守郡人周璆字孟玉高潔之士蕃字而不名特為置一榻去則懸之此亦仲舉事在徐穉前二八俊八顧八及東京之末黨人有八俊八顧八及之名太學所標榜也李膺杜宻以下為八俊郭泰范滂以下為八顧張儉劉表以下為八及至儉鄉人朱竝上書告儉與同鄉二十四人别相署號共為部黨則以儉及檀彬褚鳳張肅薛蘭馮禧魏元徐乾為八俊田林張𨼆劉表薛郁王訪劉祗宣靖公緒恭為八顧朱楷田槃疎耽薛敦宋布唐龍嬴咨宣褒為八及中間惟張儉劉表同餘皆異名字兩黄祖孔融為北海相左丞黄祖勸融結袁曹融怒殺之此别是一黄祖皆漢末人樓䕶養吕公前書樓䕶傳䕶為廣漢太守莽子宇與吕寛謀以血塗莽第門發覺莽怒殺宇而吕寛亡寛父與䕶相知寛至廣漢過䕶到數日有捕寛詔書至䕶執寛莽大喜徵䕶入為前輝光又云䕶有故人吕公無子歸䕶䕶身與吕公妻與吕嫗同食及家居妻子頗厭吕公䕶聞之流涕責其妻子曰吕公以故舊窮老託身於我義所當奉遂養吕公終身按此吕公即吕寬父所謂與䕶相知者當是既執獻寛而收養其父母耳䕶出入王氏以勢利交得官又患難中殺故人子以􅆺權奸縱養其父母終身罪難末減孟堅既誤收之游俠傳中又載此事以為美談首尾自相矛盾又誤之誤者也韓定辭唐末詩人韓定辭仕為鎮冀深趙等州觀察判官尚書祠部郎中兼侍御史為王鎔聘劉仁恭與馬彧倡和所謂崇霞臺上神仙客學辨癡龍藝最多者事載全唐詩話按安陽集重修五代祖塋域記定辭乃忠獻王琦四世伯祖忠獻五代祖又賓稱庻子府君歴仕鎮帥王紹鼎景崇鎔三世有子二人長定辭次昌辭昌辭仕為鼓城令即忠獻王高祖也東坡嘗書前詩而云定辭不知何許人豈未考其家世耶烈婦康熈十八年十月署江西巡撫布政使王新命上言浮梁縣縣丞饒紹德妻朱氏母權氏遇賊搜洗慮被汚辱皆投繯死十九年三月偏沅巡撫韓世琦上言瀏陽縣生員汪天溥妻魯氏於十五年六月遭棚賊為亂于爐煙涸遇賊露刃迫脅抗罵不屈被殺禮部議旌表應徐二高士杭州應嗣寅徵士名撝謙性至孝母病數年撝謙侍疾晝夜不懈母憐之强為娶婦終不入私室母卒逾祥禫始行合巹禮坐臥不下樓人罕梯接以經學教授里中生徒甚盛所著有周易應氏集解易學圖説書經蔡註拾遺詩傳翼禮學彚編春秋集解古樂書今文孝經辨定編注古本大學中庸本義語孟朱註大全拾遺較定文公家禮諸書康熈己未詔徵不至卒於家自撰無悶先生傳略云學不適時不好禪不喜王陸家言為文章不詭合自怡悅而已宻友多窮交經年不見與日見無異足跡不出百里而泰華溟渤皆於書册見之生不及古人而羲農堯舜若接聲響也著書若干萬言人來觀者亦不吝云云同郡徐介字孝先陸圻景宣之甥也食貧隠居三十妻死不更娶一麻布頭巾數十年不易嘗集陶杜詩各一卷秦李宗吳蘇門之秦李李王同時之宗吳諸子其文詞高下不知何如然皆不失為君子而朱文公鄭端簡皆力詆之蓋諸子恃才凌物或不能無以為小人則二公亦難以一手揜萬世耳目也朱子左袒王介甫而詆二蘇公論蘇王二氏門人之文則寧取吕惠卿而不取少㳺又左袒張浚而終不得不推重李忠定君子不黨吾不謂然司馬公和安石詩司馬文正公為中丞奏彈王安石言非行偽王制所誅非曰良臣實為民賊安石亦云自新法之行始終以為不可者司馬君實也公集中載和安石二詩如安石明妃曲云漢恩自淺胡自深公則云妾身生死知不歸妾意終期寤人主和烘蝨云醯酸蜹聚理固然爾輩披攘我當坐直如水火枘鑿之不相入而君子小人之用心亦可見矣張子韶云温公之門一傳而得劉器之再𫝊而得陳瑩中介甫之門一𫝊而得吕惠卿再𫝊而得蔡確三傳而得章惇四傳而得蔡京五𫝊而得王黼張獻忠黄巢張獻忠亂蜀日城市祠廟焚燬無遺唯於梓潼縣七曲山張亞子廟盛有增飾遇張桓侯廟亦不敢燬唐黄巢之亂所過多被殺傷然獨厚於同姓如黄姓之家及黄岡黄梅等縣皆以黄字得免盜賊行事相類如此羅文毅菽園雜記載狀元羅應魁復官以病請告還鄉從逰者頗衆遂立為鄉約凡為不善者不齒大惡者棄之於是有强梁一二人被執投之水鄉人不平訟於官而應魁適已卒其徒十餘人皆坐謀殺人為羅倫從者律使應魁不死将置重辟矣予謂文毅嫉惡已甚不可為法適足為盛德之累耳叢氏文登叢大司空蘭本漢秺侯金日磾之後相𫝊日磾四十五代孫永遷縣之叢家峴家焉遂以為姓至今科名甚盛江西多淦氏舊傳亦日磾後有金賦者為制置使宋高宗為加㸃水遂有淦姓詳載予皇華紀聞耿逸菴張仲誠耿介字逸菴河南登封人順治壬辰進士翰林檢討遷大名道副使康熈丙寅臘月禮部尚書掌詹事府湯潛菴斌疏薦之略云原任翰林院檢討轉直𨽻大名道副使丁憂囘籍河南登封人耿介賦質剛方踐履篤實服官冰蘖自矢家居淡泊自甘潛心經傳學有淵源今雖年逾六旬精力尚健老成宿素罕見其儔邇者皇上念衛既齊之賢復其原官凡有寸長誰不思奮臣才具最下恩遇過隆豈敢竊位蔽賢自昧舉知之義儻蒙鑒臣愚誠將介徵取來京賜以引見可否錄用自有睿裁非臣愚所敢擅議也云云吏部覆准下河南巡撫起送入京奉㫖從優授翰林院侍講學士未幾陞詹事府少詹事予曩為湯公作繪川書院詩有云轘轅有耿介上蔡有張沐著書各滿家衆流滙川瀆耿公實亷吏齋厨甘把菊張公赴徵車萬里向巴蜀正謂是也沐字仲誠順治戊戌進士曾知内黄縣後以魏尚書環溪象樞薦起知四川資縣謝病歸烈女閩縣旌表孝子王鑑女慧貞年十六許字儒士楊儼夫死謀以身殉家人防之因請奔䘮遂自縊林氏丁卯夏四月巡撫浙江金中丞鋐以海寧縣民陳雲生母林氏年一百八歲尚勤紡績疏請旌表部議給銀建坊曰貞壽召平漢史召平凡兩見一在蕭何傳勸何悉以家私財佐軍得免禍一在齊哀王傳諸吕欲為亂朱虛侯使人隂出告其兄齊王齊王與中尉魏勃謀發兵齊相召平聞之乃發兵入衛王宫使魏勃將勃既將以兵圍相府召平曰道家言當斷不斷反受其亂遂自殺一召平耶智愚之懸殊乃若此楊尚書古道蒲州楊大司馬守禮既貴休沐歸里有父執某老儒也所居陋巷蓬蓽公往謁下車徒歩拜於牀下老儒直呼其名蒲人至今傳之王方伯王庭字言逺嘉興人順治己丑進士初仕為廣州府知府歴官山西布政使亷介不苟所至以清惠稱罷官歸足跡不入城市常衣布袍行田間人不知其二品大僚也年踰八十乃卒五言詩清真古澹有陶韋風與石湖邢昉相上下足稱逸品何顔偽道學何心隠在萬厯間屢變姓名詭迹江湖間所脅金帛不貲嘗遊吳興誘其豪為不軌又與一富室子善偕之數百里外忽曰天下惟汝能殺我我且先殺汝紲之湖中取其家數百金然後縱之其黨吕光者力敵百夫相與為死友又入蠻峒煽惑以兵法教其酋長事聞於朝先曾祖時為湖廣巡撫捕之獲於嶺北置諸法罪狀昭然有御史趙崇善者挾私憾追劾先公殺心隠􅆺江陵而推心隠講學時先曾祖乆以戸部侍郎養親家居矣雖事之本末自有公議而崇善㨗㨗幡幡良可畏也此事之詳具載大宗伯周寅所先生應賓識小編王弇州先生别集其所載顔山農挾詐趙文肅千金與姦良家婦為心隠所毆事尤醜山農即心隠講學師也道學狼籍至此可歎可歎崇善此疏刻入萬厯疏鈔或未詳何顔顛末者恐輒信之聊復述及以質公論云宋兩唐伯虎宋唐伯虎字長孺初名瞻丹陵人庚之兄也治易春秋皆有家法性孝友史載其迎父瀘南及臨邛獄事時人以為難及附見文苑傳王鞏隨手雜録云全州進士唐伯虎至冥司主者放還語伯虎曰到人間為我轉法華經亦當勸人誦之後仕為梧州推官六十餘卒紀載失實鼎革時小說紀載多失實嘗於史館見一書曰𢎞光大事記内言甲申年山東大姓新城王氏淄川韓氏起義兵爾時先伯父御史公與𦙍全家殉節先祖布政公年八十餘家居祭酒公奉侍避兵山中無義兵事其云韓氏蓋韓氏有僕王某李某皆乗亂聚衆為羣盜亦非義師其濟南以東舉義者有長山劉相國鴻訓之子孔和李侍郎化熈而記不及之又云流賊偽制將軍至濟南推官鍾性樸死之按鍾公字文子順天人崇禎癸未進士國初為濟南府推官遷本省提學道僉事予順治庚寅自童子為諸生中辛卯郷試皆鍾公所㧞烏有甲申死難事耶野史之不足信如此翟黄新序魏文侯與士大夫坐曰寡人何如君也翟黄曰君非仁君也云云文侯怒而逐翟黄次至任座對曰君仁君也曰子何以言之曰其君仁者其臣直向翟黄之言直臣是以知君仁君也文侯復召翟黄拜上卿唐魏文貞直諌忤太宗長孫皇后朝服而賀亦同此意趙孝亷趙孝亷起鳳字羽聖德州人篤於行誼常撰一本歌以勸宗族作師友爼豆録人各為傳贊又作一室合祀之毎節家祭後必及焉仍以餕其子孫加以粟帛歲時不絶鄉里化之康熈甲寅年七十卒黄綰黄綰陽明之門人以議大禮附張桂得進用永嘉呼為平原十九客講學之流弊至此烈女林氏清玉武平縣人許字鍾廷楷楷以康熈十八年四月自京囘中途病亡清玉聞訃痛哭竟往夫家拜靈慰姑候喪葬事畢解金耳環吞之而絶部覆旌表賀醫閭賀醫閭先生集一條先生聞巡按御史考試丁憂生員歎曰壞人倫壞風俗莫甚於此古人凡有䘮者天子之命三年不過其門教孝也忍心害理君子肯為之乎近日風俗日下方面大僚郡縣有司凡地方富饒者無不營謀奪情督撫公然題畱吏部公然覆准不知一郡一縣何以必不可少此一官而上下以賄成至於蒙面喪心如此使醫閭而在不知如何扼腕矣醫閭集又一條云内外文武罕不出於宦官宫妾之門安望天下之治予謂宋仁宗謀相於王素而欲得宦官宫妾不知名者此一事便卓絶千古王山隨劄張簣山講學貞生以言事謫歸居廬陵王山有定巖覆笥峰木琴澗虎子巖諸勝皆伐木開道手自創闢簣山住此二年復應詔出殁于京邸又一年予入都門見其居王山時茅屋隨劄一卷想見此公學道刻苦非人所及略録數則于此王山金頂之勝在于髙尤在于孤然不高則不孤愈高則愈孤君子立身亦然絶頂惟高而孤雖天清氣朗無晝不風風聲四起衆山動揺人立其上脚根不穩風欲挟之而翔行者相顧裹足予獨欲於震撼處放步然而危矣王山笋類多苦烹之亦有真味又産苦菜浸之一宿饑來啖之頗勝園蔬然以其苦多為人棄人生營營無日不苦日在苦中安之若飴至飲食細故非刀俎物命便不可下箸安得㩦此二苦味令飽嘗耶王文成訪地藏洞一異人值其睡方醒問第一義諦不答徐曰周濓溪程明道汝儒家兩箇好秀才語畢復睡張子坐臥巖中有以仙術告者囘思自幼識字及壯奔奔波波老忽將至鷄鳴而起便秀才二字做不了何暇言仙巖栖一年日月逝矣内省多疚深自戰兢敬寫聖容奉以出入道大莫名非敢贊揚聊以自警贊曰古今一人大哉孔子天地終始要其立言非有殊旨道不逺人躬行而已諸儒沾沾新竒自喜門户異同慌惚疑似行非所知言大而侈憫我童蒙茫茫涯涘逐影捕風出彼入此行不顧言人視人指而今而後求歸於是未能希賢尚勉為士登高自卑行逺自邇不善則改聞義則徙恭對聖容庻幾有恥宿雲霧座大雪忽念及康齋先生十月單衾徹夜至以夏布帳加覆毫無厭貧之意頓使人不暄自暖不火自溫客來山中者輒贈竹杖强之登臨或曰孝子不登高不臨深或曰知命者不立乎巖墻之下予曰不然天下惟看破生死底人方不為生死所奪可為忠臣可為孝子可以樂天可以知命冷孝子冷孝子名昇益都顔神鎮人諸生父植元好逺逰崇禎己卯歲適嶺表鼎革後兵戈阻絶三十年孝子發憤依肇慶道趙君韞退進美往端州冀便咨訪一日有喬某者亦山東人往西粤孝子跪請訪求閲歲喬返微聞其父殁於龍州土司孝子遂辭去溯牂牁而上歴三百七十餘灘自横州逹南寧又經遷隆思明行五千里遇那利人蔡鄭二叟詢知與其父舊為龍州土司客乃與偕往復與𦵏師譚姓者遇竟得父櫬於龍州北門交𢃄橋側負骸骨歸孝子自叙其事為龍州扶櫬記冷一寒士父殁三十年竟能覓遺骸於蠻荒萬里之外視王紳滇南慟哭記尤難書之以風世云范文肅家法文肅范公文程家法最嚴子弟不稍假色笑長子官户部侍郎次子官翰林學士往往侍立終日不命之坐不敢坐故忠貞承謨歴官督撫皆以清節著聞終殉逆藩之難論者以為家教云忠貞弟承勲今為雲南總督侍郎六女廣州順德縣李氏簡姑定姑介姑潔姑寅姑璇姑遭滇宼之亂誓志同死聨臂投淵又南海縣樵夫陳茂逢虎斃命妻張順娘覔遺骸築墳殉節禮部題准旌表南海縣義女黄隨香罵賊捐軀赴焰死禮部覆無旌表僕女之例陳太守陳龍巖福建晉江舉人累官江寧知府居官以清介聞隨州妖人朱方旦左道蠱惑四方督撫藩臬所至郊迎為立書院至金陵總督某公方延之衙署忽轅門傳鼓聲甚急遣問之陳立轅門外直對云無餘事知府某以朱方旦左道惑衆來請發下鞫審正法以安地方耳制府雖怒其戅然素知其亷幹亦不罪也後陳卒於官總督于成龍親弔哭之足下黒子畫墁録云郭忠武使渾忠武瑊洗足見汾陽足下有黑子捧玩乆之汾陽問其故渾答云瑊也足亦有之汾陽令跣足而視之笑曰不及我明皇雜録安禄山初事張韓公仁愿韓公嘗令洗足韓公足下有黑子禄山竊窺視韓公問之禄山曰某賤人也不幸兩足皆有黑子比公色黑而加大韓公觀而異焉因加寵薦兩令公功名相埓若禄山叛逆亦與韓公相似相豈足貴哉又北夢𤨏言載西門軍容與吳行魯事亦同豈一事而𫝊聞異詞耶秦羅子孫説聽載秦檜裔孫某宰湯隂綽有政聲每欲謁忠武祠輒逡巡弗果將及瓜謂同僚曰少保雖與先世有惡豈在後嗣耶且吾守官無愧神明往謁何害遂為文祭之拜不能起嘔血数升而死事在嘉靖初年魏莊渠提學河南歸為所親言之此與宋御史羅汝楫子鄂州知州願事全相類汝楫附秦檜劾忠武願即著爾雅翼以古文名朱子稱為南渡第一者也宋公子鮑春秋文公十六年宋公子鮑禮於國人鮑美而艶襄夫人欲通之乃助之施既而夫人使昭公田於孟諸使帥甸攻而殺之左氏曰書曰宋人弑其君杵臼君無道也予以為丘明之言誖矣弑昭公者公子鮑為首惡罪不可薄觀鮑日數於六卿之門又竭粟以貸國中此與商人田常軰何異襄夫人以祖母欲滛其孫為昭公之不禮於已輒先殺公子卬等而昭公不能救令之田欲殺之蕩意諸言之而昭公不敢適諸侯蓋襄夫人平日有馮太后武曌之惡公素畏之而鮑因嬖幸以隂肆簒弑之謀非一日矣故昭公弑鮑遂立雖曰王姬實鮑之謀善乎劉原父權衡曰公子鮑為不臣襄夫人為不母而宋公未有無道之實也且公子鮑欲盜其國而先施於民襄夫人欲通於鮑而遂弑其君宜推公子鮑為首惡不得輕此兩人之罪反惡宋公也昔儒謂左氏是非謬於聖人不其然歟池北偶談卷十
