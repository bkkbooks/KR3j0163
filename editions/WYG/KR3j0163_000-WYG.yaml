body:
  text: 池北偶談雜家類三雜說之屬提要臣等謹案池北偶談二十六卷國朝王士禎撰凡談故四卷皆述朝廷殊典及衣冠勝事其中如戊巳校尉裙帯官之類亦間及古制談獻六卷皆紀明中葉以後及國朝名臣碩徳畸人列女其中如論王潽張商英張綵之類間有惟斥其惡者盖附録也談藝九卷皆論詩文領異標新實所獨擅全書精粹盡在於斯談異七巻皆記神怪則文人好竒之習謂之戯墨可矣池北者士禎宅西有圃圃中有池建屋藏書取白居易語以池北書庫名之自為之記庫旁有石帆亭嘗與賔客聚談其中故以名書前有自序康熈辛未作也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀池北偶談序予所居先人之敝廬西為小圃有池焉老屋數椽在其北予宦游三十餘年無長物唯書數千卷庋置其中輒取樂天池北書庫之名名之池上有亭形類畫舫曰石帆者予暇日與客坐其中竹樹颯然池水清澈可見毛髪游鯈浮沈往来於寒鑑之中顧而樂之則相與論文章流别晰經史疑義至於國家之典故厯代之沿革名臣大儒之嘉言懿行時亦及焉或酒闌月墮閒舉神僊鬼怪之事以資嗢噱旁及游藝之末亦所不遺兒輩従旁記録日月既多遂成卷軸因憶二十年来官京師所聞見於公卿大夫之間者非甚不暇未嘗不筆之簡冊散在篋中未遑編剗一日乃出䑕螙之餘盡付兒輩總次第為一書區其條目曰談故曰談獻曰談藝曰談異其無所附麗者稍稍以類相従凡廿六卷藏之家塾示吾子孫大之可以畜徳小亦可以多識賢乎博奕昔聞諸聖人之言矣康熈辛未秋漁洋山人王士禎序
