body:
  text: 池北偶談卷一刑部尚書王士禎撰特賜進士及第戊戌春世祖親覆試江南丁酉貢士以古文詩賦拔武進吳珂鳴第一是年禮闈榜後上諭特賜珂鳴進士與中式舉人張貞生等一體殿試尋改庶吉士同時崑山葉方藹試瀛臺賦甚工上深喜之踰年己亥秋復行㑹試葉中式賜一甲第三人及第部曹入詞林郎中與司業較俸陞内院侍讀自張允欽始内院詞臣與臺省一體年例外轉監司自宋之繩始尋皆罷不行吏部自十八年停内陞與五部一例選郎金拱敬以加銜僅得太僕寺丞康熙九年始復故云二程後康熙八年車駕幸太學後允御史傅世舟請求二程子後於河南撫臣以明道二十一代孫宗昌伊川二十二代孫延祀名上俱為五經博士如朱坤例坤歙文公裔也十二年衍聖公孔毓圻疏請以子張子裔孫顓孫好賢為博士某年湖南巡撫請以濂溪裔孫周冕為博士部議皆格不行上考癸卯甲辰之間更定内外官考滿之例營競紛然未數年輒罷因話錄載裴充為太常寺太祝語卿長曰本設考課為奬勤勞若一以官高下為優劣則卿合上上考少卿合上中考丞合上下考主簿合中考協律合下考某等合喫杖語雖諧謔實切情事古今一轍可嘆也配享宋初定帝王廟配享功臣多不愜人意者如魏武以荀攸程昱配文帝以賈詡王朗配唐𤣥宗配享不及曲江廣平肅宗配享不及汾陽鄴侯皆不可解經筵日講康熙庚戌七月上召翰林學士熊賜履至瀛臺進講道千乘之國一章繼講務民之義一章上大喜隨命取經筵日講儀注以進是嵗十月有㫖諭禮部帝王圖治必稽古典學以資啓沃之益經筵日講允屬大典宜即舉行爾部詳察典例擇吉具儀來奏復内閣康熙九年十月内院復為内閣復翰林院官屬一遵順治十五年之舊以圖海巴泰為中和殿大學士兼吏部尚書索額圖李霨為保和殿大學士兼户部尚書魏裔介杜立徳為保和殿大學士兼禮部尚書對哈納為文華殿大學士管刑部尚書事折爾肯哈占為中和殿學士塞赫達都為保和殿學士馬朗古張鳯儀為文華殿學士靳輔為武英殿學士田種玉為文淵閣學士陳敳永為東閣學士折庫納熊賜履為翰林院掌院學士俱兼禮部侍郎傅而都嘉利亞國康熙己酉大西洋傅而都嘉利亞國貢使瑪訥撒爾達聶入貢有㫖該國從來未通中國凡賜賚皆加一等其人物貢物與荷蘭略同起居注康熙十年二月講筵初開工部尚書王熙翰林學士兼禮部侍郎熊賜履進講大學康誥曰克明徳章及尚書人心惟危道心惟微二句三月禮科給事中吳國龍疏請復設起居注得㫖報可藥樹監搜文昌雜錄載元相詩松門待制應全逺藥樹監搜可得知云唐時殿門外有藥樹監察御史監搜之位在焉唐制百官入宫殿門必搜御史掌之太和中乃下詔宰臣奏事停其監搜云云康熙初御史李秀奏請百官佩刀雖上殿奏事亦爾後李御史棠疏罷之俄羅斯俄羅斯國以順治十七年遣使入貢不知正朔自稱一千一百六十三年讀王弇州所記有明盛事及徐應秋談薈所載因憶本朝盛事數則記錄於左兄弟九列真定梁公清寛清逺清標兄弟相繼為吏部侍郎清標歴户禮兵刑四部尚書大拜清寛清標皆給事中維本子清逺山東僉事維樞子皆前吏部尚書夢龍曽孫父子尚書宛平王公崇簡以太子太保禮部尚書致仕子熙以禮部侍郎加尚書遷左都御史兵工二部尚書大拜公時六十餘尚無恙父子同時顯貴掖縣張尚書忻以大司寇家居子文安公端拜相年三十六滄州戴尚書明説為户書子編修王綸以順治乙未及第第二人王縉戊戌進士官御史父子宰相高陽李公霨前明文敏公國􅕠子大名成公克鞏前明文穆公基命子皆父子宰相父子尚書靈夀傅大司空維鱗前明太宰永淳子父子皆尚書戊子北榜三及第順治戊子順天鄉試第四名張永祺壬辰榜眼及第第五名戴王綸乙未榜眼及第第八名熊伯龍己丑榜眼及第甲午浙榜三狀元順治甲午浙江熊鍾陵讀學伯龍主試一榜狀元及第者三人乙未史大成鄞人甲辰嚴我斯歸安人庚戌蔡啓僔徳清人徳清蔡氏二狀元康熙庚戌狀元蔡啓僔壬戌狀元蔡升元俱徳清人升元即啓僔從姪戊戌三及第順治戊戌鼎甲三人常熟孫承恩鹽城孫一致全椒吳國對皆江南人皆中甲午順天榜蘇州㑹元狀元順治以來蘇州㑹元六人乙未秦鉽長洲人丁未黄礽緒崇明人癸丑韓菼丙辰彭定求乙丑陸肯堂丁丑汪士鋐俱長洲人狀元七人戊戌孫承恩常熟人己亥徐元文崑山人丁未繆彤吳縣人癸丑即菼丙辰即定求己未歸允肅常熟人乙丑即肯堂兼㑹狀者三人崑山徐氏三及第崑山徐氏兄弟三人長乾學康熙庚戌探花及第刑部尚書次秉義癸丑探花及第右庶子次元文順治己亥狀元及第以户部尚書大拜同胞三及第前明三百年所未有也惟宋李宗諤子昭遘昭遘子果卿果卿子士廉三世探花及第同邑一榜及第順治己亥狀元徐元文榜姓陸探花葉方藹皆崑山人丁未狀元蔡啓僔榜眼孫在豐皆徳清人明崇禎癸未榜眼宋之繩探花陳名夏皆溧陽人僚壻狀元武進楊修撰廷鑑吕閣學宫僚壻也一明崇禎癸未狀元及第一順治丁亥狀元及第廷鑑二子大鵾己亥庶吉士按察使大鶴己未諭徳一邑甲科之盛本朝一邑科第之盛者無錫壬辰狀元鄒忠倚乙未探花秦鉽長洲籍秦又㑹元也己亥榜眼華亦祥榜姓鮑甲辰探花周𢎞榜姓秦崑山三徐兄弟及第外又有己亥探花葉方藹徳清庚戌二及第外又有丙辰榜眼胡㑹恩壬戌狀元蔡升元常熟戊戌狀元孫承恩丙辰探花翁叔元己未狀元歸允肅全椒呉氏兄弟全椒吳氏兄弟同胞五人其四皆進士長國鼎前癸未進士官中書舍人三國縉順治己丑進士四國對順治戊戌進士榜眼及第官翰林侍讀五國龍亦前癸未進士官禮科都給事中國對國龍孿生也國龍子晟康熙丙辰進士昺辛未進士榜眼及第父子學士桐城張禮書英兼翰林院學士掌院事子廷瓚同時官翰林侍讀學士又同為日講官兄弟學士華亭王左都鴻緒先為内閣學士二兄頊齡九齡皆翰林侍講學士特恩賜㑹試順治乙酉鄉試山東法若真以五經疏聞於朝特㫖授中書舍人仍與㑹試丙戌遂入翰林其弟若貞同科進士給事中長洲彭氏二及第長洲彭氏定求丙辰狀元寧求壬戌探花同曽祖兄弟難䕃異典順治中御史張煊以忤溧陽相死世祖皇帝親政後特以其子諸生基逺為太常少卿累陞兵部侍郎外遷蘇松兵備副使康熙中直督尚書朱昌祚直撫尚書王登聯中法死上親政後其子頌寃以朱之子紱為兵部督捕理事官王之子盛唐為大理寺少卿兩五經入翰林康熙丁卯順天鄉試海寧查嗣韓侯官林文英皆以五經疏聞特賜舉人明年戊辰俱中式嗣韓榜眼及第文英庶吉士土魯番表文土魯番自順治十三年入貢至康熙十二年國王瑪墨忒塞伊忒韓復遣其臣兀魯和隥等獻馬其表略云土魯番國王某上言於乃聖乃仁天下治平皇帝陛下恭惟皇上一統攸同何異於古之占什特惠澤羣生相同乎昔之達剌汗法紀軍威比隆於楷墨塞勞聰明格物嫓美乎伊思謙達爾皇上睿知天錫如日升之無不照皇上撥亂為治如月恒之無不臨旌旂閃爍超越乎墨烏戚爾皇恩浩蕩實出於度量寛仁國祚無疆而萬國咸寧洪福靡際而皇圖應運後稱一千八十三年二月二十八日予昔在禮部見荷蘭暹羅琉球諸國表文用金花箋文義皆如中國或謂是閩粤人代作也北岳祀典五岳皆祭於山獨恒岳祭上曲陽自漢宣帝神爵元年始而恒山實在渾源州相傳舜望於山川北至大茂山大雪不能前有石飛墮遂祀焉即今曲陽廟廟石長不滿丈闊僅四尺餘濮陽蘇穀原祐侍郎疑石晉後燕雲陷遼宋遂遙祀於此然史漢唐書之文明甚不始宋也沈存中筆談云北岳謂之大茂山半屬契丹以大茂脊為界岳祠舊在山下石晉之後稍遷近内今祠乃在曲陽云云蘇說本此也明𢎞治中馬端肅公曽請改祠於山事下禮部竟格於倪文毅公按南園漫錄云倪公父謙常奉命祀曲陽禱於神神指旁侍一人與之遂生公因名岳以是固執不肯改祀云順治十七年上允刑科給事中粘本盛之請罷曲陽廟祀祀渾源千年因循之訛至是始釐正焉祭酒題名國初設祭酒滿洲一員蒙古一員漢人一員順治十七年裁去蒙古祭酒其滿洲祭酒題名姑兒馬吽起順治元年迄康熙四年七月凡二十二年阿都里起四年迄七年六月卒於位賈祿起七年迄十二年四月左遷吏部員外郎宜昌阿起十二年迄十七年二月陞詹事府詹事阿禮瑚起十七年迄二十二年陞盛京刑部侍郎漢祭酒題名李若琳天啓壬戌進士順天大興人薛所蘊崇禎戊辰進士河南孟縣人胡統虞崇禎癸未進士湖廣武陵人高珩癸未進士山東淄川人李呈祥癸未進士山東霑化人王崇簡癸未進士順天宛平人諡文貞李奭棠順治丙戌㑹元及第順天大興人單若魯丙戌進士山東高密人沙澄丙戌進士山東蓬萊人馮溥丁亥進士山東臨朐人拜相諡文毅吳偉業崇禎辛未進士㑹元及第江南太倉人張士甄己丑進士順天通州人金鋐壬辰進士順天大興人章雲鷺丁亥進士順天宛平人熊伯龍己丑進士及第湖廣漢陽人李中白丁亥進士山西長子人李儀古己丑進士直隷任丘人綦汝楫乙未進士山東高密人陳敳永乙未進士浙江海寧人諡文安單若魯補任熊伯龍補任王守才旗人時更易官制漢軍漢人通用後停宋徳宜乙未進士江南長洲人拜相諡文恪李仙根辛丑進士及第四川遂寧人楊正中戊戌進士順天通州人徐元文己亥狀元及第江南崑山人拜相沈荃壬辰進士及第江南華亭人馮源濟乙未進士順天涿州人王士禎乙未戊戌進士山東新城人李元振辛丑甲辰進士及第河南柘城人翁叔元丙辰進士及第江南常熟人曹禾甲辰進士江南江隂人汪霦丙辰進士浙江錢塘人吳苑壬戌進士江南歙縣人張榕端丙辰進士河南磁州人孫岳頒壬戌進士江南吳縣人司業題名國初設司業滿洲二員蒙古一員漢人一員順治十七年裁去䝉古司業其滿洲司業題名東四旗司業李虎沙傅達禮白清額後任陜西巡撫副都御史尹布葛思泰後累陞總督川陜兵部侍郎拜山西四旗司業蟒吉兔鄢代曹爾和花善滿都虎達鼐漢人司業題名薛所蘊羅憲汶崇禎癸未進士江西南昌人劉肇國癸未進士湖廣潛江人吕纘祖順治丙戌進士及第直隷滄州人李奭棠單若魯王熙順治丁亥進士順天宛平人文貞公子拜相曹本榮己丑進士湖廣黄岡人姜元衡己丑進士山東即墨人張永祺壬辰進士及第順天大興人楊永寧壬辰進士山西聞喜人陳敳永田種玉乙未進士順天宛平人馬晉允戊戌進士浙江餘姚人張貞生戊戌㑹元江西廬陵人熊賜履戊戌進士湖廣孝感人拜相熊賜璵戊戌進士湖廣孝感人宋徳宜李仙根胡簡敬乙未進士江南沭陽人田麟壬辰戊戌進士遼東自在人楊正中吳國對戊戌進士及第江南全椒人杜臻戊戌進士浙江秀水人吳本植戊戌進士直隷安平人陳廷敬戊戌進士山西澤州人王颺昌戊戌進士山東高密人譚篆戊戌進士湖廣景陵人李天馥戊戌進士江南合肥人拜相吳本植補任王封濚戊戌進士湖廣黄岡人蘇宣化己亥進士順天大興人周之麟己亥進士浙江蕭山人葉方藹己亥進士及第江南崑山人諡文敏蔣𢎞道己亥進士順天大興人朱之佐己亥進士順天大興人張玉書辛丑進士江南丹徒人拜相王維珍庚戌進士旗人田喜􅀢辛丑進士山西馬邑人劉芳喆辛丑進士順天宛平人彭孫遹己亥進士浙江海鹽人徐倬癸丑進士浙江徳清人彭定求丙辰狀元及第江南長洲人董誾癸丑進士江南吳江人徐倬補任秦宗游己未進士浙江山隂人吳涵壬戌進士及第浙江石門人彭㑹淇丙辰進士江南溧陽人張豫章戊辰進士及第江南華亭人按國初官制祭酒陞内院學士後品級考既定遂陞讀講學士多或一年少或數月即遷去至康熙十二年重定品級考改讀講學士為五品祭酒仍舊四品與讀講學士較俸陞遷故崑山徐公任祭酒者餘三年陞内閣學士兼禮部侍郎以去華亭沈公繼之時復設詹事府遂陞少詹事兼侍講學士康熙初詹事府兩坊衙門既裁史官必歴司業然後得陞侍讀時侍講亦裁去故編修檢討無不為司業者率不數月即遷去康熙十四年復設坊局於是修撰編檢多陞中贊而司業與之較俸陞讀講諭洗亦非三年餘不得遷矣祭酒司業自國初未有題名予任祭酒與宛平劉公議補其闕因誌梗槩云補鄉試自庚申已後諸僭逆以次削平各省次第補行鄉試故福建有庚申科主考户部郎中劉元勲大理寺評事白夢鼐廣西貴州皆壬戌科廣西主考翰林院編修喬萊刑部員外郎楊佐國貴州主考翰林院編修沈旭初户部主事陸鍾吕雲南四川皆癸亥科雲南主考翰林院編修米漢雯户部主事高琯四川主考翰林院編修方象瑛吏部文選員外郎王材任坐次詹事府少詹事舊與掌詹同三品在京得乘四人肩輿後重定品級考改為四品在朝班列左右通政大理少卿下至大朝則三宫詹與大學士内閣掌院學士都御史列坐殿上兩坊掌坊庶子侍讀侍講諭徳洗馬諸官皆五品翰林而坐太常太僕少卿順天府丞鴻臚正卿四品之上是又不論品級崇卑也壬戌癸亥間崔夏章蔚林蔣裕菴𢎞道為少詹皆四人肩輿則以講官加正詹故耳祭酒四品與讀講學士較俸陞遷朝班則坐諸學士下兩坊庶子上康熙二十一年正月賜宴乾清宫座次在東面西與朝班同二十年七月賜宴瀛臺在南面北則序坐於太常卿僉都御史下太僕卿光祿卿上翰林結銜今翰林官結銜獨列散官於本官之下如詹事祭酒等官則散官在上與部院諸司無異按周宗伯識小編云唐翰林學士皆以他官兼故學士結銜在本官下五代後唐置端明殿學士以趙鳯馮道為之後鳯遷禮部侍郎因求宰相任圜升學士於本官之上蓋示貴重耳宋因之惟宰相則否本朝翰林列散官於本官之下與諸司異亦祖此意若宫坊以上兼翰林官者皆列兼官於本官之下散官亦列於上不復與翰林同矣翰林故事相沿多不知所出惟此考據為詳又按五代㑹要云初置端明殿學士名目如三館之例職在官下及趙鳯轉侍郎令人諷任圜移職在官上至今為例中堂明洪武十五年設内閣大學士上命皆於翰林院上任十八年又命殿閣大學士左右春坊大學士俱為翰林院官故院中設閣老公座於上而掌院學士反居其旁諸學士稱閣老曰中堂以此按湘山野錄錢希白見王冀公欽若戲曰中堂遂有如此宰相乎又聞見錄富鄭公與康節食筍公曰未如中堂骨董之美云云元王惲秋澗有中堂事記記元初中書省事皆前此矣起居注明初甲辰年設起居注秩正四品以宋濂魏觀為之吳元年改正五品後革十四年復設改正七品以單仲立為之久之復革萬厯初張位始請復設江陵相定議以修撰編檢史官充日講者日輪一員記注起居兼錄聖諭詔冊等今日之制即本江陵遺意也蓋明初起居注别為專官而萬厯後乃歸之史官爾然今制自掌院掌詹以下皆得充起居注官不專史官此其異也按唐六典起居郎二人從六品上掌錄天子之動作法度以修記事之史屬門下省起居舍人二人亦從六品上掌錄天子之制誥徳音以修紀言之史屬中書省此即古左右史之分職至明而合為一官今仍之耳郊勞安親王平湖南康親王平閩粤章泰貝子平滇黔凱歸上皆郊勞於蘆溝橋西二十里諸王都統滿漢大學士尚書侍郎阿思哈尼哈番以上大臣皆從既至詰朝皇帝對天行三跪九叩頭禮諸王大臣及出征王將軍等隨行禮畢上御黄幄諸王大臣侍班鴻臚寺引出征王將軍等朝見行三跪九叩頭禮禮畢賜茶囘宫禁師生唐人五代最重座主門生之禮明代尤甚萬厯中門户既成一為師生終身以之惟嘉靖八年張璁霍韜為主考戒諸生不得修弟子禮本朝沿明之舊順治十五年戊戌科給事中胡悉寧建言鄉㑹試不分經房不稱師生至康熙十八年己未科始復分房舊例而師生之禁仍舊初選方面順治己丑㑹試後以兩廣初定需人遂用新進士候銓者二甲授參議三甲授知府進士釋褐即為四品監司郡守蓋剏例也然止此一科為然賜生員金康熙二十二年春二月駕幸五臺駐蹕完縣召父老慰問賜金有蔡丹桂者自陳縣學生員家貧無以為養上命講飛龍在天利見大人及徳輶如毛毛猶有倫句稱㫖賜白金五兩金盤蘋婆果六枚仍諭曰爾當努力讀書開卷有益也事載西巡日錄賜御筆講義初上以御筆頒賜内閣翰林起居注諸臣即部院大僚皆不得與惟刑書蔚州魏公象樞一拜賜耳康熙二十一年廣西巡撫郝浴疏請頒賜御筆清慎勤三大字部議俞其請遂遣官徧賜各直省督撫云壬戌翰林檢討汪楫中書舍人林麟焻冊封琉球癸亥翰林編修孫卓禮部郎中周燦冊立安南亦以為請皆獲頒賜琉球得守禮之邦安南得忠孝守邦各四大字其講筵四書書經講義成例頒賜在京三品大臣國子祭酒四品亦得拜賜在外則三品督撫及在籍三品大臣亦與焉二十四年頒賜易經講義士禎以少詹亦得拜賜汪今官福建布政使林今官貴州提學道僉事皆予門人巡方世祖皇帝時時用部主事及中書舍人行人評事博士等官假監察御史銜巡按各直省差竣都察院殿最之最者得内陞京堂五品餘則仍囘居本職不真授御史也後仍歸御史而巡方亦停不遣康熙六七年間復用各部郎中以監察御史銜巡視鹽課未幾復舊翰林卿寺屬太僕寺舊有丞後裁去増設滿洲員外郎八人翰林院本無主事起居注館既設増記注滿洲主事四人中書舍人六人大中明太祖初定天下建國號意在大中既而祈天乃得大明故當時錢文有大中通寶閲江樓友人紀伯紫映鍾金陵人嘗有詩云惆悵天涯頭盡白楊花空滿閲江樓佳句也按洪武初欲於獅子山即盧龍山頂作閲江樓先令儒臣作記故潛溪諸公集皆有此文樓實不果作發陵康熙二十二年陜西平涼府盜發韓康王定王二冢法司按律擬罪上以發掘前代帝王陵墓特令加等因諭歴代帝王陵應加守冢人户下九卿雜議并禁稱故明廢陵等語聖諭云凡云廢者必如高煦等有罪廢為庶人然後可彼生為藩王誰廢之耶上之仁明如此督撫内陞康熙中總督内陞者秦督莫洛刑部尚書漕督帥顔保工部尚書浙督李之芳兵部尚書川陜總督哈占兵部尚書浙閩總督王隲户部尚書浙閩總督王國安刑部侍郎巡撫内陞者廣東巡撫馮甦安徽巡撫薛柱斗山東巡撫張鵬貴州巡撫田雯俱刑部侍郎甘肅巡撫巴錫工部侍郎伊圖户部倉場侍郎江蘇巡撫余國柱左都御史貴州巡撫楊雍建兵部侍郎山東巡撫徐旭齡工部侍郎江蘇巡撫趙士麟兵部督捕侍郎㑹元解元入翰林世祖極重科名自丙戌迄己亥㑹試第一皆入翰林惟丁亥李人龍不與後以閣薦為中書舍人壬辰程可則以磨勘被黜乙未邑同年伊翕菴闢舉進士引見南海子上顧學士曰此人山東解元也遂改庶吉士後授御史官至都御史巡撫雲南自辛丑至庚戌例又一變康熙癸丑上以㑹元韓菼為狀元榜中解元皆改庶常丙辰亦以㑹元彭定求為狀元乙丑以㑹元陸肯堂為狀元凡一榜解元亦然遂為定例人遭逢固有幸不幸也按夢梁錄宋時中省魁者殿試有陞甲恩例前十名亦如之京堂京堂本以待吏部科道官内陞者無徑授之例康熙中張靖逆侯勇子雲翼馬文毅公雄鎮子世濟陳海巡啓泰子汝器皆授大四品廣西平樂進士袁景星陳忠愍公福弟夀皆授小四品趙都督應奎子衍祥許都督占魁子登隆皆授五品伯高檀弓伯高死於衛赴於孔子孔子曰云云吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯高而來者勿拜也金陵白評事仲調夢鼐為湯隂王東臯伯勉吏部門生康熙丁巳吏部卒於家訃聞京師仲調為位而哭又於蕭寺中受弔凡弔者拜之如子弟執父兄之喪蓋古禮云外國封使國朝聲教之逺梯航至者數十國而受封遣使者惟安南琉球二國安南又凡三遣始則康熙三年諭祭黎維禔奉使者侍讀學士程芳朝繼則康熙五年冊封黎維禧奉使者編修吳光也六年八月維禧逐都統使莫元清奪其諒山高平地元清奔皈朝兩廣守臣以聞七年遣使宣諭則侍讀李仙根職方主事楊兆傑為正副使琉球封王順治中遣給事中張學禮行人王垓為正副使居閩數年罷歸康熙初復遣時張已改御史王已遷户部郎中矣康熙十二年暹羅請封上以海道窵逺令以敕印付其使臣帶往於事理甚便而亦不失柔逺之體按嘉靖二十年降安南國為安南都統使司仍以莫登庸為都統使國初定粤莫敬耀來歸未受爵卒授其子元清都統使黎維禔亦來歸未受封卒子維禧立康熙五年冊封維禧安南國王康熙二十一年琉球安南復入貢遣編修孫卓儀制司郎中周燦往安南檢討汪楫中書舍人林麟焻往琉球二十三年暹羅復入貢云試錄齒錄科場試錄齒錄其來已久東觀奏記載鄭顥知舉宣宗索科名記顥屬祠部員外郎趙璘採訪諸家科目記撰成十三卷始武徳元年至大中十年敕付翰林自今放榜後並寫及第姓名及所試詩賦題目進入内仍仰所司逐年編次明三百年鄉㑹試并沿其制康熙初停止至庚戌㑹試乃復舊例鄉㑹試錄仍進呈乙卯鄉試以兵餉不足再停止尋又復布政陞尚書李文達公天順日錄載天順二年以山東布政使陸瑜為刑部尚書四年以朝覲官布政使蕭晅為禮部尚書又欲以布政使賈銓為户部尚書不果明盛時中外用人如此天啓時以布政使張五典為兵部尚書則以其子御史銓死節蓋異數也本朝順治中布政使往往入為侍郎康熙初定品級考布政使内陞止於太常光祿卿而又不及太僕何也闕諡予鄉啓禎名臣闕諡者如鍾司空龍淵羽正畢司徒白陽自嚴曹司空見素珖先太師大司馬霽宇公象乾其尤著者曹通議葆素珍司空之兄也躬行實踐號為醇儒品不在龍淵先生之下然名位稍卑例不得諡竊謂朝廷易名重典亦顧其人何如耳今例尚書以上乃得諡國史三品以上乃得立傳其以名位湮没者多矣近王給諫北山曰高疏請死節諸臣不必拘定品級皆當予諡以鼓忠義之氣其論最正格於部議不行歐陽從祀今言嘉靖中議祀典進后蒼文中子胡瑗歐陽修四人從祀歐陽以濮議故故孚敬特進之也予謂歐陽公人品學術亦自不愧然以世廟君臣之私進之則謬矣公之生也以此負謗其殁也以此從祀所謂求全之毁不虞之譽者也世祖御書西山新法海寺前對裂帛湖世祖皇帝翠華駐此瞻眺湖光因賜今名殿有巨碑刻敬佛二字筆勢飛動世祖御書也文武互用本朝用人器使有不拘文武資格者以武臣改文職如順治中總兵官李國英改四川巡撫後為總督川陜兵部尚書總兵官胡章改山東右布政使遊擊王肇春黄明改知府以文臣改武職如莊浪道參議朱衣客改隨征四川總兵官吏部侍郎陳一炳户部倉場侍郎周卜世前總督浙閩兵部侍郎劉兆麒俱改都督同知僉事等銜充山西山東直隷等處援𠞰提督總兵官學士贈尚書本朝大臣身後例有恩䘏或予諡而贈官者絶少康熙十八年十一月翰林學士喇沙里卒以侍講筵久特贈禮部尚書諡文敏蓋異數云池北偶談卷一
