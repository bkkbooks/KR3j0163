body:
  text: 池北偶談卷十五刑部尚書王士禎撰文俶本草寒山趙凡夫子婦文俶字端容妙於丹青自畫本草一部楚詞九歌天問等皆有圖曲臻其妙江上女子周禧得其本草臨倣亦入妙品禧弟子姚亦江隂人美而艶作畫得俶遺意癸辛雜識云至元斥賣内府故書於廣濟庫有出相彩畫本草一部極竒又於杭太廟前尹氏書肆見彩畫三輔黄圖一部極精妙此亦其類也文㸃字與也文肅公孫俶從姪也畫有衡山家法亦善花卉汪編修琬贈之詩云君家道韞擅才華愛寫徐熈没骨花曾向兒時窺指訣筆端桃萼一枝斜寒碧琴記南昌王于一猷定作寒碧琴記云昔子瞻為登州司戶叅軍子由省之㩦琴遊大海舟覆琴墮海後髙麗人得之獻其王王知為蘇氏物也藏之數百年迨明崇禎間髙麗困於兵請援遣總兵某帥師救之瀕行贈以琴琴遂復還中國按東坡年譜元豐八年乙丑五月復朝奉郎知登州到郡才五日即以禮部郎官召作别登州舉人詩有五日匆匆守之句公未嘗為司户叅軍且到郡非乆即召少公亦未嘗省公於登也崇禎間亦未嘗遣師援髙麗于一好竒誕每為人欺多此類國風圖南宋馬和之侍郎常寫毛詩進御畫家稱其行筆飄逸時人目為小吳生又云善畫人物佛像山水效吳裝務去華藻自成一家髙孝兩朝深重其畫每親書三百篇令和之圖寫戊申歳在京師得其畫檜風羔裘素冠萇楚匪風四章每幅書本詩於後楷法殊妙有御府圖書耿夫人詩吾邑耿侍御省亭鳴世妻徐氏都御史華平庭柏之母也有賢行能文章兵後失其集僅傳寄子詩云家内平安報爾知田園歳入有餘資絲毫不用南中物好做清官答聖時有德之言與撚脂弄粉者迥異朱文公書益都髙木王梓予從女兄之夫博雅君子也常遺予晦翁墨蹟一卷詩云風雪集歳宴揜關聊自休今晨展遐眺倚此寒幽巖顛倒一字同雲暗空室皓彩迷林丘崩奔小澗歇飛舞增綢繆仰看鸞鶴翔俯視江漢流乾坤有竒變澒洞驚兩眸三酌不自温倚杖空㝠搜悲歌動華薄璀璨忽滿裘向來一杯酒浩蕩千里遊亦復有兹賞㣲言寄清酬解㩦今幾許光景逝不留懐人𦕈山嶽省已紛愆尤對此竒絶境一懽生百憂茫然發孤詠逺思誰能收雪中與林擇之祝弟登劉園之宴坐巖有懐南嶽舊遊賦此呈擇之屬和幷寄敬夫兄乾道三年冬十二月上浣新安朱熹奉寄時燈下走筆右詩蓋書寄南軒者昔人謂先生字學曹公今此書正類東坡先生卷首有柯敬仲題字後有歐陽圭齋及大梁班彦功跋彦功元人善詞曲者竹枝昔人謂竹枝歌詞雖鄙俚尚有三緯遺意山谷聞人歌劉夢得竹枝歎曰此奔軼絶塵不可追也夢得後工此體者無如楊廉夫虞伯生他如黄土作墻茅蓋屋庭前一樹紫荆花黄魚上得青松樹阿儂始是棄郎時等句皆入妙近見彭羨門孫遹嶺南竹枝深得古意詩云木棉花上鷓鴣啼木棉花下牽郎衣欲行未行不忍别落紅没盡郎馬蹄妾家谿口小逥塘茅屋藤扉蠣粉墻記取榕隂最深處閒時來過喫㯽榔半年水宿半山居冬採香根夏採珠珠好須從蚌中覔香燒還仗博山鑪又山隂徐緘竹枝云勾踐城南春水生水中鬭鴨自呼名伯勞飛遲燕飛疾郎入城時儂出城亦本色語也徐氏廣陵徐氏女子元端工填詞有入李易安之室者如珠簾輕掲憔悴憐黄葉忽憶小亭人乍别正是重陽時節當初一段清秋平分兩地離愁試向西風寄問知他還似儂不起來慵向糚臺倚亂綰凌雲髻歸期曾説栁青時鎮日懨懨只是惱春遲小園昨夜西風劣笑落漫天雪侍兒佯笑捲簾紗却道玉梅已放滿枝花獨坐數歸期花影重重日影低無計徘徊思好句支頥除却春愁没箇題閒門倚畫樓西芳草青青失舊堤猶記當時人去處依依紅杏花邊卓酒旗自注白詩揺膝支頥學二郎看西風吹起滿庭碎葉閉珠戸獨坐還怯窻外芭蕉㸃㸃做盡凄切禁不住芳心欲折殘燈挑盡隱隱半明半滅羅衾祇借香温熱今夜裏這愁腸勝似離别寛褪了裙兒幾摺婦人經濟葉石林每令諸子女兒婦列坐説春秋近日武林黄夫人顧氏名若璞所著臥月軒文集多經濟大篇有西京氣格常與婦女宴坐則講究河漕屯田馬政邊備諸大計副笄中乃有此人亦一竒也打毬詩三朝北盟㑹編載徽宗北狩至真定金人髙㑹擊毬請帝賦詩詩曰錦裘駿馬曉棚分一㸃星馳百騎奔奪得頭籌須正過休令綽撥入斜門揮麈餘話載道君禋祀禮成再賜太師暹字韻詩云歸問雪中誰詠絮冥搜花底自廵簷佳句也黜朱梁紀年圖長洲宋既庭實穎作黜朱梁紀年圖論其義嚴正略云王莽不得為新安祿山不得為燕全忠豈獨得為梁乎且其時移檄興復唐室者有晉岐蜀淮南四國或為唐之臣子或為唐之賜族則唐實未嘗亡也今黜朱梁紀年而以晉岐淮南之稱天祐者為主始於天祐四年至後唐莊宗同光元年而止亦春秋書公在乾侯之義也圖考唐昭宣光烈孝皇帝甲子天祐元年乙丑天祐二年丙寅天祐三年丁夘天祐四年夏四月朱全忠僭稱皇帝偽國號梁偽年號開平廢唐帝為濟隂王淮南四川移檄興復唐室戊辰晉岐淮南稱天祐五年春正月晉王李克用卒子存勗立朱全忠弑昭宣帝夏五月晉王伐偽梁夾寨破之己巳晉岐淮南天祐六年六月偽梁劉知俊奔岐岐遣劉知俊伐偽梁靈州大敗梁人庚午晉岐淮南天祐七年偽梁遣兵襲鎮州取深冀鎮定推晉王為盟主晉遣兵救之辛未晉岐吳天祐八年偽梁改號乾化晉王伐偽梁軍於柏鄉大破之壬申晉岐吳天祐九年春正月晉王及鎮定之兵伐幽州二月朱全忠救之大敗而還六月朱全忠為子友珪所殺癸酉晉岐吳天祐十年二月朱友貞殺友珪而自立甲戌晉岐吳天祐十一年乙亥晉岐吳天祐十二年朱友貞改偽年號曰貞明丙子晉岐吳天祐十三年丁丑晉岐吳天祐十四年戊寅晉岐吳天祐十五年己卯晉岐吳天祐十六年庚辰晉岐吳天祐十七年朱友貞改偽年號曰龍德辛巳晉岐吳天祐十八年壬午晉岐吳天祐十九年癸未晉岐吳天祐二十年晉王李存勗建國號曰後唐改元同光冬十月唐主入大梁朱友貞自殺唐毁偽梁宗廟廢朱温朱友貞為庶人後唐莊宗光聖神閔孝皇帝甲申同光元年尤悔菴樂府吳郡尤悔菴侗工樂府嘗以臨去秋波那一轉公案戲為八股文字世祖見而喜之其所撰樂府亦流傳禁中世祖屢稱其才既而世廟升遐尤一為永平推官以細故罷去歸吳中時時以樂府寓其感慨所作桃花源黒白衛二傳竒尤為人膾炙予嘗寄詩云南苑西風御水流殿前無復按梁州凄凉法曲人間遍誰付當年菊部頭猿臂丁年出塞行㶚陵醉尉莫相輕旗亭被酒何人識射虎將軍右北平尤為泣下康熈己未尤以召試入翰林為檢討近見江左黄九煙周星作怎當他臨去秋波那一轉制義七篇亦極游戲之致孫樵論史孫樵云史家紀職官山川地理禮樂衣服宜直書一時制度使後人知某時如此某時如彼不當以秃屑淺俗則取前代名品以就簡絶此病在唐人已有之近日艾千子訾謷滄溟弇州本此非創論也小樂府楊廉夫自負其五言小樂府嘗云七言絶句體人易到吾門章木能之古樂府不易到吾門張憲能之至小樂府二三子不能惟吾能之耳向見吾友孫處士豹人枝蔚數章頗竒略記於此蕭儼向舒州君王怒未休樓髙苦無井不及景陽樓又置酒宣華苑嘉王好酒悲韓昭方用事涕淚莫輕垂史筆陳同甫作忠臣傳以武庚為忠臣孝子之首孫可之作西齋錄發凡起例大義凛然惜其書不傳於後世是古今一大缺陷事詩地相肖范仲闇文光在金陵嘗云鐘聲獨宜著蘇州用唐人姑蘇城外寒山寺夜半鐘聲到客船如云聚寶門外報恩寺豈非笑柄予與陳伯璣允衡論此因舉古今人詩句如流將春夢過杭州滿天梅雨是蘇州二分無頼是揚州白日澹幽州黄雲畫角見幷州澹煙喬木隔綿州曠野見秦州風聲壯岳州風味各肖其地使易地即不宜若云白日澹蘇州或云流將春夢過幽州不堪絶倒耶記觀宋荔裳畫庚戌七月予寓公路浦萊陽宋荔裳琬北上過予所㩦名畫甚夥因得縱觀最竒者為郭河陽枯木劉松年羅漢上有御府圖書皇妹圖書各一趙松雪百馬圖黄子乆浮嵐暖翠圖文徵仲松泉髙士圖又元孤雲處士主振鵬畫維摩不二圖一卷甚竒妙楷法類趙承㫖自記云至大元年二月初一日拜珠集賽第二日隆福宮花園山子上西荷葉殿内臣王振鵬特奉仁宗皇帝潛邸聖㫖臨金馬雲卿畫維摩不二圖草本又云至大戊申二月仁宗皇帝在春宮出張子有平章所進故金馬雲卿繭紙畫維摩不二圖俾臣某臨於東絹更叙説不二之因某謹按釋典有云維摩詰所説經故唐僧皎然詩云禪女來相試將花欲染衣禪心定不起還捧舊花歸東坡有坐上戴花詩云結習漸消留不住却須還與散花天又云毗耶居士談空處結習已空花不墜試敎天女御鉛華千偈瀾翻無一語又云要令臥疾致文殊又臂痛謁告詩云小閣低窻晏臥温了然非嘿亦非言維摩未病吾真病誰識東坡不二門又維摩塑像詩云當其在時或問法俛首無言心自知杜工部題顧愷之畫維摩像云虎頭金粟影神妙獨難忘又東坡題石恪畫維摩云試觀石子一處士麻鞋破帽露兩肘能使筆端出維摩神通又過維摩詰某詳觀馬雲卿所作維摩不二圖筆意超絶似亦悟入不二門豈非神通過於摩詰者乎某當時奉命臨摹更為修飾潤色之圖成幷書其概略進呈因得摹本珍藏暇日展玩以自娛也東嘉王振鵬又丁南羽畫師利像亦竒按元史以功臣穆呼哩赤老温博爾忽博爾术四族世領集賽之長集賽猶言更番宿衛也皇甫湜評韓文韓吏部文章至宋始大顯其在當時皇甫湜號為知公者然其諭業一篇備論諸家之文不過曰韓吏部之文如長江萬里一道衝飇激浪瀚流不滯然而施之灌溉或爽於用若有㣲詞反不如李北海賈常侍沈諫議之流無貶詞也若天不生歐公則公之文幾湮没而不彰矣按持正此文出自袁昻書評後世敖陶孫王弇州諸家文評詩評皆仿之朝鮮詩鄒平張尚書華東公延登刻朝鮮使臣金尚憲叔度朝天錄一卷詩多佳句略載於此曉發平島云三秋海岸初賔雁五夜天文一客星初至登州云南商北客簇沙頭畫鷁青簾幾處舟齊唱竹枝聨袂過滿城明月似揚州蓬萊閣云橋石已從秦帝斷星槎惟許漢臣通登州次吳秀才韻云澹雲輕雨小姑祠菊秀蘭衰八月時水城夜景云五更殘月水城頭詠史何人獨艤舟不向東溟覓歸路還依北斗望神州夜坐聞擊柝云擊柝復擊柝夜長不得息何人寒無衣何卒饑不食豈是親與愛亦非相知識自然同袍義使我心肝惻九日云黄縣城邊落日朱橋驛裏重陽菊花依然笑客鬢髮又度秋霜東方曼倩里云夜開宣室儼珠旒執戟郎官走綠鞲首䑕轅駒俱碌碌漢庭綱紀一俳優早春云水際城邊野馬飛漸聞宮漏晝間稀東風日日蘼蕪綠塞北江南總憶歸王灘流水繞江涯江上松林是我家昨夜夢尋烏石路山前山後早梅花勞山説勞山在萊州府即墨縣境中崑山顧寧人炎武序勞山圖志曰自田齊之末有神仙之論而秦皇漢武謂真有此人在窮山巨海之中於是八神之祠遍於海上萬乘之駕常在東萊而勞山之名由此起矣山皆亂石巉巖下臨大海偪仄難度其險處土人猶罕至焉秦皇登之是必萬人除道百官扈從千人擁輓而後上也五榖不生環山以外土皆疎瘠海濵斥鹵僅有魚蛤亦須其時秦皇登之必一郡供張數縣儲偫四民廢業千里驛騷而後上也於是齊人苦之而名曰勞山也楊太史觀光致知小語曰山祖崑崙起自西北勞山居東南為中國山盡處行逺而勞所以名也二説未知孰是以理揆之顧説為長顧近寄所著日知錄内辨勞山三則又與前説不同敬一主人詩鎮國公敬一主人諱國鼒居瀋陽以庚戌七月薨於京師性淡泊如枯禪老衲好讀書善彈琴工詩畫精曲理樂與文士遊處常見其仿雲林小幅筆墨淡逺擺脱畦逕雖士大夫無以踰也有恭壽堂詩一卷頗多警䇿今略錄數篇登醫無閭山觀音閣云平生愛邱壑歴勝恣登眺醫閭夙所期兹焉愜懐抱鳥道薄層雲盤紆凌樹杪繫馬憩中林拂石坐荒草野衲候柴荆朱顔髪皓皓問渠來何時云在此山老修嶺逸驚麏斜陽忽歸鳥古洞駕長虹細泉屢廻繞亭亭堦下松百尺參青昊杔根獲斯地子落無人掃逶迤度幾峯下瞰羣山小曠然豁心目頓覺離紛擾再上白雲關萬象咸可了石門破蒼靄返景墮空杳煙霞情所鍾登渉險亦好大海面巖岫波光動林表自古逓相傳其中有蓬島安期與羨門往事終緬邈滉瀁失端倪氣色變昏曉豈識天地心物理費探討泠然此遊豫何用心悄悄戊申春日行次薊門登獨樂寺云春雨濕歸鞅行色藉以沐落日投薊門遂寄禪宮宿誰為初地功髙樓倚空築梯雲歴層楹聊縱千里目廻飇逓晚鐘薄霧籠寒竹芳草麗郊原新林變川陸豈意道路人復此慰幽獨臨風思近睽倚檻恣遥矚渤海杳漭沆盤山亘紆曲安期駐秦鑾廣成降帝屋聖哲既已往陳跡遺巖谷空同與滄溟煙波恆斷續宿向陽寺云聖朝存象法古寺復聞鐘花引山門路雲開野殿松髙齋談靜理逺嶼淡秋容日暮還㩦杖月明林外峯贈正寓云老僧多逸興五十學吟詩意出煙霞外情深揺落時依巖營丈室愛菊坐東籬欲共探幽勝邀君整杖藜遊千山祖越寺登蓮花峯云七嶺行初盡千巖宿霧開路廻青嶂側寺入白雲隈洞戸聞清籟碑文暗綠苔蓮花天際出漸覺絶塵埃龍泉寺云梵宇起中天重巗響碧泉虚堂清曉露幽壑靜鳴蟬窻引螺峯翠松含象嶺煙空憐名勝地塵世幾髙眠宿香巗寺絶頂云雨霽空山夕尋幽入杳冥雲封千澗白露濯萬峯青飛鳥依簷宿流泉伏枕聽朦朧空翠裏孤月自亭亭大安寺云萬仞盤危磴千峯此獨尊山光澄宿霧海色上朝暾野殿松杉古殘碑文字存悠然雲外想何必問花源悼剰和尚云一葉流東土花飛遼左山同塵多自得玩世去人間古塔烟霞在禪關水月閒空悲留偈處今日共躋攀贈御院焦㝠道士云蓬壺連魏闕羽客侍金門邱壑心寧遂烟霞氣自存談經清漏永掃徑落花繁西出函關叟何曾返故園秋懐云終朝成兀坐何處可招尋極目遼天濶幽懐秋水深浮雲窺往事皎月對閒心興到一樽酒沉酣據玉琴立秋云蕭蕭夜雨滿皇州景物凄其大火流懐抱不堪聞落葉相思何處是南樓關河朔氣催征雁塞草西風勁紫騮囘首雲山忘歳月一聲蟬噪又新秋秋懐寄耿駙馬云八月霜飛秋色深郊原草木日蕭森孤蹤漫憶懸遼海萬騎還思扈上林曾記郵亭風雨夕獨懐京國歳寒心他時花滿西川麓好對潺湲理玉琴丙午七夕立秋云寂寞天孫駐七襄殷勤烏鵲駕河梁相逢預恨離筵促别後應知清漏長玉露初寒丹桂冷金風時動碧羅香宵殘歸路遲環佩機杼經年罷晚糚丙午中秋云碧天如水夜初凉三五蟾光滿帝鄉何處笙歌侵曉漏幾家砧杵急秋霜仙臺深閉金莖露月殿髙懸桂子香獨抱幽懐渾不寐西風雁唳到虚堂虞山孫暘錄其詩傳之岣嶁音岣嶁音訓皆作去聲予向有金山寄友人詩憶君楚澤佳風日也上岣嶁九面山或以為誤按常熟顧充仲逹字義總略云岣嶁一字三音平聲鈎樓上聲莒旅去聲勾陋又按無可和尚通雅岣共于居侯果羽古后四切嶁龍朱郎侯隴丑郎豆四切史記音茍樓猶巃嵸蘢蓯可平可上也又張謂長沙土風碑五嶺南指三湘北流鄰連滄浪邊遥岣嶁亦平讀也集句夢溪筆談亟稱王介甫集句風定花猶落鳥鳴山更幽以為上句靜中有動下句動中有靜且云公始有集句詩有多至百韻者黄震曰荆公集句諸作其巧其博皆不可及近代頗有之然無如泗上施端教匪莪平生集句詩數千首屬對精切縱横曲折無不如意偶舉一章如贈鸚鵡長律云莫恨雕籠翠羽孤劉憲主人情意自辛劬王初人憐巧語情雖重白居易鳥憶髙飛意正殊李正平三舍鄭牛徒識字李山甫千年丁鶴任歌呼羅隱多言應伴髙吟客嚴郊學語還稱問字徒崔璞始覺琵琶絃鹵莽白居易終憐吉了舌模糊孫繁文章辨慧皆如此白居易事業紛呶亦大都魏樸歸去不煩詞客賦羅鄴夢來還記隴頭無張謂勸君不必分明語羅隱且自三緘問世途胡曾格律寄託兩詣妙境竒作也退谷論經學辛亥五月望後一日雨後過孫退谷先生城南書屋先生教以讀書當通經因言元儒經學非後人所及蓋元時天下有書院百二十各以山長主之教子弟以通經學經學既明然後得入國學即如吳淵潁程普德輩其集人多不知明初人猶多經學皆元時遺逸非後輩所及因出近日所撰詩經集解三十卷示予意主小序且言生平學問以朱子為宗獨於毛詩不然予問呂氏讀詩紀嚴氏詩緝如何先生云呂氏集衆説不甚成片段嚴氏太巧只似詩人伎倆非解經身分又言春秋程傳考事不盡憑三傳亦不盡離三傳取義不盡拘類例亦不盡屏類例朱子因此書不敢復注春秋其推尊可謂至矣然其時以黨禍方作至桓公九年閣筆未為完書予於是廣集諸儒之説妄為補之有成書矣又言古本孝經與今傳本迥别且言五經翼是十五年前所撰不過集諸經序論耳無當經學也時先生已七十有九讀書日有程課著述滿家可謂耄而好學者矣孝經庶人章江行雜錄載温公先壠在鳴條山山有餘慶寺公一日省墓至寺中有父老五六輩上謁進脱粟飯公享之既畢前啟曰某等聞端明在縣日與諸生講書村人不及往聽今幸為略説公即取紙筆書庶人章講之既已復前曰自天子章以下各有毛詩兩句此獨無何也公黙然少許謝曰某平生慮不及此當思所以奉答老父出語人曰吾講書難倒司馬端明昨見東郡耿君隱之道見云曾見古本庶人章末引詩云晝爾于茅宵爾索綯朱淑貞璿璣圖記辛亥冬於京師見宋朱女郎淑貞手書璿璣圖一卷字法妍嫵有記云若蘭名蕙姓蘇氏陳留令道質季女也年十六歸扶風竇滔滔字連波仕苻秦為安南將軍以若蘭才色之美甚敬愛之滔有寵姬趙陽臺善歌舞若蘭苦加捶楚由是陽臺積恨䜛毁交至滔大恚憤時詔滔留鎮襄陽若蘭不願偕行竟挈陽臺之任若蘭悔恨自傷因織錦字為回文五彩相宣瑩心眩目名曰璿璣圖亘古以來所未有也乃命使齎至襄陽感其妙絶遂送陽臺之闗中具輿從迎若蘭於漢南恩好踰初其著文字五千餘首世久湮沒獨是圖猶存唐則天常序圖首今已魯魚莫辨矣初家君宦遊浙西好拾清玩凡可人意者雖重購不惜也一日家君宴郡倅衙偶於壁間見是圖償其值得歸遺予於是坐臥觀究因悟璿璣之理試以經緯求之文果流暢葢璿璣者天盤也經緯者星辰所行之道也中留一眼者天心也極星不動葢運轉不離一度之中所謂居其所而斡旋之處中一方太微垣也乃疊字四言詩其二方紫微垣也乃四言回文二方之外四正乃五言回文四維乃四言回文三方之外四正乃交首四言詩其文則不回也四維乃三言回文三方之經以至外四經皆七言回文詩可周流而讀者也紹定三年春二月望後三日錢唐幽棲居士朱氏淑貞書首有璿璣變幻四小篆後有小朱印予向見斷腸集不載此文諸家撰閨秀詩筆者皆未之載宋桑世昌澤卿明雲間張𤣥超之象撰回文類聚亦未收此家考功兄輯然脂集三百餘卷多徴奥僻因録一通歸之後有仇英實父補圖四幅亦極妙按張萱周昉李伯時輩皆有織錦回文圖此圖殆有所本也鑑銘又回文類聚載唐婦人所作轉輪鈎枝八花鑑銘云花上八字枝間八字環旋讀之四字為句逓相為韻其盤屈糾結為八枝者左旋讀之自篇字起至詞字止當就支脂字韻右旋讀之自詞字起至篇字止當就先仙字韻兹不具録蜀産明時蜀王府例以三月三日取薛濤井水製箋二十四幅以十六幅貢京師近督撫監司稍募工仿製殊不能佳予使蜀時訪之井傍石臼尚存雕鐫精麗井在錦江東亦名玉女津也按續博物志云蜀松花紙雜色流沙紙彩霞金粉龍鳯紙近年皆廢惟十色綾紋紙尚在今絶響矣裴碑成都遭張獻忠之亂金石文字一無存者惟武侯廟碑尚完好葢武丞相元衡帥蜀時裴栁二公皆在幕中實元和四年己丑也碑首稱節度掌書記侍御史内供奉賜緋魚袋裴度撰營田副使檢校尚書吏部郎中兼成都少尹侍御史賜紫金魚袋栁公綽書千字頌昔人欲另編千文有難之者曰枇杷二字如何破用遂止曽見武林卓珂月人月崇禎初作千字大人頌錯綜成章甚有思理枇字云鬱尊黄金膳枇素木枇音七義取祭用素枇也杷字云姑婦任績夫男秉杷杷田器也開章云大人御天君子名世立千秋基興諸夏利髙文起家建景閏帝二百餘年我皇陟位河澄寳出鳯舉毛從虞雲兩旦漢日再中羣黎作乂列州攸同可謂髙文典冊篇中嶽伯分佐嵗星可招貢珠盈寸舍矢五扶投淵潔耳何傷盛朝帳染墨蹟帷集書囊武功稱甲吉運始丁誠推韓轂令賞終纓皆警策方爾止劉貢父平生未甞議人長短有不韙必面折之退無一語此長者之行也亡友桐城方爾止瀟洒有天趣每見人誦詩者輒為竄改其人不樂方亦不顧也然退未甞不稱其長而揜覆其短予以此重之方事多可笑秀水李良年字武曽方一日與札故作増字李明日見曰先生誤矣某字武曽非増也方曰吾正恐人誤作武曽讀如層耳聞者皆笑宣爐注如臯冒辟疆襄博雅嗜古甞為桐城方詹事拱乾賦宣爐歌自為之注甚精核云宣爐最妙在色假色外炫真色内融從黯淡中發竒光爇火乆燦爛善變久不著火即納之汙泥中拭去如故假者雖火養數十年脱則枯槁宣廟時内佛殿火金銀銅像渾而液又云寳藏焚金銀珠寳與銅俱結命鑄爐宣廟詢鑄工銅幾煉始精工對以六火則殊光寳色現上命煉十二火條之復用赤火鎔條於鋼鐵篩格上取其極清先滴下者為爐存格上者製他器爐式不規規三代鼎鬲多取宋瓷爐式仿之宣爐以百摺彞乳足花邊魚鰍蚰蜓諸耳薰冠象鼻石榴足橘囊香奩花素方員鼎為最索耳分襠判官耳角端象鬲雞脚扁番環六稜四方直脚漏空桶竹節等為下宣爐仿宋燒斑初年沿永樂爐製中年嫌其掩爐本質用番鹵浸擦薫洗易為茶蠟末年愈顯本色著色更淡後人評宣爐五等色栗殻茄皮棠梨褐色而藏經紙色為第一金鎏腹下為湧祥雲金鎏口下為覆祥雲雞皮色覆手色火氣乆而成也嘉靖後之學道近之施家皆北鑄北鑄間用宣銅器改鑄銅非清液又小冶寒儉無精采且施不如學道多矣南鑄以蔡家勝甘家蔡之魚耳可方學道真宣爐本色之厄有二嘉隆前尚燒斑有取本色真者重燒有過求本色之露如末年淡色取本色真爐磨治一新甚有嵗一再磨景泰成化之獅頭彞爐等後人偽易鑿宣款以重其價宣爐又有呈様無款最真妙者後人得之以無款恐俗目生疑取宣别器有款者鑿嵌畢竟痕跡難冺皆宣之厄也石溪亭蜀資江道中石溪橋有無名氏粉書一詩云桃花依舊放山青曲几焚香對畫屏記得當年春雨後燕泥時汙石溪亭先考功詩先考功西樵兄少時有詩曰雄風凉大壑雌蜺貫秋城時推警䇿按法苑珠林又有雄雷雌雷惠詮順怡詩東坡最喜杭僧惠詮落日寒蟬鳴一篇至為和作施彦執又記其大慈塢祖塔上題一首云谷口兩三家平田一望賒春深多遇雨夜靜獨鳴蛙雲暗未通月林香始辨花誰驚孤枕曉濤白捲江沙此詩亦佳能改齋漫録載湖僧順怡詩乆從林下遊一首云韓子蒼為予言後四句不同結句云唯聞犬吠聲更入青松去按此即惠詮詩坡公所和者但本作青蘿耳竹坡詩話作僧守詮冷齋夜話又載順怡詩云乆從林下遊頗識林下趣從渠緑隂繁不礙清風度閒來石上眠落葉不知數山鳥忽飛來啼破幽寂處又云荆公愛之則是惠詮詩自為坡和順怡詩自為介甫所賞韓誤記為一耳㢧縳道書謂一卷為一㢧佛書謂之一縳禪學云多羅樹葉書二百四十縳縳與卷同硯北雜志云徐季海題佛經云上第幾隔隔如梵夾也劉翼明東武劉子羽秀才翼明有句云桃花栁絮春開甕細雨斜風客到門謝道韞硯孫北海侍郎承澤藏謝氏道韞小硯一有銘云絲紅清石墨光洪璧資我文翰玉砅堅質末有道韞字家兄考功云詳其文句可迴讀然倒正皆殊不工砅音厲水激石聲作冰字用尤誤恐非謝筆耳戲對世傳夏忠靖公奉使江南與給事張某共事一日張登廁公戲之曰解衣脱冕而行給事給事急給音同張應聲曰棄甲曳兵而走尚書尚書常輸音同閲墨莊漫録載前句乃張燾謔胡世將語後句乃趙九齡戲對以謔李似矩尚書者也忠靖事葢出傅㑹鳯州古鏡學齋佔畢載鳯州有遁赤山景徳中軍人入一洞穴中有石鏡臺一鏡圍五寸背鑄水族回環有銘三十二字云煉形神冶瑩質良工當睂寫翠對臉傅紅如珠出匣似月停空綺牕繡幌俱涵影中方取鏡聞洞後有風雨聲此鏡萬厯中膠州趙氏自汴京得之海壑翁完璧自為記按張君房麗情集載王蜀時天雄軍節度使王承休妻嚴氏有美色王衍愛幸之賜以糚鏡其銘同池北偶談卷十五
