body:
  text: 池北偶談卷二十六刑部尚書王士禎撰三僧繁昌魏康孫進士之父素封而無子一日有僧造門乞施三百緡造橋不許僧遂然一指乞至再三終不許然三指始許之而僧死矣橋成而康孫生手缺三指焉又宣城孫榜眼予立卓之父勷故給事中也父孫翁艱於嗣一日見市中一僧以火然指問之曰願得一茅菴足供大士像旁可坐卧誦經足跡不出門而免持缽之苦久之無一檀越辦此者故然指耳翁曰吾為師了此願僧即罷爇延至其家為結茅如僧言居三年一日送客忽見僧入後堂問之則夫人臨蓐得一子矣方駭異菴中人來云僧已坐化子一指然狀宛然同年史狀元立菴大成鄞人其太公亦與一僧善一日見僧入宅覔之不見而狀元生生而長齋成順治乙未進士後官至禮部侍郎或云大成即僧之號大將軍小將軍錢舜舉折枝牡丹一卷有蜀郡桑門公實悟光題云三月江南媚景天姚黃魏紫鬭争妍那知十丈將軍樹却在青城古洞前自注云青城山丈人觀前牡丹二株一高十丈名大將軍一高五丈名小將軍琅邪秦碑諸城琅邪臺秦碑石壁俯臨海岸高數十丈海中復有一碑去岸數里潮上則没潮落則出其上嵗久皆蠣房所結不可辨識又始皇鞭石成橋處石路長數百丈無寸土石罅皆生小松才數寸海上人鬻為盆盎之玩孫真人三原民茍氏婦者病蠱脹諸醫束手氣已絶矣踰二鼓忽甦家人驚喜問之曰適已出門若將逺行者途遇一老人云吾已延孫思邈真人醫汝可速返也及入門見真人已先在年可三十許以連環針針心竅上久之遂醒不知身之已死也視之果有上下二孔七日始合又十一年而終三原醫士王文之説鹽山糖樹予昔使蜀曽聞其地有油井火井元人劉郁西征記云殢掃兒城有鹽山如水晶狀方侍御邵村亨咸怡亭雜記云緬甸有糖樹酒樹酒樹實如椰子剖之皆酒色瑩白而甘能醉人糖樹細葉而柔榦以刀刺其本汁涓涓不絶經一晝夜始止色味如餳食之令人飽李子金李子金歸德人諸生善鈎股嘉量之術嘗與儕軰聚飲鄰人高樓衆謂子金能算此樓尋丈乎子金曰諾即用小尺就地上縱横量之良久自卧地睨視又久之躍起曰得之矣使一人縋上垂繘於地試之不爽銖黍又嘗渡河晲視水面即能知水淺深石砮猗覺寮記辨楛矢石砮引晉肅慎𫝊魏景元以來供楛矢石砮晉元帝時詣江左貢石砮其地有山出石其利如鐵唐黒水靺鞨𫝊云云予嘗見吳江吳孝亷兆鶱自塞外㩦來石砮形如蠣石色如蒸栗云是混同江所産葢江邊松脂入水所結非石也黄蓮鄠縣東三十里秦渡鎮即文王豐邑故地有靈臺址傍有靈沼周數十頃沼中産黄蓮花然不常見花盛則縣士人多登科甲者又有安石榴一株𫝊為漢上林種不時結實士人亦以為科甲之驗鄠即上林故地也詩竹鄠縣多竹園有詩竹莖短而葉大堅厚土人以代箋幅花仙花仙者居鄠縣終南山之圭峯嘗有武弁張某裹糧訪之三日始至洞口鳥道險絶與之言但勸以孝弟更無他語故太保梁大將軍化鳯供養甚誠仙常徃來其家毎至則聞風作自庭樹而下唯啖果實不火食自言在山中恒與康對山王渼陂諸公相往還其貌瘦健而長髯聲甚尖利不類人殆猿玃之屬也鄠進士文登令王十洲􅄼説行雹邑北蘇王莊民某粥薑於平原見主人次子晝卧不醒問之曰病乎主人曰非也子昨往田間忽雲陰風起不覺身入雲中見神人數十輩形狀詭異各駕一車駕車者似羊而獰車中皆冰雹教之以手撒雹雹寒甚令納手羊毳間頓煖如火方撒之頃或以蒲葵扇子障之須臾不知行㡬百里雹盡怳忽已在原處矣歸家困甚寢未覺耳始知李衛公行雨非妄兩五鬼五代時南唐馮延己及弟延魯與魏岑陳覺查文徽等更相推唱時人謂之五鬼後蜀鹿䖍扆歐陽炯韓琮毛文錫閏選亦號五鬼李學顔新城諸生李學顔闈後於厯下候榜夜夢有人告云君名在第十八覺而喜甚榜將發行過藩司街舊例自領解以下皆有官馬候赴鹿鳴宴㑹按名雁行排列李徑至第十八匹前撫之曰明日即乘汝矣顧視圉人腰間有小牌書名乃李學顔也大惡之果落第空中婦人文登諸生畢夢求九嵗時嬉於庭時方午天宇澄霽無雲見空中一婦人乘白馬華袿素帬一小奴牽馬絡自北而南行甚紆徐漸逺乃不見予從姊居永清縣亦嘗於晴晝仰見空中一少女子美而艶糚朱衣素帬手揺團扇自南而北久之始没濟寧婦人康熙丙寅嵗濟寧南池側居人王姓者與衆約㑹武當山進香既再往矣歸為其妻述嵾岳竒麗之狀妻亦欲往夫以道逺艱費難之妻恚而自經夫歸驚懊言於衆衆為置櫬殮之遂行比至河南某邑忽見其妻在路旁大樹下坐憇以為鬼也曰若死矣胡為在此妻曰吾未嘗死昨以需衆行期稍遲故先行至此相候不謂君輩濡滯吾候且數日矣今當同行胡謂鬼耶其夫疑懼不知所出衆曰吾等百餘人渠即魅何怯之有遂偕行途中起居飲食皆無他異事竣歸家登堂夫指櫬示之曰爾既不死前日殮者何人妻曰吾實不死曷開視之及開視乃空棺耳今妻尚在山市文登崑嵛山有山市恒在清晨遥望之山化為海惟露一島島外悉波濤瀰漫舟船往來山下人但覺在霧氣中淄川西煥山亦有山市毎現城郭樓櫓林木人馬之狀一如蓬萊海市嘉靖二十一年縣令張其恊經山南麓始見之烟嵐鬱麗移時乃滅自後往往見之東郡恩縣白馬營茌平馬令莊皆平原時於雨後見此異土人謂之地市老學菴筆記云太原以北晨行則烟靄中覩城闕狀如女墻雉堞者天官書所謂氣也黄連花本草黄連叢生一莖三葉葉似甘菊凌冬不凋四月開花黃色六月結實似芹子色亦黄江左者葉如小雉尾正月開花作細穂淡黃白色予聞蜀人云明時馬湖府一縉紳應廵撫某之求求之深山叢箐中凡一枝重可二兩者僅得十枝其一枝生絶壁間募人懸絙倒垂取之重至三兩有老人云兒時即見之毎春開花大如椀紅如山茶與本草所云不類化虎江都俞生説曽署定番州事親見方番司土官之母化為虎後旬日一至家旋入山去又安順府陶生有姊適人生子矣一旦隨羣虎入山形體猶人與羣虎隊行趫騰絶壁如履平地亦數日一至家撫視其子即去久之漸變虎形不復至又八角井一農家婦亦化為虎皆康熙二十年間事一家上夀康熙己巳春正月予同衍聖孔公翌辰毓圻大學士李公鄴園之芳兵部侍郎孫公怍庭光祀送聖駕於濟南府西之乾石橋見厯城耆民劉子全者年八十五矣尚矍鑠自云生母魏氏年百有三嵗尚在一姑嫁郭氏年百有七嵗一姑嫁夏氏年九十有八子全有五子十三孫家藥山下子孫有為諸生者羣歎異之又聞章丘堪輿聶翁言曽遊鉅野縣至李家集見一老嫗年百四十七嵗尚能紡績忘其姓氏普陀石浙定海縣有普陀巖石有大士像華鬘天然竹林鸚鵡善財龍女之形種種皆具琴客程生曽見數枚定海縣今改鎮海舟山置縣賜名定海鬼粥硯淄川王某大理卿筠蒼公曽孫也康熙己巳上元日遊顔神鎮城隍廟時方卓午遇一老叟持古硯自廟中出王曰粥乎叟曰適已粥之矣家尚有一硯與此類明日幸過訪當以相贈不須價也且告以家在某村正王歸路必經處翌日如言訪之至村外一林墓側有茅舍叟已候門見王曰渇乎有漿可飲但所居湫隘不敢延入君候於此飲畢當出硯相贈耳少選出漿飲之飲甫畢王遂發狂奔走直上山巔雖澗壑荆棘不避遇樵人數輩識之舁歸其家迷不知人卧病數月始愈姓氏志董復亨章丘縣志葢踵楊君謙𢎞治志而作雅有體裁末増姓氏志一卷其所著異姓有恩术术虎高琪之後沙弭芈信訾鬲法襲隆鑒東類部德繩邭勾絮楮善能盈匿付典太爼杲西禡書新城舊事云邑有仇姓俳姓其姓見姓物異三從兄士襄之妻張夏夕已寢榻忽離故處尺許四顧無所見忽覩梁間有小人二寸許垂首下窺小冠緇衣鬚眉厯厯久之飛去遂失所在遺其冠乃以木為之色黒如漆忠勤祠神現康熙二十二年新城大水城不没者三版先高祖太僕公忠勤祠在南郭外水已及堦勢將入堂室司香火者張應祥晨往視水見一神人朝冠朱衣南面立水竟不入白雲湖白雲湖一名劉郎中陂在章丘縣西北七里許周圍六十餘里有河泊所與濼淯即今繡江二水㑹同入大清河邑乘載之甚明而張中丞南溟鵬重濬小清河議乃云在滸山濼之東陶唐口之西按長山縣無湖西距白雲湖尚百里不知何據也章丘李中麓太常著白雲湖考五羖大夫河津人暢體元者少時夢神人呼為五羖大夫頗以自負及流宼之亂體元為賊掠囚縶一室冬夜甚寒於壁角得五羖皮覆其身乃悟神語葢戲之耳後以明經仕為雒南知縣賢妾益都西鄙人某娶妾甚美嫡遇之虐日加鞭箠妾甘受之無怨言一夜盜入其居夫婦惶懼不知所為妾於暗中手一杖開門徑出以杖擊賊踣數人餘皆奔竄妾厲聲曰䑕子不足辱吾刀杖且乞汝命後勿復來送死賊去夫詢其何以能爾則其父故受拳勇之技於少林以𫝊之女百夫敵也問何以受嫡虐而不言曰固吾分也何敢言自是夫婦皆重之鄰里加敬焉今尚在心頭小人安丘明經張某常晝寢忽一小人自心頭出身才半尺許儒衣儒冠如伶人結束唱崑曲音節殊可聴説白自道名貫一與已合所唱節末皆其平生所經厯四折既畢誦詩而沒張能憶其梗槩為人述之天上赤字順治乙未冬夜天上有赤字如火移時始散沂莒間皆見之小獵犬八座某公未第時夏日常晝卧忽見一小人騎而入人馬皆可寸餘腰弓矢臂鷹鷹大如蠅繼至一人亦如之牽獵犬大如巨螘二人繞屋盤旋久之甲士數千沓至星旄雲䍐繽紛絡繹分左右盂合圍大獵室中蚊蠅無噍類其伏匿者輒緣壁隙抉出之一朱衣人下輦坐别榻衆次第獻俘獲已遂上輦肅隊而出甲士皆從如烟霧而散起視一無所覩惟一小獵犬徬徨壁間取置篋中馴甚飼之不食卧則伏枕畔見蠅蚋輒齧去之事見蒲秀才松齡聊齋志異又宋中丞牧仲犖曽於柏鄉魏相國座間見一小鹿長二寸許雙角嶄然與大鹿無異見中丞筠廊偶筆白毫樂安人左某流寓淄川能日行五百里必攀援樹枝數轉始得止足底有白毫長三寸許一日足痛毫落遂不能行又濟寧人某充總河承舍畜一驢日行五百里往返京師僅五日二耳中有白毫各長五六寸行駛則挺出一日拔去鞭策不復前矣錢能南園漫録載太監錢能鎮雲南有王姓者業賣㯽榔致富人呼為㯽榔王能執其人曰汝庻民敢僭號二字王賄之方免近江寧知縣陳永吉者吳逆之甥恃勢貪恣大吏莫敢問常以迎上官至淳化鎮主一富人家富人供奉極其豐腆冀得其歡陳視堂中有聨云海内存知己天涯若比鄰呼富人詰之曰今海宼猖獗汝乃謂海内知己是欲反耳富人大恐索千金乃釋之又過市肆見有以甘蔗為龍鳯形者皆以僭逆嚇詐或至破家後陞中書舍人為張俊升登選給事劾罷曽祖父母今鄉官稱州縣官曰父母撫按司道府官曰公祖沿明世之舊也張司徒南園漫録言其非矣謂稱布政司為曽祖父母則尤可笑今不聞有此稱矣女俠新城令崔懋以康熙戊辰往濟南至章丘西之新店遇一婦人可三十餘高髻如宫糚髻上加氊笠錦衣弓鞋結束為急裝腰劔騎黒衛極神駿婦人神采四射其行甚駛試問何人停騎漫應曰不知何許人將往何處又漫應曰去處去頃刻東逝疾若飛隼崔云惜赴郡匆匆未暇躡其蹤跡或劔俠也從姪鵷因述萊陽王生言順治初其縣役某解官銀數千兩赴濟南以木夾函之晚將宿逆旅主人辭焉且言鎮西北不里許有尼菴凡有行槖者皆往投宿因導之往方入旅店時門外有男子著紅帩頭狀貌甚獰至尼菴入門有㕔廨三間東向牀榻備設北為觀音大士殿殿側有小門扃焉叩門久之有老嫗出應告以故嫗云但宿西廨不妨久之持硃封鐍山門而入役相戒夜勿寢明燈燭手弓刀伺之三更大風驟作山門砉然而闢方愕然相顧倏聞呼門聲甚厲衆急持械以待而廨門已啓視之即紅帩頭人也徒手握束香擲於地衆皆仆比天曉始甦銀已亡矣急徃市詢逆旅主人主人曰此人時遊市上無敢誰何者唯投尼菴客輒無恙今當往愬耳然尼異人吾代往求之至則嫗出問故曰非為夜失官銀事耶曰然入白頃之尼出嫗挾蒲團敷坐逆旅主人跪白前事尼笑曰此奴敢來此弄狡獪罪合死吾當為一決顧嫗入牽一黒衛出取劔臂之跨衞向南山徑去其行如飛倏忽不見市人集觀者數百人移時尼徒步手人頭驅衞而返驢背負木夾函數千金殊無所苦入門呼役曰來視汝木夾官封如故乎驗之良是擲人頭地上曰視此賊不錯殺却否衆聚觀果紅帩頭人也衆羅拜謝去比東歸再徃訪之菴已鐍閉空無人矣尼高髻盛糚衣錦綺行纒羅襪年十八九好女子也市人云尼三四年前挾嫗俱來不知何許人常有惡少夜入其室腰斬擲垣外自是無敢犯者僧三世報桐城諸生姚東朗有子三保生九嵗忽病三日不食惟飲水念佛倏變中州之音告其父曰吾前世河南僧也與道侣某同居吾有三十金彼請貸之不許遂中夜刼金及度牒而逃又殺吾以滅口吾投君家為君弟字嵩少彼亦投君家為女今嫁溧陽潘氏者是也彼六七嵗時吾不忍殺吾年十八陽禄終矣故再投君家為君之子彼今逺嫁吾不能報又須轉世報之君前世為河南縣令納彼賄不之究今來君家兩世二十七年衣食之費與賄足相抵吾往溧陽矣東朗曰寃尚可解乎曰唯佛力可解語畢而逝乙夘六月事也東朗往花山求見月律師懺悔師為禮水懺且令以三十金供僧懺罷而女孕墮胎矣竟無恙前一夕女夢僧登堂而譟身有火光久之乃去葢師力云兩戴逵藝文類聚載戴逵皇太子箴廣𢎞明集有戴逵與釋慧命書此戴逵隋人非梁隐士戴安道二文梅氏采入隋文紀貂參從祖考功公門生孫中丞元化天啓中自遼東遷登撫考功從索貂參孫答書云貂不足參也魯矣人𫝊以為笑寗尚寶汝潁集云寗尚寶中立字爾強萬厯癸未進士家居不通賔客閴居一室人罕闚其户或覘之但見紙幅積座側上皆作墨㸃或環之累累如貫珠人曰寗善羯鼓記柘枝之節耳終莫測也滄溟見夢施愚山閏章在濟南時為滄溟先生作墓碑文且為立後奉祀一夕夢三丈夫峨冠朱衣來謁一白髯者南面坐蒼髯次之末坐者尤竒偉旦日拜墓下則三墓纍纍相次問其裔孫曰先生祖父三世葬此始悟蒼白髯者先生之祖父也愚山適將往南山購石見墓道間有石仆地磨礱如新遂刻已文此事與研北雜志所載嵇侍中謝趙子昂書廟額事正相類吕鴻臚吕少卿祖望滄州人順治壬辰進士康熙乙巳冬病亟夢天帝召為東嶽之神力辭不獲因訂後期遂引疾歸里舟過張家灣忽沐浴更衣端坐曰時日近吾將去矣遂瞑舟中人隐隐見空中鼓吹騶從甚盛云羅池碑栁州羅池廟碑荔子丹兮蕉黃一石尚存相𫝊為蘇文忠公書估客過栁江者搨一紙即無風波之虞亂後失去雜入築城塼石中毎當築處城輒圯有司知其異物色出之今置廟中南禮部鼎甫廷鉉嘗理栁州為予言祁侍郎明金壇祁西巖侍郎逢吉少為諸生有名嘗館某氏適鄉試東家之子已通闗節於主司臨期忽病以與祁素厚善告之比入塲立就七作喜甚自謂必售及將謄寫手忽反背不能握筆遂納卷太息而出自謂不復有科第之望矣下科竟中第官至户侍西洋畫西洋所製玻瓈等器多竒巧曽見其所畫人物視之初不辨頭目手足以鏡照之即眉目宛然姣好鏡鋭而長如卓筆之形又畫樓臺宫室張圖壁上從十步外視之重門洞開層級可數潭潭如王宫第宅廹視之但縱横數十百畫如碁局而已陳丈人陳丈人居彞陵沙地坡順治初年百有四嵗步履視聴不衰逺安知縣周恵隆延之詢其所得曰知事遲囘頭早耳予之錢帛弗受起汕乂繫彞陵風俗漁人春則起汕秋則丫繫毎三月初八十八廿八三日相率扣拍令聲振水面連歌徹昏曉必悲愴慷慨乃獲多魚惟三遊洞以下十二碚以上數十里内為然謂之起汕八月九日捕取鱘鰉先布網而後用乂自釘頭鎮以往地皆曰繫或曰枋有金釵繫丫髻繫等名謂之丫繫亦如吳淞之起叢也白牡丹高淳縣花山有白牡丹嵗開數枝種非人力亦無恒所有折者輒得疾施侍讀愚山閏章詩云空山石纍纍獨立天風吹攀條莫敢折含芳貽阿誰九尾觥泰興季御史家有古玉觥質如截肪中作盤螭螭有九尾作柄處螭首如血正赤觥底有竅與尾通九尾皆虛空宛轉相屬注酒皆滿人以為鬼工月中女子德州趙進士仲啓其星嘗月夜露坐仰見一女子妝飾甚麗如乘鸞鶴一人持宫扇衞之逡廵入月而没此與予前所記二事相類羿妻之事信有之矣黄天應康熙十五年南海民黄天應年十四惟瞽母在堂從兄天㑹者亡頼也欲併其産紿天應同往伐竹椎殺之而瘞其尸既數月矣其母思子日夜泣忽夜半有叩門者告之曰爾子某月日為天㑹擊殺瘞某處明日可往發之開户則閴無人跡如其言果得尸告之官寘天㑹於法李坤蔡琠字玉汝閩人以明經仕為粤東令罷官不歸流寓山寺一日於市肆獨飲忽有道人虬髯偉幹顧盼甚異蔡揖之坐詢其姓名曰秦人李坤居華山數十年矣因延至寺寓見蔡案上有周易曰頗讀此乎蔡曰然試舉一卦蔡為述其師説曰全未全未蔡因拜求其學曰可齋戒拜天四十九日拜老夫亦如之然後可教如其言乃為剖晰河洛精義皆出程朱之外蔡因旁及天文樂律竒門太乙六壬諸術曰此皆易之一端耳出一小篋隨所問刺取諸家之書為蔡指示書凡㡬百卷皆出篋中篋才方寸而書不窮竟不能測也留止五年盡得其奥將别去語蔡曰此後二十年癸丑嵗汝必遊京師是嵗十二月二十日即當扃門户百日不見一人否恐不免慎之慎之更㡬載某嵗某日與汝相見房山康熙十二年癸丑蔡客京師如其所戒是時果有妖人楊起龍之變都門戒嚴多所刑戮至二三月始定又二年乙夘某月日忽有童子叩門云師在房山相待蔡疾馳往道人獨坐樹下與語移晷别去云將歸華山舊居蔡以易卜垂簾都門同年子吳天章雯與之遊云學易者率莫測其藴也薛廷尉大武奮生云坤字果成騾生子釋典有三必死謂人抱病竹結實騾懷胎然康熙某年旗下人家有騾生子竟無恙池北偶談卷二十六
