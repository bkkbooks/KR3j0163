body:
  text: 池北偶談卷十三刑部尚書王士禎撰林茂之戊申九月十六日偶過陳翰林子端廷敬所出手鈔白雲先生陳昻五言律二卷讀之因憶辛丑壬寅間予在江南常與林茂之古度先生遊為言白雲出處甚竒時林方攜其萬厯甲辰以後六十年所作屬予論定予謂先生昔能傳一陳白雲吾獨不能傳先生乎因為披揀得百五六十首皆清新婉縟有六朝初唐之風施愚山閏章過廣陵讀之驚曰世幾不知此老少年面目矣子真茂之知己也乙巳予見之金陵時兩目已失明垂涕而别亡何遂卒今日讀陳詩及鍾退谷敘茂翁識陳始末感慨書之張浚書宋張魏公手書謁范文正公祠一絶云拜公祠廟識公顔神氣如生晚不還守土小生偏感仰太平功業重如山後書樞密副使綿竹張浚頓首題字畫甚拙詩亦劣御畫牛戊申新正五日過宋牧仲慈仁寺僧舍恭覩世祖皇帝畫渡水牛乃赫蹏紙上用指上螺紋印成之意態生動筆墨烘染所不能到又風竹一幅上有廣運之寶放翁詩玉堦蟋蟀鬧清夜金井梧桐辭故枝一枕凄涼眠不得呼燈起作感秋詩小説載此為蜀中某驛卒女詩放翁見之納以為妾為夫人所逐又有卜算子詞不合畫春山依舊留愁住云云按劔南集此詩乃放翁在蜀時所作前四句云西風繁杵擣征衣客子闗情正此時萬事從初聊復爾百年强半欲何之玉堦作畫堂鬧作怨後人稍竄易數字輒傅㑹或收入閨秀詩可笑也記觀王氏書畫華隂王𢎞撰字無異工書法博學能古文頃來京師觀所攜書畫聊記之定武蘭亭五字未損本有米元暉宋仲温二跋又仲温臨趙文敏十七跋又興唐寺石刻金剛經貞觀中集王右軍書又漢華山廟碑沈石田秋實圖三物皆華州郭宗昌𦙍伯家物皆有𦙍伯跋語又李營丘古木賈秋壑題詩語潦倒可笑華亭董宗伯得之南充陳文憲公者亦有跋又所藏唐子華水仙圖甚妙柏梁詩句法柏梁詩大官令云枇杷橘栗桃李梅語本可笑而後人多效之如韓文公陸渾山火云鴉鴟鵰鷹雉鵠鵾蘇文忠公韓幹牧馬圖云騅駓駰駱驪駵騵李忠定公題李伯時畫馬云騂騏騮駱駰驪黄陳後山上蘇公云桂椒柟櫨楓柞樟林艾山資中行云鐘鎛鼎鬲匜盤盂韓子蒼詩蓴藕藷芋蘘荷薑然皆施於歌行耳若鄧林鴻鵠鵾鵬鵰鶚鶻鱒魴鰷鯉鰋鱨鯋用之律則非矣蓋皆本史游急就篇如鯉鮒蟹鱓鮐鮑鰕竽瑟箜篌琴筑箏騂騩騅駮驪駵驢牂羖羯羠䍮羝羭之類又仰山答潙山云瓶盤釵釧劵盂盆禪語偶亦相似石經孟子喬三石作石經記恨獨無孟子謂自開成至今七百年無好事及此者近賈中丞漢復始為補刻以成完書嘯唐天寶末有峨眉陳道士善長嘯能作雷鼓霹靂之音聽者傾悚大理評事孫廣著嘯旨一卷有流雲龍吟深溪虎髙柳蟬古木鳶巫峽猿等名其法不傳族叔與盛字崧生開封太守曙峯公之都孫也美如冠玉性聰悟詩文伎藝寓目即工尤能曼聲長嘯響振林木崇禎壬午年死於兵劉公㦷詩劉吏部公㦷體仁詩往往有風味嘗有寄友人絶句云西湖小閣多晴月好友同舟半是僧寄語江南老桑苧秋山紫蕨憶行幐公㦷自編詩逸此予為口誦之公㦷喜以為予真能賞音也又公㦷友人某素嗜琴殁數年矣公㦷一日攜諸姬郊行過其墓停車酹酒使諸姬於墓下各操一曲而去其標致如此漢印同年子蒲州呉雯字天章以博學宏詞薦在京師偶得漢銅印文曰河聲嶽色雯家蒲州中條山南永樂鎮臨大河對岸即華嶽三峰也雯有詩云門前九曲崑崙水萬㸃桃花尺半魚江陵宅詩荆州江陵相故宅今為公廨有人題詩云恩怨盡時方論定封疆危日見才難人傳以為確論李天生因篤説續後漢書元郝經伯常撰續後漢書竊取習鑿齒漢晉春秋之義年表一卷本紀二卷列傳七十九卷附錄八卷共九十卷自云奮昭烈之幽光揭孔明之盛心祛操丕之鬼蜮破懿昭之城府明道術闢異端辨奸邪表風節甄義烈核正偽推本六經之初補苴二史之後謝陛少連季漢書所本也經文集三十卷黄俞邰家有之惜此書不傳姚燧國統離合表序曰陳壽晉臣云云通鑑因之反帝魏而主蜀後為目錄事皆書漢豈晚知其非欲正之而未及歟至綱目書出始曰漢中王即皇帝位統斯正矣而於其子獨曰後主何哉且自建興以及炎興用天子制以臨四方者實四十年鄧艾至成都書帝出降明年猶書魏封故漢帝禪為安樂公亡國之餘且然豈即位正始之年不帝而反曰後主乎其凡曰後主皆溺於熟口順耳不思而失於刋正者也予按古來文人稱操率曰魏武曰曹公於昭烈反曰先主曰劉某亦習而不察耳劉後村集云翁仲山作蜀漢書游丞相極稱之猶議其書安樂公之非又廬陵貢士蕭常作續後漢書大綱與仲山同而書後主曰少帝周丞相作序謂歐公議正統不黜魏其客章望之作明統論以辨之南軒經世紀年直以昭烈繼獻帝又引習鑿齒漢晉春秋以蜀為正魏為篡考訂詳備二書不知尚存於世否耳雙行耆舊續聞云後唐進士謁前輩各投所業一卷至兩卷但於詩賦古調中取其最精者行兩卷號曰雙行已謂多矣桑魏公維翰只行五賦李相愚只行五首詩便取大名裴説補闕只行五言十九首至來秋復行舊卷今投贄詩文以多多為善者乃疥駱駝也時文詩古文予嘗見一布衣有詩名者其詩多有格格不達以問汪鈍翁編修云此君坐未嘗解為時文故耳時文雖無與詩古文然不解八股即理路終不分明近見王惲玉堂嘉話一條鹿菴先生曰作文字當從科舉中來不然而汗漫披猖是出入不由户也亦與此意同唐書予嘗論新唐書不及舊書蓋矜竒字句全失本色又制詔等文詞率皆削去雖謂事増於前辭省於舊遠遜舊書之詳雅矣授正字詩三原孫枝蔚字豹人老詩人也以年授官放還山初得正字賦詩云一官如寵鶴萬里本浮鷗獻賦曽非晏童年况異劉山人今上路小婦免登樓臨水看蝌蚪惟添錯字愁王秋澗論文元秋澗王惲述承旨王公論文語曰入手當如虎首中如豕腹終如蠆尾首取其猛腹取其楦穰尾取其螫而毒也見本集喬吉夢符論作今樂府法亦云鳳頭豬肚豹尾大槩起要美麗中要浩蕩結要響亮見輟耕録秋澗又記鹿菴先生曰前漢列傳多少好樣度於後插一銘詞篇篇是箇碑表墓誌作者觀此足矣不必他求也特達康熙己未春御試博學宏詞諸儒閣臣擬進題有圭璋特達賦或未達其義按禮行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼圭東方也馬動物也璋南方也皮文物也皮馬不上堂故圭璋特達於上然則璧琮琥璜皆非特達矣三復姓表名非伯越乘舟難效於陶朱志切投秦出境遂稱於張祿此鄭準為荆南節度使成汭復姓表也見釣磯立談范文正公全襲用其語又蜀檮杌孟昶時翰林學士范禹偁冒姓張天成中登第復姓上郡守啓曰昔年上第偶標張祿之名今日故園復作范雎之裔亦在文正之前而引用尤切遼史夏日過汪鈍菴琬談及遼史予言遼自聖宗統和六年開貢舉歲放進士二三人及第自二十四年放楊佶等二十三人後及道宗時遂至百餘人漢人由進士至大官者甚衆然列傳所載皆耶律蕭氏所謂五院六院及二舒敏國舅貴族而漢人不與即文學傳王鼎外亦寥寥豈當時漢進士無一人事蹟可書者耶鈍菴云此當時無史官失紀載之故也金國事蹟人物得元好問劉祁數君而傳夫子曰文獻不足杞宋無徵正謂是也王振鵬元仁宗在東宫時材藝之士文章則翰林學士清河元復初書翰則翰林承旨呉興趙子昻畫山水則集賢侍讀學士商德符而永嘉王振鵬其一也振鵬妙於界畫運筆和墨絲分縷析左右髙下俯仰曲折方員平直曲盡其體而神氣飛動不為法拘嘗為大明宫圖以獻世稱為絶藝延祐中遷祕書監典簿後拜千户佩金符總海運見虞伯生集摘句圖予讀施愚山侍讀五言詩愛其温柔敦厚一唱三歎有風人之旨其章法之妙如天衣無縫如園客獨繭約略舉之若别緒不可理酒盡暮江頭人日日初晴朔風一夜至月明無遠近倚枕不能寐數篇是也至於清詞麗句疊見層出予嘗欲仿張為主客圖之例摘其尤者列以為圖與康樂池塘生春草元暉澄江淨如練仲言露濕寒塘草月映清淮流并資藝苑談助或詰予曰論詩固可摘裂如此耶予曰謝公與子弟論毛詩何句最佳或舉楊柳依依雨雪霏霏公謂不如訏謨定命遠猶辰告為有雅人深致夫三百篇尚然况騷選以下乎因作摘句圖盡日孤雲在青松滿院寒山月長清夜江雲無盡時花亞巖中樹煙横溪上村到門聞午磬遶屋過寒泉人煙梅市白山色剡溪深片雨前峰過髙松獨鶴還江路多春雨山村易夕陽野橋沙際滑山塢雪中深泉聞深樹裏山響亂流間共看谿上月正照城頭山松火圍寒坐溪窻聞夜漁夕陽沈積靄空翠辨前山明月來天柱長江入縣樓鶯聲花嶼暖龍氣雨潭腥水綠澄湘浦天青入洞庭山廚連馬櫪官舍奪僧居清泉逢谷口老樹識山家不辨翠微色秋山紅葉重江城連夜雨山館獨吟身柳葉藏州寺梅花雜吏人明月非霜雪滿城生夜涼春光門外水夕夢雨中燈黄葉連江下孤帆冒雨歸野戍風中角江梅雪後花雨色江城暮灘聲野寺秋谷雲團小閣松露響寒宵亂山成野戍黄葉自江村波平嶽麓寺天入洞庭船雲樹分曦早江村出霧遲雲氣涼依水鶴聲清滿林湖影涵官閣泉聲滿郡樓縣門流水對城堞半山銜孤城春水岸歸鳥夕陽村樹葉春藏寺谿聲夜滿樓臺迥收山郭江清送酒杯浦絶乂漁艇人荒種蛤田城郭千檣外汀洲片雨中蘆渚起寒燒楓林明翠微風起帆爭郭漁歸浦掛罾看雲孤閣暮聽雨萬峰秋孤村流水在盡日白雲閒江帆連雉堞煙樹曖漁村江橋紅樹外山郭夕嵐邊板橋三渡水楓桕一林霜溪藤翻翡翠漁艇喚鸕鷀雲來見滄海雪淨聞清鐘樹暗江城雨天青呉楚山野水合諸磵桃花成一村淥水通村港黄魚出板橋髙柳不藏閣流鶯解就人片石此天地荒祠自古今欲問垂綸意桐江秋水深飛瀑林中雨斜陽山半晴翠屏横少室明月正中峰清磬晝長寂片雲晴自深煙寺初低柳江城半落花野蔓没丹竈天風來嶽雲竹色翠連屋林香清滿山寒雲終日住秋色一山歸潭煙依檻集山色渡溪來露將松影白泉與磬聲寒檻花經雨盡沙鳥過江飛果落跳松鼠萍開過水禽家傳殉國劔身老釣魚磯風流滿江漢祇覺似君稀村徑半牛跡山田多水聲亭空木葉下風緩浦雲留暮煙隨野濶山翠入江明松雨連山響江雲入寺來暮雀依寒竹仙猿下雪松翠合江天色愁連今古情疎磬夕陽外平田春水西水氣垂天濶濤聲裂地穿月照竹林早露從衣袂生影孤彭蠡雁路遶洞庭波生猺安䑕穴猛虎雜人羣人老三秋後舟臨十八灘風笛荷花外漁燈葦葉間山勢龜蛇鬭江流沔漢分驚濤自風雨樹杪復重泉鷲嶺横天碧龍湫到海深微雨洗山月白雲生客衣予嘗以暇日撰感舊山木二集所錄愚山詩為多意猶未盡因别取五言近體為摘句圖傳諸好事者燭雛説苑齊景公使燭雛主鳥而亡之公怒欲殺之晏子曰請數燭雛之罪而殺之云云公止勿殺而謝焉漢書東方朔數漢武帝乳母五代史補敬新磨責中牟縣令以滑稽囘人主之怒皆自晏子語得來林初文詩宣城老儒丘華林者工書法嘗賦梅花詩百首以示梅禹金梅但為㸃句讀而已一日閩人林初文章孝廉以一絶句示梅云不待東風不待潮渡江十里九停橈不知今夜秦淮水送到揚州第幾橋梅擊節逐字為加圏贊丘見之愠曰林詩二十八字正得二十八圏吾詩百篇最少豈不直得二十八圏乎人傳以為笑前輩墨蹟呉匏菴擢尚書告考妣文五月二十八日久旱始雨適校白集至春雨篇因次韻一首志喜字極妙李西涯詩秋來霜露滿東園蘆菔生兒芥有孫我與何曽同一飽不知何苦食雞豚字極妙皇甫子循帖鄙集雖完甚不自滿懼有議之者孰若愛我而刪棄之乎謹以一部奉覽足下深相知必能益我也即日汸頓首清甫表姪字甚拙歸熙甫帖送行文為諸友所强極不欲作而出語輒犯時諱見昨所示舂容大雅之辭知其褊淺矣乞髙明裁示如不可出當别作數語酬之耳有光頓首澱山尊兄執事字亦拙鍾退谷帖上巳清明各賦得數詩敬呈覽譚君詩及酒牌看竟乞付來手惺上彭舉先生字亦拙張崌崍帖明日之遊不審約元翁否并問何時出城不勞再速也乂震川帖闕序文詳委周盡贈人當如是矣僭復刋落數字為公任校讎之職耳鄙作令學徒謄稿至今未來容别上更有言請教也有光頓首澱山尊兄南來詩南來蒼雪法師名讀徹居呉之中峰常夜讀楞嚴月明如水忽語侍者庭心有萬厯大錢一枚可往撿取視之果然師貫穿教典尤以詩名嘗有句云斜枝不礙經行路落葉全埋入定身一夜花開湖上路半春家在雪中山此類甚多己未二月師弟子秋臯過訪説此秋臯有句云鳥啼殘雪樹人語夕陽山亦有家法黑猿圖康熙戊申歲在京師見明宣宗御畫黒猿圖上方有御筆云宣德壬子之夏廣西守臣都督山雲以猿來進朕既一覽而足間因幾務之暇偶繪為圖以資宴玩念卿輔理之勤宜與同之特用頒賜以見朕意賜少傅楊榮上有武英殿寶按壬子宣德七年也文敏自建文四年太宗即位以編修直文淵閣至是在殿閣三十年矣其進工部尚書謹身殿大學士則在永樂二十二年甲辰九月仁宗即位之後加少傅則在宣德五年庚戌四月也予又嘗於祁縣戴楓仲廷栻處見宣宗栗猿西山雪霽二幅瘞鶴銘三則門人淮隂張弨力臣耳聾而博雅好古康熙丁未十月挐小舟渡江至焦山觀瘞鶴銘得仰石一凡六行存二十六字仆石一字在石下存三十字又二殘字又一石側立剥甚存七字仆石之背有宋人補刻三行按圖列見存字鶴側石第一行上皇側石第二行歲得於華側石第三行亭甲午歲化於朱方天其此宋人補刻石第一行屬側石第三行未遂吾翔仰石第一行遽也乃裹以𤣥黄之幣藏乎兹宋人補刻石第二行屬仰石第一行山之下仙家仰石第二行𤣥石旌事篆銘不朽詞曰宋人補刻第三行屬仰石第二行相此胎禽浮丘仰石第三行華表留形義仆石第一行唯髣髴事亦微仰石第四行厥土惟寧後蕩仆石第二行洪流前固重仰石第五行爽塏勢掩華亭爰集仆石第三行真侣瘞爾仰石第六行夆山徵君仆石題名第一行與銘三行斜連丹陽外仙尉仆石題名第二行江隂真宰仆石題名第三行按宋劉昌詩興伯蘆浦筆記載邵樞密亢摹本所存字華陽真逸撰張今本俱闕上皇山樵今闕山樵二字鶴壽不知其紀也壬辰歲得於華原闕一字當為亭今鶴至辰九字俱闕甲午歲化於朱方天其未遂吾翔原闕一字當為寥今甲至其九字俱闕有宋人補刻上有亭字廓耶奚奪今俱闕此下原闕三字遽也迺裹以𤣥黄之幣藏乎兹山之下仙家今遽至兹十二字俱闕有宋人補刻無竹此下原闕四字我原此字不完故𤣥石旌事篆銘不朽詞曰俱闕今𤣥字已下有宋人補刻相彼胎禽浮丘今六字俱存但彼字本作此此下原闕二字予欲無言爾今俱闕此下原闕五字當有雷門二字去鼓此下原闕一字當為華字今張本華字見存表留此下原闕二字當為形義今張本表留形義四字俱存唯髣髴事亦微㝠爾將何之解化此下原闕五字今㝠至化七字俱闕入原本不完此下又闕二字惟寧後蕩洪流前固重扃右今惟寧上又有厥土二字俱存洪至右七字俱闕原本六字不完此下又闕七字華亭爰集真侣瘞爾原本有闕文今華字上又有爽塏勢掩四字俱存丹陽真宰原本此四字不知其次今又有徵君外仙尉江隂七字俱存張云原石惟寧上見存厥土二字何以改作解化華亭上見存勢掩二字何以改作未下勢掩上又存爽塏二字何以改作荆門蓋張今本視邵本又闕六十五字内存宋人補刻三十二字視邵本反多十三字即厥土爽塏勢掩徵君外仙尉江隂是也其竹入已下不完八字無形跡可考矣筆記據臨海記有鶴飛入雷門鼓中孫恩破鼓鶴乃飛去事在晉安帝隆安三年斷其非逸少書而據漁隠斷其為陶隠居書張則據焦氏筆乘斷其為顧况書王觀國學林引顔氏家訓曰學二王書之得體者有陶隠居又引道書云陶隠居道號華陽真逸茅山又近焦以是斷其為陶書學林又云今世所得碑本不過二百字未嘗有歐公所得六百餘字者然邵本止一百二十餘字葉文莊集崑山葉文莊公集世無刻本所傳止水東日記四十卷予從其遠孫翰林學士訒菴方藹所見公集稿二冊未編卷次序記碑誌雜文凡二百四十六首附宣府志序例一卷後有葉氏族譜甚簡質自髙祖以來俱載干支八字公自注三十五歲干支則庚子戊子庚辰丙子也又一冊有巡撫宣府闗防詩文多手稿皆公親筆㸃竄有塗乙至數行者公文章平實條暢蓋德宣以後𢎞治以前文體大槩如此亦楊文貞王文恪諸公流派也國史經籍志載公集四卷不知何據學士云集至今未梓其弟方蔚則云公集舊已版行歲久失傳耳補漢綱目寶應朱克生作漢孝平元始元年至光武建武元年綱目序云孝平之世王莽以外戚擅權宫闈恃太后朝堂列姦黨弑帝弑后篡奪國璽朱文公綱目初始二年編年之下雖不與莽而甲子則書莽而削帝嬰猶未敢以為然也是年莽廢帝嬰為定安公而嬰尚存光武建武元年正月方望以帝嬰復位於臨涇則嬰儼然帝也客曰嬰廢於定安第及長不辨六畜方望以嬰稱帝於臨涇而綱目不許之以其不成帝也應之曰帝嬰二歲太后已立為皇太子後改元安得不與以帝乎王莽篡位而帝嬰在定安第猶夫春秋之公在乾侯宋末之帝昺在厓山也既不許莽以正統則甲子應書帝嬰在定安第而莽之偽號附焉至於六畜不辨乃莽使人守第禁出入則莽之罪也客曰莽之竊位冠以帝嬰編年而漢帝元更始元年子亦附書何也予曰綱目亦未之許也綱目又不許元以正統則正統仍在嬰矣元以諸將立之其去劉盆子劉信也幾何後身降赤睂降王長沙則更始之不得稱帝奚待辨哉予從綱目孝平元始起迄初始二年以下皆冠以帝嬰之號歴十七年至乙酉建武元年止夫建武則漢有正統而帝嬰已滅予乃韙朱文公之意而非敢與文公諍也自孝平元始元年至光武建武元年凡二十五年元詩雙文詩世以為元微之自寓然吾觀元氏長慶集中誨姪等詩云吾生長京城朋從不少然而未嘗識倡優之門觀此則小説未必真微之事也黄幡綽書唐明皇霓裳羽衣曲碑黄幡綽書今在蒲州見于奕正天下金石志雩史繩祖學齊佔畢辨杜牧之阿房宫賦未雩何龍雩當作雲猗覺寮記亦議此句引北史髙那肱事以為牧之之誤而又引爾雅􅤔蝀謂之雩云􅤔蝀虹也如此則讀屬下句意複而詞不順且龍字無著似當以史説為長綪猗覺寮記凡布物曰爭布網曰爭網布紙曰爭紙合用綪字楚世家曰綪繳蘭臺徐廣云繫也音爭今齊魯俗語尚然干人丹浦欵言云杜詩干人何事網羅求當作于人杜牧之詩自滴堦前大梧葉干君何事動哀吟按此説則南唐元宗戲馮延已云吹皺一池春水干卿何事語固有本然千家註劉㑹孟本只作千字錢本注云晉作干或作于于字恐無義千字對上句在字亦未切子田之説是也評泊韓致堯詩白玉堂東遙見後令人評泊畫楊妃李子田云評泊者論貶人是非人也今作評駁者非近諸本或作斗薄或轉訛􅈝薄殊無意義萬首絶句本作評泊當猶近古唐詩字音李子田舉唐人詩用字音與今人别者如劉夢得停杯處分不須吹分作去聲王建每日臨行空挑戰羅虬不應琴裏挑文君挑皆上聲也佶曉潄瓊膏冰齒寒冰去聲段成式玳牛獨駕長擔車長上聲予按白氏長慶集中此例尤多如請錢不早朝請作平聲四十著緋軍司馬司入聲紅闌三百九十橋十讀如諶為問長安月如何不相離相思必切燕姬酌蒲桃燭淚黏盤壘蒲桃蒲上聲三年隨例未量移量平聲金屑琵琶槽琵仄聲之類子田皆未暇及又劉夢得幾人雄猛得寧馨寧平聲抛却丞郎爭奈何爭去聲獨孤及徒言漢水纔容舠纔去聲盧綸人主人臣是親家親去聲讀如靚徐鉉騎省集莫折紅芳樹但知盡意看自注云但平聲予按老學菴筆記云但姓音讀如檀又宋陶穀尖簷帽子卑凡厮厮入聲宋文安三十六所春宫館鄜州軍司馬也好畫為屏亦如白詩又猗覺寮記舉李商隠可惜前朝𤣥菟郡菟去聲九枝燈檠夜珠圓唐彦謙燈檠昏魚目釋文檠音景前漢蘇武傳注音警唐人如此尚多未能枚舉又陸游燒灰除菜蝗蝗仄聲拭盤堆連展連上聲今山東製新麥作條食之謂之連展連讀如輦東坡詩左元放放作平聲司馬相如如作上聲三原公詩三原王端毅公遺事載公巡撫三呉時題一寺壁絶句云彩鷁西飛日未斜江村兩岸有人家吉祥寺裏梅千樹不到春來不著花亦宋文貞梅花賦之比杜茶村詩黄岡杜濬于皇晚號茶村老人少時詠蘇長公堂堂復堂堂子瞻出峩睂早讀范滂傳晚和淵明詩合肥龔端毅公酒間常擊節誦之以為二十字説盡東坡一生真不可及魏文靖公蕭山魏文靖公詩傳者絶少壬戌冬偶見黄子久畫沙磧圖一卷卷尾有文靖題詩云江村望極際春明匝地人家喚欲譍芳草一川潮灧灧嬌鶯隨處柳層層茅茨逼水通幽島苔徑穿雲接斷塍回首夕陽天末墮老漁猶自未收罾秀麗可誦板橋詩白氏集有板橋詩云梁苑城西三十里一渠春水柳千條若為此路今重過十五年前舊板橋曽與玉顔橋上别更無消息到今朝今訛作劉夢得而説者疑中山集不載此詩蓋未考長慶集耳趙松雪書杜集康熙辛酉六月在慈仁寺市見趙松雪手書杜詩一部用朱絲欄字作行楷末有新鄭髙文襄公跋云趙文敏書前人以為上下三千年縱横十萬里都無此書云云又有管志道跋冶源司馬文正公詩話載青州劉槩孟節詩昔年曽作瀟湘客云云槩棄官居野原山今州南四十里臨朐縣有冶源亦名冶泉有水竹之勝或云歐冶鑄劔之地世為馮氏别業即文正所謂去人境四十里者也野原蓋冶源之訛李侍郎六合李侍郎敬字退菴順治戊戌己亥間予在京師辱忘年之契論詩文一字不輕放過其詩有云酒醒亭午後人憶秣陵西𤓰步新添水清明遠送行此例數十句唐人絶調也有集二十卷手自編剗去留甚嚴甫刻成而病臨殁戒其子曰我死後二十年始可行世今倏忽三十年矣其集世竟無知者實本朝一作手也順治辛丑過揚州予造謁舟中因論近日布衣詩予舉程嘉燧呉兆公曰終須還他邢昉第一四句詩祖詠試終南山望餘雪詩云終南隂嶺秀積雪浮雲端林表明霽色城中増暮寒四句即納卷或詰之詠曰意盡閆濟美試天津橋望洛城殘雪詩只作得廿字云新霽洛城端千家積雪寒未收清禁色偏向上陽殘主司覽之稱賞再三遂唱過二事絶相類題韻皆同僧郢子僧澄瀚字郢子濟寧人工詩有絶句云昨宵初罷上元燈又欲看山向秣陵騎馬乘船都不㑹飄然誰識六朝僧為時所稱歸熙甫帖歸熙甫與門生王子敬一帖云東坡易書二傳曾求魏八不與此君殊俗惡乞為書求之畏公作科道不敢祕也借書雅人事乃亦徇勢力如此且在嘉靖間世風已爾矣石鼓詩筆墨閒錄云退之石鼓歌全學子美李潮八分小篆歌此論非是杜此歌尚有敗筆韓石鼓詩雄竒怪偉不啻倍蓰過之豈可謂後人不及前人也後子瞻作鳳翔八觀詩中石鼓一篇别自出竒乃是韓公勍敵坡詩坡公送蘇伯固五言詩云三度别君來此别真遲暮白盡老髭鬚明日淮南去酒罷月隨人淚濕花如霧後夜逐君還夢繞江南路公自注效韋蘇州予云此生查子詞耳三尺唐詩空聞明主提三尺宋人云三尺乃歇後語此説非是予按漢書髙帝紀吾以布衣三尺取天下師古曰三尺劔也韓安國傳所云三尺亦同而俗本或云提三尺劔劔字後人所加耳提三尺三字全用班書語安得謂之歇後出帝論濮議或問中一段全用五代史晉出帝論故著嘗試論之曰句正謂出帝論也意盡祖詠試終南山雪詩云云主者少之詠對曰意盡王士源謂孟浩然每有製作佇興而就寧復罷閣不為淺易山谷亦云吟詩不須務多但意盡可也古人或四句或兩句便成一首正此意魏晉宋詩予選五言詩於魏獨取阮籍為一卷而别於鄴中諸子晉取左思郭璞劉琨為一卷而别於三張二陸之屬陶淵明自為一卷宋取謝靈運為一卷附以諸謝鮑照為一卷附以顔延之之屬蓋予之獨見如此偶讀嚴滄浪詩話云黄初之後惟阮公詠懷極為髙古有建安風骨晉人舍阮嗣宗陶淵明外惟左太沖髙出一時陸士衡獨在諸人之下又云顔不如鮑鮑不如謝與予意略同又晉人張陸輩惟景陽殊勝在太沖之下諸家之上傅𤣥篇什最多而可錄極少如擬北方有佳人云一顧亂人國再顧亂人家千古笑柄較諸嘉隆七子剿襲古樂府尤紕謬也文海淳熙間詔臨安府開文海周益公奏文海乃近時江鈿編類殊無倫脊莫若委館閣官銓擇本朝文章成一代之書孝宗然之遂以付吕祖謙書既成上問何以為名益公乞賜名皇朝文鑑見玉堂雜記按朱子亦有與東萊論文海書予在淮安𣙜闗日有書賈攜故書求售内有寫本文海及徐夢莘三朝北盟㑹編二書不果售至今以為憾池北偶談卷十三
