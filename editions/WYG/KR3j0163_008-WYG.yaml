body:
  text: 池北偶談卷八刑部尚書王士禎撰介推説苑介子推十五為荆相堂下有二十五進士堂上有二十五老人是又一介子推也壯節王公傳宋壯節王公復守徐州闔門死節宋史僅附書趙立傳亦不詳何許人一日讀劉昌詩興伯蘆浦筆記乃知公為吾鄉人傳載世系官階始末甚悉筆記十卷乃萬厯中綏安謝兆申所鈔丹陽賀氏藏本流傳甚少因全錄之傳云公諱復字景仁淄州淄川縣人也曾祖昊國子博士祖珍尚書虞部員外郎父愈澶州濮陽縣令贈光祿大夫公少好讀書博通史傳慷慨有氣節家有唐以來名臣畫像每指顔杲卿像謂人曰士當艱難捐軀殉節當如顔公矣以門廕補官試大理評事遷本寺丞公家故饒財不樂私蓄嘗率其里之貴豪遇郊嵗各輸銀絹十萬以助賞賚郡國效之久之除京東輦運遷京東轉運判官按部過淄川父老迎候公下車慰謝先是淄川苦調外苛征公嘗與父老言他日或能奏蠲之至是以白公公曰官卑不敢言然重食吾言以為父老羞敢以私田之入代輸三年除兩浙轉運副使時太平日久民不知兵方臘初叛所過守將望風奔駭公下令所部嚴保壘修戰備竭力討賊屢戰有功賊平擢徽猷閣待制遷都轉運使朱勔以花石奉艮岳多取漕艦以載號直逹綱公曰今宼起倉卒飛輓繁困而佞幸之徒猶實苑囿惑上心固執不與勔譖於上公疏奏謂不可以不急之務疲民費財擢龍圖閣直學士以事忤宰相王黼降充龍圖閣待制宋史止稱此官移知成都興利去害民繪像立祠刻石高宗皇帝詔公知徐州史云以龍圖閣待制知徐州已上官階俱不書尼雅滿以衆數萬薄徐徐城孤勢危公合戰數不利遂閉城拒守金人重圍夾攻晝夜不息城中兵糧單竭死者甚衆敵勢益張凡二十餘日城陷公躬擐甲胄巷戰竟日度不可禦乃返州治易朝服南鄉再拜曰臣受國厚恩當以死報今日得死所矣謂賊曰死守者我也監郡而次亡與焉可獨殺我而舍僚吏與百姓一段史同其帥凜然歎異曰使南朝皆如公我豈得至此今汴京已陷二帝北去公尚為誰守乎公罵不絶口帥復説之曰必欲全活生靈請立降當為易官封就知此州公罵曰汝勿誘我我誓有死耳帥察其無降意命左右撾其口流血公含血噀之子倚在旁不勝憤突出見尼雅滿顧手無挺刃得布囊盛甎擲之中其旁千戸長斃尼雅滿怒執倚刳其心以祭千戸長欲懼公速降公不顧為帥敲死闔門百口俱遇害時建炎三年正月二十九日也帳下趙立求得公尸拜伏痛哭裹以裀褥藁𦵏於黄樓之側累甓以誌之敵退立具奏其事天子震悼詔特贈資政殿學士諡壯節給恩澤五資賻贈絹帛各二百疋初公未遇害筮而遇乾六體不變術者曰滅門之象也公曰死生定數也茍獲死所敢逃乎卒時年五十二徐人立廟祀公及倚亦號雙廟勅賜名曰忠烈史云立廟楚州積官至正議大夫累贈光祿大夫娶趙氏濮邸肅恭僖王宗博之女封安平縣主贈永康郡夫人再娶劉氏章獻明肅皇后之姪徐州陷不食三日卒贈咸平郡夫人先是公長子佾從高宗過維揚及趙立已亡徐州有武衛軍舊𨽻公義不他屬願從佾高宗聞之詔於樞密院創計議官特命佾為之仍領武衛紹興八年和議成奏乞訪先臣遺骸優詔許之行至泗州得疾抵徐城驛暴卒明年奉使藍公佐迎䕶徽宗梓宫交割地界貽書當路漕使訪公瘞所漕委幙屬王之翰往焉故跡漫沒莫得其處忽有老媼指謂之曰君非求王待制瘞所乎其在此間即所指求焉有冢巋然蓋以獸瓦啓視見大黿覆其上回視老媼化為虎撤甓取骸聨絡不斷如鎻子骨獨一手指闕之翰炷香禱須臾有指一節浮水上觀者莫不歎駭之翰易棺斂菆於京師資聖院後子孫徙𦵏於兖州萊蕪縣先塋云紹興十年承宣使田諤扈從顯仁太后回鑾佾子逵畱淄川一詩送諤云兩地音塵隔死生十年常效執珪吟羨君已作遼東鶴顧我空存魏闕心日下既蒙新眷遇海邊休忘舊知音倘憐萬里親庭在為向雲山處處尋詩至而佾卒己一嵗矣藍公佐使還一日侍上語次上曰王佾有兒女否奏曰佾五子流落中原居江南所生兒女尚幼弱上惻然詔令諸女入禁中命宫嬪保養之十餘年賜金帛遣嫁右傳得於公之𤣥孫黙按史附公於趙立傳已非體又剪截太畧若非興伯筆記公之始末無從考鏡矣稗史可無作乎傅山父子傅山字青主一字公之他太原人母夢老比丘而生生復不啼一瞽僧至門云既來何必不啼乃啼六嵗食黄精不樂穀食强之乃復食讀十三經諸子史如宿通者崇禎中袁臨侯繼咸督學山西為巡按御史張孫振誣劾被逮山槖饘左右伏闕上書白其寃馬君常世竒作義士傳比之裴瑜魏劭亂後夢天帝賜以黄冠衲衣遂為道士裝醫術入神有司以醫見則見不然不見也康熙己未徵聘至京師以老病辭與范陽杜越君異俱授中書舍人歸山工分𨽻及金石篆刻畫入逸品子眉字夀毛亦工畫作古賦數十篇常粥藥四方兒子共輓一車暮抵逆旅輒篝燈課讀經史騷選諸書詰旦成誦乃行否即予杖葉文莊論陶南村孫大雅作滄螺集有陶南村傳載其不應淛帥台哈布哈南臺御史綽羅辟舉張士誠開府姑蘇以軍諮屈之亦謝不往洪武癸丑命守令舉人才復以病免藝圃種菊有靖節之風又稱其所著輟耕錄文獻足徵其人品著述為世所重如此乃水東日記謂書史㑹要為楊文貞所不取又謂輟耕錄可鄙豈惡其人者惡及儲胥文莊亦有所不免耶何雌黄之過至此蔡趙二相子蔡絛京之子撰西清詩話宣和五年或言絛論議專以蘇軾黄庭堅為本奉旨特落職勒停見呉曾漫錄后山居士集有與魯直書云正夫有幼子明誠頗好文義每遇蘇黄半簡數字必錄藏以此失好於父正夫挺之字也蔡趙輩勢能禁天下不敢習蘇黄詩文而不能得之於其子異哉明誠撰金石錄孫墢孫墢字艾菴浙人為福寧總兵官呉萬福客閩逆叛於福州以書招諸大帥墢力勸呉公斬其使絶之發兵拒守而賊兵奄至吳公死之墢從死林舍人石來麟焻有詩弔之云誓師幕府勸移兵青史應傳慷慨名死節千秋比袁粲肯教人笑禇澗生同時有嵇永仁者字畱山無錫人古文有名為制府范忠節公承謨客亦從死歐劉劉原父與永叔相友善然原父常言好箇歐九可惜不讀書仁宗嘗問宰執劉敞何如魏公極稱其才歐對曰劉敞文亦未佳其博雅足重也二公似以名高相失後村江西道中詩云每嘲介甫行新法常恨歐公不讀書浩歎諸劉今已矣路傍喬木日蕭疎梅宛陵取士元人劉性作宛陵集序云仁宗嘉祐二年歐陽公知貢舉梅聖俞為試官得人之盛若眉山蘇氏南豐曾氏郿張氏河南程氏皆出其間葉石林詩話謂是榜得蘇子瞻為第二人子由及曾子固皆在選中今人止知蘇曾為歐公門生不知張程二氏皆出其門矣又東坡兄弟生平於六一師弟之分極深然於宛陵祗稱梅二丈亦所未解諡文公劉後村云諡古也複諡非古也封演云諡二字者一字為文一字為質世言歐陽永叔卒將諡文常秩時為太常博士議當諡文忠或謂必畱此以待介甫已而果然然唐宋以來諡文者獨韓退之朱元晦為不愧他如白居易李翺陸希聲權徳輿楊億王安石姚燧歐陽𤣥輩皆諡文亦未盡允也獨孤及云二字不必為褒一字不必為貶果在字數則是堯舜禹湯文武不如威烈慎靚王也齊桓晉文不如趙武靈秦莊襄楚考烈也唐人論如此則謂文必優於文忠亦未必然初元晦議謚文忠劉後村時年十七代其父尚左作駁議因止諡文其略曰正主庇民之學鬱而未仲著書立言之功大暢於後合文與忠諡公似矣而非也有功於斯文而謂之文簡矣而實也請以韓子之諡諡公右諡議見後村集第二十五卷烏程予鄉長山劉青岳相國崇禎間殁於戍所予内大父張忠定公延登及諸鄉大夫於朝房候烏程相祈代題給勘合溫不可比入閣即日具掲次日而准給勘合之旨下矣楊鳧岫宫諭士聰玉堂薈記載此事云烏程之結主知亦非偶然也秦襄毅公年譜康熙癸亥冬十月偶從同年汶上岳給事鎮九峰秀得單縣秦襄毅公紘自撰年譜一卷乃公八十嵗以户部尚書家居時自述時嘉靖十七年也吾東新纂通志出庸妄之手前代名臣如公及曹縣李襄毅公秉沂州王恭靖公璟皆削其名氏不載目今奉旨修一統志將何所據為文獻之徵耶因寓書高侍郎念東俾與巡撫徐中丞敬菴旭齡言之而錄公言行數則於左方以補言行錄之闕云為御史數忤内官謫沅陵縣北容驛驛丞都御史軒公上章為予分辨畱中不出同僚或謂予曰足下何以處此官予曰事上臨下素位而行持節守廉誓死不改景泰七年年三十一在北容搆茅屋三間題其扁曰安遇日讀五經諸史日夕汎江以漁釣為樂又於軒前自題聯云處困而亨有言不信予為御史時量褊不能容物由此一謫器量漸宏去就漸輕識趨漸明雖一時謫官而得終身受用天未必無意也天順元年遷知雄縣治民惟用絜矩二字御吏惟用易大畜豶豕之牙一爻至於刑罰一以欽恤為主忠國公石亨令人來討雄縣南壇舊基許以知府予不從人皆尤予未一載亨事敗出其門者皆坐嚴譴有京差捕獵内臣害民予執法禁革誣奏繫御史獄雄民擊登聞鼔代訴者五千餘人調府谷縣縣乃極邊戎馬之地予亦不敢鄙夷其民修學廟以興文教築城堡以嚴邊防里甲公用錢每人一年上戸不過二錢八年巡撫徐公廷璋保任葭州知州釋寃濫寛租賦五七日不用鞭扑同僚退而笑之予曰本州負税事有所由正當徵收時吏書兵𨽻投託催糧惟事求取民既納賂得有所挾因而延緩是豈徒民之罪哉時在坐致仕官數輩皆為泣下成化元年在葭州欲以二月十三日齋沐祈雨有父老百餘詣縣告曰本州邊地苦寒每歲至四月方有雨此時祈雨徒勞心耳予曰天道焉可知也至期行香焚檄十五至十七連雨三日予乃發粟賑貸給民子種通借牛犋民大悦四月麥苗將黄乃選差公當老人催徵五月十五日催完發運六月初三日告繳通闗在葭七月里甲公用每人止用銀六分禱雨四次輒應或以事出境公幹百姓聞予將回則喜曰雨來矣巡撫項公忠奏予才堪治繁調秦州道經西安項公謂予曰秦民難治皆以刁民作梗爾到彼有此等即打死申來予曰刁民人皆惡之所惡不同上司於刁民則惡其害人州縣官於刁民則惡其害己但患御之無道耳茍御之有道刁民將化為良民若專事誅鋤反使貪官得計耳項公笑而不言到秦一年三年拖欠糧草皆完健訟與盜賊斂跡項聞之喜曰秦州得人矣里甲公用錢上户一年不過銀二錢秦州有囉哩户乃囘囘别種漢人不與通婚姻自相嫁娶有以兄弟娶姊妹者有以姑姨配甥姪者予訪得清水秦安等縣亦有囉哩乃移文各縣令其共為婚姻秦俗尚鬼毎嵗清明日各辦花山喪儀費至三四千金臨期於城壕拾取死囚骨殖棺斂𦵏之云不如此則厲鬼降禍予嚴禁之曰爾民遇節棄祖墓不拜掃却妄費財物諂事癘鬼何耶使癘果能為禍予願以身當之此風遂息服闋秦人三疏保畱吏部不准秦人日哭於東拱辰門吏部不得已將見任奏調别州仍授予秦州郭定襄伯贈行詩云早登金榜列儒紳誰不爭先覩鳳麟曾以霜威消瘴癘還將和氣布陽春廟堂正擬徵黄霸父老俄聞借宼恂不獨兒童騎竹待郊原草木亦欣欣二王公薦士宋王文正公在政府謹惜名器叙進材品使人各得其所雖咈於己者亦不以私廢公王沂公當國未常顯拔一人范希文以為言公曰恩若己出怨將誰歸二公真古大臣之風下此則朋黨而已又下此則賄賂而已蔣虎臣翰林修撰蔣虎臣先生超金壇人自號華陽山人幼躭禪寂不茹葷酒祖母夢峨睂山老僧而生生數嵗嘗夢身是老僧所居茅屋一間屋後流泉遶之自伸一足入泉洗濯其上高山造天又數夢古佛入己室與之談禪年十五時有二道人坐其門説山人有師在峨睂二百餘嵗恐其墮落云云久之乃去順治丁亥先生年二十三以一甲第三人及第入翰林二十餘載率山居僅自編修進修撰終於史官性好山水徧遊五岳及黄山九華匡廬天台武當不避蛇虎晚自史館以病請告不歸江南附楚舟上峽入峨睂山以癸丑正月卒於峨睂之伏虎寺臨化有詩云偶向鑊湯求避熱那從大海去翻身功名傀儡場中物妻子枯髏隊裏人嘗自謂蜀相蔣琬之後在蜀與修四川通志以琬故徧叩首巡撫藩臬諸司署前其任誕不羈如此𨼆逸𫝊宋史𨼆逸𫝊載种放而遺郭延卿延卿少與呂文穆張文定遊𨼆居水南錢惟演畱守西京常率歐尹諸公訪之舊唐書陽諌議入𨼆逸元史余闕不入忠義皆不可解孔明之學徐莊裕公問讀書續記云漢儒為學能見得靜字惟孔明一人學以廣才靜以成學等語亦得規模領要王恭靖公逸事徐莊裕問讀書續記所載名臣六十四人中清古一條云王璟字廷采山東沂州人左都御史為巡撫坐忤權要免官後起為吏部侍郎左都御史正徳末士大夫當權豎亂政之後多營私殖政以賄成公門下不受私謁澹然如布衣時家無僮僕之奉田園之適惟讀書課子孫而已去之日言官惜而畱之公嘉靖中諡恭靖近見新修山東通志削去公及李襄敏公秉秦襄毅公紘名不載因詳著於此李公諡諸書皆作襄敏葉秉敬諡法考作襄毅按恭靖公一字東臯成化進士以清節著聞擢南臺御史改北巡視保定諸郡進光祿寺卿僉都御史總理兩淮鹽法浙東大饑被命賑濟所全活四十萬人巡撫保定乞罷皇莊以甦民困孝宗嘉納之正徳丙寅入協理院事忤逆瑾矯旨罷瑾誅起撫山西時流賊入河東設險防禦多所斬獲召為吏部侍郎左都御史掌院事風裁清峻朝廷倚重之嘉靖初進太子太保乞歸卒公未遇時肄業琅琊山寺夜半有巨手自窻入類人掌而有毛公取朱筆書一山字於上怪哀號乞免且言公貴人異日當至都憲公復援筆書一山字於下怪乃得出公為諸生與友人胡某同讀書别業夏夜胡每苦熱公輒言凉因易地而寢胡覺清風徐來都忘炎暑忽聞有人語曰此非王都憲乃胡教官耳叱之不見遺二蓮葉於榻前公赴省試在途為雨阻三日逆旅主人子婦為狐所祟忽三日不至問之曰王公在此故不敢耳比公歸主人以告求為除之公書王璟在此四字令置壁上狐遂絶跡公諸生時夜讀書有嫌家持槍隔窻刺之公走避得免月下窺知為某閲三十餘年未嘗告人公後顯貴其人以俵馬差累求救於公公略無難色但笑曰某日夜若刺我死誰當救汝此後慎勿害人其人感泣謝罪其厚徳如此穆文簡論王安石堂邑穆文簡公孔暉𢎞治中鄉舉領解出王文成公之門為理學大儒然其學多入禪宗其古文精勁自子書出可匹崔文敏公後渠如送沈朝綬送王如行諸序可見予尤喜其與武城王文定公道論王介甫書今錄於此孔暉頓首純甫先生足下昨在陽明先生坐上同觀象山荆國祠堂記予時未敢謂然者必象山之意多為荆公恕不為人之社稷計不為天下生靈憂不為後學慮恕一夫而不憫天下後世此何心哉不然乃象山之偏見自喜也將以正名定罪釋天下蒼生之憤為社稷大計不當姑隨也大舜殛鯀於羽山鯀之惡不大於安石安石之罪浮於鯀予謂以安石擬鯀可也鯀名重安石亦名重鯀悻直自用安石亦悻直自用鯀圮族安石亦圮族鯀陻汨安石亦陻汨鯀不能除天下之害亦不能成功安石禍及天下生靈生靈何辜宋之元氣遂不復振其罪尚為不浮於鯀乎夫以傾人社稷流毒四海者尚取其志堯舜當取鯀之志矣何者鯀之志欲平水土也孟子曰食志乎食功乎安石之操介在古人一節之士甚多未可以一節而揜元惡也非聖人無法聖人作春秋以訓萬世安石獨廢之此不容誅矣安石秉周禮蓋功利之心勝也何者周禮之政天無曠時地無曠利人無曠力此聖王所以富天下者盡三才之道者也安石慕其近似専以利言又無管仲之才所以萬無一利而害不可勝言矣天下以為君子者安石惡之天下以為小人者安石好之好人之所惡惡人之所好此之謂拂人之性辟則為天下僇矣欲恕安石者是求為過高之論恐誣後學不淺不審聰鑒以為何如孔暉頓首穆文簡論格物穆文簡大學千慮論格物曰蒼頡篇云格量度之也見文選運命論註此朱程以前書乃訓詁之最古者以其書久廢故見之者鮮考之内典隋智顗法華經文句解分别功徳品云格量功徳又云格量多少其一篇内格量字甚多此又在唐以前者大莊嚴經論云況復如來徳何可格量格量之義古皆用之而程子未之見意雖暗合而解釋弗暢故使聖經難明然其為説合於聖門無疑豈前人所及哉問格之訓至可終廢乎曰不可當云格量物理以求其至其義始備此解甚新然文簡學近於禪亦可見三進士出處本朝進士出身最竒者三乂一予同年任暄猷杞縣人明末團結鄉勇以禦流寇南渡授官後軍府左都督靖邊伯豫王下江南投誠遂𨽻旗下中順治壬辰進士以磨勘被黜復中乙未進士官至江西南贑道僉事一吳李芳邵陽人崇禎己卯舉人粤西時官至左都御史投誠願以科第進中康熙甲辰進士一錢世熹五河人南渡為副總兵官既而為浮屠久之復補諸生中康熙庚戌進士年已七十餘未幾卒楊文公宋王文正公嘗言昔楊文公有言人之操履無若誠實吾每欽佩斯言云云文公為文正誦法如此而石介作怪説乃謂其蠧壞聖人之道詎不誖哉王東臯湯陰王東臯伯勉官文選郎中清介有執持為本朝吏部第一嘗語同官尹瀾柱源進曰宋岳忠武王吾湯陰人也王之言曰文官不要錢武官不怕死吾生平服膺斯言惟求無愧耳又曰作吏部無他才能只須守定不愆不忘率由舊章八字宋開之王在吏部同時以清直稱者南宫宋開之文運亦以文選郎内陞歸卧不出魏環溪象樞疏薦之起鴻臚寺少卿庚申四月光祿寺少卿缺人應宋序轉適光祿正卿亦缺特旨以宋為正卿後至刑部侍郎卒諡端慤薛忠武明鄞國忠武公薛祿膠州人其父居海島為人牧羊時聞牧處有鼓樂聲出地中心識之語忠武兄弟曰死即𦵏我於此後如其言𦵏焉已而勾軍赴北平其兄不肯行忠武年少請往後從靖難師累功至大將軍封陽武侯追封鄞國公其地至今號薛家島蘇章事宋人小説載坡公與章惇題名石壁事頃見耆舊續聞又一事極相類子厚為商州推官子瞻為鳳翔幕簽因差試官開院同途小飲山寺聞報有虎二人酒狂同勒馬往觀去虎數十步馬驚不前子瞻乃轉去子厚獨鞭馬向前取銅鑼於石上戞響虎遂驚竄謂子瞻曰子定不如我舊聞乃檇李項氏抄白本也徐公長者宣城徐翁尚書元太父官浙江某縣典史偶以言忤巡按御史受辱扑責羞憤自免歸時尚書與弟通政元氣皆失學翁每流涕忽忽不樂尚書兄弟跪請其故曰而兄弟皆廢學吾無後矣因述受扑直指事復流涕不已尚書兄弟曰兒輩不類自今願力學以慰大人心願勿悲也乃發憤下帷兄弟相繼登第尚書謁選得某府推官即直指之家也心私喜得報父怨瀕行置酒戚友畢集候翁出稱觴翁稱疾堅卧不起尚書入跪問故且言此行冀得報夙怨何反不樂為翁曰此吾所以病也吾為小吏當日誠不為無過但直指稍過當耳且緣渠扑責激而罷歸教子以有今日則直指乃吾恩人非仇也汝思報怨吾所以病汝往當以吾言開心告之盡捐夙嫌是吾子也否則非吾子也尚書唯唯翁乃起盡歡而罷時直指久失職家居聞尚書來恐甚郊迎盡禮尚書首述父命誓無芥蔕自是情好甚洽後翁躋大耋三子皆成進士兩登九列焉此與蔡確父黄裳瀕死屬其子必報陳氏確既登政路遂以事寘恭公子世儒極典賢不肖霄壤矣王倫王倫宋臣其死不失為忠義金史不應載且與宇文虚中同貶尤非是張尚書堂邑張蓬𤣥鳳翔自明時已為尚書入國朝為大司宼年已七十餘一日侍宴上前下堦而仆世祖命内侍掖以行出長安門尚有詔追問能騎否徐諷令以禮致仕遂進所撰禮經樂經而去張公在明時為東林所推嘗自作年譜謂甲申之變欲死而不得吏部侍郎孫二如昌齡謂已曰箕子不死者以洪範也公有禮樂二經道統在焉亦箕子之九疇也何必死盛王贊寶應喬聖任可聘崇禎中以御史按浙江至金華遇山水暴漲舟不得進索挽舟者縣令盛王贊呼曰農忙矣令請以身挽喬遂改而陸行仍薦之於朝時兩賢之此與唐何易于事相類高文襄新鄭高文襄拱為相恣横己甚至以賜䘏大禮大獄建言贈楊忠愍諸臣官起用葛端肅趙文肅諸公指為徐文貞之罪其疏有曰皇上先帝之親子也議事者先帝之臣遺諸皇上者也而乃敢於悖君臣之義傷皇上父子之恩非所以訓天下也云云此與章惇一輩小人倡為紹述之論者何異石琚玉堂嘉話載金丞相石琚致仕居鄉聞司𨽻呵𨗳過門即起立客曰丞相何為如此公曰參軍雖微朝廷命官也吾敢不敬先曾祖司徒公居鄉亦然元法元宋子貞作耶律文正公神道碑云河南初破被俘擄者不可勝計及大軍北還逃者什八九有詔停畱逃民資給飲食者皆死無論城郭保社一家犯禁餘幷連坐由是百姓惶駭公進説曰十餘年間存撫百姓以其有用故也若勝負未分慮涉攜貳今敵國已破去將安往安有因一俘囚罪數百人者乎上悟詔停其禁張璁毅宗孝靜皇后崩禮官議當循累朝故事后諡用十二字張璁獨謂當用四字其黨霍韜亦非之卒用八字璁尋以病告歸他日世宗與李文康公時言及此事亦以為非是璁以庶僚躐致宰相惟敢於負孝宗敢於犯名教而不之恤術已售矣以故主之嫡后骨肉未寒雖數字之虚文亦斷斷持之徒欲以仇孝宗者媚世宗而卒為世宗所薄小人用心竟何益哉史兵部吾邑舊令史公諱能仁河南鹿邑舉人崇禎間來為縣清正而才剛柔互用至今尸祝之庚辰辛巳嵗大祲人多流亡時邑境甘露降於林木地生羊肚菜公賦詩曰上天降甘露徧地生羊肚饑食羊肚菜渴飲甘露乳涕泣告吾民慎無去鄉土真仁人之言也後調繁淄川遷兵部主事去順治辛卯復至縣雖三尺之童亦束炬歡迎至十餘里不絶可稱循吏矣惜至今未祀名宦刻言行錄頃見嘉靖中鋟文信公集乃鄢懋卿所刻宋明名臣言行錄浙人劉廷元所刻而序則出南樂魏相手筆也向見故相某公以書誡其孫諄諄以忠孝為訓而考其平生大相剌謬亦此類伍寧方著書吳人伍寧方袁萃撰林居漫錄彈園雜志續睂山論諸書攻李三才自比於蘇明允辨奸論而其於當時臺諫所推重定國是者則徐紹吉徐兆魁邵輔忠劉廷元數人也其後熹宗之際皆為閹黨兆魁廷元至大司寇輔忠至大司馬紹吉至都御史崇禎初定逆案數人皆褫職定罪是時袁萃已前殁矣至其書并攻孫立亭呂新吾諸公語尤狂悖金忠節金忠節公鉉素精易理讀邵康節先生集手書於後曰甲申之春定我進退進雖遇時外而勿内退若苦衷逺而弗滯外止三時逺不卒嵗優哉游哉庶畢吾世至甲申三月以兵部主事巡視皇城盡節玉河時有中官呂胖子同死二公骨不可辨其家人遂同𦵏玉河之岸焉公少好誦鄒汝愚先生詩龍泉山下一書生偶占三巴第一名世上許多難了事市人何用苦相驚後果一十八嵗領順天解忤璫削籍大節視汝愚無愧云姚端恪刑書桐城姚端恪公文然真實經濟人也其好生之念尤出天性常拈句云嘗覺胸中生意滿須知世上苦人多命諸子各錄一紙粘於壁淄川高世豪公戊子所得士也任南鄭令卒官逋官糧二千餘兩妻子十三人例當沒官公捐貲數百鍰復醵金代輸高妻子竟獲免好行其徳皆此類公戊子典山東試闈中得先考功兄卷異之曰他日必為風雅名家遵典集遵典集亦伍袁萃撰所取章疏大抵黨邪醜正如趙興邦攻湯兆京孫居相亓詩教攻孫瑋周起元徐兆魁攻顧憲成孫光裕攻高攀龍岳元聲趙興邦攻呂坤韓浚攻劉宗周姚宗文薦徐大化胡來朝薦邵輔忠徐兆魁皆推為千古公論而劉光復輩之論李三才尤詳哉言之光復掲内訾及福清并及先少師謂少師以位育顔三才之堂去有餘倖其詆毁君子可謂不遺餘力至所標榜如邵趙二徐及劉廷元周應秋呂圖南輩皆逆案中人而周忠惠劉念臺諸公之死卒與日月爭光桀犬之吠於君子何損毛髮徒自穢耳若先少師之見毁於光復先方伯之被擯於亓韓今日觀之何啻華袞乎袁萃自負乾坤正氣然乎否耶張氏甲寅閩賊作亂有陳某妻張氏早孀撫孤十二年矣賊至題詩壁上有句云乾坤此際當自決遂雉經思南守陳君某為作𫝊雙烈靈璧有諸生王餐秀者生二子長已娶而病其婦某氏侍湯藥五年終始如一日疾亟既視含殮畢遂縊死其季未娶亦病婦某氏女也隨其母來省夫疾遂不肯歸父母趣之歸曰身已字人嫁不嫁等耳病如是而秦越人視之乎遂侍左右五日夫死亦自縊殉之知縣馬君驄御驌親詣其家弔祭池北偶談卷八
