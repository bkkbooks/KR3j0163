body:
  text: 池北偶談卷二十三刑部尚書王士禎撰善慶菴老僧顔神鎮善慶菴孫文定公香火院也有住持老僧年八十餘辛未夏一日早起索浴罷呼侍者曰好語主人吾去矣遂陞座而寂壁間留偈云者箇臭皮袋撇下無罣礙洪爐烈焰中明月清風在惜忘其名矣萬嵗古亦有人主自呼萬嵗者新序梁君出獵見白雁羣公孫襲下車拂矢云云梁君援其手上車入廟門呼萬嵗曰幸哉他人獵得禽獸吾獵得善言命名左氏𫝊申繻曰名有五不以國不以官不以山川不以隠疾不以畜牲不以器幣按春秋諸侯公子卿大夫之名犯此者甚衆沿及漢初猶然如瘈疥疵痤蟣虱狗彘掉尾姓昭涉之類見於史漢者不可枚舉陸龜蒙小名録序云三代之時殷尚質直以生日名之如太甲太乙武丁是也周以伯仲次之如太伯仲雍叔達季厯之類是也自周以降隨事而名之至有黒臀黒肱之鄙羊肩狐毛之異負芻之賤禦宼之強杵白籧篨髠頑狂狡不夀不臣皆名不正而言不順也然則繻之言何據乎東野氏東野志世表載魯公少子魚始以東野為氏子宗宗子雷雷子暉弟晞又六代灝弟淳七代縉弟紳十代繪弟純十四代璋弟珙弟璜十六代輔弟輸軏轅三代無此等名必出杜撰無疑獨角青牛明時六月十二日御廐洗馬於積水湖導以紅仗中有數頭錦帕覆之最後獨角青牛至諸馬莫敢先之見陸啓浤叔度北京嵗華記葢崇禎年中事也今三伏日洗象亦導以紅仗在宣武門西響水閘上明時洗象則自八月十二日始更三日為期亦見嵗華記前定唐人小説記王涯舒元輿兄弟事甚竒老學菴筆記一事絶相類苗劉之亂有内侍秦同老者被命荆楚前一日還行在尚未得對亦死焉又有蕭中道者日侍左右忽得罪黜為外郡監前一日出城遂免事皆前定如此南宋國學南宋國學即岳忠武王故第其土地祠在東南隅神即忠武也封號曰正顯昭徳孚忠英濟侯見夢梁録又云景靈宫即韓蘄王賜宅秦羅子孫説聴載秦檜裔孫某宰湯陰綽有政聲毎欲謁忠武祠輒逡巡弗果將及𤓰謂同僚曰少保雖與先世有惡豈在後嗣耶且吾守官無愧神明徃謁何害遂為文祭之拜不能起嘔血數升而死事在嘉靖初年魏莊渠提學河南歸為所親言之此與宋御史羅汝楫子鄂州知州願事全相類汝楫附秦檜劾忠武願即著爾雅翼以古文名朱子稱為南渡第一者也祀王右軍同年馮再來刑侍甦嘗著滇考有云初雲南未知尊孔子祀王逸少為先師元世祖至元十五年除張立道中慶路總管立道陳留人始言於賽典赤名沙斯達克囘囘人建孔子廟置學舍嵗時率諸生行釋菜禮後立道卒官與賽音齊并祠鄯闡城至今血食不絶以王右軍為先師固竒且右軍生平足跡未嘗至滇滇人何為祀之皆不可解蜂分日謝臯父晞髮集有粤山蜂分日記云甌粤之南某山其民老死不知嵗厯惟户養蜂四時旦暮悉候之蜂之分也其日必吉人家無大小貿易皆趣成之事未及辦則以待後之分日至於婚嫁興作皆候焉蜂移之家若鄰若僕無逺近逓相報不敢隠有販者至其地留一年書蜂分之日凡百有竒歸取厯驗之皆黄道紫微天月德吉曜也其不分者非凶星則常日也物性之靈能通造化如此鬭駞鬭象圭塘小藁有鬭駞賦葢蹄角羽毛之屬無不可教鬭者康熈中駕幸南苑觀象與虎鬭虎竟為象所斃此又一竒也董宗伯高念東先生書來云昔聞宋直方徴輿中丞説董思白宗伯臨終時忽索鏡自詫作美人相鄭刺史祠王璵似字魯珍益都諸生也康熈元年省父保寧太守玉生字稚崑歸次鳯翔横水西迷失道時方五月暍甚遥見山麓屋宇隠隠出林表策馬赴之可五六里至則古木叅天藤蔓糾結漸入陰翳不見曦景蝟伏䑕竄栖鶻磔磔驚起叢薄間心悸欲返更誤入敗垣北得一亭蒿藜没徑閴無人跡繫馬堦楹轉入東北隅有堂巍然堂後素壁上題詩滅没不完有云殘魂揺逺夢弱骨冷空山又云金刀斷織韓香事千載銜寃泣月明方吟諷然疑之頃忽墻下窸窣有聲一巨蛇出草間拔刃逐之乃引至别院一室類祠廟室中有塑像綠衣少年衣冠甚古室東西正黒如夜西北隅微茫有物如牀几不敢近稍以刃穴壞牖土石視之天光穿漏則一敗柩耳睇其中豐髩纖足女子也雖衣花成土而依稀可辨胸壓匕首剪刀出其左脇憶壁間詩殆以此因以土覆其身而出比紆㢠廻出林木日已將夕僮僕方徬徨道左乃覓路東行怳忽見一女子拊心倒行馬前既而形隨目矚化身百千投逆旅假寐夢女子來云荷君厚意後十三年再得相見比覺問店主人云鄭刺史祠也闖宼以來久為􅉘虎之窟欲焚其處而未果也然十三年後竟無所遇云王生予門人造書法苑珠林云造書凡三人長名曰梵其書右行次曰佉盧其書左行少者蒼頡其書下行按佉盧虱吒書隋言驢唇也西域有驢唇書蓮葉書佛書之妄不必言其長梵而少蒼頡亦陰抑儒書如謂宣聖為儒童菩薩之類墜石順治十三年二月初十日午時寧陵縣忽有響聲自東北來黒氣如斗光芒甚異墜落城中民家其形如石重二斤十四兩見總督李尚書蔭祖報䟽濮陽蘇氏濮陽蘇氏其先本元蒙古之後至榖原兵侍祐始以進士起家官至總制以文章名海内其祠堂藏始祖某所用鐵槊重百斤至今尚存黄衣人康熈甲子春有刑部筆帖式某素奉神佛甚謹一日忽有旋風起庭際風息見黃衣人衣冠甚偉立庭中呼其名謂曰吾天神也以汝事神甚謹故降汝家可掃除東廂吾居之某焚香拜禮如所言次日黃衣忽問曰汝鄰家有病者吾能愈之某𫝊語迎神果即日愈御史邁色者有妹病劇聞而拜求之黄衣曰當為汝查勘良久曰宿業深重以君䖍禱但可遲限三日終不能生也果三日卒已而求者踵至黄衣人謂某曰本以汝善人故來棲止今車馬雜沓久且不利於汝吾當去此汝福本薄如甘貧可延夀命慎無妄求若有贏餘則促算矣遂去不見湯學士夢左庶子湯潛菴斌夜夢登高山已陟其半忽一人自後越之先登湯鼔勇繼之遂至山巔顧一室空無所有惟壁上懸麻姑仙壇記既覺不知所謂癸亥臘月閣學缺特用右坊王庶子儼齋鴻緒甲子二月閣學復缺湯遂繼擢上官日適某督撫䟽内有蔡姓名經者宛平王相公笑云蔡京宋奸臣胡同其音高陽李相公曰彼乃京字此麻姑仙壇記中所云蔡經耳湯聞之竦然事之前定如此是年六月特擢湯江蘇廵撫葢麻姑壇在撫州而蔡經家吳之洞庭也蔡氏狀元德清蔡翁者築室落成夢人持一盤授之盤有四紅箋箋各大書一一字後其孫奕琛為刑部侍郎南渡拜相官一品奕琛子啓僔國朝康熈庚戌科狀元及第啓賢子升元康熈壬戌科狀元及第皆其曾𤣥也兩狀元皆生於此宅升元從弟彬辛酉浙省解元人始悟四一字之兆升元生時其父夢一金甲神人持紅箋大書懸其㕔事云第一甲第一名蔡升元遂以名之而字曰徴元及壬戌殿試日又夢如前升元及第其父年才四十六見只編德清老人蔡四者以服鹿角膠夀至百八嵗豈即其人耶瓷易經益都翟進士某為饒州府推官甚暴横一日集窰戸造青瓷易經一部楷法精妙如西安石刻十三經式凡數易然後成蒲城王孝齋綡官益都令曽見之吳漢槎吳江吳孝亷漢槎兆騫以順治十五年流寧古塔二十餘載康熈辛酉歸至京師相見出一石砮其狀如石作紺碧色云出混同江中乃松脂入水年久所結所謂肅慎之矢也又高麗碁子一枚乃硨磲所製又云寧古塔東北二百餘里乃金之㑹寧府有斷碑尚存書法如栁誠懸頃為一流人所碎碑文可以辨識者有俯瞰闕庭又文學盛於東觀云羊馬西域種羊或云以皮肉埋地或云以脛骨率用初冬季春未日其詳見於異物志剡溪漫筆諸書吳立夫淵穎集有波斯國種羊皮書褥歌又元僧楚石詩自言羊可種不信繭成絲予嘗考之不自立夫楚石始也北齊高昂詩隴種千口羊泉連百壺酒朝朝圍山獵夜夜迎新婦形諸歌詠其來久矣雙槐嵗鈔以骨羊草馬作對云雲南越賧故地之西多薦草産善馬始生若羔嵗中紐莎縻飲以米瀋七年可御日馳數百里世稱越賧駿見唐書周嬰巵林云太平廣記引談藪作瓏種千口羊詩紀詩所乃云千口牛誤也赤蝦子三都雙槐嵗鈔云東粤順德縣有地曰夀星塘山水幽勝有物名赤蝦子如嬰兒而絶小自樹杪手相牽掛而下笑呼之聲亦如嬰兒續續垂下甫至地而滅俗謂蓬萊仙女遺類也諾臯記載昔有姚汪王三姓食都樹皮餓死化為鳥都皮骨為猪都婦女為人都皆棲大樹即如人形而絶小男女自相配偶在樹根者名猪都在樹尾者名鳥都在樹尾可攀及者名人都左腋下有鏡印闊二分其禁有山鵲法打土壟法食其巢味如木芝有術者周元大能禹步為厲術以左合赤索圍木斫之樹仆剖其中三都皆不能化乃執而烹之周侍郎櫟園詩人都擁樹形同鳥是也又月山叢談載廣西思恩縣近村樹杪有二人約長一尺五寸武人裝束白竹纒芒屩其行如飛此當即赤蝦子之類葢閩粤皆有之準字諱兩見宋宼萊公準作相諸司公移諱其名改為准至今相沿不易汴京舊有平準務蔡京為相以其父名準改為平貨務又官司公移皆避其名如京東京西皆改畿左畿右然予按求古錄載泰安州冥福寺五代後唐長興四年中書門下牒石刻已用准字唐韻二字竝收准字下注曰俗莊子平中准管子懷䋲與准鈎准䋲文子放准尋䋲皆用此字不始宼公也師生同姓名古人同時同姓名者如毛遂陳遵韓翃李益門第文章往往有之然不聞師生同姓名也康熈癸丑㑹試今翰林學士張敦復英為同考官本房中式舉人張英海鹽人丙辰㑹試編修馬殿聞鳴鑾為同考官本房中式舉人馬鳴鑾河南人吹笛宋人小説記張子韶言閭巷有人以賣餅為生吹笛為樂僅得一飽資即歸卧其家取笛而吹如此有年鄰有富人察其人甚熟欲委以財千餘初不可堅諭之乃許諾錢既入手遂不聞笛聲但聞籌算聲耳其人大悔急還富人錢於是再賣餅明日笛聲如舊此與唐劉伯芻所言安邑里粥餅人匆匆不暇唱渭城事絶相類今士大夫不及吹笛人者多矣青鸞雙槐嵗鈔有貞鸞烈鴛二詩因憶昔在揚州署中有青鸞二飲啄必俱一日其雄為鹿觸死雌日夜哀鳴不忍聴聞數日亦死予感其義作青鸞操念佛鳥唐韋蟾岳麓道林詩静聴林飛念佛鳥細㸔壁畫䭾經馬按王得臣麈史安陸有念佛鳥小於鸜鵒色青黒常言一切諸佛宋元憲詩鳥解佛經言張齊賢守郡日為作古詩一篇鏊字擀字鏊魚到切字書曰餅鏊今山東俚語尚然富鄭公言太宗既下并州欲乘勝收復薊門咨於衆叅知政事趙昌言對曰自此取幽州如熱鏊翻餅耳殿前都指揮使呼延贊曰此鏊難翻又北夢瑣言王蜀時有趙雄武能造大餅毎三斗麵擀一枚大如數間屋因號趙大餅擀字亦俚語帨麈史謂野有死麕之詩曰舒而脱脱兮無感我帨兮婦人服飾獨言帨者按内則注云帨婦人拭物之巾也居則設於門右佩則分之於左常以自潔之用也古者女子嫁則母結帨而戒之徐太室徑定野有死麕為淫詩甚有理刀圭刀圭字常用之而未有確義碧里雜存云在京師買得古錯刀三枚形似今之剃刀其上一圏如圭璧之形中一孔即貫索之處葢服食家舉刀取藥僅滿其上之圭故謂之圭言其少耳泉布錯刀皆古錢名風磨風扇西域哈喇賽瑪爾堪諸國多風磨其制築垣墻為屋高處四而開門門外設屏墻迎風室中立木為表木上用圍置板乘風下置磨石風來隨表旋動不拘東西南北俱能運轉風大而多故也耶律文正詩衝風磨舊麥懸杵搗新粳又有風扇於帳房中高懸布幔下多用頭髮當面設䋲索牽動自然有風不用揮扇也見陳誠西域錄錄載沙塵哈雅賽瑪爾罕之東五百餘里有草春有生秋死臭氣逼人取其汁熬以成膏即阿魏也又小草高二尺許遍身棘束葉絪如藍清秋露降綴於枝幹甘如餳蜜可熬為糖名達郎古賔即甘露也筆蘆姑熟青山李白墓生蘆其形如筆號筆蘆績溪舒頔道原有詩云筆蘆蕭蕭青山巔頔元末人有華陽文集七卷捉卧甕人昔見朱竹垞簡討彜尊詩云捉卧甕人選新格初不解及觀通志有趙昌言捉卧甕人格及採珠局格旋碁格金龍戲格等名始悟所謂正德錢於慈仁寺市見正德錢二面幕皆有文如蟠螭狀與今制殊異正德又夏國偽年號也錢不知何年所造閆羅世𫝊趙定宇馮具區皆為閆羅王近聞比部張屏公四維言癸丑秋居保定忽夜夢至一官署堂廡宏壯見有官府衣冠坐於堂上披覽文書視之乃先兄西樵也張與先兄昔同官交甚厚因前問此何地君所覽是何文書先兄笑曰此非人間我已死為神主此文書察世人善惡耳張云然則我何為至此豈非死耶先兄答君不應死但此地不宜久留當即送歸倐而夢覺張時未聞先兄之訃特至京師問之王太史曰西樵以今年七月死矣先兄殁時徧體作種種香當已證菩薩果位然平生忠厚正直死作閆羅王理亦有之釋典謂閆羅是嗔相報身先兄以悲憤殁豈其徴乎虚實今墟市之稱義取朝實暮虚也宛丘有羲神實羅苹路史注實者對虚之名天文旗中四星為天市其中星多則實虚則耗神農所在人民常實非若虚砦朝實而暮虚也地以實稱亦竒犀角刀子周嬰巵林載唐牛肅紀聞云牛騰唐郟城令中書令裴炎甥也炎遇害騰謫牂牁建安丞時中丞崔察用事貶官例皆辭行誅殛甚衆騰將見察懼不知所為忽遇一人謂曰公有犀角刀子乎曰有曰甚美授以神呪令見察時但俯伏掐訣言帯犀角刀子掐手訣乃可以誦呪其訣左手中指第三節横文以大指爪掐之而密誦呪七遍無患矣呪曰吉中吉迦戌律提中有律陁阿婆迦呵已而果免其難嬰自云崇禎癸酉為縣令所羅織庭讞時偶有象牙刀子以代犀刀掐訣誦呪如前亦獲免因錄之以𫝊於世闗忠義現身袁太常密山景星言順治丙申年五月廿二日闗忠義忽現身廣東韶州府西城上身凭女墻以右手捋髯時方亭午鬚眉面目厯厯可睹廿三日廿八日復現舉城官民奔走禮拜總督尚書李棲鳯親詣廟祭焉後甲子使粤别詳皇華紀聞陸舟朱秋厓克生云寳應西去十里地曰黎城鎮古黎王城也又西北七十里曰張公鋪屬天長縣康熈乙巳二月二日張公鋪人見平地中忽擁官艦數十帆檣樓櫓畢具船首列羽旗大纛之屬儀衛森然所過之地迅如飛鳥跡其過處草木皆靡竟不知何祥也獸種家語曰馬十二月而生狗三月而生豕四月而生猿五月而生鹿六月而生虎七月而生蟲八月而生淮南子本此魏畧云黃牛羌種孕身六月生廣志云獠民皆七月生蜀郡記云諸獠娠七月生葢獸種也博野婦人郭宫庶快圃棻説博野有一婦人一生不飲食而育男女數人操作與常人無異亦罕疾病云不敢欺今市井俚語云不敢欺亦有所本國䇿秦興師臨周章顔率謂齊王曰不敢欺大國疾定所從出敝邑遷鼎以待命吳道子水陸畫平陽普菴堂有吳道子畫水陸百二十軸明世宗朝西河郡王城北有隙地𫝊為廢寺址其地中間方數尺雨雪不濡中夜常見光怪王令人持畚鍤發之五丈許得石函以鐵緄二道束其外發之又得錫函最中函以木木函啟軸見乃吳道子真蹟也王甚珍之王薨嗣王以乞揮使吕某吕又死其家貧落寺僧以恒直得之此崇禎間事予兄西樵使山右為賦長歌今載集中三西湖粤劔編云恵州豐湖在郡城西人呼為西湖東以城為儲胥西南北三方皆羣山為衛儼然與武林相似蘇長公曽買此湖為放生池出御賜金錢築堤障水人號曰蘇堤是天下有兩西湖兩蘇堤也潁州亦有西湖坡知潁州謝表云出守三邦輒為西湖之長是又三西湖也天醫俗説雷部擊人必有天醫隨之或誤擊則旋活之近雲南府有二人同行遇雷皆殛死其一人怳忽見一比邱坐其旁以手摩其腦曰汝不應死勿慮汝家人尋至矣時有目擊者歸告二人之家家人皆號泣至至則生矣比邱亦不見宗兄行人爾成敬公説火神武進諸生楊某館於某氏其人富而豪侈毎夜飲必三鼓一日醉歸見館中燈火甚盛從牕隙竊窺之見案邊二燭卓立甚巨有緋衣人據案觀書意其楊也明日詢之楊對以實早寢未嘗夜讀然心怪之至夜假寐以伺近三鼓忽有大聲𫝊呼排户而入隨有二巨燭出地上已而紅焰滿室僕𨽻雜遝擁一緋衣人至據案而坐取案上書册翻之楊懼而叫呼緋衣人若不聞者將五鼓緋衣者徐起徑趨楊卧處衆皆從之忽舉牀四脚盤旋室中復擲之空中者數四天將曙又聞𫝊呼聲寂無所見矣久之楊始甦起視門户扃鐍如故問院中人毫無所聞也因急謝主人歸歸數日火大作所居皆燼始悟所見乃火神耳楊後中鄉試鴛鴦鏡楚人王蘭士者嘗遊江西一日遇風雨投宿古祠遂假寐門忽洞開見翁媼二人入祠直據上坐僕從十許人旁列復有二翁媼扶服入跪其前坐者怒數其罪顧從者鞭之數百跪者哀號乞憐且曰業生此不孝子不敢辭罪祈見釋當碎其鴛鴦鏡事猶可及也坐者沉吟釋之王忽𠻳發聲遂無所覩晨起雨霽將行忽有年少持一鏡入拜祠下某怪而問之曰此鴛鴦鏡漢物也視之背作鴛鴦二頭益異之謂少年曰肯見售乎少年不可展轉間鏡忽墜地而碎少年方驚惋某告之曰汝必有失德壞人閨門事不實相告且有陰譴少年懼吐實乃與里中謝氏女約私奔期㑹祠中鏡即女所遺也因語以夜來所見少年大悔恨再拜而去王視其額乃謝氏宗祠也鹿盡心順治中安邑知縣鹿盡心者得痿痺疾有方士挾乩術自稱劉海蟾教以食小兒腦即愈鹿信之輒以重價購小兒擊殺食之所殺傷甚衆而病不減因復請於乩仙復教以生食乃可愈因更生鑿小兒腦吸之致死者不一病竟不愈而死事隨彰聞被害之家共寘方士於法内江石壁魚四川内江縣儒學後有石壁甚竒明三百年中衣冠科第甲西蜀順治末輝縣冀應熊為成都知府好作擘窠大書一日至内江謁文廟愛石壁之竒書而鑱諸石石破有清泉一泓魚十餘頭游泳其中見風水涸魚皆化為石自是科甲不振炙輠集載有人以石子壓紙或見欲得之酬價二十緡後破之乃有一魚躍出其中泓然清流也又李後主有小石彈丸置研池中水終日不耗陶穀取之投地石裂中有小魚躍出死自是研無復潤澤矣松頂生蘭予門生翰林湯西厓右曽嘗於湖南永州道中見古松數萬株是宋刺史栁開所植亘數百里有蘭寄生長松杈椏間可徑丈葳㽔四垂時正作花香聞逺近其地曰竒蘭鋪草木寄生理固有不可解者驢駒媚座客偶舉唐小説霍小玉𫝊中有驢駒媚不知何物按僧贊寧物類相感志云凡驢狗初生未墮地口中有一物如肉名媚婦人帶之能媚姓異一兩雙五六七㭍八九第二第五第八九百皆姓也聞見記載縣令妻伍氏縣丞妻陸氏主簿妻漆氏事以為笑不過音同耳劔俠某中丞廵撫上江一日遣吏齎金三千赴京師途宿古廟中扃鐍甚固晨起已失金所在而門鑰宛然怪之歸告中丞中丞怒亟責償官吏告曰償固不敢辭但事甚疑怪請予假一月徃蹤跡之願以妻子為質中丞許之比至失金處詢訪久之無所見將歸矣忽於市中遇瞽叟胸懸一牌云善決大疑漫問之叟忽曰君失金多少曰三千叟曰我稍知蹤跡可覔車子乘我君第隨徃冀可得也如其言初行一日有人煙村落次日入深山行不知㡬百里無復村疃至三日踰亭午抵一大布鎮叟曰至矣君但入當自得消息不得已第從其言比入市則肩摩轂擊萬瓦鱗次忽一人來訊曰君非此間人奚至此告以故與俱至市口覔瞽叟已失所在乃與曲折行數街抵大宅如王公之居厯階及堂寂無人戒令少待頃之𫝊呼令入至後堂堂中惟設一榻有偉男子科跣坐其上髮長及骭童子數人執扇拂左右侍拜跪訖男子訊來意具對男子頤指語童子曰可將來即有少年數輩扛金至封識宛然問曰寧欲得金乎吏叩頭曰幸甚不敢請也男子曰乍來此且將息了却去即有人引至一院扃門而去日予三餐皆極豐腆是夜月明如晝啓後户視之見粉壁上纍纍有物審視之皆人耳鼻也大驚然無隙可逸去徬徨達曉前人忽來𫝊呼復至後堂男子科跣坐如初謂曰金不可得矣然當予汝一紙書輒據案作書擲之揮出前人復導至市口惝怳欵夢中急覔路歸見中丞厯述前事叱其妄出書呈之中丞啓緘忽色變而入移時𫝊令歸舍并釋妻子豁其賠償吏大喜過望久之乃知書中大略斥中丞貪縱謂勿責吏償金否則某月日夫人夜三更睡覺髮截若干寸寧忘之乎問之夫人良然始知其劔俠也日照李洗馬應廌聞之望江龍簡討燮云八才子圖今世𫝊孟襄陽王右丞輩七賢過闗圖皆䇿蹇重戴青箱雜記亦云世𫝊潘閬安鴻漸八才子圖皆策蹇重戴其為唐七賢宋初八才子不可得而詳也東觀餘論跋滕子濟所藏唐人出遊圖云此卷據其名題或有弗同時者而揚鑣竝驅睇盼相語豈亦於世得意忘象者乎題名云宋之問王維李白高適岑參史白凡六人尤為不倫濮州女子明末山東將亂時濮州民家子周猱頭者居負郭之周家村語多清狂人謂不慧一日自城中歸過真武廟側有雙鬟女子立道旁樹下絶色也謂周曰與君夙縁當為君婦遂㩦至家拜母母疑其蹤跡俾子遣之女子笑曰我以夙縁奉天帝命為汝家婦誰能遣我久之事姑孝謹即鄰里無不敬愛之周家素貧又值荒歉女子日具食養姑皆豐潔周被役築城同事者戲語曰同執畚鍤能俾君婦治饌相勞乎周歸語婦答曰此不難但張帷幕吾自致之如其言果日獲飽食一日潛告其姑曰此地不久必大亂不可留也曷避之乃徧辭鄰里挈姑與夫擔負去不知所徃未㡬榆林賊起濮被兵甚慘果如其言浦囘子浦囘子者固原人業染所居對城隍廟一道士夜坐廟門火光繞身浦意其異人獻以茗果不納浦益恭道士乃食其一棗謂曰子誠信有根器他日訪我羅山浦如其言訪之踰年歸以道授其妻復去王輔臣亂後還家容色如少年鄰人曹文珽者叩之曰久居終南山山中老人多眉長過面扱之兩耳間者洞中有二黒猿見我執手甚歡其言即不能辨飲以瓢水清甘如醴由此不饑不寒雪天可著單衣旬日不食自若也歸數日求見其妻妻拒之曰各做自家事何必相見浦因别去徐步出郭門鄰人送之奔馳不及而返静寧州道士陜西静寧州一道士賣藥於市手持小葫蘆修廣僅寸許傾之得土數升皆成金丹以予病者立已求者日衆不能給以麈尾一揮人人袂間各得三粒一日以小瓢貯丹任人自取極力多攫止得三粒數百人悉得藥而瓢仍不空後不知所之王九臯王九臯字鶴鳴濮州人萬厯壬午舉人自少至老夜未嘗寐終身不知有夢少時常遇闗忠義親指隙地令為建祠今濮州大闗帝廟是也池北偶談卷二十三
