body:
  text: 池北偶談卷六刑部尚書王士禎撰李太守近日亷吏以松江知府李正華為第一正華貢士獻縣人予鄉李御史森先按下江誅鉏豪右有海忠介之風中䜛被逮呉民號泣攀送者數萬人旣登舟僚屬皆在相視揮涕正華最後至㩦一酒瓢滿酌送侍御慷慨言曰吾曹期不愧天日不愧朝廷不愧百姓耳成敗利鈍造物司之公今日之行榮於登仙諸君何至作楚囚相對耶侍御掀髯大笑諸君改容謝之後以考成不及格鐫級去行之日囊無一錢松江人醵金數百强投舟中復人製一衣獻之凡數千領正華一無所受松人走白巡撫中丞下檄使受之移書慰勉乃量受為行李之費旣歸家騎一驢往來田間嵗一至郡城南鼎甫廷鉉官河間時與之往還甚稔予過獻問其所居在縣西門數椽僅蔽風雨云重慶三忠獻賊自荆州上峽攻陷重慶蜀撫都御史陳公士竒重慶太守王公行儉巴縣令王公錫同日罵賊被磔死酆都林君明儁作三忠傳今巴人立三忠祠祀之楊太常楊懷玉者以琴供奉明懷宗官太常丞鼎革後㩦賜琴流轉呉越間文士多為賦詩絶似宋末注水雲也同時有伊爾弢者㑹稽人亦以琴供奉禁中興化李鏡月瀅有長歌贈之悽婉可誦二烈女丙寅六月福建巡撫張仲舉疏言閩縣未婚烈女呉淑鳯從容盡節矢志靡他連江縣未婚烈女楊聨姐投繯就義百折不回部議奉㫖旌表文柔文柔者李之儀端叔配胡武平宿孫女也為東坡所知呼為法喜上人東坡南遷手自製衣以贐曰我一女子受此等人知復何憾耶見端叔自撰墓誌二文正墓元耶律文正楚材明李文正東陽墓皆在都城西近畏吾村王文貞公崇簡云為孝亷時見耶律王墓上斷碑尚可讀二十餘年來墓田歸旗下此碑無從復問西涯墓抔土僅存明萬厯時有進士王文邁者曾為封樹畿輔人物志云公墓在阜城門外畏吾村後人式微麗牲之石不復有矣張綵張綵焦芳劉宇曹元皆為逆瑾爪牙腹心而綵又其鄉人也苑洛見聞錄獨稱綵遏止逆瑾功德數事謂大學士焦芳導瑾為惡劉宇首阿附瑾綵皆勸退之如是不下十餘條孝子慈孫百世不改而苑洛以鄉曲之故亂天下萬世公是非亦見其愚矣蔡道憲蔡公道憲閩人以進士為長沙府推官數夢與宋李忠節公芾酬酢後天兵下湖南蔡殉節潭人嵗時報賽常見二公往來車騎甚盛全州謝石臞良琦記其事云事叔至孝宣城施愚山閏章少孤事叔譽至孝一日值叔誕辰大集親戚上夀而叔以小故忤意堅卧不起愚山跪榻前移晷辛亥客都門毎憶叔輒涕泗事叔如此古人所希有也譽有遺詩一卷愚山屬予為論定序而行之張待問予邑新城本長山縣地元始為縣閲長山志名宦宋止知縣翟大順一人丞簿則有明以前無考適閲東軒筆錄得張待問一人知志之闕漏多矣張待問為淄川長山縣主簿縣有盧伯達者與曹侍中利用通姻復憑世廕大為邑患縣令憚其勢莫敢與較張一日承令乏適伯達以訟至庭即數其累犯杖之未幾伯達之姪士倫來為本路轉運使人皆為張危之或勸令自免去張曰盧公賢者肯銜隙以害公正之吏乎了不嬰意一日士倫巡案至邑召張語之曰君健吏也吾叔賴君懲之今變節為善士矣為發薦章而去待問固不愧名宦乃士倫亦鄉之賢大夫也錄之以補志乘之闕范文正公㓜隨母改適長山朱氏筆錄訛作睢陽宜正之孔公父子史載孔道輔原魯使契丹優人以文宣王為戲道輔艴然徑出澠水燕談載元祐中上元駕幸迎祥池宴從臣伶人以先聖為戲刑部侍郎孔宗翰奏唐文宗時有為此戲者詔斥之今聖君宴犒羣臣豈容有此詔付檢官置於理二事絶相類宗翰字周翰即原魯子也宋至道二年皇太子諸王宴瓊林苑教坊以孔子為戲賓客李至言唐太和中以此為戲文宗笞伶人以懲無禮魯哀公以儒為戲尚不可況先聖乎龐嚴因話錄角部載江淮一舉人姓嚴登科記誤書龐嚴遂賃舟丐食往夀春謁從事龐尹事極可笑按唐書龐嚴夀春人元和中登進士第元微之喜其文體類已歴太常少卿京兆尹姓名地里皆巧合其一人耶劉富川劉欽鄰字鄰哉號江屏其先江右人籍揚州之儀真順治庚子舉人辛丑進士筮仕廣西富川知縣甲寅賊陷富川劉不屈死之兩廣總督疏聞得㫖劉某忠憤死節深為可憫應得卹典從優議奏予在揚州時劉初釋褐識其人恂恂儒素而大節如此可敬亦可哀也適見徐御史敬菴旭齡疏云守土者必有城存與存城亡與亡之義然後可以固封疆敵愾者必有寧使進尺勿使退寸之心然後可以克大敵今賊來則以請兵救援而出賊退又以隨兵進𠞰而入守令逃竄而委責任於將弁將弁怠弛而望恢復於禁旅又云國家深仁厚澤培養臣工三十餘年承平日久文武燕安綢繆牖户之計不深故捐軀徇國之志不決昔安史之亂杲卿力徇河北故十七郡皆歸朝廷淮蔡之平裴度不與賊俱生不浹月而掃清巨寇臣就目前事勢而論立欲削平僭逆必先振刷紀綱云云真藥石之言也張商英宋張商英反復狙詐小人之尤杲禪師與天覺論元祐人才因問温公如何天覺曰大賢也杲曰相公在臺諌時如何論他天覺曰只是後生時死急要官做故如此予嘗謂便要官做亦何至仆温公之碑耶吾鄉益都房安恪公可壯天啓中為御史為東林部黨之魁而晚節不終順治初為溧陽相所逐時年七十餘矣京師邸舍器用皆自扃鑰或以為言公曰老夫不久當復召耳予嘗問其姪孫星顯云公嘗自言少年血氣盛只是要官做其言與天覺相類孟氏云是集義所生者非義襲而取之也論人者不可不辨劉元子光州劉元子黄裳嵩陽先生繪之子也好談兵倜儻負竒嵩陽守重慶銅梁大司馬張襄憲公佳𦙍以童子見知愛如己子致署中與元子兄弟讀書時元子十許嵗妬襄憲之才夜與弟黄鼎潛往縊之賴太夫人走救得免後襄憲開府元子尚在公車過襄憲公酒酣耳熱輒謾罵襄憲遜謝而已元子後以兵部郎叅謀征倭軍事徐東癡吾邑徐隱君夜字東癡又字嵇菴年二十九棄諸生隱居東臯鄭潢河上掘門土室絶跡城市有朱桃椎杜子春之風癸亥春予及先兄過之欲約同志為搆草堂又遺書縣令云元道州狀舉處士張季秀請縣官為造草舍十數間給水田一二頃免其當户徭役令得保遂其志使士庶識亷恥之方又楊君謙蘇談所記中峰和上草堂乃馮海粟煉泥趙松雪搬運中峰塗壁呉人至今傳為美談明府能為此盛舉繼三公之後者亦佳話也竟不果朱浚盧奕之有杞華原栁氏之有璨韓忠獻之有侂胄呉玠呉璘之有逆曦所謂君子之澤五世而斬也何燕泉餘冬序錄載朱文公曾孫浚為浙漕值賈似道當國時毎有劄子白事必稱某萬拜按文公世系公長子塾塾生鑑鑑生浚浚仕至朝散大夫右文殿修撰兩浙轉運使吏部侍郎丙子元兵至福安州浚不屈死之浚能殺身成仁而不能不失身於權貴明末亦有之如張捷楊維垣是也浚死節事宋史及綱目皆不書王李掖縣王漢字子房俶儻有經世才中崇禎丁丑進士為髙平河内二縣令上書言事懷宗竒之召對擢御史巡按河南進巡撫都御史死永城賊劉超之難予少見其奏疏及小武當詩一篇真竒才也同邑李森先字琳枝崇禎庚辰進士入本朝為御史屢上疏論事切直三下刑部不少摧折巡按下江清剛端勁寘淫僧三拙優人王紫稼於法江南人莫不快之中忌者被逮呉中罷市哭送者萬人世祖亷知之尋内擢卿寺而李不幸死矣李修髯長身飲酒無算家有椒雨園在南郭外日與酒徒酣飲其中醉則衣白衣徒歩歌呼過市巾幘攲側酒痕狼籍有陽城之風黄熙績順治己亥海寇破京口𤓰儀寧國等處金陵幾不守寇安慶推官黄熙績力守全城辛丑論功罪監司守令以下死者數十人熙績以前功特擢給事中仍世襲阿思哈哈番通判李皇詔亦得叙陞員外郎世襲阿達哈哈番黄閩人李楚人米元章二壻段拂呉激皆米元章之壻拂字去塵元章有潔癖見其名字喜曰旣拂矣又去塵真吾壻也以子妻之拂南渡後仕至叅知政事激字彦髙入金為翰林學士以詩樂府知名與蔡松年齊名號呉蔡體篤師誼汴梁王金章紫綬叅政常從老儒劉文竒學崇禎末劉家没於水王為置田園廬舍於蘇門山中後年七十餘病卒為之營𦵏情禮甚備予見其哭師詩哀樂有過人者其警句云門無司馬求書使室有黔婁正被妻餘不具錄陶九成載檇李顧德玉𦵏其師新昌俞觀光事此近之矣兩郝天挺本末金元間有兩郝天挺一為元遺山之師一為遺山弟子予考元史郝經傳云其先潞州人徙澤州之陵川祖天挺字晉卿元裕之嘗從之學裕之謂經曰汝貌類祖才器非常者是也其一字繼先出於多囉别族父哈尚巴圖爾元太宗世多著武功天挺英爽剛直有志略受業於遺山元好問累拜河南行省平章政事追封冀國公諡文定為皇慶名臣嘗修雲南實錄五卷又註唐人鼓吹集十卷元時漢人賜號巴圗惟史天澤張𢎞範見輟耕錄漢言勇也近常熟刻鼓吹集乃以為隱逸傳之晉卿而致疑於趙文敏之序稱尚書左丞又於尚書左丞上妄加金字誤甚孫靈暉新城僻陋其在南北朝則長樂武强二縣地也長樂今青州之髙苑武强今濟南之長山偶讀北齊書孫靈暉傳乃予鄉前哲而志不載因錄於此孫靈暉長樂武强人也魏大儒秘書監惠蔚靈暉之族曾王父也靈暉少明敏有器度惠蔚一子早卒其家書籍多在焉靈暉七嵗便好學日誦數千言唯尋討惠蔚手錄章疏不求師友三禮三傳皆通宗㫖時就鮑季詳熊安生質問疑滯其所發明熊鮑無以異也舉冀州刺史秀才射䇿髙第授員外將軍後以儒術甄明擢授太學博士遷北徐州治中轉潼郡太守天統中令朝臣推舉可為南陽王綽師者吏部尚書尉瑾表薦之徴為國子博士授南陽王經王雖不好文學深相敬重啓除其府諮議叅軍綽除定州刺史仍隨之鎮綽所為猖蹷靈暉惟黙黙憂悴不能諌止綽欲以管記馬子結為諮議叅軍乃表請轉靈暉為王師朝廷以王師三品啓奏不合後主於啓下手答云但用之仍手報南陽書並依所奏儒者甚以為榮綽除大將軍靈暉以王師領大將軍司馬綽誅停廢齊亡數年卒子萬夀聰識機警博渉羣書有辭藻尤甚詩詠齊末陽休之辟為開府行叅軍隨奉朝請滕王文學豫章長史卒於大理司直忠勤公黔志列傳先髙祖太僕府君死事於黔明世廟諭祭文有忠勤報國之褒故稱忠勤公黔記名宦傳云王重光濟南新城人以進士為司空曹郎嘉靖中貴州左叅政㑹赤水黑白羿蠻叛公與叅將於某衝嵐冒瘴癘勤事以死事聞賜祭贈太僕少卿公祠在永寧衛有指揮王之屏張朝者奉委采木不避險艱水漲有巨木閣灘頭朝之屏先卒徒入水掀撥巨木溺死事聞賜𦵏今從祀公祠蠙衣生曰予聞王之先有王叟者與其嫗力田作苦家贏儋石之儲有窮措大夜穿其墉叟覺以戒嫗是偷兒也扼其吭而燭之曰嘻君故儒士而顧穿窬耶夫婦甚憐惜之耳語曰勉旃勉旃吾終不暴君之短因出粟與之庾人無知者太僕蓋其孫云由太僕而後益昌大今所稱新城王是已此傳同年某中丞撫黔時特錄相寄時曲沃衛少師方有纂修一統志之請不一載滇黔告變志未進呈故具錄於此死節富川知縣劉欽鄰死節之後又得數人謹書之饒寇陷浮梁知縣王臨元死之陷新昌典史諸士英死之臨元山東平山衛人順治辛丑進士叛將以紫衣誘降不從自縊死浙寇陷武義署縣事蘭谿丞徐喆死之賊索印力拒而死喆山西廣昌人貢生海寇薄温州總兵官祖𢎞勲迎降巡道僉事陳丹赤死之叛將議脅之降大罵遇害丹赤福建閩縣人順治辛卯舉人初贈光祿寺卿加贈通政使司通政使朱龍據定邊堡以叛守備劉士英同其妻妾郭李俱死之孫崇雅以神木叛榆林道叅議楊三知全家死之三知順天良鄉人順治丙戌進士其妻缺氏與二女先死妾缺氏不死為賊所得大罵遇害贈光祿寺卿王贈光祿寺少卿喆贈浙江按察使司僉事劉士英贈叅將世襲拜他喇布勒哈番諸士英贈江南宣城縣主簿段復興段公復興兗州陽榖人明末為秦中監司有威惠崇禎癸未冬李自成入闗西安陷諸郡瓦解賊檄至慶陽公怒裂之斬其使誓以死守十一月十六日賊陷慶陽公巷戰力竭死之母夫人妻楊氏妾劉氏宗氏張氏子瑞女成曁婢僕七人皆自焚死秦人立祠春秋饗祀有禱輒應以比唐段太尉闗中人稱二段云蔣氏王氏蔣氏淮安大河衛人許字山陽髙昂未娶而昂夭女趨䘮哭甚哀自矢不嫁毎嵗寒食必往祭墓今五十餘尚在又康熙十六年閩逆初降巡撫楊熙疏請旌表孝子王鑑女惠貞惠貞年十六許字儒士楊儼儼死謀以身殉家人止之因請奔䘮自縊夫柩之側王應熊巴縣劉孝亷非眼道開作故大學士王公應熊傳頗紀實無䛕詞其贊云立朝孑孑居鄉赫赫峻整力嚴夏日冬雪天資則美聖學未充責人無己居己不洪仗鉞秉旄入相出將遇非其時用違其量民之焦墊其何能淑翰林有餘宰相不足應熊以崇禎癸酉冬内傳入閣辦事不由枚卜在政府僅五月攻之者衆遂罷歸後弟應熙與同邑户侍倪斯蕙子天和相軋遂成大獄倪氏傾覆殆盡巴人少之癸未周延儒罷相舉應熊自代詔起田間比至周已賜死陳演不欲其入紿應熊止涿州而上疏力辭上以問陳陳對曰此要君之術耳上怒遂勒歸南渡以為督師專辦蜀寇甫抵遵義獻賊已據成都隘將曾英擁衆數萬駐重慶應熊無師可督蟒衣玉帶端坐受庭謁而已丙戌冬肅王誅獻賊於南部之鳯皇山假子孫可望奔重慶墮其城南入滇黔明年丁亥秋應熊卒於永寧之土城倪所居有巴字園俯臨城堞南對塗山下有龍門浩擅巴郡江山之勝自題一聨云居臨巴水真成字家對龍門好著書予昔過重慶聞之門人林舉人云魏尚書格言蔚州魏環溪尚書象樞順治中以光祿丞養親家居服闋以臨胊馮相國易齎溥薦起為御史不五載至尚書所著有庸齋閒話與薛文清讀書錄同㫖偶錄數則於此有不可知之天道無不可知之人事好名是學者病是不學者藥居大臣而德不純學不粹不如下僚居下僚而政不平刑不中不如素士為士而理不明學不正不如庶民偶見水與油而得君子小人之情狀焉水君子也其性凉其質白其味沖其為用也可以澣不潔者而使潔即沸湯中投以油亦自分别而不相混誠哉君子也油小人也其性滑其味濃其為用也可以汚潔者而使不潔倘滚油中投一水必致搏激而不相容誠哉小人也五倫之外無道六經之外無文四書之外無學貧賤立品富貴立身方是天地間真男子成德毎在困窮敗身多因得志為仙為佛論死後地位為聖為賢論生前地位此虚實有無之别世間第一種可敬人忠臣孝子世間第一種可憐人寡婦孤兒恭謹忍讓是居鄉之良法清正儉約是居官之良法呉芾云與其得罪於百姓不如得罪於上官李衡云與其進而負於君不如退而合於道二君皆宋人也合之可作出處銘父母有過子猶幾諫諭親於道心無欺慢兄弟有過豈容背訕面吐衷腸誰能離間匿怨而友良朋所患一人作偽一家習慣骨肉手足譸張為幻人而異情犬豕之豢家門喻魏環溪尚書聖人家門喻略載於左聖人門觀者自下而上取君子上達意門闢正路三條中行中路狂左路狷右路門閾内外二界喻義閾内喻利閾外門内戒規三節老在得終戒壯在鬭中戒少在色始戒門内畏箴三則畏天命一則畏大人二則畏聖人言三則門内賞罰二格懷德賞懷刑罰門内才品四種剛第一種毅第二種木第三種訥第四種門内課士三等行已有恥不辱君命一等宗族稱孝鄉黨稱弟二等言必信行必果三等門内黜士四等患得患失之鄙夫下等無忌憚之小人又下等德之賊最下等此段自上而下取小人下達意門内取士四科德行一科言語一科政事一科文學一科叩門三法反三隅力叩法悱口叩法憤心叩法入門一歩致知格物聖人家自下而上同前孝基弟址門户堂室聖人室君子堂善人戸有恒門䕶家四壁信四壁忠三壁行二壁文一壁向上三階樂之上層好之中層知之下層自外達内四程權四程立三程適道二程共學一程自内達外四程禮動四程莊涖三程仁守二程知及一程傳家四法游藝家外依仁家内據德家内志道家内成家四事樂忘憂憤忘食誨不倦學不厭聖門戒律廬陵張學士幹臣作聖門戒律八條一名穿窬之類多方鑽刺覬覦者是一名患得患失鄙夫夤縁以獵榮膴者是一名妾婦阿附取容者是一名壟斷賤丈夫指為竒貨者是一名墦間乞人望門干謁者是一名無忌憚小人侮法作奸擅行者是一名德之賊游移不可方物者是一名不逺禽獸横逆不悛淫蕩無恥者是圖讖漢光武好以圖讖決事宣布天下桓譚以此得罪而苻堅以讀讖殺王彫王佩此一事過光武逺矣其後乃以讖文入五將山竟為姚萇所執當是末路憒憒耶朱肜朱肜京兆人隱居不仕閆負使凉以肜與王猛並稱堅以猛為侍中猛表讓於肜其後猛死堅欲南寇引羣臣會議太極殿苻融石越等皆諫肜獨贊之卒致淝水之敗以至亡國此豈景略匹耶處士盜虚聲何代無人馮可宗益都馮起震字青方老儒也工畫竹有名啓禎間時號馮竹子有子二人長可賓成進士官給事中好聲妓侍妾數十人其弟可宗南渡掌錦衣衛事為馮阮牙爪尤豪侈自恣居第皆以紫檀為窻楹乙酉死於金陵同時有馬文室者貴陽相之廝役也亦官都督金陵破官於其居宅井中淘金得數萬兩或為賦淘金行焉劉吏部劉吏部公㦷體仁忼慨任俠意氣自許嘗遊睢陽睢陽守贈遺頗厚歸經人家墓田徘徊久之曰此地自佳惜𦵏不合法不急遷且有竒禍因迂道訪其家具為主人道之曰公誠長者顧力不能遷奈何劉曰是易耳盡解槖中裝與之而去此與漢書原渉事頗相類王公家書故尚書王公德完字希泉蜀廣安州人萬厯庚子臨朐馮公琢菴琦南充黄公慎軒輝同侍皇長子日講退謂王公曰今日皇長子閟言母后憂危狀殆不自保馮又曰今日之計母后安則皇長子安而天下安否則危矣須得一人􅂸性命説破庶有濟乎王公慷慨起曰此言官責公詞臣可無言然某言之必死老母弱子以累慎軒矣疏入神宗大怒下詔獄究問主使之人當是時馮公自分不免王公備任慘毒但云道路喧傳髙皇主使語不及他拜杖謫歸天啓中起廢籍至户部尚書公之孫有馮予門人也以公獄中家書及馮黄二公手札示予敬錄於此家書云十月二十八日男上中宫本蓋中宫危則皇長子危長子危則宗廟社稷危此回天機括曲突徙薪上䇿男赤心為國奮不顧身冒昧陳言致皇上震怒拏送鎮撫司考訊人臣盡忠報國獨立敢言誰為主使皇上初震雷霆計且不測幸賴二祖列宗在天之靈皇上夢一金甲神人持鞭而撻宫殿動搖因此上心驚懼男遂免於廷杖止繫鎮撫司中出則無期也各衙門上三疏救皆不報男思人臣為宗廟社稷即死亦可不朽矧仗我祖宗父母積德累仁今得不死非聖主恩深焉能再造耶萬里長途兩位老母暮年聞此信息驚惶憂慮恐致成病則不孝之罪無所容於天地間矣馮公書云千古綱常萬年宗社係兄此舉蓋向來所言止及國本而兄所言者事之本也烈心竒節與鄒爾瞻等而所闗比爾瞻更大國史野史大書特書不一書矣雷霆之下笞箠慘并百僚悸心千夫隕涕寄九死於九闗幸而不死社稷實式靈之旣逆隆㫖干天譴士之處此當以忠智相兼有身在無忘主恩有舌在無談國事事在身外身在世外鷗波萍跡足寄此生柴車就道形跡宜晦即遇故舊一夫一馬亦勿受之貂璫滿途百凡寧過慎耳行矣足下相與淺而意則深業已成千秋之事為千秋之人事事須與此舉相稱令龍逄黄綺合為一人乃為全盛若異日出而肩大任建大業則在天不在我然聊以兄之出處卜之也勿煩作報書有所欲言異日覓便相聞可耳黄書略云臣罪當誅兮天王聖明此語至當真見古人之心辟如父母反目泣諫不從大杖而走豈須臾忘怨慕哉常存此心自不見直言得罪有毫髮之可矜負也天下人公共大事被兄一肩擔盡所闗至大而弟所言欲百尺竿頭更進一歩蓋責備賢者愛不能已耳此事孫北海侍郎益智錄載之止言黄而不及馮且錄名臣亦不及文敏何哉陳忠愍陳都督福字東海陜西定邊堡人積功至右都督駐䕫州予壬子使蜀見之真儒將也與予登夔府東城觀八陣圖謁白帝城昭烈廟奏軍中之樂行酒極歡酒酣送予江岸執手殷勤而别此後予廬居聞陳遷寧夏總兵官尋滇黔告變陳百口尚在夔門時蜀中已陷賊以左將軍印誘之招致百端陳皆執其使以聞朱龍輩叛亂據花馬池等城討平之進圍固原朝論方倚為長城謂必辦賊一日賊忽以五百人偽降陳坦然不疑置之左右陳部下有九營而自居中號令嚴肅日晡諸營不得相往來夜二鼓降人發難中軍驚擾時大風雪諸營無敢趣救者遂刃陳取其元去此乙卯冬事也陳忠勇乃心王室今大帥無出其右其死也上震悼特贈為公諡忠愍擢其弟叅將竒為天津總兵官夀為光祿寺少卿今為右通政曹植司馬順呉江顧生庶其萬祺三餘漫筆云三叔周之畔臣實殷之忠臣也説本陳同父若曹丕篡漢陳思王植變服而哭司馬炎篡魏習陽亭侯順歎曰事乖唐虞而假為禪名遂悲泣由是廢黜而卒二公非漢魏之忠臣歟門户吾家自明嘉靖中先髙祖太僕公以甲科起家至隆萬而極盛代有聞人當明中葉門户紛紜之時無一人濡足者亦可見家法之恭謹矣先伯祖太師霽宇公諱象乾出入將相六十年與葉文忠公沈文端公郭文毅公輩師友之誼最厚故小人造東林同志錄東林籍貫皆列焉先祖方伯公諱象晉為禮部主事時鄉人亓詩教韓浚勢張甚以公名閥素有清望餌以銓曹欲引入其黨公力却之遂觸其怒丁巳以察典中傷里居者十餘年此其梗槩也至從叔祖吏部象春為東林聞人而才浮於缺家法始一變矣夏瑗公允彛幸存錄云辛亥京察孫丕揚主之曹于汴湯兆京佐之而所處湯賓尹王紹徽輩則攻東林者也紹徽有清望而賓尹負才名故秦聚奎直糾其不平丁巳京察鄭繼之主之徐兆吉韓浚佐之而所處皆東林也世之所謂清流者一網盡矣是時有齊楚浙三黨鼎峙齊為亓詩教韓浚輩楚為呉亮嗣官應震輩浙為劉廷元姚宗文輩而湯賓尹輩隂為之主於是有宣黨崑黨種種别名宣即賓尹崑則顧天埈也亓韓亓詩教萊蕪人韓浚淄川人趙忠毅著論所目為四凶也皆同郡㑹山東缺銓司先方伯時官儀制主事同鄉前輩皆屬意亓韓欲攘以為德冀為之用屬張華東公延登通殷勤時伯祖太師以薊督召入中樞公曰朝廷威柄惟銓與樞詎有兄在本兵弟復為銓曹者力謝辭之亓韓怒不附己遂以察典中傷夏考功云丁巳之察不平彌甚竟無一人起而爭之者蓋在朝清流驅逐盡矣諒哉先是癸丑考選諸公皆以名德首推公時太師方以大司馬召寓家書曰弟以資望應得臺省且欲假歸俟考選後乃入弟即迴避例亦當改翰林公復書言王事孔棘且君命不宿於家不可以弟故遲君命即具呈迴避公生平恬退如此髙忠憲髙忠憲公自言少年以氣節自許以此一念受譴亦不畏及得罪逺竄值風雨困卧舟中數日天晴霽登岸入旅店中忽推窻見桃花爛然遂有悟并氣節之想亦氷消矣崇禎三相夏瑗公云烈皇英明勤敏自當中興而卒致淪䘮者以輔佐非人也庶幾如范景文之博大好賢方岳貢之清勤憂國不失賢相惜用之稍晚謝陞不徇物情不違公論三公於二䣊皆虚公不滯但闖寇之難范死節最烈照耀千古方以直精微房入内聞變即自縊為僕所釋欲再縊而寇已入受刑至慘終不屈死或惜其死稍晚然大節終無貶也謝又出方下矣酈道元酈道元史稱嚴猛為中尉汝南王悦嬖人丘念弄權縱恣道元收付獄悦請於胡太后太后赦之道元殺念并劾悦時蕭寳寅在闗中反狀已露悦遂奏道元為闗右大使行至隂盤驛遇害世但知其文士耳二王好佛王右丞兄弟好佛多與名僧游處其山川梵字之作往往精妙然唐書王縉傳載縉喜飯僧徒對揚啓沃輒以因果為證毎西番有警輒使羣僧誦仁王經禳之大厯刑政日以陵遲縉又縱弟妹女尼等廣納賄賂如市賈焉孟子謂頌詩讀書必知人論世㫖哉言乎薛佩玉予年來訪求殉節者謹書之近又得貴州都匀知縣薛君殉節狀於同年子呉雯天章薛君諱佩玉山西芮城人辛丑進士出予友李宫詹容齋之門為人孤介質直臨事不茍康熙十三年正月十一日滇逆至都匀戍將及兵士數千人内叛脅受偽印薛君不可登樓自縊僕薛策薛健救之曰汝誤我非愛我也急麾去遂死其子鏞今為諸生池北偶談卷六
