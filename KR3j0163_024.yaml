body:
  text: 池北偶談卷二十四刑部尚書王士禎撰一家完聚浙東亂時諸暨陳氏女年甫十六為杭鎮撥什庫所得鬻於銀工工逼之堅不肯從杭人郭宗臣朱膽生尚御公者創義醵金以贖難民知女之義贖之方至忽友人某贖一童子問之即其夫也翌日贖一嫗至乃其母也繼又贖一嫗至其姑也有兩翁覔其妻踉蹌至門即其父與翁也兩家骨肉一時完聚詢之蓋將於十二月二十四日婚而兵忽奄至遂被掠云三人具衣帨治酒肴為之合卺給裝而歸之人以為女子貞節所感關索雲貴間有關索嶺有祠廟極靈云明初師征雲南至此見一古廟廟中石爐插鐵箭一鈒其上曰漢將關索至此雲南平遂建關索廟今香火甚盛月山叢談雲南平夷過曲靖晉寧過江川皆有關索嶺上各有廟蓋前代凡遇高埠置關關吏備索以挽舁者故以名耳𫝊訛之久遂謂有是人而實妄也洗眼方右通政袁密山景星廣西平樂人嘗𫝊一洗眼方云宋元豐間某太守年七十雙目不明遇仙人𫝊此方洗一年目力如童子録之如左每嵗立冬日採桑葉一百二十片懸風處令自乾每月用十片水一碗於砂罐內煎至八分去渣溫洗每洗眼日清淨齊戒忌葷酒正月初五日二月初一日三月初五日四月初八日五月初五日六月初七日七月初七日八月初八日九月三十日月小則草九日十月初十日十一月初十日十二月初一日治鳥傷凡鳥翅足折喂以芝麻仍嚼爛敷患處即差見客座新聞宋三館書目有􅀈以麥反潄二卷皆養鷹之法具醫療之術孫文定益都孫文定公廷銓世居顔神鎮為童子時常五鼓入孰道遇一長人如方相狀目睢盱可畏直前欲搏之公方悚懼自覺身驟長與之等且搏且却至孝水西岸玉皇宫其物忽不見公又常讀書齊中有狐貽金豆數枚而去其家有金豆山房至今存焉男子生子福建總兵官楊富有嬖童生二子楊子名之曰天舍地舍魏惟度憲親見之楊厯官江西提督近樂陵男子范文仁亦生子內兄張賓公實居親見之采人參本草圖經人參一丫至四丫各五葉今遼東采參者識其苗不語急以緯簾凉帽名覆其上然後集人發掘則得參甚多否則苗倐不見發之無所得禮斗儀云下有人參上有紫氣理或然也康熙戊午豫直內庭曽應制賦御苑人參詩親覩其樹唐人詩咏人參者絶少惟韓翃云上黨人參五葉齊溫岐云松刺流空石差齒煙香風軟人參蘂白海棠范烈女者易州范良鼒女許字田未婚而夫死烈女聞之即自縊庭前有海棠一株方花時甚穠艷女死花忽變白一時文人竒之多為賦咏云端肅拜周禮九􅉔其一曰端肅􅉔今人止以為婦人之禮近見元人題跋末亦有書端肅拜者猶有古意三相女李騰空林甫女得道廬山李太白有送內往廬山尋女道士李騰空詩金陵張可度詩所謂父居黃閣女崆峒流水桃花石室中是也茅山有秦檜女繡大士像甚靈異居人不敢托宿見蔣說王安石女最工詩見覺範詩云云曰此浪子和尚耳見吳曽漫録又蔡卞妻亦安石女有文三奸皆有如此女子亦一竒也白騾異濮州兵侍穀原蘇公祐總督宣大時一日聞邊警親率偏師出塞禦之戰衄與衆相失敵追急馬蹶而死正倉皇間忽山上一白騾馳下公躍而乘之得馳入塞既至騾忽不見敵退遣人至其山跡之山有文昌祠白騾宛然在焉異姓近所聞見異姓再識如左若干昭涉詩移絮茄節棧冕招産腰閉坑縮維防戲波友昃蟲鱉歹奴粟竹針線團圓續羸狡灰迮旦佴俳問風西弟諒抗朗晃角細答扁銀教興行賞彥要䠠庹􅀢睢匽焉見猶玉環星邰是汝式上昶駟鈔樹又甲子科山西舉人有因必芳曲沃人降緯介休人又泰和縣早禾市巡檢遆修紀涿州人廣德州杭村巡檢爨礦河南人兩裴迪唐有兩裴迪一天寶詩人與王維杜甫友善一為王鐸辟租庸招納使朱溫鎮宣武辟節度判官既篡位拜右僕射溫自岐還將吏皆賜迎鑾叶贊功臣入見溫目迪曰叶贊之功惟裴公有之見五代史雜𫝊黃巢黃巢自長安遁歸奔於太山狼虎谷為其甥林言斬首送徐州其死明甚乃小說杜撰稱其遁去為僧依張全義於洛陽曽繪已像題詩云記得當年草上飛鐵衣著盡著僧衣天津橋上無人識獨倚闌干看落暉按此詩乃元微之贈智度師絶句特改首句三陷思明三突圍為云云耳此宋陶穀劉定之說癸辛雜志又云即雪竇禪師賔退録亦已辨之為此言者真亂臣賊子之尤也餘聞録之訛餘聞録記湖州吳進士為父乞夀詞於李西涯西涯不許吳問人曰今爵位大於西涯者誰耶曰太師英國公張輔也吳具幣求英公英公令門館作詩與之吳得詩誇於人云黎愧曽士𢎞筆記亦載其事不知英國公輔死土木之難與李相去甚逺黎博雅君子亦仍其謬何也禾山寺顔書永新縣禾山寺傍有顔魯公書龍溪兩大字鐫於石壁方廣徑丈數百年已來石壁如故而二字每年輒徙下今離地不二尺矣郭文毅郭文毅正域貴盛時與漢陽老孝亷劉某者為姻一日劉之女眷至郭氏郭殊不加禮歸而訴之孝亷鬱鬱以殁既數十年矣明末獻賊屠武昌城市人民稀少有人入城過城隍廟見懸一牌云郭正域劉某一案候審時正白晝硃墨如新漢陽宗姪孟穀戩說女化男嘉靖中山西男子李良雨化為女子事載前史近見仁恕堂筆記莊浪二事甚竒一紅塵驛軍莊姓者婦寡有一女已字人年十二忽化為男子女羞不能自明及就婚其夫覺而聞之官乃以聘禮還之夫家聽其别娶而夫之母憐女之婉嬺又以其女歸之今名莊啓盛現為莊浪㕔書役丁巳秋又有莊浪女子十五嵗亦化為男與莊事僅隔十年皆在莊浪亦異聞也范忠貞范忠貞承謨撫浙日杭之西溪有虎攫人遣卒往捕一日自詣水月和尚卜之告以故和尚答云山頭大蟲任打門內大蟲休惹范不悟而去未幾遷閩督遇逆藩之變竟以身殉始悟門內大蟲之語挑戰挑戰二字見左𫝊宣十二年趙旃請挑戰弗許唐人詩屢用之類要云兩陳既立各以將出鬭謂之挑戰劇談録白敏中興師討吐蕃有酋帥衣緋茸裘乘白馬出陳頻召漢軍鬭將有潞州小將善射馳馬彎弧而出射中其項抽短劔踣於鞍上脫緋裘金帶奪馬而還又李臨淮將白孝德斬賊將劉龍仙事亦相類又五代史周德威𫝊有陳章者號陳夜叉乘白馬被朱甲以自異求陽五欲生致之德威出挑戰禽之唐宋已來實有鬭將之事非盡稗官之妄說也箐雞箐雞産水西長尾白羽羽之周遭黑文緣之如淡墨所畫或畜之見人輒避去終不馴擾門人黃自先元治官平逺府通判云然樂毅棗樂毅棗産吾鄉大倍常棗云是樂毅伐齊所遺種也太平廣記所載有王母仲思等名又有安期棗梁國夫人棗西京雜記上林有西王母棗出崑崙山而不及此先方伯羣芳譜云樂氏棗豐肌細核多膏肥美舊𫝊樂毅自燕㩦來太平寰宇記濰州貢毅氏棗今青城縣産無核棗一名虛中即西京雜記之枵棗也上林又有顔淵李出魯國井溢康熙二十四年長山一廢寺有池水忽大溢衆往視之有物如牛伏池中人不敢逼次年鄒平郭莊居民院中井鳴如牛吼水忽上溢祭之乃止短人丙寅春長山之苑城周村間有短人長可尺許鬚眉手足皆具能按拍而歌問之云年三十餘矣豈巨靈焦僥之類耶黑牡丹曹州牡丹品類甚多先祭酒府君嘗往購得黃白緑數種長山李氏獨得黑牡丹一叢云曹州止諸生某氏有之亦不多得也范祠鳥長白山醴泉寺即范文正公讀書處祠在佛殿東偏康熙間秋霖浹旬祠上漏下濕公像獨不沾濡寺僧疑而竊窺之有大鳥張兩翼翼上有火光正覆其上天霽遂失所在文昌閣鸛濟南府學文昌閣有二鸛巢其上一日翔西郊為一軍士射中其脛此鸛每帶箭出入人皆見之偶中丞閲軍將士皆集轅門此軍方負墻鸛忽飛翔其上矢墜焉軍士異而取之俄覺耳中癢不可忍試以箭鏃搔之墻忽壓焉鏃深入不可出軍士歎曰此鸛報怨也吾其死矣數日果死萬嵗後漢書韓稜𫝊竇憲為大將軍威震天下尚書以下議欲拜之伏稱萬嵗稜正色曰禮無人臣稱萬嵗之制乃止然馬伏波𫝊吏士皆伏稱萬嵗又吳良𫝊注東觀記曰門下掾王望諂稱太守功德掾史皆稱萬嵗無上將軍滕撫𫝊建康元年陰陵賊徐鳯自稱無上將軍何進𫝊帝靈帝躬擐甲介馬稱無上將軍行陳三匝而還人主自稱將軍與明武宗先後一轍至與劇賊同號尤可異也師資老子曰善人為不善人之師不善人為善人之資資之云者如詩小雅他山之石可以攻玉之義今俗謂受業為師同學為相資語蓋有本然以同學為不善義亦可商師資之情後漢亷范對明帝語庫厙松江有厙公山厙音舍字書注姓也後漢竇融𫝊金城太守厙鈞按融𫝊章懷太子注引前書音義曰庫氏即倉庫吏後也本王嘉上哀帝疏今羌中有庫姓音舍云承鈞之後風俗通云古守庫大夫之後以官為氏然則庫鈞之姓為式夜切為苦故切漢書注亦未定其音訓氏族博考云庫氏有二漢倉氏庫氏以官為氏又河南官氏志庫傉官氏改為庫氏則是苦故切之庫又有二族矣竒姓通收入去聲禡韻從舍音按式夜切字從廠苦故切字從廣自是兩字兩讀因章懷注雙引之混不可辨耳六丁祭酒舊不一二年輒遷去春秋丁祭無過四者順治中淄川高念東侍郎珩為祭酒久不遷一日至閣洪文襄承疇戲謂曰高先生可謂五丁開山矣高笑對曰無妨六丁六甲果三年始遷去豫在成均迄四載始遷少詹戲為口占寄先生云嘉話曽聞役六丁任教人笑鈍司成六丁今日還加二始信前賢畏後生然此官清簡實宜恬靜南史邱靈鞠有言人居官願數遷使我終身為祭酒不恨也獨學舍稟給皆久廢用兵已來捐資者率許在籍肄業期滿該省布政使司徑送吏部銓授雍中人才寥寥素餐為慙耳偏諸治安策今民賣僮者為之繡衣絲履偏諸緣又云白縠之表薄紈之裏緁以偏諸服注曰如牙條以作履緣顔曰偏諸若今之織成以為要襻及標領者也杜詩客從西北來遺我翠織成注引廣雅天竺有細織成宋書禮志諸織成衣帽錦帳純金銀器雲母從廣一寸以上皆為禁物高麗史獻織成衣襖弓劔按子美詩題乃太子張舍人遺織成褥段蓋褥帳衣帽要襻標領皆有織成而偏諸以為衣履之緣者乃織成之一耳銀杏鄉大夫有好為雅談者問鄰縣一友人云聞貴鄉多銀杏然否友人不應問再三不已旁人皆匿笑終不悟蓋銀杏淫行音同也又江淮間一御史疏陳水患內云臣鄉下流之下流人亦𫝊以為笑趙康敏夀光趙康敏公訥故第為裔孫所鬻屢易主矣居者每見朱衣人於堂中輒病後某官張姓者居之初入宅復見朱衣人悲叱咄唶張設拜遙謂之曰公子孫自不肖不能守先業此宅且數易主人與某無與公生名卿何不達而屢此見祟耶言甫畢朱衣以袂掩面入壁而沒自是不復見墨芍藥館陶人家有墨芍藥與曹州黑牡丹皆異種邵進士三世姻同年濟寧邵士梅字嶧暉順治辛卯舉人登己亥進士自記前生為栖霞人姓高名東海又其妻某氏死時自言當三世為夫婦再世當生館陶董家所居濵河河曲第三家君異時官罷後獨寓蕭寺翻佛經時訪我於此後謁選得登州府教授一日檄署栖霞教諭暇日訪東海故居已不存求得其孫某為置田宅已而遷吳江知縣謝病歸殊無聊賴有同年知館陶縣因訪之館於蕭寺寺有藏經一部寂寥中取閲之忽憶妻語隨沿河覔之果得董姓者於河曲第三家家有女未字邵告以故且求縣宰縱臾遂娶焉後十餘年董病且死與邵訣曰此去當生襄陽王氏所居濵江門前有二栁樹君幾年後訪我於此與君當再合生二子邵記其言康熙己未在京師時屢為豫及同年傅侍御彤臣扆潘吏部陳伏揚言言之賽從儉文登人賽從儉卜地葬親於黃山南有鄰某者陰圖其地夜遺地主金老嫗赴塋忽迷失道有二童子執炬前曰嫗欲往賽氏塋乎吾為嫗導中途謂曰此地誠善但汝家不能有賽氏當世科第天啓之也言已忽不見嫗乃在海港中及覔路至塋所則既葬矣嫗悔述其故從儉曰汝言果不妄吾子孫有仕宦者即以十金贈書其言於券末後從儉知三河縣子孫多仕郡縣皆不負約康熙丙午元旦五更時近村人遙見塋前有二炬繞行曽孫玉紘以是秋舉鄉試明年登第己酉元旦復然玉紘子璋以是秋舉鄉試明年登第劉大成天啓中文登生員劉大成以儒醫耆德為鄉黨所推董修學宮鑿泮池得一石函啓之有女骼叉釧為徙瘞北城隍上次日復得一瓶中貯竹漿外勒八語云濱人花母劉支竹漿一匕濟人廣嗣功長南文焕發北屋城隍妥豫之靈云云自後劉以竹漿施病者輒愈享年八十餘生六子諸孫科第甚衆二狠石京口北固山甘露寺有狠石臨潼驪山亦有狠石皇甫湜狠石銘曰狠石蒼蒼驪山之旁昔秦皇帝謀之不臧七十萬人兹焉遑遑是也今人但知甘露寺矣舞蠅虎書言百獸率舞𫝊記所載如舞馬舞象舞鸞舞鶴之屬不一杜陽雜編載唐穆宗朝或云憲宗飛龍士韓志和本倭國人於御前出一桐木合方數寸中以丹砂養蠅虎子其形盡赤分為五隊令舞梁州上召國樂以舉其曲蠅虎盤回宛轉無不中節每遇致詞處則隱隱如蠅聲曲終纍纍而退若有尊卑等級者然又續癸辛雜志臨安呈水嬉者以大斛貯水小銅鑼為節凡龜鱉鰍魚之類皆名呼之即浮水面戴戲具而舞觀此則蟲豸水族皆能舞不獨鳥獸矣水蠶吾鄉山蠶食椒椿槲柘諸木葉而成繭各從其名故相國益都沚亭孫公廷銓作山蠶說曲盡物性文多不録唐小說載元和八年大軫國貢神錦衾水蠶絲所成云其國以五色石甃池塘採大柘葉飼蠶於池中始生若蚊睫游泳其間及長可五六寸池中有挺荷蠶經十五日即跳入荷中成繭自然五色亦謂靈泉絲山蠶水蠶皆物産之異熱洛河盧氏雜說明皇射鹿取血煎酪賜哥舒翰及安祿山謂之熱洛河祿山帳下健兒名曵落河恐因字音相近而傅㑹其說今齊魯間以蕎麥作麵食名河洛俚名亦有所本老神仙獻賊軍中有老神仙者本鄧州陳氏子少遊終南遇一道士授異術能生死人後為獻賊所得賊監軍孫可望被酒刃其嬖妾以刀圭藥投之立起於是賊中呼為神仙既而獻賊誤刃其愛妾洞脅潰腹復俾陳活之納其腸以針紉之傅以藥夾以木版以繩約之七日而蘇獻賊敗入滇以病死蹇少保明少保薊遼總督蹇公達字汝上四川巴縣人自記前兩世為某衛指揮以墜馬死往生山西某府趙氏名某登進士官至重慶太守與邑紳蹇公來譽善一日蹇設席召守飲守方坐堂皇聞吏白蹇公有使邀請即出就輿甫出門見大河阻路方異之若有人推墜河中驚而寤室廬非故而形軀已小在䙀褓中家人報蹇公入視曰男也繼又𫝊報趙太守以痰病死矣蹇公為出涕自往護其喪尋送夫人及二子歸里心皆了了然無可奈何以義斷割早成嘉靖乙丑進士自禮部郎出為故郡太守兩子已長以通家禮來謁欲言不可姑隱忍之惟時時存恤其家居三年遷山東提學副使乃詣故居致辭夫人請見不禁泣下夫人亦泣以通家故不知固即其夫也及兩子送至境始屏人告以前生事執手泣别而訣賀相國明相國對揚賀公逢聖崇禎中枚卜詣京師舟至九江之鱘魚嘴風浪大作公具袍笏拜禱舟上人忽見空中有緋衣神人執一黑鬼投水中風遽息公設祭大王廟以答神祐自是香火益盛日宰羊豕無算十三年蘄王欲興復溈仰道場延三昧律師入楚過九江夢神告曰某九江神宋大王也前生與師及賀相公三人同在山中修道師不昧正因今為大師賀以福緣為宰相唯某一念之差為血食之神昨因鱘魚嘴樹妖欲覆賀舟某以前世因救之緣此宰殺日繁將來必墮無間地獄師明日過此必至廟中為我授記更布其事於四方使來禱祀者戒宰殺幸甚師如其言自是鱘魚嘴行旅坦然矣此與冷齊夜話所記弄亭湖神託安息國王子建洪州大安寺事相類張道人商邱高辛鎮有道人嘗周游歸德屬邑貌類少壯雖長老自童幼見之形容不改莫知其年自云張姓鹿邑人居少林若干年武當若干年勞山若干年屈指百數十年矣一日募修某祠廟需石灰千斤人問所出曰自有之忽至一寡婦姑媳門求布施以孀且貧辭道人曰門前槐樹旁有灰三千斤何云無也如其言掘之果然或問曰渠先祖建樓所餘我常見之其家不知也頗能前知有問之者則曰我是顛子我是顛子日可行三百里崇禎末袁賊亂梁宋間致道人縛置地上驅所掠婦女裸體淫之遂敗其道日行僅百五六十里亦穀食矣語人曰譬桶子已破再篐便難日者宜興陳其年維嵩年四十餘尚為諸生一日過京口有日者謂之曰君年過五十必入翰林宣城梅杓司磊因贈以詩曰朝來日者橋邊過為許功名似馬周至己未果以諸生應博學宏詞薦授翰林院檢討時五十六又有范騋者字文園善相人謂武進周清原吳江徐釚皆當不由科甲入翰林己未皆授簡討其言良驗范海寧人驤字文白之弟也龍異康熙壬子嵗吾邑李鹺副仲默鴻雷家日正午忽有一物蜿蜒數尺鱗鬛可畏遍體如金色爛然奪目自院中入所居之室已復出形漸長大知其龍也忽雲霧滃然如烟雲庭中晦冥遂不見伊中丞翕菴闢云荷蘭刀劔康熙六年荷蘭國入貢其貢物有刀劔八枚皆可屈伸縈繞如帶劔俠𫝊載种諤畜一劔可屈置盒中縱之復直張景陽七命論劔曰若其靈寶則舒屈無方斯之謂歟銅人聞西洋人欽天監管理監事加工部侍郎南懷仁言自大西洋入中國凡十萬里海舶甚巨海口有銅人高不知其幾由旬舶出其胯下或出其脅間乃入海洋不知何由鑄造也山溪烈婦旌德縣地曰山溪有民家女某氏嫁甫數月夫死無子又無舅姑伯叔遂歸母家誓不更適人久之其父母私受鄉人聘旦夕且娶女覺之自請於父母父母不能隱遂告以故女欣然曰嫁則嫁矣明日當一辭夫墓耳許之乃歸房中晨起理糚易新衣內衣皆自縫紉行至溪上時山水暴漲女顧之喜至橋半急踊身入水死乘流數里罥岸樹而止有石工某見之欲褫其衣衣結不可解忽以手自批其頰曰吾以父母欲奪吾節而死汝小人輒敢無狀吾褫汝魄矣語畢而死觀者莫不歎異父母為合葬故夫墓焉張巡妾徐藹字吉人㑹稽諸生年二十五得瘕疾痛不可忍年餘瘕能作人言瀕死時見一白衣少婦問曰君識張睢陽殺妾事乎君前生為睢陽吾即睢陽之妾也君為忠臣吾有何罪殺之以饗士卒吾尋君十三世矣君世為名臣不能報復今甫得雪吾恨言訖婦不見藹亦隨逝庚申在京師其門人范思敬說童謡萬厯壬子山東鄉試濟南童謡云三人兩小太陽離島是科解元乃長山徐海曙日升也又某科有童謡云山佳木一旦挑上天差我送羊角是科解元平度崔桓也康熙庚子又有童謡云一裹針三條絲是科解元新城李嗣真解副益都高三思也天啓辛酉朱純領解亦有一牛兩尾之謡趙廷鑨順治甲午有某生者應試濟南瀕入闈其僕忽死但胸前微暖及出闈僕忽蹶然而起生問之云適隨主人入棘闈見號舍有紅黃二色旗主人所居之舍則紅旗也生喜曰果爾當娶某氏女妻汝僕難之生曰吾既為孝亷何慮彼不嫁其女乎既入二場其僕又死如前比出復蘇連呼可惜可惜生急問之曰主人已中解額因昨日一言今易萊陽趙廷鑨矣生然疑且半私心悔之及榜發榜尾一人即萊陽趙廷鑨也御馬供奉周道言御廄有千里馬毛色純黑惟顱及四蹄白長可一丈腹有逆鱗高麗所貢也顧東橋何元朗叢說載分宜嘗邀顧東橋樂工盈庭六七十人東橋顧從人賞銀五錢遣之明日邀六卿則聽命如小生賞賜各二三兩比年各省督撫中丞宴監司賞伶人多至四十金或六十金視分宜當日不啻什倍矣斷腸草康熙庚申春有徽人方姓者商於都門與其徒八人合資纍千金往江南次河間之南腰跕宿焉其八人者與騾夫先食方以齊素獨後忽一人且食且語曰斷腸草如是者三方怪而問之曰君知食中有斷腸草乎宜勿食其人曰然隨視騾夫已如中惡狀仆地矣方急呼衆人皆停筯而身自走通衢呼集居人召醫視之曰中毒也急解之皆蘇而騾夫食獨多遂不救方因問某曰食時若有人在後告以斷腸草者三聽其語隨出諸口初不自知也諸商欲鳴之官居人力凂之僅以百金賂騾綱其主人竟漏網道路間不可不知恪妃世祖皇帝恪妃石氏灤州人户部侍郎申之女也申父維嶽明萬厯庚戌進士官某省副使㑹王府中官某鴆其王反誣其妃某弒逆撫按以下皆納其賄將具獄矣維嶽獨持不可力雪妃寃至是申生恪妃竟入宫掖人以為妃之報云河套喇嘛嘉禾談舟石吉璁延綏鎮志云套中最尚佛教距榆林三百里外為砑抱山山左有水曰河泥津果勒右有泉曰博囉烏蘇中有寺曰堵王延袤可十里兩水環其前而合流其地名曰拜甡社寺中住持則班迪達喇嘛也寺一門二殿門名哈勒哈殿亦覆以琉璃瓦殿名薩藏中塑大喇嘛像傍皆供藏佛第二殿名堵王中亦塑大喇嘛像稱曰布爾罕巴勒弟子譯言佛與祖師也楹之東為蓮花佛佛身高二尺頂湧一菡萏長可五寸許製甚巧有機捩之開便成蓮菂上坐一三首佛花瓣中亦各有一佛卧焉楹之西為馬頭佛一佛坐以俟馬頭佛頸中掛三十六鬼頭數珠貌甚獰惡當面飛來若欲撲噬狀坐佛作歡喜容仰手舒臂迎之復以兩足鈎出其後是曰佛度而鬼頭者皆以銀鑿成也傍皆供小藏佛設木龕三層大小參差無數四壁皆畫天神及諸菩薩而金剛者長不過二尺餘就次於東西墉下左刀矛右幡幢少北皆虞置柱黃金塗梁間懸纓絡結成花勝者四殿立四柱空其中如樓不庋板垂四阿而室則十二開窗牖於上若重屋然殿後有塔名蘇巴爾罕即大喇嘛蛻骨處山之半創一小殿名蘇默繚以周垣南啓一門東西與北皆有配殿殿中供者名瓦窰聖類牟尼左供斡齊爾瑪伊特類普賢右供和霜博迪蘇類觀音其山無石而有石子套部長以潔白圓潤者人各集一堆名鄂博高丈餘列山上自王以下皆有嵗之初夏作醮或三日或一月前期以佛頭如盂者銀足承之盛水用酒或白糖供於殿上佛頭盂骨厚可寸許不類人之髑髏也經有三卷皆梵文誦或以百計以千計亦時時作樂樂器俱用銀以人脛骨作管銀筒承其上下吹之聲如清角誦經畢取佛頭盂中水人以匙分之自口至頂用手婆娑為獲福矣復用柏樹一枝綴五色小旗并刻木作刀劔弓矢植於堆上或其主有逺行則以一矢告反亦如之皆插於柏樹之傍其鏃或以金銀為之任其朽人不敢犯時或旱潦亦往祈焉旱則喇嘛手頂以瓷鉢水禱於山以口噀之雨如期至或雨時喇嘛曰此中不須雨亦以頂水噀之雨即分雲而下潦則左手指間搢一小紅旗掌中托一小淨水瓶右手捻訣而前至山上口誦梵語雨即止或有病誦經以禳兼以小紅丸藥救之即愈或其人中鬼以頂骨數珠壓其頂或繞其中指是人即發顫自呼伏曰某鬼為祟頂骨數珠者以高僧頂骨中取圓厚如碁者為之其數亦一百八云其徒可三百人戒行亦與浮圖相似但所飲食者乳湩牛羊耳池北偶談卷二十四
