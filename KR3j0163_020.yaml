body:
  text: 池北偶談卷二十刑部尚書王士禎撰博羅韓氏女明末廣州亂後有周生者市得一袴丹縠鮮好置牀側衣桁上夜分将寢忽一好女子搴幃驚問之曰妾非人也生懼趨出比曉鄰里聞之競乘偵視聞有人聲自袴中出若近若逺久之形漸見姿首綽約若在輕塵曰妾博羅韓氏女也城陷被賊俘擄橫見凌逼罵賊而死此袴平生所著故附之以來諸公倘見憐愍為作佛事當徃生淨土永脱輪迴言訖嗚咽衆共歎異乃為召僧禮佛焚袴自是遂絶程職方石臞説章格菴黄州曹石霞𦙍昌崇禎己夘解元癸未進士以文章名世父卒官順寜旅櫬未返萬里入滇順寜有民家生一兒七嵗不言一日忽語父曰楚人曹石霞吾門生也今日至此當往見之家人疑怪不信兒輒自往父母尾之至通衢果有肩輿來者兒從稠人中直前止其輿字而呼之曰石霞吾待汝久矣曹愕然兒又曰此地未可語當至邸舍告汝既至邸兒又曰可屏人闔戸如其言兒南向坐曰我章格菴正宸也一念之誤三墮輪迴始在豫繼在粤在此候汝又數年矣今可隨我去乎曹歎訝再拜曰某以父櫬未返𦵏間闗萬里逺涉南荒未能即從夫子請俟異日兒黙然久之曰然則吾先行待汝耳遂至其家是夕死矣曹賦詩紀異不數月竟卒於順寜其子以櫬歸至某郡忽重不可舉視其壁上乃有曹入滇時弔洪半石天祿詩洪亦黄人藁𦵏於此乃啟洪竁禱於櫬前請同歸𦵏於是遂行楊職方鄂州兆傑説道君畫鷹楊職方又言武昌張氏有子婦為狐所媚百計驅之不獲一日置酒召客張宣和御筆畫鷹於堂上比客去狐夜分始至云幾不免婦問之狐曰汝家堂上有神鷹見我即奮欲摶擊微項有鐵絙将不免矣質明狐去婦以語其夫或謂之曰畫誠神物曷爇去其絙狐必不敢復至矣如其言至夕果有狐擊死堂下後其家遭回祿共見鷹從火中飛去道州祠堂道州有濓溪先生祠堂近嵗周氏子孫有為諸生逋賦者州守張大成遼東人徑詣祠堂枷鎖先生像三日見諸彈章比年呉中奏銷逋税唐荆川繆西谿諸公名列官戸亦不免云劉雲山劉雲山常州醫也康熙丙午杭州有巨室子某病亟忽有一醫到門曰我呉人劉雲山也投一七而霍然贈之金不受曰他日尋我於毘陵之司徒廟巷踰月某至常詢問廟側有老人曰雲山死三十七年矣顧雲山生時信鬼神曾授夢於斯廟之神募地廣其祠宇因自為像於神旁尚可識其形容也巨室子驚愕入拜其像宛然哭祭而去陳椒峯玉璂記其事趵突泉異濟南趵突泉地中涌出三尺許餘則方塘漫流清鑑毛髮康熙庚戌藩臬置酒邀提督楊宫保捷忽大雷雨龍首入戸泉涌起丈餘水大上諸公急呼騎水頃刻及馬腹踣墜而死者數人從來未有之異也陳玉笥濟寜陳益修字玉笥恂恂君子也明崇禎末濟寜有回回楊生花等素豪猾武㫁鄉里一旦欲毁闗忠義祠廟擴其居㕓陳號召諸生鳴於官懲首事者廟得以存及鼎革之際生花挾舊憾帥其黨邀陳於天井閘箠之瀕死仍以刀刓其睛啖之以礦灰實目眶棄諸野外家人舁歸謂必無生理矣至夜陳昏憒中見綠衣神人强之以酒外青内白痛稍差次夜後見一神人以手擊其腦後目中血出如注痛良已又次夜見一老嫗食以杏李又以羊眼盈把令口吸之比覺雙瞳烱然矣生花及其姪樸乘亂為盜族誅去陳事纔八月也陳乙酉與弟尚謙同舉省試丙戌登第官貴池知縣仕至戸部主事予在京師見之錦裙宋繡陸魯望云瓦官寺有陳叔寳羊車一輪天后錦裙一幅予在金陵遊上瓦官寺猶見錦裙所製幡裙紺碧色錦作雲龍紋四角綴十二鈴焦山枯木堂有宋刻絲觀世音像亦竒古六足龜暹羅國進貢有六足龜十枚比至京師止存其三其足前二後四趺趾相連予在主客時見之按龜三足曰賁羅漢予在海陵一士夫家見毘盧國僧號羅漢自言明英宗土木之變始入中國能風雪中裸體而浴一日席上有胡桃羅漢以齒碎之凡數十枚舊住通州之軍山以遷濱海界徙居海陵髙郵守某之祖傳有小像一軸像上畫一老僧相向坐自記此僧名羅漢毘盧國人一日守聞軍山有毘盧僧心疑即其人試往謁乃與畫上老僧了無差别葢已閲三世百年矣丙丁龜鑑丙午丁未從古以為厄嵗隂陽家云丙丁屬火遇午未而盛故隂極必戰亢而有悔也康熙丙午冬戸部尚書蘓納海督撫尚書王登聫等搆死丁未春災祲疊見彗星出太白晝見白眚出西北經月餘是嵗七月輔臣蘓克薩哈誅死吾友程職方謂予欲裒輯前史所載丙丁災變徴應為一書頃見宋理宗淳祐中柴望所上丙丁龜鑑十卷自秦荘襄王五十二年丙午迄五季後漢天福十二年丁未通一千二百六十載中為丙午丁未者二十有一備摭事實系以論㫁元至正中又有續丙丁龜鑑者補宋元事之闕前人已有此書當考據故明三百年中丙丁事應以續二書之後白烏康熙庚戌六合縣民王振家庭樹産白烏二督府麻勒吉表進於朝竒姓予在儀曹時見有宛平人碧某者吏誤呼作碧其人不應問之云碧音如樊此萬姓統譜竒姓通諸書所不載者又任給事琪云髙密有高姓音閦又禚姓音卓諸城有則姓音支又壽光有鱉姓河南有驢姓吾邑有俳姓壬子典試四川有副榜庹謀音拓明有指揮八通副将九聚近見山西鄉試榜有峯姓因姓古銅器庚戌臨淄人於古城畊田得銅器數百枚形製瑰異白諸官悉取入藩庫無從考其欵識殊可惜也辛亥春京師草場火火燼得石數千百皆有峯巒之形不測其故又明末河南鄢陵人浚城壕得石數百皆有人物鬚眉宛然或謂恐傷地脉掩覆之後有兵地震定數宋小説載崔公誼為鄚州任丘簿熙寜初河北地震而公誼秩滿挈家南歸一日宿孫村馬鋪中風電陰黒夜半有急叩門者云傳語崔主簿君合係地震壓殺人數輒敢擅逃過河今已收魂岱嶽到家速來崔自度必死乃兼程送妻孥至壽陽次日遂卒康熙戊申山東地大震莒州尤甚莒與日照縣鄰地震之夜凡日照人客莒者皆從崩壓中得不死莒人客日照者皆死信有定數己未七月京師地震通州尤甚死者凡數百人梨花漁人㑹稽姜鐵夫梗説其鄉近嵗有漁人獨居無家室所居有梨花數十樹人呼為梨花漁人一夜月明放舟湖中聞岸上有人呼渡移船近之未抵岸其人已在舟中矣視之尼也年可十七八衣縞而姿首甚麗詰所從來不應将及家登岸穿林冉冉而去漁人心知非人明日晚歸燈火熒然則尼已先在室中矣漁人稍疑懼尼曰我非人也居湖邊某村父母自幼送我為尼今年月日死以與君有夙緣故來相從且君當得佳婦亦須我為作合幸勿訝也自此鷄鳴而去夜即復來如是将一載鄰里皆聞漁人室有異香里中某氏有女及笄一日忽有鬼物憑之言禍福多竒中且云汝女病惟某漁人善醫且夙緣當為某婦否者死矣其父母懼邀漁人至其家漁人不知所以固辭歸迨暮尼復來告曰我與君夙緣已盡當從此辭此女當為君婦祟即我所為君何為耶漁人誼不負心因與盟誓尼感動泣下亦不復强明日漁人以告女之父母鬼遂不至不數月漁人竟卒麟宋荔裳琬觀察説其鄉趙鵬程者官彰徳太守府庫中有一麟相傳明武宗時土人所獲誤斃之以獻於官貯庫中趙任滿欲取之吏不可乃㫁其一脛攜歸毛作黃色紋理如刻畫蹄通明類黃玊宋常見之慶忌萊人張允恭明天啟壬戌進士為南陽守浚河役夫夜宿岸側聞橋下每夜有哭聲共伺之乃一巨鼈因置鐵鑊烹之忽鑊中人語曰勿殺我我當利汝衆懼益烈其火少頃無所聞啟視之鼈已死剖腹得一小人長數寸許眉目宛然以獻於守攜之歸識者謂即管子涸澤之精名曰慶忌是也康熙壬子嵗濟南人炰鼈亦於腹中得小人如回回状人多見之楊李隋末酸棗邑所進玊李一夕忽長清陰數畆是夕院中人聞空中語云李木當茂帝欲伐之左右曰木德來助之應也不可伐又楊梅玉李同時結實帝問二果孰勝院中人曰楊梅雖好不及玉李之甘帝嘆曰惡楊好李豈人情哉又民間歌云河南楊花落河北李花榮楊花飛去落何處李花結果自然成南唐将受呉禪江西楊化為李信州李生連理其亊前後略同又釣磯立談載武義中童謡云江北楊花作飛雪江南李樹玉團枝李花結子可憐在不似楊花無了期與隋謡亦相類記前生同年濟寜邵嶧輝士梅自記前生為寜海州人纎細不爽後以己亥登進士為登州教官親至所居里訪其子得之為謀生計且教之讀書為諸生又自知官止縣令及遷呉江縣知縣遂辭疾歸又其妻早卒邵知其再生館陶某氏俟其髫而聘之復為夫婦河南張給事文光能記三生事李御史嵩陽樂安李貢士煥章皆能記前生事此耳目覩記之尤著者萬維嶽順天萬維嶽嵩中順治丁酉京畿解元康熙庚戌成進士其入學題乃夫子循循然善誘人食餼則博我以文約我以禮丁酉領解首題即顔淵喟然章明年世祖御試題則克已復禮為仁自謂平生與復聖有因緣比庚戌㑹試三書題無顔子語自謂當落第榜發中式房師乃儀制主事曲阜顔修來光敏也丁貞女丁貞女聊城之沙鎮人靖難功臣某裔也貞女幼孤無兄弟依母以居及笄母欲議婚貞女曰母老矣又鮮兄弟不願適人願終身養母母不能强及母卒從兄某為議婚貞女又不許獨處三十餘年年五十矣閨範嚴肅里中人咸稱曰貞女堂邑黃中丞圖安七十喪偶聞貞女之名遣聘焉貞女先一日召其從兄語曰明日當有議婚者至吾将許之兄及娣姪輩謾應弗之信也詰旦黃氏蹇修已及門先是貞女縞衣數十年是日乃易色服既許字卜吉𦵏母始于歸黃氏猶處子也中外子孫多人待之皆有恩禮東昌人傳為美談魏舎人妾魏舎人麟徴納妾京師甫一月妾病且殆求歸母家已而延魏至榻前操呉音曰某前生姑蘓人君前生逋吾五十金今來索償事畢矣此去當生平陽某氏年十八即中甲科復與君有後緣語訖而逝此康熙辛亥春正月事也莫如孫侍郎退谷先生説昔為祥符令有人發一古冢乃東漢馬武妾𦵏處中有石即武為其妾自製誌文甚古字畫精絶又有香奩一具中貯脂粉皆宛然奩底一小銅印鐫妾莫如三字印在孫處碑歸張給事文光家今不知所在急就篇有解莫如之句注云漢有毛莫如義臝同年張鶴洲行人吾瑾嘗乘一臝甚愛之康熙甲辰鶴洲以科場事下刑部饘粥不繼乃以臝抵逋于人一日過市酸嘶悲鳴墮其新主而逸歸張邸稍近之輒蹄齧不已家兄考功為賦義臝行嗚呼此臝勝華歆賈充褚淵六臣之徒多矣龍睛呉江金文通公之俊生時母夫人夢人告曰與汝子龍睛将來位極人臣公大拜後蕭山瞽者陳生善相人試令相之曰乞兒相也衆駭笑已而至目大驚曰此龍睛也當位極人臣衆乃服能改齋漫錄載陸農師言曽魯公得龍脊王安石得龍睛追寫真宋憲使荔裳琬幼失恃每憶母夫人形容輒泣下呉門某生者自言有術能追寫真人殁數十年皆可得其神似乃令設壇淨室中自書符咒三日陳丹青紙筆令宋禮拜出扃鐍其戸戒毋譁比夜忽聞屋瓦有聲已夜分聞擲筆於地鏗然屋瓦復有聲生乃開戸引視之燈燭熒然丹青縱橫筆落地上而紙仍緘封未啓啓視則像已就宛然如生宋捧持悲泣重酬之生云過六十年則不復可追也蘓穀原逌旃璅言云澶淵宋僉憲敬夫幼失怙不識父形容請方海山人貌之持歸家母夫人視之如生悲不自勝世或有此理耳善謔京師有市猾某者本騾馬行牙人以附黃臕李至巨富一日堂成讌士大夫壁間有孔竇客疑問之答曰手脚眼也葢工匠登降攀附置手足處宋荔裳在坐應聲曰吾有對句矣乃頭口牙也合坐大笑又萊人某者以散官居旗常狎一婦婦齧其舌持赴刑部令急騎追之宋適往視戲曰君所謂駟不及舌前定世事莫非前定所云動乎四體有不知其所以然者往予在淮南好觀棧道圖有興化顧生符稹工此技妙入毫髮予令畫絹素屏扇凡十數自為長歌題之復以其一贈姊夫劉大田倬既而予有入蜀之役同行即劉君也辛亥嵗在京師沈文恪繹堂荃為侍讀以小冊索書予為書陸放翁詩云殘年作客遍天涯下馬郵亭便似家三疊凄涼渭城曲數枝閒澹閬中花擘牋授簡相逢晚理髩薫衣一笑譁俱是邯鄲枕中夢墜鞭不用憶京華比入蜀宿閬中乃憶前事真詩讖也因賦一詩寄沈葭萌闗外極天涯長憶西園夜鬭茶萬事輸他前定在今朝真看閬中花曩丁未嵗四月二十九夜夢中得絶句云溪鋪翡翠映煙空溪上飛橋落彩虹愛玩花叢憶元相一枝渾卧碧流中既覺不知所謂末句則元微之使東川所賦亞枝紅詩也至是過褒城亦騐予己酉奉使淮上過奉髙閲泰安州志至嬴博字輒心惡之辛亥壬子遂連遭渾沂兩兒之痛入蜀時過百牢關作一詩懷諸兄結押廬字忽心動曰廬廬居也得勿不祥乎又閲劔南詩有云成都放榜第一人楊姓具慶下愴然有感又心惡之比榜放解元果楊兆龍也心益動時先慈宜人已見背予在萬里外未知也昔阮孝緒於鍾山聽講母王忽病兄弟将召之母曰孝緒至性冥通必當自到果心驚而返信有是哉工人善琴萬厯末詹𢡟舉者守潁州偶召木工詹適彈琴工立戸外矯首畫指若議其善否者呼問之曰頗善此乎曰然使之彈工即鼔前曲一過甚妙詹大驚異詰所自工曰家在西郭外往見一老人貿薪入城擔頭常囊此因請觀之聞其彈心復悦之遂受學耳詹予以金不受曰某賤工也受工之直而已又曰公琴皆下材工有琴即老人所貽今以獻公果良琴也詹乃從竟學一時琴師莫能及盧昭容古月頭陀歙人胡姓名明勲字半菴順治丙戌居京口兩膝忽患瘍痛入骨髓數日宛成人面眉目口鼻皆具易醫一百三十餘人瀕死者數矣辛卯十二月七日瘡忽人言曰我梁時盧昭容也子害我於洛陽宮今日報汝醫何能為詣佛懴悔可耳既甦即謝醫發願書經書水懴至九卷遂杖而起終三十六卷復閉闗書法華經華嚴經各一部遂能行又書湼槃經金光明經心地觀經報恩經金剛經凡五百萬字瘡竟愈後在真州有降乩者書盧昭容邀半菴與㑹自畫生時像首飾鳯髻衣宮衣問半菴洛陽宮相見今似否胡為悚然胡天啟中官中書舎人嘗收左忠毅公骸骨云義虎汾州孝義縣狐岐山多虎明嘉靖中一樵人朝行失足墮虎穴見兩虎子卧穴内深數丈不得出徬徨待死日将晡虎來銜一生麋飼其子既復以餕予樵樵懼甚自度必不免迨昧爽虎躍去暮歸飼子復以餕與樵如是月餘漸與虎狎一日虎負子出樵夫號曰大王救我須臾虎復入俛首就樵樵遂騎而騰上置叢箐中樵復跪告曰蒙大王活我今相失懼不免他患幸導我通衢死不忘報虎又引之前至大道旁樵泣拜曰蒙大王厚恩無以報歸當畜一豚縣西郭外郵亭下以候大王某日日中當至無忘也虎頷之至日虎先期至不見樵遂入郭居民噪逐生致之告縣樵聞之奔詣縣㕔抱虎痛哭曰大王以赴約來耶虎㸃頭樵曰我為大王請命不得願以死從大王語罷虎淚下如雨觀者數千人莫不歎息知縣萊陽人某也急趣釋之驅至亭下投以豚大嚼顧樵再三而去因名其亭曰義虎亭宋荔裳琬作義虎行王于一猷定作義虎傳紀其事客氏刺順治己亥在京師於慈仁寺市見鬻故書者賣一敝刺大書客氏拜三字寳應朱國楨克生以三錢得之賦客氏行予笑曰使當天啟時此一紙過詔㫖逺矣驨先太師公曾於塞上得馬一角按爾雅驨如馬一角注元康八年九真郡獵得一獸大如馬一角角如鹿茸即驨也王㑹圖有俞人之雖馬注雖馬一角來陽伯來陽伯復三原人神於醫尤多技術常使人脱靴脛隨之長幾丈許靴亦如之尤精女紅官呉中時刺繡之妙呉中閨閣無能及者來三原人萬厯中進士官至布政使啖石仙人煑石世但傳其語耳予家傭人王嘉祿者少居勞山中獨坐數年遂絶煙火惟啖石為飯渇即飲溪澗中水遍身毛生寸許後以母老歸家漸火食毛遂脱落然時時以石為飯毎取一石映日視之即知其味甘鹹辛苦以巨桶盛水掛齒上盤旋如風後母終不知所往周府馴虎先祖方伯公為河南按察使時周王府有馴虎日惟啖豆腐數斤猛虎如此何異騶虞楊世榮楊世榮者汾陽人以鬻器為生夜夢人告之曰汝富貴至矣覺則身忽長二丈餘一衣須布十八疋每食啖一烝羊用一鐡鞭重百六十斤鄒平張方伯毓泰時知縣事錄為民壮後遷寜武道以之自隨㑹流賊亂每步戰殺賊賊皆披靡以積功至參将鼎革後不知所終金蟇先太師舊有金蝦蟇一枚崇禎辛未潰卒陷城一賊得之置腰間輒爬其腹如是者數四賊怒擊破之有白氣冲天而去劉張二仙劉吏部公㦷體仁劉先生傳云劉任字𢎞父潁川人生而一瞳子正方登隆慶丁卯賢書嘗著唐巾衣淺紅窄衫乘駿馬挾彈林薄間一日謂家人曰仙伯期我海上某日暫還題一詩有明白來時明白去君看直北起雙鳬之句遂瞑後十五年有故人從燕中來者云見先生書一詩於西山蘭若僧曰日者一先輩畱此亦時時往來寺中問其状則先生也遲寺中數日待之不復至矣又同里張葵孝亷者髮長等身無一莖異七嵗時讀書樓上忽一黃冠來告曰從吾步空下即仙矣葵有難色黃冠叱之即能步空下居城東十里許一日有道士服過之者曰吾望氣而來乃子耶幸勿墮落遂别去然張竟無他異鳩食麥康熙癸丑吾邑旱東山曹村有鳩千百成羣食麥近羽孽也蟙䘃硯張華東公延登崇禎丁丑三月遊泰山宿大汶口偶行飯至河濵見水中光芒甚異出之則一石可尺許背負一小蝠一蠶腹下蝠近百飛者伏者肉羽如生蠶右天然有小凹可以受水下方正受墨公製為硯名曰多福硯銘之云泰山所鍾汶水所浴堅勁似鐵溫瑩如玉化而為􅴄生生百族不假雕飾天然古綠用以作硯龍尾繼躅文字之祥自求多福爾雅蝙蝠服翼郭璞注齊人呼為蟙䘃因又名之曰蟙䘃硯公門人劉文正理順馬文忠世竒夏考功允彜髙中丞名衡諸公皆為銘贊亦竒物也荆州鏡寃荆州有某氏子素亡賴一日於後圃築牆夜夢一美女子前拜曰妾在地下數百載矣修煉將成明日大刼懼不可逃惟君救之妾胸前有古鏡一枚君慎勿取但為妾復掩其藏誓報厚徳覺而厯厯能記明日集畚鍤掘地未丈許果得一棺發之中有女子古糚靚服顔色如生胸前有鏡方圓數寸寒光射人毛髮某憶夢中語欲掩之其僕曰鏡必有異第取何害某遂取之女子忽化為灰燼某駭甚遽掩其棺是夜復夢女子泣告曰吾煉形已成為汝所敗然自刼數應爾於汝何尤汝但珍䕶吾鏡吾當福汝某遂寳鏡䖍奉之鏡時時有聲一旦女子來曰楊相公開府江陵思得竒才共濟此功名之秋也試往軍門獻䇿吾當助汝時武陵楊相國督師駐荆某信其言遂往上謁楊公與之語某談兵料敵髙議縱橫不可窮詰公竒之延致幕中每有戎機輒與㕘決将聞於朝官之一日某以小過箠其僕僕竟死方在幕府不知為計女子忽至曰無傷也君但請暫歸休沐輿尸以出吾能䕶汝如其言至轅門忽輿中血出如注軍校輩驚視之得僕屍馳報府中召某問之但云罪當死既而語以兵事亦懵然不復能對公怒究其故某始對以女子所敎已都不知今鏡尚在公命取鏡鏡忽作大聲飛去自是女子不復至矣某竟瘐死獄中鄭禮部次公日奎在成都説池北偶談卷二十
