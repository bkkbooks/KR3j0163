body:
  text: 池北偶談卷十八刑部尚書王士禎撰明宣宗畫豫嘗見明宣宗畫黑猿一軸有御筆題云鎮守廣西都督山雲所進圖中一橫木猿臂挂其上不解何謂一日豫門人常熟錢玉友良擇從粵東來云嶺外有黑猿大不盈尺二臂相通寐則臂挂於橫木上一臂漸縮一臂漸長所謂通臂猿也乃知畫貴格物婦人畫近日婦人工畫者海寧李因是菴善畫松鷹及水墨花竹翎毛江陰周禧善人物花鳥其妹祜與之頡頏義烏倪仁吉秀水黃媛介皆工山水木石桐城方維儀白描大士張登集國史補稱張登小賦有織成隱起往往蹙金之狀托言亦云如蹙金結繡而無痕迹王彥輔云曾在汴京相國寺得唐漳州刺史張登文集六卷權文公為序云詩賦之外雜文合一百二十篇又云求居寄别懷人三賦與證相一篇意有所激鏘然玉振然所得書肆鏤版裁六十六篇已亡其半彥輔欲續姚鉉文粹録登之文不果惜也朝鮮採風録康熙十七年命一等侍衛狼瞫頒孝昭皇后尊諡於朝鮮因令采東國詩歸奏吳人孫致彌副行撰朝鮮採風録皆近體詩也今擇其可誦者粗載於此林悌詩十五越溪女羞人無語别歸來掩重門泣向梨花月閨怨羸驂馱倦客日暮發黃州可惜踏青節未登浮碧樓佳人金縷曲江水木蘭舟寂寂生陽館孤燈夜似秋中和道中白光勳詩秋草前朝寺殘碑學士文千年自流水落日見孤雲𢎞景廢寺偶因休浣到沙門把酒題詩古寺存紅藕一池風滿院亂蟬千樹雨連村深慚皓首從羈宦猶喜青山似故園聞説錦湖煙景異何時歸棹問真源奉恩寺吳時鳯詩地即黃岡勝官如玉局間居然小雪日喚作此堂顔小雪堂金宏弼詩處獨居間絶往還只呼明月照清寒憑君莫話生涯事萬頃煙波數疊山書懷趙昱詩十年長掩故山扉塵土東華幾染衣想得鑑湖春夜月子規應喚不如歸贈鑑湖主人薑克誠詩江日曉未生蒼茫千里霧但聞柔櫓聲不見舟行處湖堂早起鄭碏詩逺逺沙上人初疑雙白鷺臨風忽橫笛廖亮江天暮聞笛成運詩江觸春樓走天和雪嶺圍雲從詩筆染鳥拂酒筵飛浮海知今是趨名悟昨非松風當夕起蕭颯動荷衣竹西樓白光勉詩旅泊依村日重遊屬暮年鐘聲隔岸寺人語渡湖船月上蒹葭逺煙橫島嶼連夜深風更急落雁不成眠縣津晚泊金宗直詩偶到仙槎寺巗空松桂秋鸜翻羅代蓋龍蹴佛天幽細雨僧縫衲寒江客􅋈舟孤雲書帶草獵獵滿池頭仙槎寺為訪招提境松間紫翠重青山半邊雨落日上方鐘語共居僧軟杯隨客意濃頽然一榻上相對鬢髼鬆佛國寺竒邁詩南山松柏幽北山煙霧深遊子暮何之庭樹生秋陰歸雲向遙岑宿鳥棲前林幽懷杳不極清風吹我襟直禁咏懷鄭道傳詩曉日出海東直照孤島中夫子一片心正與此日同相去曠千載嗚呼感豫衷毛髮豎如竹凜凜吹英風嗚呼島弔田橫魚無迹詩馬上逢新雪孤城欲閉時漸能消酒力渾欲凍吟髭落日無留景栖禽不定枝灞橋驢背興應與故人期逢雪權應仁詩結屋倚青嶂㩦瓶盛碧溪徑因穿竹細籬為見山低枕石巾粘蘚栽花屐印泥繁華夢不到間味在幽栖山居趙希逸詩春寒料峭酒微醒羈宦連年恨不平燈暗小窗聞馬齕夢回孤枕數雞鳴祇憑吾友論交道欲向何人説世情已判此身同許國與君終始寸心明次延曙都郵韻鴨水西邊是漢關天扃地鐍限重灣荒煙亂磧麟州戍落日孤雲馬耳山風定空江波瀲瀲雪消春郭溜潺潺思家未得平安字歸思惟應夢往還龍灣偶成金􅣌詩楊花落盡草萋萋楚客傷離思轉悽佳節一年寒食過亂山千疉子規啼虞翻去國身全老王粲登樓賦漫題想得天涯回白首昭陽江上夕陽低寄友李達詩二妃昔追帝南奔湘水間有淚寄湘竹至今湘竹斑雲深九疑廟日落蒼梧山餘恨在江水滔滔去不還斑竹怨鄭士龍詩隨意攤書坐孤吟對晚暉岸風帆腹飽洲雨荻芽肥籬缺通江色簾垂礙燕飛誰知采蘭節和病試春衣釋悶鄭之升詩細草間花水上亭緑楊如畫掩春城無人為唱陽關曲獨有青山送我行留别崔慶昌詩危石才交一徑通白雲千古祕仙蹤橋南橋北無人問落木寒流萬壑同武陵溪水岸依依楊栁多小船遙聽采蓮歌紅衣落盡秋風起日暮芳洲生白波采蓮曲栁永吉詩落葉鳴廊夜雨懸佛燈明滅客無眠仙山一躡傷遲暮烏帽欺人二十年福泉寺金質忠詩常苦愁腸日九回忽驚啼鳥報春來三年藥物人猶病一夜雨聲花盡開世事紛紛難自了天機衮衮遞相催平生久負凌雲氣怊悵如今半已摧病出湖堂林億齡詩寂寞荒村隱少微蕭條石徑接柴扉身同流水世間出夢作白鷗江上飛山擁客窗雲入座雨侵書榻葉投幃飄然又作抽簪計塵土何由化素衣送友還山崔夀峸詩老猿失其羣落日古槎上兀坐首不回想聽千山響題畫金淨詩江南殘夢日懨懨愁逐年華日日添雙燕來時春欲暮杏花微雨下重簾江南春思鄭知常詩桃花紅雨燕呢喃繞屋春山間翠嵐一頂烏紗慵不整醉眠花塢夢江南醉後偰遜詩一夜山中雨風吹屋上茅不知溪水長祇覺釣船高山中雨李植詩春風急水下輕艭朝發驪陽暮漢江篙子熟眠雙櫓靜青山無數過船窗泊漢江權遇詩衙罷乘間出郭西殘僧古寺路高低祭星壇畔春風早紅杏半開山鳥啼竹長寺許筠詩重簾隱映日西斜小院回廊曲曲遮疑是趙昌新畫就竹間雙鶴坐秋花晚咏朴瀰題平壤館壁西京古迹詩三十首遺田儀曹其六云檀下神人始此都至今遺廟古城隅不知當日阿實達亦有攀髯墮者無一太師杖軼筆猶存舊事鴻濛未足言惟有青山三尺墓東人須與孔林論二周家井制出鄒賢猶是其詳不得傳試向含毬門外望平郊十里是商田三丹絡元非赤土宜清泉何事涌中逵鹿盧汲取瓊漿飲千載令人説太師四高句驪起漢鴻嘉宫殿遺墟草樹遮怊悵乙支文德死國亡非為後庭花五朝天片石出江潯麟窟苔封草樹深怊悵天孫何處去野棠花發古祠陰六又送詔使還京師詩序并載於左皇上紀元之十七年戊午上駟武備二大人頒大行皇后諡於下國時則不佞謬膺寡君儐命之托馳迓龍灣因護其行抵王京二大人傳宣帝命以寡君有疾停郊迎儀前度使臣之回奏也小邦君臣且感且悸惟是飲冰之行莫肯虛徐請少留而不可得時值大歉公私未立殆不能備供億之禮二大人大加傷一革浮費所索者惟詩文與書法而已寡君命朝紳或製或寫以應槖中所齎蕭然若寒士前此所未有也武備公仍將兩朝宸翰示不佞暨都監諸官其書曰正大光明者即先皇帝筆今皇帝手書跋尾者也其曰清慎勤今皇帝筆也生龍活蛟之蜿蜒銀鈎鐵畫之徑健真可以參造化驚風雨跋語珠光玉潔自有不可掩之華蓋公世懋勳庸錫豫蕃庶最以此珍玩不以出疆而舍之云海外鯫生非蒙天使眷顧則亦何途之從而獲此大觀也哉自臨境至回斾首尾四十有二日不佞又伴至鴨緑江上大人徴詩若序要作他日不忘之資顧不佞素短於章句重以筮仕數十載勞攘簿書拋棄翰墨自慚不足以副大人之勤教也辭之益固命之益懇因略敘其槩兼呈篇什以供一粲云爾詩五言十韻有云紙上風雷隱毫端造化竒城路風旌掣滄江鼓角悲云云伴送使資憲大夫行司憲府大司憲兼成均館大司成廣州後人歸巗李元楨致彌後登戊辰進士改庶吉士神韻汾陽孔文谷天胤云詩以達性然須清逺為尚薛西原論詩獨取謝康樂王摩詰孟浩然韋應物言白雲抱幽石緑篠媚清漣清也表靈物莫賞藴真誰為傳逺也何必絲與竹山水有清音景昃鳴禽集水木湛清華清逺兼之也總其妙在神韻矣神韻二字豫向論詩首為學人拈出不知先見於此梅詩宋梅聖俞初變西崑之體豫每與施愚山侍讀言及宛陵集施輒不應蓋意不滿梅詩也一日豫曰扁舟洞庭去落日松江宿此誰語愚山曰韋蘇州劉文房耶豫曰乃公鄉人梅聖俞也愚山為爽然久之周嬰巵言周嬰字方叔莆田人撰巵林十卷援據該博偶記其數條可資詩話者如石尤風引元相詩罔象睢盱頻逞怪石尤翻動忽成災義山古意詩去夢隨川后來風佇石郵以石郵對川后蓋竒相飛廉之屬又古咄唶歌棗適今日賜誰當仰視之引方言云賜盡也潘嶽西征賦若循環之無賜維摩詰經如來鉢飯悉飽衆會猶故不賜太平廣記引啓顔録山東人謂盡為賜是也又光明經食已飽足飯不消瀃瀃與賜同豫按集韻儩盡也見釋典瀃泄水門南史有石瀃杼山詩應思石瀃訪春泉石瀃清心胸不云盡義又楊用修曰唐人云君苗無姓宛委餘編曰君苗姓應瑒之從弟見文選注非也按陸雲與兄平原書云前作登臺賦極未能成而崔君苗作之又云君苗作愁霖賦極佳見兄文輒云欲燒筆研曹志苗之婦公其婦與兒皆能作文頃借其釋詢二十七卷當百餘紙寫之則君苗清河族也休璉與二陸相距且百年其從弟安得尚存復修少年鉛槧事耶又高似孫緯略金樓子云劉子玄為水仙花賦時人謂不減洛神豫固不敢望知幾云云按金樓子者梁元帝也劉子玄知幾也知幾在證聖中作史通二十卷後以名類玄宗改名子玄在元帝後百餘年矣御覽引金樓子云劉休玄為水仙賦云云是南宋南平王鑠也水仙乃水上神女陶𢎞景亦有賦高氏以休玄為子玄以水仙為花名豈不謬歟此類數十條皆足解頤胡元瑞陳晦伯作正楊筆叢等書以駁用修方叔作廣陳諗胡尤為楊氏功臣豫按以休玄為子玄正如書家以劉德升為景升也常棣叶韻詩常棣兄弟鬩于墻外禦其侮每有良朋蒸也無戎劉原父七經小傳云戎疑當作戍戍亦禦也吳才老補音云務字古人讀作蒙疑侮當作雺以叶戎童子問載朱子云戎汝二字古人通用是叶音汝也如南仲太祖太師皇父整我六師以修我戎亦叶汝也豫按三説當以原父為長中晚詩句北齊房君豹有山池在歷城參軍尹孝逸將還鄴詞人餞宿於此自為詩曰風淪歷城水月倚華山樹時人以比謝氏此自北齊詩詩紀未采詩藪誤作中唐且訛華山為華陽方叔正之是矣至云猿啼洞庭樹人在木蘭舟句格近六朝而方叔疵之謂是晚唐面目則謬甚吳郡皇甫少玄百泉兄弟論詩以此二語為五言極則藝苑流傳焉可誣也一鳴集唐司空圖一鳴集十卷雜著八卷碑版二卷前有自序云所撰密史别編又有絶麟集述亦其自著也其與王駕論詩曰國初雅風特盛沈宋始興之後傑出於江寧宏肆於李杜右丞蘇州趣味澄敻如清沇之貫逵大厯十數公抑又其次元白力勍而氣孱乃都市豪估耳又與李生論詩曰江嶺之南凡是資於適口者若醯非不酸也止於酸而已若鹺非不鹹也止於鹹而已酸鹹之外醇美者有所乏耳王右丞韋蘇州澄淡精緻格在其中豈妨於遒舉哉晚唐詩以表聖為冠觀此二書持論可見其所詣矣官銜官銜二字習俗相沿不識其義家語禮運篇云官有銜職有序注銜治也執轡篇云古之銜天下者以六官總治焉故曰銜四馬者執六轡銜天下者正六官官銜之義本此封氏聞見記云銓曹聞奏之時先書舊官品於前次書擬官於後使新舊相銜不斷如人口銜物又如馬之有銜以制其首古人謂銜尾相屬即其義也此臆説殊無所據邵潛邵潛字潛夫自號五嶽外臣南通州人性傲僻不諧俗好嫚罵人人多惡之及與李本寧鄒彥吉黃貞父陳仲醇諸公遊所著友誼録循吏傳印史諸書多可傳者年五十無子娶後妻成久之嫌其貧老棄去一婢又為勢豪所奪遂隻身客如臯城西門年八十矣康熙乙巳豫過臯訪之茅屋三間黝黑如漆邵筋骨如鐵白髮鬖鬖被領雙眸炯然具果䔩留豫飲尚盡數觴與修禊冒氏洗鉢池尚能與豫輩賦詩陳其年維嵩云古今文人多窮然未有如邵先生者聽其言愴然如劉孝標所自序也豫去廣陵聞邵即以是歲下世矣沈嘉客沈嘉客字無謀河間故城人居鄭口性孤迥有潔癖與德州盧德水侍御世漼臨清汪未央孝廉大年交好以詩相倡和於吳交姚孟長希孟楊子常􅉓顧麟士夢於梁交吳讓伯伯裔徐霖蒼作霖與容城孫鍾元竒逢尤善中年作閉關疏送客不出籬落一畝之宫花竹清深圖書充牣縣令至必式廬復其徭役年八十餘乃卒豫嘗愛其一絶云淮南作客逢春雨破帽疲驢幾日程六合城南呼舴艋緑陰相送到南京名媛詩周嬰方叔極稱辨博然有不必辨者如詮鍾辨文明太后青臺雀歌杜蘭香贈張碩詩數條不知名媛詩歸乃吳下人偽託鍾談名字非真出二公之手何足深辨又向來坊間有明詩歸更俚鄙可笑亦託名竟陵又足辨耶坊刻又有皇明通紀亦託名鍾惺內載左都御史曹思誠為魏忠賢建祠事曹近刋寃揭云與惺素無仇怨惺何不自惺等語不知惺殁於天啓乙丑而坊賈偽託之也曹氏遍訴京師與鍾為難可發一笑此康熙二十年事去鍾之殁已五十七年矣七子三獨夫陸機五等諸侯論六臣犯其弱綱七子衝其漏網吕向注七子謂吳王濞七國劉更生傳春秋地震為在位執政太盛也不為三獨夫動亦明矣師古曰獨夫猶言匹夫也七子三獨夫皆竒文二王詩畫金陵王槩字安節善畫山水其兄蓍字宓草工花卉翎毛兄弟皆能詩往往可誦蓍本名尸槩本名丐後改今名嘗見槩兩篇云虛窗吮筆臨秋水葭菼蒼蒼冷到天為愛芙蓉江月好小亭長伴鷺絲眠又潯陽江水抱城流庾亮曾經此夜遊亦是新涼當八月遂教高會擅千秋風騷接席無今古喬梓凌雲富唱酬傑閣共傳詩句好飛揚興不減南樓槩詩人方文爾止壻也王右丞詩世謂王右丞畫雪中芭蕉其詩亦然如九江楓樹幾回青一片揚州五湖白下連用蘭陵鎮富春郭石頭城諸地名皆寥逺不相屬大抵古人詩畫只取興會神到若刻舟緣木求之失其指矣契丹大金二國志契丹國志二十七卷宋淳熙七年祕書丞葉隆禮奉詔撰進其書帝紀十二卷后妃諸王外戚傳三卷列傳四卷石晉降表宋澶淵誓書關南誓書議割地界書共一卷南北朝饋獻禮物外國貢獻一卷四京州縣沿革一卷風俗官制科舉等一卷王沂公富鄭公行程録一卷張舜民使北記等一卷諸番雜記歲時雜記二卷又大金國志四十卷宋端平元年淮西歸正人改授承事郎工部架閣宇文懋昭上其書帝紀二十六卷開國功臣一卷文學二卷張邦昌録一卷劉豫録一卷立偽楚偽齊册文宋宗室隨二帝北狩一卷兩京制度陵廟儀衛官制科舉兵制等四卷兩國誓書一卷京府州縣一卷初興風俗一卷許亢宗行程録一卷金志記載與南遷録多相合與史多謬其文學傳則全節取元好問中州集或云宋人偽造似也契丹志簡淨可觀金志則仿其書而為之者耳王義山詩豫向謂劉後村詩好用本朝人事近見宋末王義山稼村集效顰尤可厭如爭道老泉生二秀最難錦水又三劉師魯僅存遺集在樂天無限故人思田園彭澤菊三徑意思濂溪草一般上帝遣符徴范鎮斯民失怙哭溫公梅花窗下參同契緑草庭前太極圖榜文爭看乖崖押士類歡呼常衮來無己許令參後社庭堅端的是前身有時覓句尋歐約不慣斟羔學黨家此真下劣詩魔惡道坌出矣宋末如王義山何夢桂之流酸腐庸下而詩文獨傳至今文之傳不傳信有命耶杜注國初選家注杜主宋紹興吳若季海本若自序云凡稱樊者樊晃小集也稱晉者開運二年官書也稱荆者王介甫四選也稱宋者宋景文也稱陳者陳無己也稱刋及一作者黃魯直朝以道諸本也又宋胡仔苕溪漁隱云子美集豫所見者凡八家杜工部小集則潤州刺史樊晃所序也注杜工部集則內翰王原叔洙所注也吳彥高集云是元祐間祕閣校對黃本鄧忠臣慎思所注託名原叔改正王內翰注則王寧祖也補注杜工部集則學士薛夢符也校定杜工部集則黃長睿伯思也重編少陵先生集并正異則東萊蔡興宗也注杜詩補遺正謬集則城南杜田也少陵詩譜則縉雲鮑彪也王承旨詩宋刻鑒戒録載前蜀興聖太子隨軍王承旨失其名詠後主出降詩云蜀朝昏主出降時銜璧牽羊倒繫旗二十萬軍齊拱手更無一箇是男兒此與花蘂夫人詩大同小異必有一誤此詩能改齋漫録亦兩載之盧延讓何光逺鑒戒録載王蜀盧侍郎延讓獻王建詩卷中有栗爆燒氊破貓跳觸鼎翻之句後建與潘峭在內殿平章邊事令宫人於爐中煨栗栗爆出燒損繡褥子建多疑每於爐中燒金鼎子惟徐妃二姊妹侍茶湯而已是夜宫貓誤觸鼎翻建曰栗爆燒氊破貓跳觸鼎翻憶延讓詩有此一聯先輩裁詩信無虛境來日遂有六行之拜自給事拜工部以俚鄙之詞遂獲顯擢與孟公松月夜窗虛迥異如此人生窮通豈非命乎或云是盧延遜獻宋太宗詩潘峭作潘美慈恩塔詩元白因傳香於慈恩寺塔下忽覩章先輩八元詩吟咏竟日悉令除去諸家之詩惟留章作其五六句云回梯暗踏如穿洞絶頂初攀似出籠殊不成語不知元白何以心折如此盛唐高岑子美諸公同登慈恩寺塔賦詩或云秋色從東來蒼然滿關中五陵北原上萬古青濛濛岑或云秋風昨夜至秦塞多清曠千里何蒼蒼五陵鬱相望高或云秦山忽破碎涇渭不可求俯視但一氣焉能辨皇州杜此是何等氣槩視章作真小兒號嗄耳每思高岑杜輩同登慈恩塔高李杜輩同登吹臺一時大敵旗鼓相當恨不厠身其間為執鞭弭之役陶季寶應布衣陶􅊹字季一字昭萬有著舟車集豫為刪定其客湖南閩中諸詩多似高岑龍標今日一作手也過東阿曹子建墓有句云可憐衰草地猶是建安人為時所稱琉球二僧詩琉球天王寺有僧號瘦梅道人賦七夕詩云陶公簾外赤龍下漢武殿前青鳥來又萬松院僧不羈有詩云黃葉落三徑白雲歸數峯豫門人汪翰林舟次楫林舍人石來麟焻康熙癸亥奉使其國見之石來有詩云瘦梅道者人不識梵夾吟題聳兩肩賦得赤龍青鳥句樊南甲乙可同傳浮屠亦有不羈人祗樹蕭蕭絶世塵唐體詩中風格好白雲黃葉鬬清新詩三百非孔子所刪孔子但正樂使各得其所而已未嘗刪詩觀自衛返魯云云可見且一則曰詩三百再則曰誦詩三百家語對哀公問郊亦曰臣聞誦詩三百不可以一獻知古詩本來有三百篇非孔氏自刪定也又左傳列國卿大夫燕饗賦詩率皆三百篇中之詩多在孔氏之前其非夫子手刪了然可見葉水心習學記言云史記言古詩三千孔安國亦言刪詩為三百篇按詩周及諸侯用為樂章今載於左氏者皆史官先所采定就有逸詩殊少矣不待孔子而後刪十取一也論語稱詩三百本謂古人已具之詩不應指其自刪者言之也輔廣亦謂司馬遷言古詩三千傳聞之誤其説與豫見略同敏速南唐近事載處士史虛白嘗對客奕旁令學徒四五輩各秉紙筆先定題目隨口而書略不停綴數食之間衆製皆就封氏聞見記雒縣尉張陟在中書日試萬言令善書者三十人各操紙執筆俱占題目身自巡席依題口授周而復始午後詩筆俱成得七千餘字唐詩紀事長沙王璘日試萬言崔詹事廉問表薦於朝先試之璘請十吏皆給筆札璘口授十吏筆不停綴首題黃河賦三千字復為鳥散餘花落詩二十首皆可謂敏速矣又韋臯嘗於二十四化設醮請符載撰齋詞於時飲摩訶池上載命小吏十二人捧硯人分兩題緩步池間各授口占其敏如此石敬瑭家廟碑朱簡討云曾於廟市見五代石敬瑭家廟碑梁周翰撰文翰雖不甚工亦是古物惜未購之此碑石今不知所在東絹蜀鹽亭縣有鵝溪縣出絹謂之鵝溪絹亦名東絹子美詩我有一匹好東絹是也周紫芝詩百尺寒松老幹枯韋郎筆妙古今無何如莫掃鵝溪絹留取天吳紫鳯圖此雖諧謔然北征自作於赴行在時而題韋偃畫松則在入蜀之後固不可同日語也魏野詩宋小説載魏野同寇萊公遊陜郊某寺詩云若得時將紅袖拂也應勝似碧紗籠湘山野録云添蘇長安名姬也孫僅尹京兆日野寄詩云見説添蘇亞蘇小隨軒應是珮珊珊孫愛之以示添蘇喜如獲寶求善筆札者大署其詩於壁野以事抵長安孫邀置府宅人未之知也有好事者與密過添蘇家見其風貌魯質固不前席野忽舉頭見壁所題乃索筆於側别紀一絶云誰人把我狂詩句寫向添蘇繡户中間暇若將紅袖拂還應勝得碧紗籠添蘇始知是野大加禮敬二説不同鐵帆僧鐵帆能詩順治末豫官揚州鐵帆住木蘭寺劉吏部公勇體仁聞之寄豫書云是天寒衣衲重鐵帆耶天寒衣衲重乃粵僧一靈句公勇誤記耳東坡在黃日參寥往視之京師士大夫寄書云聞有僧在彼是隔林倣佛聞機杼和尚耶坡笑語參寥云此是吾師七字號公勇帖全用此語徐曹詩徐禎卿洞庭葉未下瀟湘秋欲生一篇非太白不能作千古絶調也曹學佺亦有秦淮送别一篇云疏籬豆花雨逺水荻蘆煙忽弄月中笛欲開江上船情致殆不減徐徐五集中有一絶云渺渺太湖秋水濶扁舟搖動碧琉璃松陵不隔東南望楓落寒塘露酒旗曹一絶可以相敵新林浦云夾岸人家映栁條玄暉遺迹草蕭蕭曾為一夜青山客未得無情過板橋題壁逸詩豫少時與先兄考功同上公車每到驛亭輒題素壁筆墨狼藉率不存稿逸去多矣數年來往往從友人口中得之恍忽如夢不忍盡割略記於此河口花明錦纜春砑繚綾子領邊巾不知何事牽儂思欲疉紅箋賦洛神徐隱君東癡嘗口誦此詩不見湘中舊汜人西園蘭石愴如新低佪十五年前句祗有蛛絲絡暗塵彭少宰孫遹羡門誦之關河連夜雨驛路一聲蟬湯右曾西崖王戩孟穀誦之風回邸閣聞鈴馱日落關山見戍旗倣佛夢中尋蜀道打包身度棧雲西徐學士健菴誦之且題其右云古驛斜陽聽鐸聲分明棧路蜀山行讀君題句成先讖天遣才人過錦城往迹流傳本事詩草年如夢不堪思重來頭白風情盡誰記巡簷繞柱時汪耀麟叔定誦之趙北燕南水四圍此中避地可忘機垂垂芡實迎秋熟拍拍鷗羣接翅飛蟹舍都連黃篾舫釣人相映緑蓑衣淮南小别今三載魚稻珠湖願竟違曹祭酒未峨嵋榜旅舍曰漁洋詩屋白洪崖先世父侍御公崇禎中巡視茶馬作西巡雜詩數十首有云不須赤打白洪崖豫幼誦之不解為何語頃見丁謂戲白稹詩云五百青蚨兩家缺赤洪崖打白洪崖蓋用此論坡谷許彥周詩話云東坡詩不可輕議詞源如長江大河飄沙卷沫枯槎束薪蘭舟繡鷁皆隨流矣珍泉幽澗澄澤靈沼無一點塵滓只是體不似江河耳林艾軒論蘇黃云譬如丈夫見客大踏步便出去若女子便有許多糚裹此坡谷之别也明史樂府長洲尤展成侗晚以博學宏詞入史館在局中仿李西涯體作明史樂府百篇佳處殆不減李今略載數首於此作佳傳云入學宫辭孔子衣帶題詩自經死出史局别同官官方飼豬不暇看一死一生交情見留與若翁作佳傳閣門使云閣門使鐵簡賜谷長史兼理六王事當局不敢讓臣誼應如是殿下百世後難逃一箇字下詔獄徽髮死嗟乎此真文成子張辟強豚犬耳生程濟云為忠臣為智士死高翔生程濟身免乎軍中祭君免乎宫中剃君乘車臣執轡君登舟臣操枻寒則燎衣飢持糒四海從亡多故人道旁相見惟流涕萬水千山風復雨送君還上金陵去天外龍蛇有日歸鴻飛冥冥不知處靖難云七國反誅家令灌將軍出山東定北平起討齊黃曹國公出金陵亡建文君非景帝燕王亦非吳王濞靖難雖然百戰功成敗何常總天意太祖生男二十五為王為庶知誰主燕子高飛上帝畿紇干凍雀無毛羽可憐高煦亦英雄頃刻燒死銅缸中威武大將軍云平陽侯張公子威武大將軍三君一轍耳漢家天子自待邊大同宣府往復還朕稱將軍封萬戶驃騎當屬江與錢旌旗獵獵向北駐樓船搖搖望南渡豹房家裏樂未終更覓春江花月處朝登牛首山夕宿鳯皇臺鄱陽凱歌何雄哉戎服簪花金銀牌揚鞭却指隋堤笑一狩江都竟不回大禮云明倫典問誰作唱者璁和者萼筆者方削者霍浹與綰唯且諾天子有私臣朝中皆黨人武夫何知咄郭勛配爾祖英烈傳中山􅌓眙開平歎根本彗云根本彗腹心彗門庭彗羣妖掃地偷龍睡彗未退兮孛將至大馮君小馮君忠臣孝子出一門刺血上書動至尊但看六月飛霜雪君門之彗乃可滅河套寃云嚴夏兩家雞相鬬曾銑仇鸞分左右嚴雞方勝夏雞孤銑欲劾鸞胡為乎套未復身先死朝璽書墓西市將軍橫尸何足言宰相駢首寧無寃君莫哭君不見朱仙鎮上風波獄長生藥云五利戮文成死致一真人上天去復有紫府神霄兩高士天子齋居日夜禱祠相公宿直爭獻青詞赭衣半道斷首滿稽殺人媚天修玄奚為四十五年元氣削王金方進長生藥海瑞疏云世宗在位四十五建言諸臣盡圜土末年乃有海瑞疏直訐乘輿干上怒擲地不已繞殿步忠臣豈肯逃亡去大行賓天應釋汝獄吏酒肴相勞苦但願飽啖得死所誰知晏駕驚聞訃此日方看臣哭主當時尚擬子罵父逐新鄭云華亭去分宜江陵逐新鄭賢否故懸殊門戶總同釁主少國疑賴元老一留一去由馮保宰相踉蹌出午門先皇顧命寒秋草大臣獄起重驚倒不憐身殁無遺表夫人泣涕致相公敬為故夫獻微寶富貴何常忽易人江陵簿録還如掃噫嘻乎前人跌後人滑古來名位多相軋死姚崇算生張説趙高傳云委鬼當頭坐茄花滿地紅趙嬈曹節竟私通涿州道上馬遊龍月華門前車鬬風內操撾鼓鳴刀弓犴狴流血朝班空祠堂昭德兼崇功乾兒義子多如蟲讀史至此再三歎殆哉岌岌將作難滿朝彈章君不見中宫獨看趙高傳闈中詩淄川袁孝廉松籬名士也以康熙癸卯冠禮經壬戌尚困公車闈中賦詩云二十年前古戰場卧聽譙鼓夜茫茫三條畫燭連心爇一徑寒風透骨涼若向緇塵埋鬢髮憑誰青眼託文章明宵别後長安月偏照河橋栁萬行武康陳孝廉興公之羣吟之至泣下是科袁竟下第乙丑病蠱卒無羊之什詩國風如燕燕蒹葭豳風東山七月諸篇述情賦景如化工之肖物即如小雅無羊之什云或降於阿或飲於池或寢或訛爾牧來思何蓑何笠或負其餱麾之以肱畢來既升即使史道碩戴嵩畫手擅場未能至此後人如何著筆池北偶談卷十八
