body:
  text: 池北偶談卷二十二刑部尚書王士禎撰銀瓦寺古鏡謝郎中方山重輝言明末德州修河堤於銀瓦寺前地中得古鏡一規製甚小照見隔城樓閣塔寺人物往來纎毫畢具寺僧深匿之今亡短人田少司寇漪亭雯言德州兵器庫自明季扃鐍久順治初有司開視之於室奧壁下見一短人身才尺許形如老翁遍體有毛左膝長跪左手垂而拳右足履地右肘拊膝而手承頤鬚髮皓白攢眉閉目若悲苦之狀頃之雷電繞屋失所在嶗山道士嶗山又名勞山在即墨界山中多一二百嵗人有髙密張生者讀書道觀觀有老道士形貌怪醜執樵蘇之役張意忽之一日買二牛其家去山百餘里苦無人遣送方躊躇頃道士忽謂張曰君似有所思得勿以牛故耶吾為君送之張異其言逡巡已失牛比歸問家人曰某日某時有道人送二牛至憶其時正立談頃也自是知非常人頗禮之又一日張為其徒說周易道人從窗外聽之呼曰君所述皆俗說試叩之名理出人意表生受其學遂以說易擅東方一日薄暮大雷雨震電張閉門從窗隙中見天神數百輩圍繞道士房如作禮狀驚愕不敢喘息比達曙雨止開門視之道士門已反鐍寂無人矣是夜山中道觀數十百處皆見道士焉宋孝亷數學雲間宋孝亷幼清懋澄副都御史直方徴輿父也精數學直方生時預書一紙緘付夫人曰是子中進士後乃啓視之至順治四年丁亥捷南宮開前緘有一行字云此兒三十年後當事新朝官至三品壽止五十後果於康熙丙午以宗人府丞遷副都御史至三品明年丁未卒官年正五十也又嘗與淮南白孝亷同年友善白亦精數學一日晨起謂夫人曰今年九月某日白兄當死渠無子我當渡江取别為治後事遂買舟渡江比至白已候門迎笑曰我固知兄今日必來相送遂閉門相對痛飲數日至期白無病而逝先生為治後事畢乃歸歸謂夫人曰白兄事已完吾明年三月亦當逝矣如期而卒宋有九籥集如稗官家劉東山杜十娘等事皆集中所載也張谷山張谷山潁州人日與小兒嬉戲人不知其有道者也張有表兄客薊州一日除夕嫂方製餛飩祀先念夫而歎谷山在側曰嫂無憂吾為嫂今日一至兄所請寄餛飩為信潁去薊二千餘里日未移晷已返云適至薊見兄亡恙嫂笑其妄谷山探懷出家書及夫昔所絮衣云此豈妄耶自是人始驚其神異後入武當山不知所終遺二陶器盛夏盛肉不腐此與萬回事相類劉公㦷吏部說陶松雲陶松雲者居吳江自謂少時遇許旌陽謂曰吾弟子三十餘人皆在下界汝其一也今命汝以度人為功行汝其慎之常有一士夫往謁陶求養生術陶語人曰此人不久當死安望長生問其故云凡人作虧心事一事則神縮一寸今觀此君神才數寸耳竟如其言李神仙利津李神仙者占卜射覆多竒中霑化李吉津宮詹呈祥在京師一日問李前程事李書一聫云洗耳自同髙士潔披襟不讓大王雄後半載宮詹以建言流徙出關途次永平有一秀才迎道側具刺自言貧苦求資助視其名則髙士潔也大駭歎及出關一守備王姓素受宮詹恩聞公至逺來相送因為誦前詩及第六句王駭曰雄即某小字也李公太息以為定數不爽如此至康熙元年詔許生還李公一日偶舉此事語長洲尤太史展成侗尤又駭曰此詩乃某昔年戲作論語詩中之一也李今已老尚往來燕趙齊魯間洞庭神宋牧仲犖言其鄉梁中翰遂奉使西粵時道出洞庭風日晴明呼風而渡忽雷雨驟至雲氣晝晦舟中人共見一神人美鬚髯戴烏紗巾騎異獸行水上獸身半在波濤中僅露頭角後一人形貌怪偉銜獸尾而行其速如飛去船里許人獸皆漸騰上雲雨晦冥遂不復見舟人以為洞庭之神也梁丙戌進士後官山東提學道僉事雷侍御子井研胡菊潭相國世安嘗說其邑雷侍御某為縣令時生一子八嵗而夭後復生一子年七八嵗一日晨睡不醒喚久之乃覺自云適見其兄來呼入一山似非人境且贈之詩云三生未了塵凡業一夕初完渾沌胎紫氣臺前千劫盡白羅天外百花開正吟末句忽云父母喚汝可去為我致問安好也髙念東侍郎說前知郭學憲諫福山人兵部尚書君弼先生宗臯曾孫言其縣人劉某少雲遊四方餘二十年始歸明末山東亂諸郡縣皆嚴守禦縣令召劉問休咎劉云城必無恙守亦得不守亦得然某必死兵令笑曰城既無恙汝但留城中何患劉曰數定矣不可逃也遂辭去至城西一村村人皆避兵他徙劉獨止不去適有兩人避兵過之劉指東路曰此去直東凡有山林處皆可避即途遇敵騎毋恐必無害兩人强之同行不可但云明日覓我骸骨於村西某樹下即兩君報我矣疾走勿復顧兩人不得已趨去道遇鐵騎絡繹竟免俘執兵去如約訪之果死樹下矣城亦無恙乃告於令葬之地震康熙戊申六月十七日戌刻山東江南浙江河南諸省同時地大震而山東之沂莒郯三州縣尤甚郯之馬頭鎮死傷數千人地裂山潰沙水湧出水中多有魚蟹之屬又天鼓鳴鐘鼓自鳴淮北沭陽人白日見一龍騰起金鱗爛然時方晴明無雲氣云梁尚書鄢陵梁尚書廷棟官陜西一日按部河州有通官四人迎於道左其一人望見梁公股栗伏地比至稱病不謁梁怪之勒令出見一見怒甚即核其交通外彛侵冒軍實罪狀劾而殺之將服刑告人曰吾死固矣吾少時至一山寺見寺僧饒於資吾以計殺而掠之今三十餘年矣頃望見梁公之貌宛然僧也又一目眇吾死固矣尚書從孫曰緝侍御熙說劉尚書琴鄢陵刑部尚書劉公訒前刑書璟子也性嗜琴嘗蓄一蕉葉琴其輕如蟬翼蓋古物也一日晝寢初覺見一黃衣人坐而鼓之其聲絶妙起視則無所覩矣公自是琴理益精河南亂後失琴所在王祭酒吾郡厯城明翰林王公敕字雲芝成化甲辰進士及第第三人諸生時讀書卧牛山寺夜見地有火光發之得石匣匣有書二冊讀之遂能御風出神知未來休咎生平異事甚多嘗與僧采枸杞山上僧先下扣門公已先在啓扃官河南四川督學試日諸生見銷院窗廡各有一公危坐一日見白雲一片命騎追之雲落地化為石色如雪煮食之其甘如飴曰此雲母也行輝縣山中忽下輿拜曰丈乃在此令掘地得竒石置之百泉書院又於道左古垣中開視得紫石硯二枚各有鴛鴦一隻雌雄相向嘗云地如竹篩眼凡有異寶皆可見又采杞僧臨終公問所欲曰欲富貴兼之公曰但可作一藩王耳朱書其背曰蜀王比王生第二子背上隱隱有書字尹恭簡旻寢疾問之曰有大鶴入室飛旋已而揚去公之神也果然官終南國子祭酒預知死期怛化時四城門皆見公羽衣鶴氅而去如雲水道人鄉人於良鄉道中遇鼓吹從南來視之乃公也王陽明素推服之張尚書鶴鳴為作傳先贈司徒公生時大父方伯贈司徒公取公名名之民母鼻子民母嫡母也見漢服䖍注又王伯厚漢制考云始生子為鼻子倉頡倉頡祠墓在壽光縣城西門瀕河劉丈和公珝縣人也幼時讀書外孰每往返涉水輒有白鬚老人負之久之問何人答曰我倉頡所遣迎送公者他日富貴毋相忘公既貴後謁倉頡祠有侍者形容宛如所見遂新其祠墓云靖州雞鵝靖州觀音寺與副將某署相鄰一日厨人宰鵝鵝忽飛上寺殿鴟尾僧異之因乞施寺中每朝夕課誦鵝輒上殿諦聽日食蔬飲水而已自順治中至今二十餘年尚在又明季寺有一雞亦在佛前晨夕聽經如是四十年化去一夕見夢老僧曰弟子已往生武岡王府三年後師可來一相視僧異其言及期往武岡郡王生子適三嵗矣不能言見老僧至忽問訊曰别師三載無恙乎僧歸紀其事於石有吳君者從軍湖南至寺親見之蠢動俱含佛性信然趙解元趙浮山作舟登州大嵩衛人順治甲午領解乙未公車入京師居汾陽館館中㕔事有武安王神像趙居其側偶狎一妓其父趙翁曾官通判里居放榜之夕忽夢入一大城有偉丈夫自委巷出揖翁問曰君非趙某耶曰是也曰吾潘姓關帝下直日功曹也爾子本應今科髙第入翰林以近日得罪神明奏聞上帝且降罰矣頃之鼓樂騶從駢闐而至有神人峩冠盛服手黃紙功曹亟指示曰㫖下矣可俯伏聽之翁如言竊視紙上則大書趙作舟三字以硃筆勒之功曹曰君可去矣郎君罪止罰科耳作舟既下第歸入門翁詰其故且具述夢中所見作舟悚然後蹭蹬公車者二十四年署東平州學正康熙己未始登第改翰林院庶吉士親述其事如此異馬異牛癸亥在京師見一馬索值千二百金通身毛如新鵝兒黃無一莖異惟尾鬛獨黑又一馬索值五百金通身如雪上作桃花文紅鮮可愛又額駙石公家一紫花㹀牛文如海棠色施銜勒走及奔馬云得之南中波斯犬嘗於慈仁寺市見一波斯犬髙不盈尺毛質如紫貂聳耳尖喙短脛以哆囉尼覆其背云通曉百戲索價至五十金亦宋太宗桃花犬之屬也梅異宣城自本朝來科甲久不振康熙己未施侍講愚山閏章髙檢討阮懷詠以辟薦孫編修豫立卓茒編修楚畹薦馨以鼎甲四人同時入翰林時施園有梅三月復開四花其方位恰應四人所居人以為異梅孝亷淵公清繪為圖壬戌阮吉士爾詢亦入翰林或謂宣城有文昌閣久頽廢甫新之五君遂相次入翰林云壬戌茆卒癸亥施孫相繼卒乙丑髙卒又不知何說也籖驗京師前門關帝廟籖夙稱竒驗豫順治己亥謁選往祈初得籖云今君庚甲未亨通且向江頭作釣翁玉重生應發跡萬人頭上逞英雄又云玉重生當得意恰如枯木再逢春爾時殊不解是年十月得揚州推官以明年庚子春之任在廣陵五年以甲辰十月內遷禮部郎所謂庚甲者蓋合始終而言之揚郡瀕江故曰江頭也然終未悟後二句所指至庚申年八月置閏而豫以崇禎甲戌生實在閏八月過閏中秋四閲月遂蒙聖恩擢拜國子祭酒於是乃悟玉重生之義諺云飲啄皆前定詎不信夫名龜麟鳯龜龍並稱四靈漢唐宋已來取龜字命名者不可勝紀至明遂以為諱殊不可解惟張太嶽生時其母夢一大龜入室因名之曰龜後夢神人謂泄天機乃易名蜘蛛塔京師城西慈慧寺有蜘蛛塔萬厯中少詹南充黃公平倩輝書碑平倩耽禪悅與僧愚菴善嘗住此寺一日方誦金剛經次一蜘蛛緣案上向佛而俯驅之復來黃曰爾以聽經來耶為誦終卷又為說情想因緣竟蜘蛛立蛻化去因以桑門法起塔復書碑記其事云義蜂冢金山有義蜂冢鎮江府廨有蜂一筒逸出其王斃羣蜂相揉藉爭死之不下萬餘嘉靖中鎮江嚴同知者為立義蜂冢徐尚書養齊問作蜂冢歌紀事云羣蜂勢方屯主蜂自殘折意氣許與成君臣義心欲奮秋陽烈摧軀抉股同死君田橫門客多如雲後人重死不重義奉頭鼠竄何紛紛微蟲感恩乃至爾吁嗟萬靈不如此金山山髙江水寒孤冢蒼茫為誰起西園雜記云嚴名應階緑雪堂雜言云在北固山楊邃菴閣老表為義蜂冢萬孔明成化中萬安為相與萬貴妃通族為古今笑柄然陳後主時都官尚書孔範與孔貴嬪結為兄妹已前此矣乃知奸邪行事亦有所本謝鳯宋謝鳯康樂之子超宗父也元嘉中為鄞令今奉化縣屢著靈異縣人祠之元大德十二年饑有巨艘自南劔運米至鮚亭聞有人招之者曰吾謝鳯也人賴以活至正中寧海賊犯境官軍逆戰仰見大旗飛揚萬騎雲合旗有謝字駭賊而奔斬獲無數貝瓊清江集有謝公廟記懿徽二宗事相類學圃萱蘇載唐懿宗於苑中取石造山﨑危詰屈有若天成又命取終南草木植之山禽野獸縱其往復造屋室如庶人家未及半年竒花異草自然生滿宮殿識者以為丘墟之象與宋徽宗艮嶽事絶相類木晶門人南陽李鴻嘗贈豫印章色類栴檀質如玉上作龜紐甚精云是木晶海外産也宋諸相八字宋人小說載蔡京八字丁亥壬寅壬辰辛亥與東京鄭粉兒子干支盡同猗覺寮雜記韓莊敏與吳冲卿王禹玉同詣天祿山人卦肆莊敏先云己未七月初九日寅時生禹玉午時生天祿皆云極貴後俱宰相能改齊漫録載曾布八字乙亥丁亥辛亥己亥與章惇同乙亥生章戲呼曾為四亥公又蕭注八字癸丑乙丑乙丑丁丑王安石以辛酉十一月十二日辰時生韓絳以辰年辰月辰日辰時生布以大觀元年八月二日卒其弟肇以三日卒先後才一日京與祖某父準皆以七月二十一日卒三世同忌日見老學菴筆記何中官勺中志略載𢎞治時中官何文鼎以寧壽侯事忤孝宗死後於宫中常戛銅缸為厲按西園雜鈔云孝皇始甚怒既聞文鼎言然之止責置南京閒住鄭端簡公吾學編餘云文鼎素忠直二張褰視御帷文鼎持大瓜箠之幾死泰陵竟不罪文鼎三說皆不同然死而為厲之說非實録相國孫雲間某相國之孫某乞米於人歸途無力自負覓一市傭代之嗔其行遲曰吾生相門不能肩負固也汝傭也胡為亦爾對曰吾亦某尚書孫也此聞諸董蒼水俞孝亷者貴人子孫不可不知宋三賢八字富文忠公以甲辰正月二十日巳時生蘇子容以庚申二月二十二日巳時生王正仲以癸亥正月十一日申時生李公擇孫莘老相善公擇卒以元祐五年二月二日莘老以三日先後才一日俱見吳曾漫録左手把筆棗强宋中郎師祁康熙丁未進士工諸體書後知獲嘉縣忽遘風疾遂以左手把筆其工不減於舊老學菴筆記載陸元長宗室不微梁子輔皆用左手作字勝於右手又趙廣以左手畫觀音大士信有之矣故藩址濟南德藩故宮面南山負百花洲宮中泉眼以數十計皆澄泓見底石子如摴蒱然青州衡藩故宮亂後尚存望春樓及流觴曲池上有偃蓋松蓋數百年古物豫順治丙申飲於此甘橘繡毬尚數十株後丙午丁未間周中丞有德另建撫署乃即德藩廢宮故址移衡藩木石以搆之落成壯麗甚衡藩廢宮鞠為茂草矣放翁記長安民家契劵四至有云某處至花蕚樓某處至含元殿者古今皆然山無僧寺陸放翁云天下名山惟華山青城茅山無僧寺吾鄉勞山亦無僧寺明萬厯間憨山大師建海印寺於勞山尋為道流所訟譴戍粵東米太僕研米紫來翰林漢雯說其大父太僕公萬鍾知六合縣日蓄一古研甚寶惜一日渡江沈於水急懸重賞募善泅者下取之百計不能得但惋惜而已次早將解纜忽有紅霞起水面其光燭天公曰必吾研也命舟人於其下索之研果隨手出公大喜賞之如格煞風景豫在江南時目擊煞風景者四事一金陵桃葉渡順治初一縣令邵姓者建橋其上榜曰利濟一青溪長板橋明末為葛禮部寅亮所毁一焦山焦先祠像設作冕旒如王者旁設儀仗一金山築城壘有鎮江孔知府者曲阜聖裔也於諸門朱書乾坎艮震等字山有裴頭陀藏金洞孔改題曰開山第一洞每舉似人皆為捧腹白帽子張影繡庶常光豸南宮人康熙戊午赴順天鄉試時其父病意不欲往父强之再三乃行是夜宿旅舍夢有人送一白帽子令著覺而惡之自是每夜必夢心悸欲歸而父書至言病良已遂勉終場事歸途夢亦如初抵家父已久愈而報人尋至則張領解矣是夕遂不復夢明晨賀客麕至一客忽云邑中自大司馬白公後久無冠冕者喜君繼之張始恍然而悟白公諱圭前明正統某科解元纍官兵部尚書宮侍御泰州宮侍御宗衮夢仁初名𢎞宗久困場屋欲更名一夕夢鄉前輩林㑹元東城春手書一冊豫之林公字子仁於是更名夢仁是科己酉遂舉順天鄉試明年庚戌中㑹元癸丑殿試入翰林改御史名字豫兄叔子士祜十餘嵗時在家孰一日㑹食有舉焦太史姓名為問者或曰此無它亦如魏相字弱翁之類耳兄在末坐遙對曰非也此本考工記輪人竑其輻廣以為之弱舉坐驚歎以為夙慧老子唐追尊老子為𤣥元皇帝至宋政和中崇奉道教又詔升老子於列傳之首别為一帙尊道德為大經御製注解令學者與易書等經分習之禁以耳聃伯陽命名其為兩代尊奉如此論語䜟論語䜟云孔子讀易韋編三絶鐵撾三折漆書三滅後世但知韋編一語下二語遂不著又王原叔云顔子讀書鐵鏑三摧風俗通古今注云趙髙用事獻蒲為脯指鹿為馬鄭康成禮器注趙髙欲作亂以青為黑黑為黃今人但知鹿馬一語髙僧傳載支道林嘗養一鷹人或問之答曰當以神俊今人但知其賞馬不知其賞鷹惟坡公有支遁鷹馬圖詩世說郭林宗還鄉里送車千乘獨李膺與林宗共乘薄笨車上大槐坂觀者望之若喬松之在霄漢然世止知同舟而不言同車王延哲明尚寶少卿王延哲文恪少子也其母張氏壽寧侯鶴齡之妹昭聖皇后同産延哲少以椒房入宮中性豪侈一日有持宋槧史記求粥者索價三百金延哲紿其人曰姑留此一月後可來取直乃鳩集善工就宋版本摹刻甫一月而畢工其人如期至索直故紿之曰以原書還汝其人不辨真􅎓持去既而復來曰此亦宋槧而紙差不如吾書豈誤耶延哲大笑告以故因取新雕本數十部散置堂上示之曰君意在獲三百金耳今如數豫君且為君書幻千萬億化身矣其人大喜過望今所傳有震澤王氏摹刻印即此本也又有持琥珀求售者中有蜘蛛形狀如生索值百金延哲謂蛛果生耶曰然然則碎而視之果爾即償百金否則一錢不直手碎之果有生蛛自內躍出行几上數巡見風化為水乃立以百金償之其豪快如此聖泉貴陽城西南有聖泉有貴人至輒沸起驗之百不失一滇逆將倡亂雲貴總督甘公文焜暨諸大吏一日遊泉上泉不沸怪之未幾亂作甘死之又陸郟縣次雲說孫可望在黔中時有僭逆之志至泉卜之水竟不至可望怒以炮擊之今泉上石欄炮痕尚存蘇文宋時諺云蘇文熟啖羊肉殿帥姚某性叨餮每得坡公手帖輒換得羊肉數斤故坡有傳語本官今日斷屠之謔杜祁公為相清儉非㑹客不食羊肉按宋時京官日支羊肉錢故云厦門磚刻明季崇禎庚辰嵗有閩僧貫一者居鷺門即今厦門夜坐見籬外坡陀有光連三夕怪之因掘地得古磚背印兩圓花突起面刻古𨽻四行其文曰草雞夜鳴長耳大尾干頭銜鼠拍水而起殺人如麻血成海水起年滅年六甲更始庚小熙皥太平千紀凡四十字閩縣陳衎盤生明末著槎上老舌一書備記其語至今癸亥四十四年矣識者曰雞酉字也加草頭大尾長耳鄭字也干頭甲字鼠子字也謂鄭芝龍以天啓甲子起海中為羣盜也明年甲子距前甲子六十年矣庚小熙皥寓年號也前年萬正色克復金門厦門今年施琅克澎湖鄭克塽上表乞降臺灣悉平六十年海氛一朝蕩滌此固國家靈長之福而天數已預定矣異哉風聞陳衎云風聞二字出漢書尉他傳風聞老夫父母墓已壞削又晉書顧和對王導曰明公寧使網漏吞舟何忍採風聞以察察為政少正陳衎云少正卯其人名卯而官少正也當時魯鄭皆有少正之官列於卿故子産亦稱少正按氏族博考云以官為氏者有公正宗正少正正令等蓋卯官少正其後列國為此官者子孫因以為氏耳郝氏遇仙霸州郝恭定公惟訥母李太夫人戶部侍郎傑之配也孕公時家有盜警夫人倉卒墜樓傷股忽有老嫗詣門自言能療且曰腹中兒當大貴吾并活之先一手摩股久之投藥少許骨格格有聲遂相屬胎竟不墮酬以金帛辭弗受竟去不知所之後公中順治丁亥進士厯官左都御史工刑禮戶吏五部尚書神黃豆神黃豆産滇之南徼西南彜中形如槐角子視常豆稍巨用筒瓦火焙去其黑殼碾作細末白水下之可永除小兒痘毒服法以每月初二日十六日為期半嵗每服半粒一嵗每服一粒一嵗半每服一粒半遞加至三嵗服三粒則終身不出痘矣或曰按二十四氣服之以二十四粒為度雲南趙玊峯士麟中丞王子玠瑜刑部說癸亥地震康熙癸亥十月初五日山西巡撫穆爾賽疏報太原府屬地震凡十五州縣而代州崞縣繁峙為甚崞縣城陷地中毁廬舍凡六萬餘間與丁未山東己未京師之災相似族望唐人好稱族望如王則太原鄭則滎陽李則隴西贊皇杜則京兆梁則安定張則河東清河崔則博陵之類雖傳志之文亦然迄今考之竟不知為何郡縣人殊可恨宋人罷官者多居近畿不歸其鄉死即葬焉子孫亦遂占籍如巨野朝氏東萊呂氏華陽范氏梓州蘇氏易簡代居京師又如歐陽居潁而葬新鄭蘇氏居許而葬郟後世過廬陵眉州者豈復可尋其倣佛耶此二者至明乃無之魚石前即墨令周屺公斯盛說汧陽縣有魚石如饅頭狀破之即成兩石各有一魚形鱗鬛宛然以手摩揩之作魚腥云此山一溪中所産石子盡然溪有魚石娘子廟求石者必禱之不禱則石皆無魚也前郟令陸雲士次雲又說新昌縣有水簾洞洞口出石亦如饅頭狀人戲云欲得糖者或肉或菜者破之一一逼肖造物狡獪如此叫蛇粵西有叫蛇能呼人姓名應之即死然性畏蜈蚣逆旅主人每以篋貯蜈蚣客至輒授之令置枕旁云夜半舍外有呼姓名者慎勿應但開篋縱蜈蚣蜈蚣即徑去食蛇腦已仍還篋中泰山孝子順治十年四月泰安州知州某於泰山下行忽見片雲自山嶺下雲中一人端然而立初以為仙及墜地則一童子也驚問之曰曲阜人孔姓方十嵗母病私禱太山府君碩殞身續母命母病尋愈私來捨身巖欲踐夙約不知何以至此知州大嗟異以乘輿載之送歸蘇公墓郟縣二蘇公墓明末劇寇吳宗聖作亂松柏剪伐無餘順治初知縣張石只篤行章丘人丙戌進士至謁墓下復為封樹立碑增植松樹千餘株題詩云峨眉遙望獨傷情樹盡碑殘野草生莫道荒村烟火絶山家今日是清明是夜夢一青衣曰東坡遣致謝問先生今何在曰在臨汝公至彼當相見是嵗七月以事至汝州有青衣欵門遺一卷乃東坡墨蹟蜀岡送蘇伯固之嶺南五言詩也青衣忽不見張異之因命工摹勒于石自記其本末如此洞溪物産陸次雲洞溪纎志所載物産有絶竒者略記于此風鬼出黔中無形無影能以旋風攝人夜義産蜀之黎州穴生長七尺亦名曰玃路見婦人盜之入穴生子以楊為姓木客産粵洞中衣服舉止與人不異在恍忽有無間野婆亦産粵西狀如嫗陟險如飛遇男子負去求合嘗有人刺其腰間得一玉印篆文莫能識黃丈鬼生東粵身著黃衣能為疫癘潛牛居江中能上岸與牛鬭角軟入水濡之復鬭其力甚鋭肉翅虎飛而下山食人食已復飛去月山叢談云䕫州府有鬼物名小神子髙尺餘一二十為羣依人以居自景泰間始有之皆異聞也成御史遇仙前御史樂安成公寶慈勇明崇禎中以疏救黃公石齊道周譴戍鼎革後隱崑嵛山中一日大雪登絶頂遙見松林中有人僵卧意其凍死趨而視之四面皆積雪無人跡其人衣木葉卧處丈許獨無雪見公至蹶然而起曰候公久矣問其年云不記年嵗祗憶少在京師見楊椒山赴西市遂發憤出家學道耳向見左蘿石沈周泉二公託訊公起居故候於此問二公何在曰在上帝左右因又言二公每欲薦公自代沈公云成公正人顧嘗疑我今其疑須釋成公聞之惘然有間曰昔沈公疏論漳浦遺書及我我不答此事人無知者誠不妄矣道人自言有長生術當授公公曰吾陳人也以速死為幸長生何為道人曰聊試公耳二年後清明日當偕二公候公言畢謝去步履如飛公果以康熙戊戌清明無疾而逝響豆同年李侍郎奉倩迥言樂安縣有孫公者年九十强健如四五十嵗人自言生平惟服響豆每嵗槐子將熟時輒令人守之不令鳥雀啄落既成實即收作二枕夜聽其有聲者即響豆也因棄其餘如是數易而得響豆所在每樹不過一枚每嵗服不過一粒如是者數十年矣無他術也池北偶談卷二十二
