body:
  text: 池北偶談卷二十一刑部尚書王士禎撰每牛雖馬菌人竫人豫在禮部見荷蘭所進西洋小牛異之考王㑹圖所載有數楚之每牛注每牛牛之小者王㑹圖又有俞人之雖馬注雖馬一角大者曰麟按爾雅驨如馬一角不角者騏大荒南經曰蓋猶之山有小人名曰菌人東經有小人國名靖人或曰竫人銀杏樹觀音像辛丑壬寅間京口檄造戰艦江都劉氏園中有銀杏一株百餘年物也亦被伐及工人施刀鋸則木之文理有觀音大士像二妙鬘天然衆共駭異乃施之城南福緣菴中時蘇州瑞光寺有觀音像亦大木中文理自然結成之唐童子松江唐童子勳五嵗而瞽年十二詩多可誦其先有汝詢字仲言者亦瞽而能詩嘗注唐詩傳於世周宿來茂源贈童子詩云家風師曠逺家學卜商傳又永平孟元輔熊弼忠毅公子少而失明好讀書聽輒成誦嘗選唐人詩五十家亦竒人也體香先考功西樵於癸丑七月草二日以哭先淑人不起屬纊時口鼻中作栴檀蓮華蘭蕙種種異香凡三日夜益都髙木王梓豫從姊之夫孝友忠信人也以康熙甲寅春捐館病革時體中亦有異香此皆豫聞見最確者黃鬚宋范公稱過庭録載黃鬚傳即今所傳虬髯事也然其間云於汴州見太宗殊紕謬黃鬚兒曹操呼其子彰而此傳李衛公所遇亦稱黃鬚柳耆卿墓儀真縣西地名仙人掌有栁耆卿墓按避暑録栁死旅殯潤州僧寺王平甫為守出錢葬之真潤地相接或即平甫所卜兆也豫真州詩云殘月曉風仙掌路何人為弔栁屯田普救寺西廂傳竒河中有普救寺畫墁録郭威宿師河中逾年登蒲阪以望城中憤蒲民固守曰城開日當盡誅之幕府曰若然守愈固矣第告之曰誅守城者餘皆免城既開乃即其地為普救寺蒲志云舊名永清院院僧與郭威約城克之日不戮一人因改名普救寺二書大同小異然寺名實始五代傳竒假以成文耳神女廟神鴉巫峽神女廟有神鴉迎送客舟陸放翁入蜀恨不及見豫壬子冬下三峽至十二峯果有鴉十餘往來旋繞以肉食投之即攫去十不失一其鴉比常鴉差小棲絶壁石洞中得食即入洞去天祿閣外史曰嘉陵之墟其鳥曰鳶臨溪啄影則孕吐于口而生方密之以智通雅云嘉陵漾江之口下至巴東皆有神烏所謂嘉陵之鳶指此或謂山烏穴乳即爾雅之鸀三僧坡詩有琴聰蜜殊謂僧思聰仲殊也放翁筆記云思聰大觀政和中以琴遊權貴間遂還俗官御前使臣仲殊自縊以死參寥尤為坡公所喜政和中老矣亦還俗又墨莊漫録載呂溫卿為浙漕屢起大獄復欲網羅參寥參寥本名曇潛東坡改之曰道潛呂索牒勘驗竟坐刑之還俗編管兖州一字字筆記云錢協字穆范祖禹字淳本皆一字豫按古如爰絲房喬顔籕劉乂之類皆一字字也今文士有寶應陶澄字季萊陽董樵字樵二人皆以布衣遊於都門初不相識豫為介之曰二君非但詩筆相當即一字字亦絶對也二君遂賦詩定交按龍川别志有隋時道士屈突無為字無不為朝景迂一字伯以父見陸務觀文集劉敞劉攽兄弟字伯貢父仲原父見歐公所作原父墓志前涼張天錫字公純嘏見十六國春秋此又三字字也陶一字昭萬有太原傅山字青主一字公之他趙廣戴祿趙廣合肥人李伯時小史伯時作畫常令侍左右久遂善畫尤工畫馬幾亂真遭亂為賊脅之作畫不肯從斫其右手乃以左手畫大士宋南渡士夫家所藏伯時大士多是廣筆戴祿者臨邑邢子願先生家僮亦精六書之學與子願書往往亂真邢與寒家有姻婭之好豫幼時多見屏幛間署子願姓名率戴書也古石刻大梁城西水磨間有人掘地得一石有日月逝酒漿五字乃古篆也周櫟園侍郎摹勒以傳謂非仙者不能道施愚山有詩記之墨魚蜀嘉州凌雲烏尤山下有魚曰墨魚行則噀墨云郭璞注爾雅於此魚食硯墨所化立春後泛子漁人以燈火照之輒止不去南越志謂烏鰂懷墨而知禮蜀本草圖經云烏鰂名海鰾鮹九月烏􅖂入水所化不知即此一種否豫在蜀見之鐵漢和尚鐵漢和尚居金陵牛首東峰下獨坐數十年嘗蓄二猿子自隨有所須猿輒解意與龍眠方學士坦菴拱乾善特搆一軒方來即居之號曰坦軒和尚化去二猿悲鳴不食死葬於塔側學士題其遺像云兩箇獼猴杖一根獻花石上獨稱尊怪公事事能超脫留此贓私誤子孫駙馬懶真子云御馬之副謂之駙馬杜預尚主武帝拜鎮南大將軍給追鋒車第二駙馬吾鄉有為尚書子壻者與婦兄同赴京師一日向友人訴廄吏云婦兄馬肥吾馬獨瘦友人笑答曰彼正馬也君駙馬耳那得一例合坐大笑此雖戲語深合故實厚葬薄葬秦始皇穿治驪山上具天文下具地理漢文帝遺詔霸陵山川因其故毋有所改二君之賢愚人皆知之乃亦有相反者宋壽州張侍郎撫州晏丞相俱葬陽翟相去數里有盜發張墓得金寶珠玊甚多遂完其棺櫬掩覆其穴繼發晏公墓無所有器皆陶甓破其棺惟木胎金裹帶一盜失望大恚以刀斧碎其骨而出世謂張以厚葬完軀晏以薄葬碎骨事之不可知如此鳥異益都縣顔神鎮康熙辛亥冬鳧鴈駕鵝之屬以千萬計飛過城中皆墮地死逺近四山皆滿甲寅春復然已而相國沚亭孫公廷銓薨於私第公世為鎮人二玉璽順治十七年富陽典史孫某解餉北上舟過髙郵見湖中夜有光令榜人跡之得玉璽水中方四寸六分盤龍雙紐辨其篆文漢髙帝大風歌也十二月疏獻于朝鄧州人丁象輝賦大風玉璽歌又康熙四年十月初八日溧水民耕田得玉璽其文乃人心惟危十六字亦上於朝青原道場龍眠無可和尚本方姓故明崇禎庚辰進士早以文詞知名亂後為浮屠曾住金陵髙座寺劉公㦷見之衣壞色破衲衣行纒束腰居然苦行頭陀也最後住吉安青原山青原古道場也明王陽明鄒東郭南臯諸先生亦講學於此住山後有倒荆久枯忽發三枿㑹施愚山閏章分守湖西講學白鷺洲與之往來青原宗風一時復盛冰山康熙戊申豫邑北錦秋湖中冰立如山髙可數丈許巖洞林巒皆具千峰萬壑宛轉關通逺近走觀之入其中者如在深山而表裏洞徹類晶玉旬日始消異鴉邑東北耿氏墓林中有鴉一隻碧色飲啄自異不與羣鴉為伍亦不見其蕃育人往往見之按唐書滕縣有羣鳥嗛柴為城中有白烏碧烏各一又城東旬召店有白燕二居民家井中皆康熙十二三年間事昭烈券獻賊破荆州時民家有漢昭烈帝借富民金充軍餉券武侯押字紙墨如新見綏寇紀略蜀府鬼獻賊據成都以蜀王府為宮所居人鬼相觸一日聞後殿有歌吹聲自往視之見有數十人手持樂器而皆不見其首大驚仆地乃移居北城樓不敢入宮馬岱後黎州土司馬金者蜀漢將軍馬岱之後張獻忠在蜀以金印招之金得印擲之地誓衆拒之金時年十六未幾卒張儲張儲字曼胥南昌人大學士位之弟多才藝醫卜星相堪輿風角之術無不通曉萬厯間遊遼東歸語人云吾觀王氣在遼左又觀人家葬地三十年後皆當大貴行伍閭巷中兒童走卒往往多王侯將相天下其多事乎人以為狂既而其言果驗儲年七十餘卒其外孫夏吏部抑公以鋒云孝芝洛陽呂忠節公維祺撰孝經大全三十年至崇禎十三年庚辰告成夢神人錫以丹篆又袖出一物如黑飴倐生二白角化為黃羝羊約七八寸優游草際謂公曰此孝芝也明日果有芝生庭中凡十八莖剷者誤去一莖明日復生說者謂應十八章之數云公自作孝芝記十具牛王景略臨終托其子皮十具牛為治田之資不為求官亦葛侯八百本桑之意今江淮以北謂牛四頭為一具俗語亦有所本壽冢梁國兒仕姚秦封平輿侯嘗於平凉自作壽冢將妻妾入冢飲宴酒酣升靈牀而歌八十餘乃卒可謂達者近淄川髙侍郎念東珩亦自作生壙時與友人唐翰林濟武夢賚飲酒賦詩其中德州程工部正夫先貞自作一棺題曰休息菴自作銘刻其上酒酣便即偃卧有詩云版屋蕭然密四周愚人息矣聖人休百年恍惚真疑夢萬事紛紜已到頭廣栁何時催去駕猗蘭此夕詠閒愁相煩雅客來欣賞莫待遙憐土一丘千里人南燕慕容超時髙句驪獻千里人十人畢尚書淄川畢白陽自嚴先生明崇禎初為戶部尚書精心㑹計為時名臣時練餉新餉諸項日增臺諌多歸咎司農一言官以亢旱上疏有烹𢎞羊天乃雨之語先生笑謂人曰此非烹𢎞羊直是要烹白陽耳謔語王完虛中丞㸃明萬厯甲辰進士好詼謔初仕為鄒平知縣縣與章丘接境一日與章令某相見令問足下以何年生對曰乙亥因問章令答云亦乙亥王笑云某是鄒平一害兄便是章丘一害排調同年薛給事奮生以才氣自許常在淮隂酒間謂豫云子文士耳異日終依我幕下豫答曰恨吾子非嚴鄭公耳汪苕文亦有詩調之云十載雕蟲稍擅名未曽縛袴學長征他年若得登三事但取蕭郎作騎兵引經德清陳端菴凝順治己丑進士筮仕為新城令性仁厚每杖人輒對之泣有王生者宅為人所奪久不給直訟於官陳不能決第好語曰毛詩云維鵲有巢維鳩居之王秀才獨不能作鵲耶聞者笑之士大夫南史紀僧真得幸齊世祖請於上曰臣出自武吏階榮至此即時無復所須唯就陛下乞作士大夫上曰此由江斆謝瀹我不得措意可自詣之僧真承㫖詣斆登榻坐斆顧左右曰移吾牀逺客僧真喪氣而退告上曰士大夫固非天子所命六代時士大夫之重如此兩周盤龍劉桃枝蕭齊時兩周盤龍一奉叔之父於淮陽大破魏軍一徐州民與建康僧法智作亂為王元邈所誅南北朝兩劉桃枝一北齊人洋湛間多拉殺諸王大臣在涼風堂殺斛律明月者一陳威鹵將軍克齊胊山城程蘇謔語元祐初司馬公薨百官方有慶禮事畢往弔伊川引子於是日哭則不歌東坡云云然檀弓衛太史栁莊寢疾公曰疾革當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞其死請往不釋服而往遂以襚之又梁左軍將軍馮道根卒是日上春祀二廟問中書舍人朱异曰吉凶同日今可行乎异引衛獻公以對上即幸其宅伊川何未衷於此欒城遺言載此條則是潁濵事非東坡孫忌語南唐孫忌語馮延己曰僕山東書生鴻筆麗藻十生不及君詼諧歌酒百生不及君諂佞險詐纍劫不及君雙塔京師雙塔乃安祿山史思明所造而劉侗景物略不載元乃賢易之詩云安史開元日千金搆塔基世尊寧妄福天道自無私寶鐸遊絲罥銅輪碧蘚滋停驂指遺蹟含憤立多時何老菴吾邑東六七里有何老菴何元時人修道於此獨居數十年每夜有蛇虎伴之菴後有積水曰豢龍池相傳何老擾龍處虹橋板榕城書肆有虹橋板一片色黝而澤文理堅栗發聲清越材中琴瑟云産武夷山中不辨何木也興化林穆之賔王賦虹橋板行記其事漢人唐人秦人昔豫在禮部見四譯進貢之使或謂中國為漢人或曰唐人謂唐人者如荷蘭暹羅諸國蓋自唐始通中國故相沿云爾馬永卿引西域傳言秦人我丐若馬注謂中國人為秦人各以通中國時為稱古今不易也真龍石龍宋中丞牧仲犖說順治二年在京師見大內所藏真龍全身盤屈貯篋中一角五爪鱗甲如鐵長丈餘陳宮詹說巖廷敬說康熙十四年陽城張侍郎東山爾素家鑿石中有石龍一鱗甲頭角宛然刻畫亦長丈餘淨池魚宗弟九青侍講豫嘉扶風人家渭水上去太白山二十里云太白一峯直上三十里盛夏雪霰不絶人無能登其巔者惟六月可上上有太白神殿以鐵瓦覆之有五池有鳥紅色大如雀池有滓穢則銜去之名淨池鳥山竒寒無林木鳥獸此鳥亦不知棲止何所也按客座新聞云每墮葉則鴛鴦鳥銜出之紅魚有長丈餘者五行陸象山云五行書以人始生年月日時所值晨推貴賤貧富夭壽禍福甚詳乃獨略於智愚賢不肖曰純粹清明則歸之富貴福夀曰駁雜濁晦則歸之賤貧夭禍易有否泰君子小人之道迭相消長各有盛衰純雜清濁明晦之辨不在盛衰而在君子小人今顧略於智愚賢不肖而必歸之富貴貧賤壽夭禍福何耶沙隨程氏云易以道義配禍福隂陽家獨言禍福而不配以道義如此而詭遇獲禽則曰吉得正而斃則曰凶故文中子曰京房郭璞古之亂常人也二說可互證常熟三鼎甲常熟南門地名山塘港琴川水經處三鼎甲居第相望中孫扶桑承恩前趙東田士春後瞿文懿景淳三公臚傳年皆三十九尤竒扶桑弟舉人暘為豫說如此杜氏康熙丁酉山東東昌府館陶縣民婦杜氏年一百十三嵗載縣志秦宣太后晏子語國策楚圍雍氏韓令尚靳求救於秦宣太后謂尚子曰妾事先王日先王以髀加妾之身妾固不支也盡置其身於妾之上而妾弗重也何也以其少有利焉此等淫䙝語出於婦人之口入於使者之耳載於國史之筆皆大竒又晏子春秋景公蓋姣圉人視景公僭者問之曰竊姣公也公將殺之晏子入見公曰色寡人故將殺之晏子曰嬰聞拒欲不道惡愛不祥雖使色君於法不宜殺也公曰然若沐浴寡人將使抱背此段問答亦竒姚康伯崇禎時內殿石驟長數寸上以問大學士何文端公如寵何謝不知歸問其老友姚康伯康伯曰此璞也中必有玉翌日以對上命剖之果得玊上訝其博物何謝曰臣友姚康伯教臣也因召見欲授以官不受姚字休那與文端俱桐城人張學士敦復英說李頻唐詩人李頻字德新睦州人名列唐書文藝傳才調集所載中流欲暮見湘煙一篇其作也懿宗時為建州刺史卒見神黎嶽郡人祠祀之宋紹興中封靈顯忠惠公後加靈佑善應王再加廣濟王又加福佑威濟信順王明洪武初改建州刺史之神載在祀典宋真文忠公序其詩今所傳梨嶽集是也詩人殁而為神未有如頻之昭昭者寶蘂江浦周西水兵部名于漆幼不能言然頗能記前世為某邑人所常栖止處廣庭中設一几庭前有紅薔薇一叢時時夢到其地七嵗時戲門前有僧過門顧之曰此郎有夙因周應聲即能言家人驚喜因令讀書一過目如宿習數月遍通經書左國史漢年十四讀書山中精舍一日日夕憩溪邊石上遇老僧謂曰郎忘七嵗門前相見時耶叩其名曰我寶蘂也閩人周因留之舍中日夜與論象緯律厯六壬丁甲勾股洞章之術未半載盡通其說瀕行復以黃河海道九邊三圖授之且曰吾數學未傳人今當遊四方訪之又祕語周以十年之內天下必大亂君異代人物也自丙子迄甲申果九年而明亡皆如其言周入本朝以明經謁選人常念寶蘂别時贈詩有元夕燈前尋賈子秋風臺下拜鄒生之句未詳所謂及謁選得房山令上元與僚屬宴於賈公祠問之唐詩人賈閬仙祠也問有子孫乎吏對有賈某者其裔也見以逋稅繫獄周令急出之代完其逋是年秋調平谷令抵縣日即出勘田畝夜宿山村古廟比晨視其額則鄒衍祠也於是悟寶蘂之語一無爽焉周述其學著三才儒要三十卷追尊始祖唐以老子為𤣥元皇帝蜀王衍追尊王子晉為聖祖至道玉宸皇帝沈石兄萊陽沈石兄名迅明崇禎辛未進士官給事中鼎革後家居一日其傭奴鉏田見禾葉上皆有篆書如蟲蝕者其文曰沈迅死是年沈禍作舉家自焚棗栗白虎通義曰婦人之贄以棗栗腶修棗取其朝早起栗戰栗自正也今齊魯之俗娶婦必用棗栗諺云早利子也義本白虎通而稍訛南宋時太學生齊祭用棗子荔枝蓼花曰早離了也殊可捧腹矣一生七子明天啓中大名民家一生七子俱成立每疾病則七人同之王比部令少寓天雄猶及見其第三子云康熙戊申安徽巡撫張中丞朝珍疏報歙縣民吳士全妻呂氏一産四子同年李望石贊元說順治中按楚有漢川縣民王某妻一産六子按北魏延興三年秀容郡婦人一産四男四産十六男與此相似郝推官郝某失其名嘗為湖廣某郡推官一日送直指宿驛中夜坐篝燈倦而假寐恍惚見有白衣女子針刺其額驚覺遂就寢既卧又若有刺其股者創甚急呼童子然燭視之果有針在左股疑其刺客乃秉燭巡視室中空無所有至屋隅暗處有緯蕭障之隙而窺焉見一物如大鳥人立遍體似水晶臟腑皆見見人即前攫急以手中挺逼之遂倚壁上不能起大呼從人破窗而入挺刃交下乃死竟不知其何怪也劉吏部公㦷說林四娘閩陳寶鑰字緑崖觀察青州一日燕坐齊中忽有小鬟年可十四五姿首甚美搴簾入曰林四娘見陳驚愕莫知所以逡巡間四娘已至前萬福蠻髻朱衣繡半臂鳯觜鞾腰佩雙劔陳疑其仙俠不得已揖就坐四娘曰妾故衡王宮嬪也生長金陵衡王昔以千金聘妾入後宮寵絶倫輩不幸早死殯於宮中不數年國破遂北去妾魂魄猶戀故墟今宮殿荒蕪聊欲假君亭館延客固無益於君亦無所損於君願無疑焉陳唯唯自是日必一至每張筵初不見有賔客但聞笑語酬酢久之設具宴陳及陳鄉人公車者十數輩咸在坐嘉肴㫖酒不異人世然亦不知何從至也酒酣四娘叙述宮中舊事悲不自勝引節而歌聲甚哀怨舉坐沾衣罷酒如是年餘一日黯然有離别之色告陳曰妾塵緣已盡當往終南以君情誼厚一來取别耳自後遂絶有詩一卷長山李五絃司寇化熙有寫本云又程周量㑹元記其一詩云靜鎖深宮憶往年樓臺簫鼓遍烽煙紅顔力弱難為厲黑海心悲只學禪細讀蓮花千百偈閒看貝葉兩三篇梨園髙唱闕君試聽之亦惘然秦時人遼東醫無閭山中有人斸參見毛人長丈許驚而却走毛人招之曰吾非妖魅乃秦時築長城卒昔同輩數萬人今僅七人在耳因問其飲食居處狀曰始饑食松柏實渴飲溪水久之不復饑渴矣言已去如飛鳥友人某親聞之操江宜中丞永貴云又巴山中有白髯叟采樵者嘗見之自云唐時人嶽儀部石齊貞說離非女子故友南粵陸漢東卿孝亷有小硯是南漢劉鋹宮中物有鋹宮人離非女子篆銘卿死子幼此硯不知流落何所石埭令姚六康子莊為豫言之姚亦粵人謝在杭謝在杭肇浙閩之長樂人少讀書邑蕭氏園園素多怪異人無敢居者謝不之信一夕坐燈下忽一女子前拜且泣謝叱之女子曰妾負寃久求公申之非魅也妾湖州德清人幼隨父客此同行某甲者中表戚也利父囊槖遂殺父恐妾鳴於官司併置諸死今數載矣公異日必官於湖望逮甲窮治扺罪使妾家知妾父子死所父子目瞑矣謝許之戒勿復出為祟自是竟無它是年謝中鄉試果筮仕湖州推官抵任後即檄縣捕甲至一訊立伏遂抵罪郡人以為神姚禮部琅曾令長樂為豫言如此南江野人蜀張獻忠之亂遺民奔竄山谷久之遂為野人南江有二野人能手格猛虎恆擘獐鹿啖之懸崖絶壁騰上如鳥隼雖其家人親戚招之疾走不顧也嶽儀部石齊南江人為豫說尼涵光尼涵光江西宜黃人姓鄒氏歸談大司馬綸之孫其夫椎魯不知書涵光棄去走京師上書請南遷不報㑹鼎革遂為尼每談故明門戶事源流甚晰居寶應朱秋崖克生曾見之陳百史秀水張侍郎天植流塞外時一夕召乩仙仙至大書云我陳百史也今為尚陽堡土地因謂諸公可召吾兒來時其子掖臣徙居尚陽家城外張謂城門下鑰請俟明日又書云渠今夕飲城內某家往偵之果然比至凡書數百言皆言家事及訓誡之語後在遼陽海寧相邸中亦往往見形與談笑如平生宋齊丘語宋齊丘表請與故吳太子璉絶婚曰非獨婦人有七出夫有罪亦可出此與左傳人盡夫也之語可為絶對漢碑異姓金薤琳琅所載漢碑碑陰故吏門生姓名有絶異者如韓敕碑有麃次公充宙番君舉加進亓輝魯人恐即亓官之後弓如骨通國孔宙碑有叔香如廬浮劇北海人薤章魯峻碑敢敦東鄉晨成河間阜人景君碑羽質臨照水丘郎人營陵中名闕字季逺炅詩立遷又漢碑陰有弟子洪丞相𨽻釋謂親受業者門生次相傳授門童未冠故吏掾屬故民占籍處士非吏非民義士義民非所蒞又有故修行趙明誠謂後漢百官志注河南尹官屬有循行百三十人晉書百官志亦有之修乃循之訛都穆謂當信碑本以正漢書之誤故午似是皂𨽻賤役香山􅓝􅓝門在香山縣大海中忽起一石埂廣十餘丈長六里許首尾相屬不斷如蓮之有莖中途甕城名關閘踰之抵􅓝門則如蓮菂畨人依山築城廣袤四五里三面皆臨巨浸惟北通地脉一莖耳海中諸峯包裹前十里為十字門如兩眉橫列而缺其正中又南十里為小橫琴塞隘口又南稍折西為大橫琴重案也番人之停舶必於灣灣之所在即名澳香山故有澳名浪白諸番互市其中而今之􅓝門則舊名濠鏡地有南北二灣明萬厯中有大西洋人至此樂之遂請濠鏡為澳而就二灣停舶久之益自彼國遣衆聚居嵗輸稅五百金本朝除之番人安其業者已數世所居率依山為樓三層方者圓者三角者六角八角者俱為螺旋形以入其教曰天主其寺曰三吧髙十餘丈於屋側啓門戶石作雕鏤金碧照耀寺僧曰法王以時集男女禮拜其所奉曰天母名瑪利亞抱一嬰兒曰天主為耶穌被服珍怪障以琉璃望之毛髮生動云漢哀帝時人也寺有風琴其琴銅絃彈之以和經唄并管簫諸樂器藏機木櫃聫以絲繩輪牙相錯一人轉機則諸音並奏有定時臺巨鐘覆其下立飛仙臺隅為擊撞形亦以機轉之按時發響起子末一聲至午初十二聲復起午末一聲至子初十二聲晝夜循環無少爽前揭圓槃書十二辰俟某時鐘動則蟾蜍移籌指某位有千里鏡畨人持之登髙以望舶械仗帆檣可矚三十里外又有玻璃千人鏡多寶鏡顯微鏡小自鳴鐘自行表以及海洋全圖璇璣諸器皆極工巧花有貝多羅丁香禽有五色鸚鵡么鳯倒掛獸有獴􅀈短狗其人昂鼻蜷髮目深碧不眴貴女而賤男晝卧而夜起男有白黑二種白者貴黑者為奴衣以多羅尼辟支曳髙屐戴黑氊笠相見脫之以為禮腰佩長刀刀著地尺許間有握赤藤者則甚貴􅓝中四人而已其女子則華襔寶靨出以錦被䝉其首而跣足不襪其家政女子操之父死女襲其業男子則出嫁女家不得有二色犯者女訴之法王立誅死或許悔過則以鐵鈎鈎其手足血流被體而免之􅓝中有議事亭畨目四人受命於其國更畨董市事凡市經四人議衆莫敢違及官司有令亦必下其議於四人者議得當以報聞其行賈之地曰馬西以中國絲帛白鉛易胡椒檀香蘇木以歸且與馬西約不得以所産市他國康熙辛未馬西背約私與他國市􅓝人怒駕舸往所市之國責之馬西患之遂相仇殺死者三百餘人市道中絶稍西曰小西洋去中國萬里半年始至所産有碧琉璃諸器極西曰大西洋去中國九萬里三年始至往者以其太逺祗就旁島遷販未嘗親至其地也番舶之出以冬月冬月多北風其來以四五月四五月多南風既出則􅓝中黑白鬼一空計期當返則婦孺繞屋號呼以祈南風亦輒有驗其舵工素與海習雖卒遇颶母浮椒亦萬不失一云右見龔兵部蘅圃翔麟珠江奉使記池北偶談卷二十一
