body:
  text: 池北偶談卷二刑部尚書王士禎撰鍾恭愍恩恤明景帝易儲鍾恭愍公同章恭毅公綸廖恭敏公莊皆極諌恭愍公疏先入死杖下被禍尤慘至英宗復辟特擢恭毅禮部侍郎恭敏復官大理少卿尋進侍郎成化中卒贈尚書而恭愍止贈大理寺丞恩恤獨薄當時亦無言之者五學士國朝官制設內三院曰國史曰祕書曰𢎞文院各有學士一員既設翰林院以內三院為內閣則止設閣學二員而别以一人掌翰林院事俱兼禮侍康熙十九年庚申乃有學士五人內閣徐立齋元文李容齋天馥掌院葉訒菴方藹而張敦復英以講學內直特升翰林院學士李厚菴光地以軍功超擢學士至是入京陛見奉特旨入內閣四公皆兼侍郎葉則加尚書云近李諫臣應豸王藻儒掞李倚江柟顧懿朴藻同時為內閣學士亦四人李去陸義山葇代之王擢户侍徐勝力嘉炎代之陸乞休韓慕廬菼代之亦四人李選侍明光宗朝選侍李氏鼎革後尚存至康熙甲寅嵗五月十八日始卒明熹宗有老宫監言明熹宗在宫中好手製小樓閣斧斤不去手雕鏤精絶魏忠賢每伺帝制作酣時輒以諸部院章奏進帝輒麾之曰汝好生看勿欺我故閹權日重而帝卒不之悟會議翰林記正統十年始命內閣與六部都察院通政司大理寺堂上官六科掌印官會議遂為例如合會儒臣則本院詹事府左右春坊司經局國子監皆與國朝制凡大事及章奏會議內則親王貝勒大臣外則九卿詹事科道而內閣翰林院不與詹事府凡事皆得與坊局不與不避廟諱唐避太宗御諱率改世曰代豫讀皮襲美文藪多不諱世字鹿門隱書一條云三王之世民知生而不知化五帝之世民知化而不知德又與元徴君書云懼來世聖人責乎無意於民又皆世民二字連用大名居士金史衛紹王本紀載尚宫左夫人鄭氏罵胡沙虎事贊云於金掌奏目女官大名居士王氏所紀得資明夫人援璽事附著於篇則金時宫掖蓋有記載女官矣讀講諭洗康煕中更定品級考後又定朝班坐次侍讀侍講班在諭德洗馬之上然凡郊廟祭祀諭洗皆與陪從而讀講則否及推升祭酒則庶子與讀講皆得開列而諭洗則否又左右掌坊庶子正五品侍讀侍講學士從五品而庶子必升講學皆品級考之宜加審詳者張真人隆慶中江西守臣言張氏職名賜印不載典制宜永裁革詔革去真人之號以為上清觀提點萬厯初復之相沿至今無釐正者使與衍聖公公然並列何哉有子萬厯初訓導侯貴上言論語成於有子曽子之門人子張不及有若進子張而坐有子於廡非是豫嘗謂十哲未允當進有子而黜宰我冉有貴之言誠不易之論及豫為祭酒已具疏欲言之同人謂恐涉紛更而止至今以為憾寧陵城侍講湯先生斌言初寧陵城小而卑吕新吾先生以刑侍家居謀大之縣人難於改作或生怨謗公曰三十年後當知吾意至流賊之亂適三十年矣境內百姓攜家入保者以數萬計縣人德之為立祠明太宗稱祖宋孝宗淳熙十五年太上皇崩洪邁請廟號世祖尤袤言光武以長沙王後布衣崛起不與哀平相繼稱祖無嫌太上繼徽宗正統以子繼父非光武比乃定號高宗明嘉靖十七年加上太宗廟號曰成祖豈未聞袤之言耶翰詹官朝班翰林記載翰林院朝房在午門外右第六區殿閣大學士本院學士以下皆在焉詹事府在右第十八區詹事少詹事以下皆在焉今制內閣大學士本院學士詹事少詹事皆拜於殿上不與部院同班起居注康熙十年復設起居注館在午門內之西與實録館相對其官則自掌院學士詹事以下史官以上皆得充之初止八人後增至十六人今桐城張公英以禮書兼掌院事亦為起居注官吏侍常書公兼掌院事亦然序秩翰林記凡修書考試等事書職名學士序於春坊大學士庶子之上讀講學士序於諭德之上侍讀侍講序於府丞中允之上修撰序於贊善司直之上今春坊大學士府丞司直罷不設大抵學士在詹事之上學士兼禮部侍郎為三品詹事本三品而兼侍讀學士少詹事在讀講學士祭酒之上庶子在侍讀侍講之上讀講在諭德洗馬之上升遷則同較俸次中允贊善司業次之史官又次之庶吉士又次之批旨翰林記宣宗時始令內閣楊士奇等及尚書兼詹事夏原吉蹇義凡中外章奏用小票墨書貼各疏面以進謂之條旨中易紅書批出今謂之票旨尚沿其制而批紅則內閣學士之職國初明史總裁國初順治二年曽奉旨纂修明史大學士剛林祁充格范文程馮銓洪承疇李建泰為總裁學士詹圖賴衮伊圖寧完我蔣赫德劉清泰李若琳胡世安侍讀學士高爾儼侍讀陳具慶朱之俊為副總裁郎廷佐等九員為纂修官薦舉優異康熙戊午薦舉文學洪洞進士范鄗鼎以病辭巡撫疏參溫旨令遵前諭來京以副求賢至意比諸人至京又諭户部月給銀米其不與五十人之選擇高年者授以官部議皆授司經局正字特旨改內閣中書舍人初太原傅山定興杜越年皆七八十以老病請於吏部不與御試故部議不及特旨傅山杜越等文行素著俱著授內閣中書右文之盛古未有也四布衣上嘗問內閣及內直諸臣以布衣四人名字即富平李因篤慈溪薑宸英無錫嚴繩孫秀水朱彞尊也後公卿薦舉獨宸英不得與繩孫目疾是日應制僅為八韻詩閣中閲卷已不録上特令與因篤彞尊二人同授翰林是時宸英方在京師不免向隅信遇合有定命也閲卷四人大學士高陽李公寶坻杜公臨朐馮公掌院學士崑山葉公上賜上優禮儒臣癸丑賜宴瀛臺翰林官皆與戊午士禎同陳葉二學士內直時四五月間頒賜櫻桃蘋果及櫻桃漿乳酪茶六安茶等物其茶以黃羅緘封上有六安州紅印四月二十二日賜天花特頒御筆上諭云朕召卿等編纂適五臺山貢到天花鮮馨罕有可稱佳味特賜卿等使知名山風土也用烏絲闌書又賜御書人二幅士禎得存誠二字唐人張繼楓橋詩廷敬得龍飛鳯舞四大字唐詩一首曲江垂柳一條條方藹得存誠二字唐人崔國輔詩遺却珊瑚鞭别賜士禎石刻二幅一清慎勤三大字一格物二字諭云去冬曽以石刻賜經筵諸臣時爾士禎未與故特頒賜八月入直又同陳葉張三學士和御製賜輔國將軍俄啓詩仍命次日攜名字印章入內各書一幅即發養心殿裝潢隨御筆同賜之皆異數也考察翰林記載翰林官考察之法成化間本院學士會同內閣考察𢎞治元年令翰林官亦從吏部考察本朝翰林京察在吏部過堂例凡數變順治中讀講諭洗中贊司業以上皆後堂相見具迎送之禮康熙癸丑始在前堂過半堂呼官及姓不呼名至己未則自少詹讀講學士直呼名矣京堂官自僉都御史大理少卿左右通政亦皆呼名體統陵替非古制也賜衣翰林記載洪武十四年賜翰林官羅衣各一襲永樂中賜內閣七人二品織金紵絲衣康熙中每冬賜內閣及學士日講起居注官貂裘人一襲自癸丑後滇黔用兵輟賜賜居第翰林記洪武中賜編修羅復仁居第宣德中賜楊溥第於東安門康熙丁巳上命左諭德兼修撰張英內直講書特賜第西華門內翰林院侍講高士奇亦然後杜編修訥亦賜第厚載門明史開局康熙十七年內閣奉上諭求海內博學宏詞之儒以備顧問著作時閣部以下內外薦舉者一百八十六人十八年三月朔御試體仁閣下瑢璣玉衡賦省耕二十韻詩中選者彭孫遹等五十人有旨俱以翰林用開局編修明史候補少卿一人邵吳逺改侍讀監司湯斌李來泰施閏章三人郎中吳元龍一人改侍講進士彭孫遹中書舍人袁佑等授編修貢舉監生生員布衣倪粲等授檢討以原任翰林院掌院學士徐元文為監修官翰林院掌院學士葉方藹右春坊庶子兼侍講張玉書為總裁官開局內東華門外五十相石林燕語云本朝宰相自建隆元年至嘉祐四年一百四十年凡五十人明崇禎十七年間命相亦五十人可以觀治亂矣加侍郎銜本朝監寺官加侍郎銜者絶少康熙元年以來惟欽天監管理厯法南懷仁加工部侍郎殁後贈禮部侍郎太醫院使馬之俊殁後亦贈禮部侍郎陳澔從祀康熙二十六年江西巡撫安世鼎疏言宋儒陳澔南康府都昌縣人著禮記集説學者宗之當與程朱蔡沈胡安國並議從祀部覆陳澔禮經集説上有師承源流明白但性理精深之處未能遽逮程朱即較之蔡沈胡安國亦覺有間且生平行實湮沒無考既已專祀於鄉其著書立言之功亦足云報崇奉兩廡未敢輕議西園雜記之誣海鹽徐咸著西園雜記述嘉靖初議大禮極言張桂之論確不可易諸元老大臣徒以大功出一書生不勝其憤不論事之是非義之當否相率羣和力排之非至公正當之論云云又載慈夀皇太后飾美姬數十人列左右以惑帝尤為悖誕所謂不知世有廉恥事者矣內大臣本朝官制滿洲勳舊别有內大臣不為閣部院官及八旗都統等官有軍國重事在禁中與滿洲大學士尚書等雜議按唐制兩樞密使左右中尉稱內大臣然彼乃中貴實異而名同耳奪情奪情非盛德事唐宋名相多蹈之賢如曲江公亦所不免明新都楊文忠公屢疏力辭起復升菴謂國朝宰相不起復自公始前此三楊蹇夏諸名臣奪情者習為故常不知何以李文達獨受惡名明末武陵奪情則有軍旅之事較之無事之時自可末減湘潭王山長岱常著説雪武陵之寃亦自有理然漳浦之論固萬古不易也從祀疏康熙二十年都察院僉都御史張吉午疏言故明翰林院學士方孝儒當建文靖難之際平居則闡道黜邪臨難則成仁取義能以理學為天下倡其所著遜志齋集自程朱而後未多見也吏部尚書羅欽順當正嘉之際學者蔑棄淵源談空好異欽順作困知記以正人心斥雜學似是之非明心性毫釐之辨至萬厯啓禎間聖道式微異端益熾賴有光祿少卿顧憲成都察院左都御史高攀龍倡正學於東林都察院副都御史馮從吾倡正學於關右都察院左都御史劉宗周倡正學於浙東皆能羽翼聖經發揮賢傳有功於理學名教並當急議從祀以光大典但此六臣或阻於忌諱或扼於權姦所以故明未及表章實為勝國之闕今正在纂修明史之時伏乞覃恩從祀登之學宫兩廡使天下知正學云云常參文昌雜録載宋時百官日赴文德殿東西向對立宰相一員押班再拜退謂之常朝又云唐制京司職事官有朔望參有五日參唯職事官五品并供奉官八品以上及員外郎監察御史太常博士則每旦參有常參官九參官六參官等云云春明退朝録唐有職事者謂之常參今隸外朝不釐務者謂之常參本朝順治中月凡六朝世祖皇帝嫌其頻數定以三旬逢五日常朝壬戌夏有旨文武官每日五更入朝列班午門外候部院啓奏官出始散歸署既而大理寺司務趙時揖上疏言之尋有旨九卿詹事掌印給事中掌道御史如故餘併停趙杭州人琉球入學康熙二十三年册封琉球翰林院檢討汪楫中書舍人林麟焻等疏言中山王尚貞親詣館舍云下國僻處彈丸常慚鄙陋執經無地嚮學有心稽明洪武永樂年間常遣本國生徒入國子監讀書今願令陪臣子弟四人赴京受業云云事下禮部部覆史載唐貞觀中興學校新羅百濟俱遣子入學琉球自明初始內附會典載大琉球國朝貢不時王子及陪臣之子皆入太學讀書禮待甚厚又載洪武永樂宣德成化間琉球官生俱入監讀書今該國王尚貞以本國逺被皇仁傾心嚮學懇祈使臣汪楫等轉奏願令陪臣子弟四人赴京受業應準所請聽其遣陪臣子弟入監讀書云云時豫為祭酒咨覆禮部略云查太學志載洪武二十五年秋琉球國遣其子及陪臣之子日孜等入監命工部給羅絹為秋衣冬琉球中山王遣其舅仁悅慈等至永樂二年琉球中山王從子三五良亹等九人以謝恩至奏請入監給賜一如洪武中故事令工部建王子書房於監前以處之三年琉球山南王遣寨官子李傑至四年中山王遣寨官子石達魯等六人至其後李傑石達魯等每在監三年得乞歸省九年中山王遣王相之子懷德寨官子祖魯古至十一年遣寨官子周魯等三人至是年有奏歸省者命禮部厚賜以榮其歸是後乞歸省或令候其使者還國以行永樂以後至於正德常三四遣至嘉靖五年中山王遣官生蔡廷美等四人至十一年歸國十七年遣梁炫等四人至二十三年歸國尋又遣蔡朝用等五人至今在南雍處以光哲堂嵗時給衣物如例向慕文教琉球於諸國為最篤國家待之亦為最優云康熙二十七年琉球國王遣耳目官魏應伯等恭進朝貢方物又遣陪臣子弟梁成楫鄭秉均阮維新蔡文溥等四人同貢使赴京入監讀書於正貢方物外敬加屏風紙三千張嫩蕉布五十匹四相順治中閣臣無定員自康熙元年至今二十年漢大學士止三人存內三院之舊也壬戌嵗寶坻杜公臨朐馮公同致政歸而宛平王公以前兵書大拜又兩月餘錢唐黃公以吏書漢陽吳公以禮書同日大拜始有四相前此癸丑嵗李杜馮三公在內閣而孝感熊公以翰林學士大拜亦四相大臣宫銜自康熙元年以後閣部大臣無加宫銜者壬戌十一月以太宗文皇帝實録告成加武英殿大學士禮部尚書勒公明公俱太子太傅少傅保和殿大學士户部尚書高陽李公太子太師致仕太子太傅保和殿大學士禮部尚書寶坻杜公太子太師致仕文華殿大學士刑部尚書臨朐馮公太子太傅故太子太傅中和殿大學士吏部尚書都統公圖公追贈少保仍兼太子太傅二十餘年所未有也建祠壬戌冬廣西巡撫郝中丞浴上疏為死節前巡撫廣西都御史贈兵部尚書諡文毅馬公雄鎮平蠻滅寇將軍巡撫廣西兵部尚書諡忠烈傅公𢎞烈請建雙忠祠詔允之疏略云原任撫臣馬雄鎮當逆氛狂熾矢志不二幽禁三年罵賊而死原任撫臣將軍傅𢎞烈仗義興師臨危不屈殺賊之心死而益烈云云二公真不愧俎豆者矣土魯番表康熙二十一年土魯番上言伏以我皇上猶昔者斯堪達爾之君一統金甌札穆西特之君藻鑑五缺亦若化日普臨率土景星光照萬靈抑猶哈地穆之君廣缺恩惠汝思他穆之君勇力絶倫譬之矛鋒之鋭龍爪之威莫敢正向而視兹者恭候聖安竊照前經遣發進貢烏盧火者曽上諭五年一次進貢欽此所以誤此進貢者原因臣國遭逢荒亂今幸太平亟遣亦思喇木火者前往進貢至於以後應進貢物合當照密爾焦地音阿克剌覃進貢舊例但天朝建都極東臣國地居極西應否照舊進貢表請裁奪蒙古表康熙二十一年蒙古為請旨事外藩蒙古王貝勒貝子公台吉等諸臣誠惶誠恐謹奏者向因逆賊吳三桂相率叛亂軍民極其荼毒幸我皇上不憚身心之勞孜孜圖治仰見天朝早臻太平是以祭告太祖皇帝太宗皇帝世祖皇帝復上太皇太后皇太后徽號渙頒恩詔大赦天下爰加賜賚率土俱歡恭上我皇帝尊號為至神大德治平天下聖皇帝伏祈皇上俯準臣等所奏臣等不勝欣躍奉旨朕自御極以來夙夜孜孜勤求化理期於中外乂安生民樂業今逆寇雖已蕩平治化尚未孚洽前諸王大臣等請上尊號已經有旨這藩王等所請亦不必行該部知道御書康熙十九年以御書手卷賜日講起居注諸臣學士葉方藹太極圖説詹事沈荃心經侍讀學士張玉書莊子説劍篇增起居注官辛酉四月增起居注日講官八人湯荆峴斌秦對巖松齡徐健菴乾學曹峨眉禾王瑁湖頊齡朱竹垞彞尊嚴藕漁繩孫潘稼堂耒合舊講官共十六人謄卷唐閻際美鋪試蠟日祈天宗賦誤書衛賜作衛駟榜出登第往參座主曰諸君試日天寒急景寫札或不如法恐文書到西京須呈宰相請先輩各買好紙重來請印如法寫淨送納抽其退本舊時直省小試解卷送禮部例須别謄淨本亦是唐人遺意至鄉試朱墨原卷解部即不得爾官年三十年來士大夫履歷例減年嵗甚或減至十餘年即同人宴會亦無以真年告人者可謂薄俗按洪容齋四筆宋時有真年官年之説至形於制書乃知此風由來逺矣獨寇萊公不肯減年應舉又司馬郎傳伯達志不減年以求成則漢魏間已有之柳條邊哈達城在撫順東北有哈達河其東插柳結繩以界蒙古長亘千里南至朝鮮西至山海關有私越者置重典名柳條邊見高宫詹士奇扈從東巡日紀朝鮮疏康熙十五年朝鮮國王李淳奏為臣先祖臣穆莊王橫被野史詆誣敢陳寃痛情節冀許刪改特示昭雪事臣五代祖昭敬王於明朝萬厯戊申嵗薨逝元妃朴氏無子繼妃金氏生一子甫三嵗庶子光海君琿嗣位蓋以金氏遵先王意舍已出而為之請於中朝得準封也光海既立聽信讒賊自生猜怨仇視母后幽閉别宫僇辱備至而戕兄殺弟屠滅諸姪殄絶彞倫無復人理內作色荒嗜欲無節外營宫室十年未巳斥逐耆老昵狎羣小繁刑重斂下民嗷嗷神人咸怒宗社將墜時有金瑬李貴等以昭敬王舊臣不勝邦國危亡之憂奮發忠憤誓靖內難乃於天啓癸亥三月糾合義旅大集廷臣奔告王太妃於别宫宣教廢琿迎立昭敬王孫綾陽君倧即臣曽祖父穆莊王也以太妃命權署國事遣使請命於明明朝始不允許後乃洞察本國事情特降封典此實當時天下耳目共所聞知穆莊王匡復之烈雖不敢上擬殷周廢立之正亦可謂無愧漢宣此所以臨蒞東國二十有七年而功光往牒業垂後裔者也頃年陪臣之使還也偶於沿途買得皇明十六朝紀其中記本國癸亥年事直以篡逆書之其他汙衊之言不啻狼籍臣先父王淵自得此書居常腐心復慮明朝國乘復有誑謬方擬赴訴天朝祈加釐正不幸奄忽齎志未伸煢煢微臣奉此遺戒何敢一刻忘於中而重哀薦禍事有未遑淹延遲回遂至今日此固臣之大罪而亦臣之日夜銜痛者也兹敢歷陳先祖臣穆莊王受誣事略冀皇上之哀憐垂察焉其所謂十六朝紀不知撰次者為何許人而乃遽張訛偽掇拾怨讒一則曰倧走馬試劍謀勇著聞常在廢君左右用事二則曰密約繼祖母王太妃以救火為名令兵入宫甚至謂綁縛廢君投之烈焰嘻此豈人理之所可有者乎復有登萊巡撫袁可立侍郎畢自嚴諸人之疏至以媾倭等語大加詆誣夫以穆莊王之聰明仁孝素有令聞留心經術不學武事而謂之走馬試劍自際昏亂弟死讒口屏處危懍莫保朝夕而謂之常在左右金墉十年內外隔絶圜門棘户穴通飲食而謂之密約祖妃其虛罔謬盩固已極矣而當廢君之在位也戮太妃之父竄太妃之母奪太妃懷中八嵗之兒而殺之廢君之與太妃非特子道已絶亦太妃父母之讐也然而終使昌邑山陽得以自全於放廢之日者實賴我穆莊王泣涕惓惓上以寬太妃下以救羣臣以克盡乎保護之道也居則贍其衣食病則濟以醫藥矜恤之誼始終不替故光海君癸亥三月見廢至辛巳七月以天年終葬以壬午禮官供祭祀恩禮之厚無愧古昔彼投焰等語又何誣妄之太甚耶至於媾倭一款尤萬萬無理日本即小邦先世之深仇而隔海之外種也雖強弱不敵姑與之羈縻而既是我之仇邦又非我之匹偶今以童孺之騃儓隸之賤若指之為壻於倭則亦必駭然而憤怫然而怒矧以王室之親貴介之尊寧有忍事忘恥結秦晉於異類之理哉穆莊王妃即昭敬王朝宰臣領敦寧府事韓復謙之女王之在邸以禮委禽及至癸亥進主中壼與王同受天子誥命冠服而其氏族之詳亦既具於當時請封之奏臣不知登撫諸人何所徴據而作此不倫之語至上誣天子也伊時遼陽既閡登海初開中朝聲息之流布於小邦者只是江東毛鎮一路而已小邦情實之得達於中朝者亦只有江東毛鎮一路而已文龍方且占據一島積貨自衛飾功行賄西面而邀勳爵慿威肆喝東嚮而責餽餉首尾將十年矣及其驕虐日肆意欲無厭或俵散低貨而勒取貂參或多縱黠校而盡括民産或誘斬邊民而虛充首級西圉騷然若在塗炭穆莊王既纘序知民不堪義責常切彼不悛改祇益嫌釁而小邦之所以受懟於文龍者有不可以一二計則文龍之巧作蜚語肆然搆誣於廢興之際者又豈可量哉因此而督撫有奏因此而禮部有疏始則以無罪見疑而為憂終則以至寃將伸而為幸上自先太妃下至百官民庶悉舉廢君淫暴無道斁倫亂紀之罪先穆莊王寬仁孝順天與人歸之狀或直奏於天子或呈申於當路文龍亦反前説更上題本及其事實悉暴誣寃大伸明朝乃於天啓乙丑嵗遣太監胡良輔等許準封典仍賜誥命丙寅又遣翰林院編修薑曰廣等來頒詔敕兼以錫賚恩綸洊疊昭雪無餘則環東土數千里亦既脫離覆盆而獲見天日矣不料閲歷數紀之後興亡百變之餘尚有一種傳訛未盡除於私相記載之中者也夫末俗多陂流言易訛斯固叔季之通患而齊東之人或未悉於秦雍交南之事多不詳於燕代則草野之所紀述稗家之所論著容亦有此孟浪之失矣至於任當日之記注執當日之簡䇿考證有據聞見亦該想不至於顛倒紕繆如野史者而倘或溺於傳説眩於去取以之而布諸天下以之而傳於後代其將為先祖九地之寃小邦百世之痛者為何如哉今臣仄聞天朝方修明朝史書其於傳信紀實之際必有以正訛釐舛以成一代之正史小邦呼籲此正其時兹專差陪臣福善君李柟議政府參贊鄭哲等畢陳卑悃仰瀆天聰伏乞皇上特命修史諸臣細考明朝行查始末及小邦前後申奏刪除注誤快許湔雪以示勸懲以裁成永世之令典仍將印本宣賜小邦則非但小邦今日君臣受恩銜結糜粉是期抑臣之先祖先父亦將感泣於冥冥之中矣臣不勝大願謹具奏聞特賜諡本朝最重易名之典官至尚書大學士乃得賜諡近惟翰林院掌院學士喇沙里公以講筵舊勞又勤王事以死特贈禮部尚書諡文敏掌院學士葉公方藹以講筵舊勞特加禮部尚書尋遷刑部侍郎仍帶掌院學士加禮書舊銜卒亦諡文敏掌詹學士沈公荃亦以講筵舊勞加禮部侍郎仍掌府事卒諡文恪皆異數非常例也諡典古易名之典太常博士議之吏部考功奏行之有未允者所司駁之其重如此明掌於禮部本朝則內閣典籍司之每一人擬八諡或六諡以上內閣閣臣擇其三四進呈御覽欽定其一琉球世纘圖琉球國或云流求或云留求自元以前不通中國明洪武五年中山王察度始遣使入貢入本朝為屬國職貢不絶然紀載諸書不詳其世次豫門人汪翰林舟次楫使琉球歸作中山沿革志進呈御覽云世系沿革彼國有厲禁祕不以告多方購得琉球世纘圖一卷令譯者以漢文釋之知其國自南宋始稱王元延祐間國分為三中山山南山北明宣德時復合為一明初山南王承察度山北王帕尼芝亦遣使入貢受封自宋及今代已四易所謂姓歡斯者無據謂皆尚姓者亦非也世纘圖載之如左大琉球國中山王舜天以來世纘圖舜天舜馬順熙義本英祖大城英慈王城二城或作成西威察度始通中國武寧尚思紹尚巴志尚忠尚思達尚金福尚泰久尚德尚圓尚宣威尚真尚清尚元尚永尚寧尚豐尚賢尚質尚貞即今襲封世子題名碑劉公嘉話録慈恩寺題名起於進士張莒題姓名於鴈塔下後書之於版遂為故事宋龎文英文昌雜録云本朝進士題名皆刻石於相國興國兩寺趙升朝野類要云進士及第各集鄉人於佛寺作題名鄉會起於唐之慈恩寺塔也豫按進士題名列諸梵剎於義無取至明乃立題名碑於國學題名記或學士或祭酒撰其典始重永樂壬辰已前在南雍今京師太學持敬門內諸碑則自永樂十四年丙申科始至崇禎十六年癸未科止螭首龜趺星羅林立一代之巨觀也本朝最為右文而題名碑止順治丙戌一科丁亥已後無之當時不知何故廢而不舉後遂相沿此闕典也土地今吏部禮部翰林院衙門土地祠皆祀韓文公明南京吏部土地祠則祀蹇忠定公池北偶談卷二
