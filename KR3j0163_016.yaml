body:
  text: 池北偶談卷十六刑部尚書王士禎撰景範碑鄒平縣西南五六里有小山曰相公山山前有景相公墓墓上有碑雖闕文尚可讀近于奕正作天下金石志亦未之載録於左云大周故銀青光祿大夫中書侍郎同中書門下平章事上柱國晉陽縣開國伯食邑七百户贈侍中景公神道碑銘并序翰林學士朝議郎尚書水部員外郎知制誥柱國賜緋衣袋臣扈載奉敕撰翰林待詔朝議郎守司農寺丞臣孫崇望奉敕書帝軒轅乘土德之運其臣曰奢龍祝融能辨方域以制區夏帝媯氏禪陶唐之基其臣曰伯夷后䕫能典禮樂以和人神上古佐命之道闕五字焉三政嗣興圖史寖盛彌綸輔翼代有其人皆金䇿丹書絢繢功業垂其訓聚而為墳典形其美流而為歌頌陋篆籀之質略我則潤之以闕五字之淪朽我則鏤之以貞珉銘以紀功碑以志行千載之下粲然可觀者其惟神道之表乎故中書侍郎平章事景公諱範皇朝元佐闕二字顯德二祀冬十一月薨於淄川郡之私第天子廢視朝軫殱奪之念制贈侍中遣使贈奠飾終之典優而厚闕二字詔詞臣闕一字文闕一字琰盛矣闕二字孔悝彝鼎不出廟門杜預豐碑空沈漢水姑自矜於名氏誠未顯於邦家與夫輝煌帝恩導揚休烈闕八字者可同日而語也闕六字綸有直而敘之用丕顯我大君之命臣聞景氏之先出於芈姓從楚王於夢澤差闕一字侍臣畫漢闕一字於雲臺丹推名將濟美垂闕六字生偉人維周之輔長山之下淄濟為川地勝氣清惟公故里夫嘉遁絶世髙卧於是者足以闕一字皓氣而為闕七字生於是者足以闕三字而為世傑故公之先由烈考太僕府君之上曰王父賔大王父閏皆貞晦不仕介享天爵而巢許闕十三字􅲊下闕仲曰篆公闕四字世闕二字聿登相位而申甫之祥著矣昔者聖人之教天下也本之以仁義制之以經籍是謂人文是謂人闕六字以闕一字開物成務者闕四字所於此闕二字以公輔之位必由稽古升廊廟之才必以經術顯而公以明經擢第於春官氏則賢哲之闕六字為吏於清陽闕十一字掾於高密郡秩滿而闕一字授范縣令大鵬之翼鎩北溟以未舒蟄雷之聲殷南山而不闕一字然則闕七字于之闕十五字通人之才變而順則方圓之量不能局故公之佐縣政也人謂其勤且潔矣典刑書也人謂其闕八字邑恪闕一字以闕八字使闕一字政闕一字而從入者則人謂其賢且能矣粵若日月之彩得天而大明風雲之期遇屯而勃起闕十字磻溪闕一字璜闕十字我大周聖神恭肅文武孝皇帝建大功於漢室為北藩於魏邦初筵既開得賢斯盛於是我公闕九字而君臣之闕九字龍飛在天躬載曜靈至於霄極皇業肇建制以公為秋曹郎進階至朝散大夫而闕九字萬闕十二字之樞惟聖人執左契臨萬邦經久制大命日政之機國之大柄總於樞務者可謂重矣而公闕九字忠而賢闕十一字公為左司郎中充樞密直學士尋轉諫議大夫克職今皇帝嗣位之時登用舊臣而并人乘我大喪擁衆南寇親征之舉迅若奔雷分命大臣保釐闕七字於公仍拜二卿闕九字振帝伐張黃鉞白旄殪羣凶而皆盡參旗河鼓導清蹕以言旋大祲既已平九服又已定闕四字時惟輔臣而公昌言可闕八字聖謨碩望可以鎮流俗爰立之命帝心允孚六府肇修兵賦元大邦之調用闕五字公自立不回信而有守闕十字哉大運逢時洪鈞在手資忠孝於君父享富貴之崇髙而盡悴之勞因成恙疢封章疊上優詔褒稱聽解利權闕一字專闕七字以列卿歸第懸車故鄉嗟風樹之忽驚訴昊天兮何極見星而往夕露方多泣血以居晨漿屢絶哀與性盡臥疾而終享年五十有二闕七字觀夫公之行事則其道也淳而粹充充焉無能稱其言也直而肆謇謇焉無所忌耿介以自立强幹以自闕一字故其仕也闕一字一命之卑闕一字三闕六字無悔吝古人之操何以尚也秉筆者得無愧於詞矣許國夫人李氏嗣子太廟齊郎嚴信等闕三字靈闕一字光闕二字蒸嘗翼翼賢人闕九字子事終之禮佳城閉日長楸篲雲勒銘垂休以示千古其詞曰長白蒼蒼淄水湯湯哲人之生逢時㑹昌哲人之逝魂遊故鄉闕一字髙山兮峩峩逝水兮驚波闕一字而闕一字死闕十九字山有頽坂水有髙岸人何世而弗新善有名兮獨逺猗歟公兮時用丕顯顯德三年嵗次丙辰十二月己未朔十日戊辰山泉翁詩青州城南花林疃泉石清幽有塵外之趣山泉翁題詩云山藏栁市無車馬水隔桃源有子孫馮宗伯琦愛其語遂與鍾司空羽正約卜鄰其地集詞秀水朱竹垞彝尊集唐詩為填詞一卷名蕃錦集殊有妙思略録數闋於此燕語踏簾鈎李賀池北池南草緑王建京口情人别久張繼與君歌一曲李白有時半醉百花前李賀山月皎如燭韋應物贈瑶華之旖旎陳子昂得明珠十斛李賀秋風清李白秋色白李賀望盡青山獨立盧綸披澗户盧照鄰度飛梁同上吟詩秋葉黃杜甫幽蘭露李賀香楓樹皇甫冉吠犬鳴雞幾處同上蒼翠晚劉長卿染羅衣李賀鳥還人亦稀李白江海茫茫春欲遍劉長卿岸上無人孫光憲野色寒來淺羅隱向晚因風一川滿薛竒童蘭閨栁市芳塵斷駱賔王越女含情已無限羊士諤灑霧飄煙包佶天畔登樓眼杜甫此夜斷腸人不見顧况紗窗只有燈相伴裴說此首詠春雨尤字字入神耕者王清臣天啓初潁川張逺度買田潁南之中村地多桃花林一日㩦榼獨遊見耕而歌者徘徊疃間聽之皆杜詩也遂呼與語耕者自言王姓名清臣舊有田畏徭役盡委諸其族今為人傭耕少曽讀書客有遺一冊於其舍者卷無首尾讀而愛之故嘗歌亦不知杜甫為何人也異日逺度過其廬見舊厯背煤字漫滅乃燒細枝為筆所書皆所作詩後經亂不知所在張獨傳其一篇云人生如泛梗飄飄殊無根飲啄得幾許營營晨與昏對此春日好荷鉏出南原近觀草色敷靜聽鳥語繁諸有弄花本雜遝呈真元曉然似供我寧不倒清樽有身貴適意窮達安足論此亦杜五郎之流歟草賢崔瑗善章草王隱謂之草賢此在草聖之前而人罕知之考功詩從叔祖季木考功象春跌宕使氣常引鏡自照曰此人不為名士必當作賊嘗奉使長安飲於曲江賦詩云韋曲杜陵文物盡眼中多少可兒墳其傲兀如此有題項王廟樂府一篇云三章既沛秦川雨入關更縱阿房炬漢王真龍項王虎玉玦三提王不語鼎上杯羮棄翁姥項王真龍漢王鼠垓下美人泣楚歌定陶美人泣楚舞真龍亦鼠虎亦鼠此詩劉公㦷絶愛之公與文光祿太青友善詩亦齊名三禮楊太史用賔觀光致知小語云周禮儀禮大戴禮曰三禮喪禮葬禮祭禮亦曰三禮出喪禮天神人鬼地祇亦曰三禮出舜典唐宋詩句晚唐人詩風暖鳥聲碎日髙花影重曉來山鳥鬧雨過杏花稀元人詩布榖叫殘雨杏花開半村皆佳句也然總不如右丞興闌啼鳥緩坐久落花多自然入妙盛唐髙不可及如此蟹字韻詩顧姒字啓姬杭州人適鄂生某康熙庚申從其夫至京師嘗見所著靜御堂集小賦詩詞頗婉麗九日豫與同人飲宋子昭工部小園限蟹字韻翌日鄂詩先就顧代作也其末云豫本淡蕩人讀書不求解爾雅讀不熟蟛蜞誤為蟹豫驚歎顧善歌所製詞曲有一輪月照一雙人面之句豫最賞之梵雅安丘馬禮部應龍撰梵雅十二卷釋言第一釋義第二釋相第三釋教第四釋佛第五釋菩薩第六釋聲聞第七釋外道第八釋人倫第九釋天文第十釋地理第十一釋鳥獸第十二安邦試録孫沙溪無用閒談載安邦鄉試録并其賦表極佳雖中華文士無以過之安邦者安南一道之名也試録題云洪德二年辛卯蓋其國僭號初場四書義四篇五經義五篇二場制詔表各一篇三場詩賦各一篇四場長策一篇交趾明初為十四道之一蓋沿中國科舉之制而稍損益之耳其擬謝𤣥讓前將軍表曰奈彼氐秦生心猾夏逞虎貪狼噬之惡正爾憑陵賴風聲鶴唳之威居然奔潰諒本皇天之助順亦由廟算之先幾詎意圖功驟加異寵言念百年之績猶後即誅豈伊一戰之勞敢先受賞木罌賦曰雪罍恥於滎陽振槁葉乎濉水士自間於汔濟人何擇於善泅又云惜乎始終參差倉皇反復固陵之車桅不來齊村之禍坑自速智已局於挈瓶悔猶追於鼎足瓽轠啓釁瓶羸告凶檻車之困未幾鐘室之恨何窮鳥言卉服何以有此亦竒矣粵風續九粵西風淫佚其地有民歌猺歌狼歌獞歌蛋人歌狼人扇歌布刀歌獞人舞桃葉等歌種種不一大抵皆男女相謔之詞相傳唐神龍中有劉三妹者居貴縣之水南村善歌與雍州白鶴秀才登西山髙臺為三日歌秀才歌芝房之曲三妹答以紫鳯之歌秀才復歌桐生南嶽三妹以蝶飛秋草和之秀才忽作變調曰朗陵花詞甚哀切三妹歌南山白石益悲激若不任其聲者觀者皆歔欷復和歌竟七日夜兩人皆化為石在七星巖上下有七星塘至今風月清夜猶倣佛聞歌聲焉同年睢陽吳冉渠淇為潯州推官采録其歌為粵風續九雖侏􅍣之音時與樂府子夜讀曲相近因録數篇民歌曰妹相思不作風流待幾時只見風吹花落地不見風吹花上枝相思曲思想妹蝴蝶思想也為花蝴蝶思花不思草兄思情妹不思家蝴蝶思花娘在一岸也無逺弟在一岸也無遙兩岸人煙相對出獨隔青龍水一條隔水曲妹嬌娥憐兄一箇莫憐多已娘莫學鯉魚子那河又過别條河妹同庚嫩鴨行遊塘柵上嬌娥尚細不曽知天旱蜘蛛結夜網想晴只在暗中絲塘上妹相思妹有真心弟也知蜘蛛結網三江口水推不斷是真絲妹相思科舉秀才取紅豆相思及早辦前程黃菊花開九月九枝枝葉葉有娘名黃菊花猺歌云思娘猛行路也思睡也思行路思娘留半路睡也思娘留半牀一白馬兒白馬端正也難騎娘騎馬頭表馬尾馬轡尖尖妹陷比二陷比即怎騎鄧娘同行江邊路却滴江水上娘身滴水一身娘未怪表憑江水作媒人三鄧與也黃蜂細小螫人痛油麻細小炒仁香鴨兒細細著水面表緣細小愛憐娘四狼歌六吞六齊度菊口籠六鳥也吞見也齊度大家也菊飛入也口籠山中也大路無數岔江河無數曲望東西南北花色一般紅又舊錢便好使舊米好做糍望北斗超生望有彭照顧彭謂所私各想心各愁心頭如馬踐條條臘真力百色盡眉齊臘擔也真力重也三十六圖羊四十雙圖雞言采禮之多盛稱夫家與羅敷行同意獞歌口三六四里踏得耳花桃花脈淋了好花桃淋了密淋了細絲絲淋了離乙乙養勒佛排􅀈養勒花排菲里樣對鴛鴦里樣梁山伯山伯祝英臺此進山踏歌之詞口入也脈瓣也淋諦視也離陸離之意乙猶亞也五六句承四五句言桃花跗萼之穠艷已下五句專賦踏歌之人勒兒也􅀈整齊也菲美麗也男女相悅言男如佛女如花耳鴛鴦比之於鳥梁祝比之於人蛋歌蛋有三種蠔蛋木蛋魚蛋此魚蛋也錯畔行過蘇行巷魚通水透到花街木樨花發香十里蝴蝶聞香水面來一蛋船起離三江口只為無風浪來遲月明今網船頭撒情人水面結相思二今拏也三江黔江鬱江潯江鹿在髙山喫嫩草相思水面緝麻紗紋藤將來作馬匹問娘鞍落在誰家三麻紗網也魚蛋浮家泛宅故所賦不離江上也狼人扇歌者書歌於扇字如蠅頭一面則花鳥其詞有云比萬兩千金睂心又睂意比火帝龍師結夫妻卦世火帝龍師二人名卦過也擔歌者峒人多以木擔聘女或持贈所歡以五采齘作方段齘處文如鼎彞歌與花鳥相間字亦如蠅頭布刀者峒人織具也書歌於刀上間以五采花卉明漆沐之又有師童歌者巫覡樂神之曲詞不録彭氏詩鄧州彭氏布政使禹峯而述女適李鴻鴻字青立文達公裔孫學士恆茂之子豫門人也鴻亦能詩而才不及婦豫嘗序其蝶龕集刻之京師如咏白蓮云月亦驕花色風偏送葉香刺繡云針宜停午倦窗喜趁新晴送外云山川日以逺雨雪天將寒皆佳句也又雷家灣云峯峯斜倚俯清漘一葉孤舟亂後身洞口白雲雞犬在此中大有避秦人金銀洞云絶壁繩橋萬壑深春風何意此登臨安禪暫借蒲團力坐聽神龍澗底吟又隂崖如幄俯青蘿脈脈寒泉激素波豆大一舟沙際望四山香氣鳥聲和種桃栁云繞畦煙水望迷離種得桃枝間栁枝好是年年芳草地春晴須記聽鶯時惜香橙云幾經剪拂始成林夏晚移牀就緑隂却怪一朝風雪惡惜香空負十年心此類數十篇皆可誦也超一子超一子者廣陵殷氏女早寡學道三年坐化遺詩偈一卷有云靜中無箇事反復弄虛空地老天荒後魂飛魄喪中有師聞道統無法度愚蒙忽底虛空碎夕陽依舊紅又看花云土來澆灌水來栽顛倒工夫任我來滿院春風花自語不將顔色向人開四六話宋王銍作四六話二卷與詩話賦話文話並𫝊於時又有作四六談麈者唐宋以來重四六如此故溫公知制誥以不能作四六辭識小編載洪武六年諭禮部尚書牛諒禁止四六文字并表箋亦然諒等乃録栁子厚代栁公綽謝上任表韓退之賀雨表以上命頒行天下以為式然其後制誥表箋皆用四六未嘗變也宋元人集目秀水曹侍郎秋嶽溶好收宋元人文集嘗見其靜惕堂書目所載宋集自栁開河東集已下凡一百八十家元集自耶律楚材湛然集已下凡一百十有五家可謂富矣近時石門吳孟舉之振刻宋詩鈔亦至百數十家多祕本而潁濵南豐尚不及載則未刻尚多也吳曽為豫言唐樊宗師宋二劉公是公非集其家皆有之又嘗見金陵黃俞邰虞稷徴刻唐宋元書目所載有金趙秉文滏水集二十卷元郝經陵川集三十九卷癸亥俞邰以徐都憲立齊元文疏薦入明史館豫時向之借書所見如李觀集司空圖一鳴集沈亞之下賢集栁開河東集王令廣陵集牟巘陵陽集李之儀姑溪集耶律楚材湛然居士集皆目所未載者又豫家所有張養浩歸田類稿石介徂徠集尹洙河南集嶽珂玉楮集則黃氏之所未備也近朝鮮入貢使臣至京亦多購宋元文集往往不惜重價祕本漸出亦風㑹使然水東日記云張文忠公全集今在故副都御史雲中孫廷瑞家蓋齊府舊物有歐陽圭齊序豫所見本有富珠哩翀序而無圭齊序杼山集牒釋晝杼山集十卷有湖州刺史于頔序詩七卷碑志𫝊讚書序二卷聮句一卷首載敕浙西觀察使牒湖州當州皎然禪師集牒得集賢殿御書院牒前件集庫內無本交闕進奉牒使請速寫送院訖垂報者牒州寫送使者故牒貞元八年正月十日牒都團練副使權判兼侍御史李元使潤州刺史兼御史中丞王緯按唐六典集賢殿學士掌刋緝古今圖籍凡天下圖書之遺逸賢才之隱滯則承㫖而徴求焉當時一衲子之集至下敕觀察使牒本州寫送其於文事可謂勤矣後世如此等事豈可易得張睿卿雅通所編吳興唐五家集略同但作四卷王威寧詩豫改官翰林侍講時淄川唐濟武夢賚太史寄詩云蠟燭五侯新制誥鞦韆三影舊郎中語雖巧特工妙後讀王威寧詩有云江浙老成新運使户曹公道舊郎中乃知前輩已有此句法但工拙異耳武侯集宋龍泉葉氏習學記言序目云諸葛武侯集荀朂和嶠令陳夀所定亮之言魏晉所不欲聞然且存之而不敢沒非亮至誠孰能使之哉豫謂是固忠武至誠動物之效而晉武帝之視宋哲徽二宗朂嶠之視章惇蔡京輩務俾蘇黃諸公著作一字不存於世明太宗靖難後舉世以方正學文章為諱其用心霄壤矣葉謂晉武好善忘讎自是盛事故其後裔雖亂而尚延㫖哉曹操殺孔北海其子丕獨愛融文辭每嘆曰揚班儔也募天下有上融文章者輒賞以金帛此又在晉武之前皆後世所不及葉水心論三國志葉水心謂陳夀三國志筆髙處逼司馬遷但少文義緣飾終勝班固又云近世有謂三國志當更修定者蓋見注所載尚有諸書不知注之所載皆夀棄餘按陳夀之書古今訾謷者非一班氏良史以夀勝固殊不可解若其稱名三國名義乖舛自陳同甫郝伯常諸人皆改正其書此外作者尤衆林霽山集有胡君季漢正義序楊亷夫正統辨其言尤著近世歙人謝陛少連季漢書出不惟名正言順抑且文詞斐然惜水心不及見耳駟不及舌葉氏之謂矣管夫人畫祁縣戴楓仲藏管夫人道升小畫一幀有細書十字云山回新綺閣竹掩舊朱門邢子願太僕題云竹繞層樓罥網蛛絲絲縷縷貌曇瞿倦來素面流輕粉尚衣羊肝半臂無戴博雅有文與傅青主善有半可集毗陵集唐獨孤及毗陵集二十卷有朝議大夫前守䖍州刺史隴西李舟序補闕安定梁肅後序此序載文粹中末有祝允明跋云毗陵集二十卷祕藏天府世罕其𫝊吳文定公在東閣抄藏於家其孫經府君與貞山給事為內兄弟給事因得假歸録之云詩三卷通八十二篇與今詩紀所載無異餘賦一表二十七書二議九銘三頌一論一缺二碑五序五十一集序三讚六記述十二䇿書四文十二行狀二碑銘五靈表一墓志二十七祭文九康熙癸亥閏六月借抄於晉江黃氏林艾軒駁詩本義宋林艾軒光朝與朱子同時同里說詩最不喜歐陽本義與趙子直書云詩本義初得之如洗腸胃讀之三嵗覺得有未穩處大率歐陽二蘇及劉貢父談經多如此又一書駁本義關雎樛木兔罝麟趾等解甚悉大抵歐陽本義雖未必盡合然較考亭盡去小序而以臆斷不啻勝之未可厚非誦詩豫六七嵗始入鄉孰受詩誦至燕燕緑衣等篇便覺棖觸欲涕亦不自知其所以然稍長遂頗悟興觀羣怨之㫖宋王融陳叔盥與樂軒陳藻讀國風於古寺至采蘋藻掩卷而泣頓悟中庸之㫖叔盥以告網山林亦之網山遂以藻見於其師林艾軒曰吾嘗謂詩不歌易不畫無悟入處今于元潔尤信知此者可與言詩然采蘋之詩亦未見可泣處學杜宋明以來詩人學杜子美者多矣豫謂退之得杜神子瞻得杜氣魯直得杜意獻吉得杜體鄭繼之得杜骨它如李義山陳無已陸務觀袁海叟輩又其次也陳簡齊最下後村詩話謂簡齊以簡嚴掃繁縟以雄渾代尖巧其品格在諸家之上何也沈下賢集唐吳興沈亞之下賢集十二卷古賦詩一卷雜文雜著如湘中怨秦夢記馮燕傳之類三卷記二卷書二卷序一卷䇿問對一卷碑志表一卷行狀祭文一卷有宋人序題元祐丙寅十月一日無名氏末有萬厯丙午閩人徐􅎾興公跋云鈔諸焦太史者後附張祐杜牧李商隱三詩黃俞邰虞稷得之周櫟園户侍户侍得之謝在杭方伯家下賢文大抵近小說家如記弄玉邢鳯等事雞上木豫贈徐隱君東癡夜詩云先生髙卧處柴門翳苦竹雪深門未開村雞鳴喬木日午炊煙絶吟聲出茅屋云云故友葉文敏公方藹最愛之而不解雞鳴喬木之句以為江南若見雞上木鳴則以為妖孽矣然古詩已云雞鳴髙樹顛陶詩云雞鳴桑樹顛而諺亦有云雞寒上樹鴨寒下水此皆前習見語訒菴豈忘之耶佛手柑詩益都王太平遵坦有詠佛手柑詩云斷此黃金體施於祇樹林度人難下指合掌即𫝊心味向駢枝悟香從反覆尋諸天有真訣巨擘競森森豫每歎其工太平又嘗作禪意詩數十篇木瓜詩解紫陽解詩多失本意其甚者如木瓜一章尤為穿鑿輔廣童子問亦知其非而不敢斥師說則欲盡抹倒小序家語以傅㑹其謬依違可笑云有學者請於先生曰某於木瓜詩反復諷咏但見其有忠厚之意而不見其有䙝慢之情小序以為美齊桓恐非居後揣度者所能及或者其有所傳也竊意桓公既殁之後衛文公伐齊殺長立幼衛人感桓公之惠而責文公之無恩故為是詩以風其上不然則家語所謂吾於木瓜見苞苴之禮行焉豈鑿空而為此言乎先生以為不然曰若以此詩為衛人欲報桓公之詩則齊桓之惠何止於木瓜而衛人實未有一物報之也此論呆甚豈詩人言外之意愚謂此下輔氏之說以此言之則小序之說亦傅㑹之失實無所據何武斷如此而先生疑以為男女贈答之詞則亦以為衛風多淫亂之詩而疑其或然耳此段是至於家語所載夫子之說乃王肅所纂集固難盡信而其言亦又無甚意味且於小序之作未知其孰為先後也若是則秦火已後六經四子之書皆不足信矣因傅㑹師說而并欲廢家語可謂妄人也已矣其它解有女同車風雨子襟等篇皆傅㑹無理諸家之說斯為最下廟堂碑虞伯施夫子廟堂碑真蹟康熙壬戌江南一士夫㩦至京師或酬直五百金不許張學士素存玉書云親見之又有陸士衡真蹟一帖歸户書真定梁公蒼巖清標宋牧仲犖曽見之表語本樂天詩宋任忠厚惇坐上書入籍久不得調投時相啓云籠中剪羽仰看百鳥之翔岸側沈舟坐閲千帆之過蓋用白樂天詩沈舟側畔千帆過病樹前頭萬木春語后山師曽黃猗覺寮記云陳后山平生尊黃山谷末年乃云向來一瓣香敬為曽南豐人或疑之非也無已少學文於子固後學詩於魯直各有師承是詩觀兖文忠公六一堂圖書又有句云世雖嫡孫行名在惡子中又與林秀州書云有聞於南豐先生不敢不勉答朝深之書云始僕以文見南豐辱賜以教云云又妾薄命二篇至有殺身以相從之語自注為曽南豐作其推尊至矣至答秦覯書云僕於詩初無師法一見黃豫章盡焚其稿而學焉其自序源流甚明白惟於兩蘇公雖在及門六子之列而其言殊不然其答李端叔書云兩公之門有客四人黃魯直秦少游朝無咎長公之客也張文潛少公之客也言外自寓倔强之意此則不可解耳虞揭虞道園序范德機詩謂世論楊仲𢎞如百戰健兒德機如唐臨晉帖揭曼碩如美女簪花而集如漢廷老吏曼碩見此文大不平一日過臨川詰虞虞云外間實有此論曼碩拂衣徑去留之不可後曼碩赴京師伯生寄以四詩揭亦不答未久卒於位偶讀梁石門寅集述此記之文士護前盧後王前千古一轍可笑也艾軒用法語吳子經臨川人與歐陽文忠游著法語有云稚子夜啼拊背以缺之而不止取果餌與之而不止於是其母滅燭其父伏户下為鬼嘯為狐鳴則其口如窒此事所以貴乎權也韓子蒼謂其絶似莊子孝宗朝林艾軒光朝在太學日試兵勢䇿云譬如嬰兒夜啼拊之不止啖之不止卒然滅燭伏户下為虎嘯狐鳴則其喙如窒全用吳語校文者傳以為笑少司成陳少南見之大驚歎曰此筆當與太史公爭衡必置首選林希逸作艾軒文集序載其事蓋當時艾軒實竊吳詞訕笑與賞歎者皆不知其本法語也蜀鑑蜀鑑十卷起秦人取南鄭秦人伐蜀迄西南夷本末有文子嘉熙丁酉跋云與資中郭允蹈居仁共為此編又有姚咨嘉靖丙寅跋云是編豫得之羅浮外史顧𤣥緯氏𤣥緯得之兵侍鄞范東明翁翁又得之章丘李中麓吏部輾轉假録越二十餘年豫始得手鈔凡六踰月乃畢夙興夜寐無論寒暑蓋不知老之將至是書豫壬子入蜀時購之不可得康熙癸亥乃借之朱檢討錫鬯朱好寫書多未刻祕本跋中李中麓氏藏書百六十年未散近始歸崑山徐宫贊健菴乾學梁溪顧氏書至孝亷修逺宸尤富後書歸吳中丞伯成興祚惟四明范氏天一閣書不以借人至今無恙餘姚黃梨洲宗羲多就閲其祕本李元賔集唐李觀元賔文集五卷附詩四篇始郊天頌終邠寧節度饗軍記凡雜文五十篇諸碑銘亦有竒處至與孟簡吏部奚員外諸書粗率叫呶如醉人使酒罵坐蓋唐中葉已後江湖布衣挾行卷干薦紳延接稍遲贈遺稍薄則謗讟隨之浸以成習觀諸書可見編首有陸希聲序謂始元賔舉進士其文稱居退之右元賔早世其文未極退之窮老不休故能卒擅其名又云元賔尚於辭故辭勝其質退之尚於質故質勝其辭此序載文粹中豫謂元賔視退之如跛鱉欲追騏驥未可以道里計也唐人不明理唐人多不明理如歐陽詹自明誠論先云文王周孔自性而誠者也顔子游夏得誠自明者也下却云尹喜自明誠而長生公孫𢎞自明誠而為卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴此等議論可謂離經畔道宋儒之罪人也熊館豫蜀道詩有熊館四時隂之句亡友葉文敏訒菴方藹以為射熊館乃漢上林館名不可借用非也夢溪筆談云熊於山中行數千里悉有跧伏之所必在石巖枯木中山民謂之熊館訒菴或偶忘之耳又有句云東道連􅓃䏰按􅓃䏰音潤蠢而顔師古地理志注音劬豫從顔音唐人歌樂府唐人所歌樂府詞曲率是絶句然又多剪截律詩别立名字殊不可曉如王右丞風徑角弓鳴一首截取前四句名戎渾揚子談經處一首截取前四句名崑崙子旗亭伶人所歌髙常侍開篋淚霑臆一首萬首作濡本是長篇截取前四句名涼州歌是也又考教坊記諸曲名如胡渭州穆護子又作砂涼州伊州甘州之類皆載而無戎渾崑崙子之名潘髙金壇潘髙孟升南村詩雅語時入古人豫最喜一絶句云黃鴉穀穀雨疏疏燕麥風輕上鮆魚記得去年寒食節全家上冢泊船初武風子武風子雲南之武定人名恬或言其先軍衛官也嘗行乞市中或寄宿僧寺狀若清狂不慧特有巧思能於竹箸上燒方寸木炭畫山水人物臺閣鳥獸林木曲盡其妙嘗畫凌煙閣功臣瀛洲十八學士鬚睂意態衣褶劍履細若絲粟而一一生動或以酒延致之以箸散布其側醉輒取畫運斤成風藩王督撫藩臬大吏欲邀致即逃匿山谷不見也其箸一束直白金數星宦滇南者逺餽京師用充方物亦竒技也風子醉後或歌或笑或說論語有竒解年六十餘卒盧氏雜記云故德州王使君椅有筆一管約一寸許管兩頭各出半寸以來中間刻從軍行一幅人馬毛髮屋木亭臺逺水無不精絶每一事刻從軍行二句云用鼠牙刻之故崔郎中鋋有王氏筆管記此其類焉銅雀硯辨崔後渠彰德府志辨硯云世傳鄴城古瓦硯皆曰曹魏銅雀磚硯皆曰冰井蓋徇名而未審其實魏之宫室焚蕩於汲桑之亂趙燕而後迭興代毁何有於瓦礫乎鄴中記云北齊起鄴南城屋瓦皆以胡桃油油之光明不蘚筒瓦用在覆故油其背版瓦用在仰故油其面筒瓦長二尺闊一尺版瓦之長如之而其闊倍今或得其真者當油處必有細紋俗曰琴紋有花曰錫花傳言當時以黃丹鉛錫和泥積嵗久而錫花乃見古磚大者方四尺上有盤花鳥獸紋千秋萬嵗字其紀年非天保則興和蓋東魏北齊也又有磚筒者花紋年號如磚內圓外方用承簷溜亦可為硯宋刺史李琮元豐中於丹陽邵不疑家得唐元次山家藏鄴城古磚硯背有花紋及萬嵗字與鄴中記合又曰大魏興和二年造則唐賢所珍已出於南城矣扈從清涼詩髙侍講士竒扈從清涼山雜詩云仙蹕陪遊陟井參年來萬里閲﨑嶔東西行遍關山路三度春風宿羽林辛酉扈從巡歷喀爾沁壬戌扈從奉天府癸亥扈從清涼山皆以二月出都輕寒未放杏花枝樹底停鞭感嵗時不止今年負花事漫將遊跡比分司元王惲完州詩誰著分司王老子杏花香裏過今春滱水濺濺出谷流沙原路僻草新抽雞聲亭午山村外報道郵籖過定州佛頂分來五髻青浮空鳯剎玉輿停茜衫黃帽搖金鐸宫錦齊開梵宇經紫府仙山實奧區長松鬱鬱壑爭趨興來那得勾龍爽重寫峯巒入畫圖勾龍爽有紫府仙山圖載宣和畫譜新安城上有髙樓金粉香銷幾百秋傳是章宗遊賞地纖花細草滿春洲野淀瀰漫一望迷漁莊蟹舍接通隄逺天雲樹熹微裏只少樓臺似浙西池北偶談卷十六
