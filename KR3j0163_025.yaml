body:
  text: 池北偶談卷二十五刑部尚書王士禎撰劉吏部詩劉公㦷吏部在鳯陽與其友蘇懋斿銘孝亷往龍興寺與某禪師扣擊竟日晚歸遂化去是夜蘇夢公㦷來微笑吟詩云六十年來一夢醒飄然四大御風輕與君昨日龍興寺猶是拖泥帶水行放生池京師沙窩門有放生池一區順治中浙人范思敬者實創始焉初范嘗夢到一院旁有禪室簷際懸木刻作魚形有人指示云東坡先生居此遂入伏謁東坡與語久之云吾有王文正公泥金書法華一部今予汝取授之經尾署名王旦也坐側有一人侍立云是何姓覺而異之既數年放生池成延一老宿居之范一日至院中堂宇宛與夢中相似禪室果有木魚懸簷際既而與老僧坐語移晷老僧忽云貧道有一法寶藏之久矣今贈居士視之即王文正公金書法華經也室有募縁䟽為何侍御某書豈僧即東坡後身耶釣臺郯城東南有臺壘石為之甚峻而堅鄉人𫝊為釣臺或云大禹鑿羽山通沭水作此臺以鎮水俗又呼為鎮水臺明世宗時一縣令毁臺取石及其半有大石板下有一巨荷葉尚鮮好有古劔尺餘壓其上下則一水泓然池中二魚鼓鬛游泳令竟放魚於河置劔於庫而毁之自是郯罹水患遂遷今治黃給事六鴻説黃嘗為郯令熊仙人楚人熊生者客某公家塾為童蒙師一旦謂具親某生曰我修真有年合得仙道有書若干卷當以授子踰日又謂曰昨子不合作某事不應得仙明日我午刻當逝矣慎無窺伺聞室中聲響乃啓户至期闔户入寂無所聞頃之忽聞霹靂一聲發牕視之香氣絪緼熊生已端坐化去現形雲端揮手别衆久之始没崇禎年間事也海寧陸冰修嘉淑説蕭氏釣磯立談載契丹使至江南云蕭氏與耶律氏相為終始謂江南諸蕭雖享國日淺無大罪戾是以遼之蕭氏為梁後也按遼史太宗以小漢為汴京留守賜姓名曰蕭翰因稱蕭氏非本氏蕭也立談失考杞縣狀元明中州狀元二人皆杞縣人一正德甲戌孫襄敏公賢一崇禎甲戌劉文正公理順相距百二十年禮部尚書湯公潛菴斌云蔡侍郎睢州蔡侍郎石岡天祐𢎞治中進士方嚴正直生平遇鬼神事甚多湯荆峴先生斌言其為山西憲使時行部至一驛驛有鬼為祟人不敢宿驛卒以告公叱之比夜秉燭獨卧堂中枕傍寘一劔三更時忽風起門洞開有一人被髮跪牀下公起坐從容問之曰汝何人果有寃枉當告我為汝理之鬼徑起由廊下出公拔劔隨其後廊外皆荒草斷垣至垣外眢井而殁公卓劔識之歸而酣寢及曉從者皆至公集衆至其所縋視則有尸在焉訊諸驛卒云有某甲向開店於此移去數年矣此井其後圃也公立令捕至至則具服某年月日有行客㩦重貲宿其家謀而殺之投諸眢井家以此致富遂遷居公立寘諸法自後驛遂無他超然琅邪二臺諸城李渭清澄中太史言超然臺上舊有蘇文忠公三大字嘉隆間知縣顔某字琅邪秦人幼時嘗夢登琅邪臺因以自號後果筮仕諸令秩滿竊載蘇書歸而别以贗石易之今臺上止存八分題名九字琅邪臺上秦碑高數丈形製甚朴無趺首今可辨者僅臣斯臣去疾數字又臺下入海十餘里復有一碑毎海潮退時乃可見荻港神順治丁酉十月當塗荻港水忽涌丈餘有宋某者卧官舫夢神促之曰移船移船遽驚起纜已解俄岸崩如雷他舟皆溺女化男山東濟寧有婦人年四十餘寡數年矣忽生陽道日與其子婦狎久之其子鳴於官其事屬怪異律無明文乃令閉置空室中給其飲食戊午年事也萬眉山高學士士竒在内直一日理内府書見有明成化中大學士萬安進房術書一册装潢精緻署臣安進字尚宛然劔術長興人臧湘友少逢異人授以一卷書中有劔術臧頗得其𫝊海鹽陸辛齋嘉淑云嘗見其劔合乃以雷擊木雕成有鐵丸二即雌雄劔也又方寸小㦸一又金穵耳一又有白金二兩許餘物尚五六件云鍊劔須寒天乃可鍊時時有雷電遶戸逼人毛髮云岳陽改名宋史秦檜既殺岳忠武以岳州與其姓同改岳州為純州岳陽軍為華陽軍其忮刻穿鑿至此洞庭神康熙十八年湖廣總督蔡毓榮䟽言舟至新祥倐遇暴風因䖍禱君山龍神靈應甚著得㫖封為洞庭湖之神遣官致祭韓湘像邯鄲黄梁夢社㑹有道人疥癩遍體衣履垢敝見市中粥竹簾者輒卧其上惡而逐之毎一簾輒有一韓湘子像鬚眉宛然人競市之粥者得利亡算夢解元萬厯壬子山東鄉試濟南西郭有單叟者夢人告曰今科解元徐日升也明日見一士人徒行西來衣敝履穿彷徨市中叟試叩之云東昌人徐姓叩其名即日升也叟大驚異曰君必解元但留茆舍一切飲食洎塲屋之費吾皆任之他日富貴毋相忘耳徐驚喜不勝及榜發竟落第領解則長山徐日升海曙也後累官僉事尤生江南尤生者忘其郡縣將赴鄉試而苦貧無裝具夜夢人告曰市橋下有白金二錠重二十兩五更可往取之如其言而往無所見夜復夢如前又往亦無所遇橋側有銀工某者怪其早行頻數邀而問之尤告以夢且歎鬼神㺯人如此至夜復夢如前更促其早往至則果有白金如其數銀工又邀而問之對以故出示果白金也銀工曰吾誤矣昨聞君述夢聊鎔鉛錫為之以戲君耳不意誤取篋中金以往然神先告之特假手於我此定數也即舉以相贈已而中式乃倍酬銀工焉李叅政僕己未七月廿八日京師地震前河東道叅政李元陽居采峪死焉其二僕皆死逾二日一僕復活云初地震時不知已死但見二偉丈夫各高丈餘驅出門顧視同行者甚衆主人亦在焉頃之偉丈夫顧某曰汝不合在此人數内可速囘某曰某主人在是某將何之又數里復顧曰汝未去耶以杖擊其背遂甦泣筍蜀檮杌載蓬池人程宗雅母疾泣竹林得冬筍則泣筍不止孟宗也洞庭丐者洞庭山有丐者貌似狂易常行乞道上夜則卧菴寺廡下僧厭苦之驅去復來汪鈍翁嘗記其數詩云不信乾坤大超然世莫羣口吞三峽水脚踏萬方雲又有形總是假無象孰為真悟到無生地梅花滿四鄰又燈火輝煌慶此宵夜深兒女不相招破蒲團上三更夢那管明朝是嵗朝又一杖穿雲到上方湖光山色總茫茫乾坤有我能擔擔明月清風底太忙宣城烈婦宣城北門内舊有某烈婦坊近許州守阮士鵬居宅汙穢不治一夜阮氏館賔劉姓者夢烈婦來言曰吾苦節數十年蒙朝廷旌表建坊身後所得止此耳今子孫零落屬之他人瀦潦穢雜何以堪之劉瞿然醒白主人乃為重葺之士鵬今侍御爾詢父也錢葆馚松江錢少司宼艱於嗣與夫人往天童祈子大師為集衆僧問誰願隨錢居士往衆皆不答一飯頭老矣自言願往已而錢果得子名鼎瑞字寶汾後易名芳標字葆馚詞華麗藻有名東南中康熙丙午順天鄉試官中書舍人既而假歸戊午以博學宏詞薦值丁内艱不赴一日方與客坐齋中有僧至門持一椷書云自天童來舍人啓視之殊不駭訝但云倉卒奈何明日晨起徧召親故與訣索筆書一偈云來從白雲來去從白雲去笑指天童山是我舊遊處微笑而逝定數泰和蕭太常伯玉士瑋之姪孟昉家素封遭亂㩦珍貨值千萬至山中小菴菴僻甚人跡罕到蕭氏香火院也有彌勒佛像值殿門項可啓乃納貨其中人無知者忽大兵將襲贑州取道山中途出菴前以其僻陋初無意但稍駐午炊即行有卒繫馬彌勒像項上尋又一卒亦繫一馬於側二馬蹄齧遂曵像於地腹中珍貨悉露卒走告其帥遂盡取之物之有定數如此羅漢米紫來漢雯言知長葛縣時有剃髮待詔名羅漢者家衛輝貌甚寢一日方剃髮米家僮有吹笛者羅忽曰誤矣命作一弄甚妙又令吹笙曰必和胡琴方可明日自製胡琴將來吹之迥異凡調米素善南曲因與究極音律雖吳中曲師不能過也時癸丑㑹試舉人題𫝊至長葛其孟子題則盡其心者一節米歎其難羅漢為闡發𫝊註名理燦然又曰此章與宗門某某公案相發明因引諸尊宿語録如翻水米益竒之扣其所學頗記唐人詩數百篇亦曉篆𨽻自言有母妹在河北今辭公去當復來一别即往五臺不歸矣後亦竟不至焉徐蓉米侍講漢雯言前令建昌縣有縣署水夫文三郎者頗文雅不類俗人米謝亊居南昌三郎亦隨侍一日見家僮輩兩素扇一畫梅一畫蘭竹又書唐人絶句二首問之即文三郎妻徐蓉所作年才二十三化鶴南昌府驛路旁有精舍去江不逺溪水廻繞修竹萬个風景清幽康熙初忽有偉丈夫襆被來宿貌甚雄竒居止旬日語操西音自言愛此地風土欲為僧寺僧難之曰吾槖中有百金裝盡以相付但仰饘粥於此足矣乃從之遂落髮毎日粥飯外即面壁不語或竟夕不卧亦不誦經叅禪如是六七年初不解衣或竊視兩臂皆有銅圏束之莫測也一日與儕輩晚立江上有數人泊舟登岸望見之大驚趨前揖則揮手止之耳語移時别去戊申嵗忽沐浴禮佛遍别寺僧云明日當涅槃衆皆不信至期登臺敷坐少頃火自鼻中出烟焰滿空有白鶴自頂中飛出旋繞空際久之始没大衆皆見周伯衡體觀時為南昌憲副述其事作化鶴記湯氏傭宋中丞牧仲犖言睢州湯氏有傭工人某者夫婦傭其家數年毎聞主人與客談詩文輒竊聴一旦扃門去留書千言文詞博奥自叙悲憤援據古今多出意表竟不知誰何也黃大王黄大王者河南某縣人生為河神有妻子毎瞑目久之醒輒云適至某地踢㡬船好事者以其時地訪之果有覆舟者皆不爽李自成灌大梁使人刼之往初決河水輒他泛溢不入汴城自成怒欲殺之水乃大入始賊未攻汴一日黄對客慘沮不樂問之曰賊將借吾水灌汴京奈何未㡬自成使果至黃至順治中尚在鄭端清世子鄭端清世子讓國自稱道人造精舍懷慶郭外居之毎出坐竹兜四人舁之精邵康節之學宫中有一櫃手自緘鐍毎嵗輒益一封遺令遇急乃開及其孫夀平王值河北流宼之亂發櫃得破布衫五一闊大四稍窄小王軀幹甚偉其弟四人則短小也遂衣而逃某年亂定歸王府一舊人忽遇端清於山中云𫝊語諸孫當速去故里不可居也夀平兄弟以為妄不聴未㡬及難平陽僧平陽府南高河橋僧甚愿朴造橋工成遂結菴橋側與一郡王交好一日王坐聴事見僧從外來問之不顧徑入宫去未㡬報後宫得世子王心知其僧也後襲郡王夀九十乃終江河之異己未秋江南江鳴水立如山久之乃復其故又順天府東安縣河水暴漲居人見水中有物如蛟龍而目赤色後有白馬隨之目亦赤隨漲徐去鄱陽湖異南安守孔興訓曲阜聖裔一日渡鄱陽湖見有物約長十餘里許身有兩翼自空中飛入湖黒質黃文掉尾波上行數里猶彷彿於水中見之時風日晴霽舟亦無恙竟不知其何怪也夢道士臨清胡給事某夫人嘗夢道士三人跪伏求救以告給事給事未之信詰旦入署道遇市儈驅牛三頭見給事輿過三牛跪於前若乞哀者問之則將入屠肆矣捐白金九兩贖之置放生池上是夕夫人復夢三道士來謝京師一婦人死見夢其女甥曰吾今為羊生某處汝贖我如言贖之置池上後夕又見夢曰感贖吾命更勞誦經超度我當往生翌日延僧於池上誦經呪羊亦隨僧徒拜佛佛事畢而羊死矣帛白帛白姓同按帛道猷西天竺人居剡之沃洲然白氏長慶集沃洲山禪院記但作白其詞曰昔道猷肇開兹山寂然嗣興兹山僧寂然亦白氏樂天又垂文兹山異哉沃洲山與白氏其世有縁乎水經注瀍水西有真人帛仲理墓仲理名䕶巴郡人石鏡湖南祁陽縣浯溪有鏡石高尺五寸闊二尺五寸石色黝黒如漆光可以鑑隔江竹木田塍厯厯皆見曽有人竊去即昏昧無所覩還之如初喬侍讀石林萊言如此老僧鹿邑張太室字松麓予兄西樵門人也言順治庚子年客京師長椿寺見一老僧深目長頭畧似世人圖畫夀星之狀問張鄉貫因曰去夏邑㡬何張對曰百四十里僧曰彭嵩蘿侍御亡恙耶張訝曰此百年前人也又問其子成立否曰夀過八袠考終久矣僧歔欷久之乂曰昔侍御與貧道為方外交其公子方在襁褓寄籍釋氏為我弟子曽㡬何時皆成古人因㩦手入小院中指堦前牡丹曰此彭公手贈物植此百餘年矣張云牡丹高六七尺大十五圍曩見河南段凝之氏六十年牡丹不及其半信百年物也因問其年僧曰忘之矣張又曰於京師骨董店中遇張翁者蘇州人自言與雍丘孟調之曽大父游厯厯能道其平生遊獵處孟氏兄弟嚴事之如曽大父行亦百五六十嵗人也玉簪韓城縣相𫝊有郭汾陽墓實非是墓石往往崩陷出金玉之屬有諸生解某者得塊玉如簪形簪之髻不知其何物也有賈胡一見請售生云須二十鍰乃可賈即如數應之生又云適相戲耳必欲售非三十鍰不可賈亦無難色既售問之曰此字洗也試以玉拂字字皆滅後轉粥之西安得百二十鍰比部張蓮峯顧行説墓樹張君乂云韓城有蘇屬國司馬子長二墓蘇墓樹枝皆南向司馬墓樹枝皆北向驗之良然司馬北向理不可曉張公洞樹康熙十八年江南造戰艦凡千百年古樹多被斧斤之厄宜興張公洞有大銀杏樹數株相𫝊數百年物也廵撫下令蘇松道方叅議國棟親往伐之樹皆血出方驚悸得疾旬日卒方字干霄稱亷吏又奉開府檄而竟死鬼神之靈謂何血影石黃侍中祠在金陵青溪之側祠中有夫人血影石有無頼子醉溺石側石忽起擊之立死白廷評仲調夢鼐説景公高座寺在長干雨花臺臺側即景方二公祠順治中一士人讀書寺中月色皎甚開牕南眺戲語寺僧曰此景方諸公盡節處魂魄應猶戀此吾烏得見之僧别去士人獨坐室中未寢忽有紫衣偉丈夫立牕外曰吾景大夫也士人驚起伏地遂不見亦白君説李道甫妾李尚書道甫三才性豪侈姬妾數十人道甫病將革呼諸姬問我即死誰當從我諸姬争言願從死一姬最少美而艶獨無語衆譙讓之道甫既死姬更盛服靚糚諸姬怪問之曰公之嬖我以色也將從公地下而毁其貌豈公意乎坐匶側七日不食死諸姬竟不能從鷄公山神康親王䟽言大兵向駐永興對壘之際鷄公山神示豎旗列隊之異部議致祭允行焦桂花曹升六貞吉舍人曽於内庫檢視書籍見庫房柱上有嘉靖間一帖記烏玉黄玉緑玉白玉紅玉各若干斤玉璞七萬㡬千斤後書答應焦桂花𫝊擊硯圖吳匏菴嘗蓄一銅雀瓦硯甚珍之一日出示其友某公惡曹瞞拔劔擊之立碎匏菴懊惜時沈石田在座乃援筆於便而作擊硯圖匏菴大喜崇禎間有都司胡琳者遊吳中以十金購得之珍惜甚病且革手握扇不可解家人遂以殉琳武進士商丘人所藏又有蒲廷昌獅子一軸亦神品宋牧仲犖中丞説高陽民高陽民家子方十餘嵗忽臂上生宿瘤痛痒不可忍醫皆不辨何症一日忽自潰中有圓卵墜出尋化為石劉工部霦以一金售之治膈病如神潁州道士劉進士祖向言潁州一少年為邪所侵疾入膏肓家人謂不可活置之路傍忽一道士過之自言善醫命取鐵鎚重數十斤鎚病者頭面父母泣謂病已至此鐵鎚下首立碎矣道士笑曰無傷也鎚下病者若無所知輒有一美婦人長二寸許自口中躍出而滅凡百鎚口出百婦人大小形狀如一少年立愈道士亦不復見牡丹歐陽公牡丹譜云牡丹出丹州延州東出青州南出越州而洛陽為天下第一陸務觀作續譜謂在中州洛陽第一在蜀天彭第一今河南惟許州山東惟曹州最盛洛陽青州絶不聞矣客星光武與故人嚴光卧客星犯帝座桓帝與河南尹鄧萬博客星亦犯帝座老姜繼世紀聞云李夢陽下獄禍且不測劉瑾家人老姜者告曰昔公不得志時李主事管昌平倉曽許吾家納米領價獲利乃忘之乎瑾遂釋之令致仕此與王振欲殺薛文清公事相似華亭宋楙澄九籥集訛為逆瑾欲殺文清誤矣且救空同者不止康對山也二相貽謀錄載宋時試禮部士人皆禱於二相廟二相謂子游子夏游夏二相之名亦竒謹空黃魯直云太祝辨九􅉔􅉔即拜也三曰空手拜頭至手所謂拜手也唐人書末云謹空謂空手也風異康熙丙辰五月初一日京師大風晝晦有人騎驢過正陽門御風行空中至崇文門始墜地人驢俱無恙又有人在西山皇姑寺前比風息身已在京城内此灾祥之甚者丁巳三月上諭諭禮部帝王克勤天戒凡有垂象皆闗治理故設立専官職司占候所係甚重一切祥異理應不時具奏今欽天監衙門止有尋常節氣尚有觀驗至今嵗三月初霜霧及以前星辰陵犯應占奏者并未奏聞皆由該監官蒙昧踈忽有負職掌爾部即行察議具奏以後欽天監占候本章内閣照例票擬批發大哉王言謹備録之涿州二生涿州有二生修州志偶削去二節婦不為立𫝊一日二人晚行恍惚見二婦在前直入城隍廟二人不覺隨之入見二婦跪愬於神云苦節數十年久載舊志今為狂生某某所削寃苦無所伸二生亦前與之辨婦人執益力倉皇歸家是夜皆卒魚腹書張生太室言順治十三年渡河至荆隆口龍王廟下見堤夫買得大鱣魚長六尺許剖其腹得紅錦袋一枚中藏珍珠一琲金約指四玉條脱一牛黃丸子一紅甲二片香藥一裹又私書一紙半已浥爛詞甚悽惋似是婦人欲寄所私不遂投河死而入魚腹也張賦魚腹怨紀之名字之異宋桑世昌蘭亭考載三米蘭亭本有米尹仁尹知二跋注尹仁即友仁又范文度摹刻石本有温公跋旃蒙單閼厲陬壬戌晦涑水司馬某公實觀注温公曽字公實吳虎臣漫録載曽子固懷友一首其曰介卿者即王介甫少字也研北雜志云張曲江初名博物翟耆年籕史載李龍眠洗玉池篆款云元祐惟五年庚午正月初吉舒李叔時公麟韓文公慈恩塔題名稱李翺翔之見本集石守道有讀安仁學士詩一篇後村詩話云石曼卿舊字安仁支機石畫墁録元豐末有人自兩浙以昭陵玉匣蘭亭與支機石同齎入京師欲上之不果王欽若云支機石予嘗見方二寸不圜微剜正碧天漢左界北斗經其上支機之説本誕妄不經此石不知何據予在成都見西城石犀寺後嚴真觀故址廢圃墻隅有石麄如砂礫高六七尺許圍如柱礎蜀人相傳為支機石尤可笑也池北偶談卷二十五
