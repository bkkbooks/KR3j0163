body:
  text: 池北偶談卷四刑部尚書王士禎撰親謁孝陵康熙甲子冬大駕幸金陵親謁明太祖孝陵上由甬道旁行諭扈從諸臣皆於門外下馬上行三跪九叩頭禮詣寳城前行三獻禮出復由甬道旁行賞賚守陵内監及陵户人等有差諭禁樵采令督撫地方官嚴加巡察父老從者數萬人皆感泣總督兩江兵部侍郎王新命刻石紀事己巳春南巡再謁孝陵古今未有之盛舉也殿試改期國朝毎科殿試之期在三月十五日自辛丑科後以三月十九日為萬夀節遂改殿試於二十日至今為例壬戌科駕幸盛京謁陵改殿試於九月二十日戊辰科以大行太皇太后升遐改㑹試於二月十九等日殿試改三月二十六日云㑹試二亥順治三年丁亥重行㑹試十六年己亥復重行㑹試日講今上親政後選翰林官直講禁中先在𢎞德殿後移於乾清宫講官始則熊賜履繼為史鶴齡孫在豐張英徐元文陳廷敬葉方藹張玉書湯斌歸允肅大抵以掌院學士一員與翰林官一員同講止二員惟戊午陳葉日講而上幸南海子葉偶病假旬日以張代之後葉疾愈入直遂三員同直講史以編修歸殁於家特賜祭𦵏其恩禮非外庭所敢望也朝報今之朝報或曰邸報亦有所本見王明清揮麈錄趙昇朝野類要云朝報日生事宜也毎日門下後省編定請給事判報方行下都進奏院報行天下其有所謂内探省探衙探之類皆衷私小報率有漏洩之禁故隱而號之曰新聞蓋自宋時已然又六科綸音册子號晚帖以當晚即知之次日乃登邸報故曰晚帖亦有小報謂之小抄臺灣府縣康熙二十二年臺灣平設府一曰臺灣府縣三曰臺灣曰鳯山曰諸羅又設總兵官分巡厦門道各一員駐焉幅員之廣古未有也東野氏世襲康熙二十三年上東巡周公後裔七十三代孫世襲奉祀生員東野沛然上疏籲恩奉㫖交與該部禮部覆無庸議奉㫖周公承接道統繼往開來功德昭著其子孫應給職銜著九卿詹事科道㑹同確議㑹議得周公後裔應授官職撥給祀田修葺廟宇行文該撫查明以沛然世襲五經博士如孔顔曾孟仲氏例先是沛然上疏行在上召問周公姬姓爾疏稱東野何故沛然對曰昔魯公伯禽季子魚賜東野田一成因以為氏上曰周公廟庭何在對曰在闕里城東北二里上悦隨御製祭文遣恭親王致祭禮部尚書介山御前侍衛觀保鴻臚寺卿穆成格閻興邦太常寺寺丞張量馨山東提學道副使唐賡堯陪祭其後沛然卒子枝盛嗣為博士云是時子貢後裔端木謙端木直亦上疏請部議不允階官避家諱予嘗疑六朝以來朝廷為臣下避家諱至改州郡名者有之考愧郯錄乃知宋時律文有私諱冒榮徒一年之禁四銓之法遇磨勘階官之稱與其三代諱相值者許其自陳授以次官謂之寄理遂以繫之官稱之首又李文簡燾奏疏亦載雍熙二年有詔凡除官内有家諱者三省御史臺五品文班四品以上許用式奏改餘不許嘉祐六年翰林學士賈黯知審官院奏准下太常禮院大理寺同議言祖父之名子孫所不忍道不繫官品之髙下并當迴避乃詔凡府號官稱犯祖父名而非嫌名及二名者並聽迴避其後韓絳除樞密副使自言樞字與祖名下一字同乞避免不許遵嘉祐之詔也宋敏求提舉萬夀觀敏求父名綬自言夀字犯父嫌名詔改醴泉觀則嘉祐之詔復不行矣及呉中復提舉荆湖北路兵馬中復父名舉乞改稱提轄詔以朝廷官稱不當避守臣私諱遂不許然後知迴避私諱唐宋以前載在律文亦孝治天下之意明代以來始刋削耳又燾疏引晉江統言其叔父春為宜春令與縣同名故事職與祖父名同皆得改選而未有身與官職同名改選之例統以為身名所加亦施於臣子凡佐史朝夕必稱厥官倘指實而語則觸尊者諱或詭詞迴避則以私廢公統以為身名與官職同者宜與祖父名為比武帝許之據此又不獨迴避先諱矣朝野類要云授職任而犯三代名諱者許避之而開禧初張嗣右除起居郎以犯諱辭免改名修注官其餘若一名偏犯則不避武職丁憂武職舊無丁憂之例康熙二十四年四川提督何傅疏言竊惟議禮制度聖王御世之大權地義天經人子立身之大本養生莫如送死教孝所以作忠據䕫州副將孫斌呈詳云云通䘮制禮旣無貴與賤之殊沿例宅憂乃有文與武之别俱屬毛而離裏忍絶裾以滅親豺獺尚有一祭之知介胄豈無三年之愛臣久失怙恃見素韠而興懷恭際休明瀝丹心而上請實天下萬世之公義非孫斌一人之私情伏懇特渙綸音定武職三年通䘮之例垂光史冊云云得俞㫖遂為定制孝治之隆夐絶千古矣又浙江提督陳世凱上言武臣丁憂特其一節宜令讀書識忠孝大義得温㫖已後武臣俱當留心典籍責令提鎮倡率之訪遺書康熙二十五年四月上諭禮部翰林院自古帝王致治隆文典籍具備猶必博採遺書用充秘府以廣見聞而資掌故甚盛事也朕留心藝文晨夕披覽雖内府書籍篇目粗陳而裒集未備因思通都大邑應有藏編野乘名山豈無善本宜廣為訪輯凡經史子集除尋常刻本其有藏書秘錄作何給值採集及借本抄寫事宜爾部院㑹同詳議具奏務令搜羅罔佚以副朕稽古崇文之至意旋又奉㫖闗係經史方許採進時禮侍徐乾學疏進宋朱震漢上易傳并圖説十五卷宋張浚紫巗易傳九卷讀易雜説一卷魏了翁大易集義六十四卷曾穜大易粹言十卷吕祖謙東萊書説十卷元金履祥尚書表注十二卷宋李樗黄櫄毛詩集解三十六卷趙鵬飛春秋經筌十六卷王與之周禮訂義八十卷蔡節論語集説十卷李燾續資治通鑑長編一百六十八卷唐開元禮一百五十卷共十二部御書康熙二十三年駕幸闕里御書萬世師表四字懸大成殿次年以四字頒行天下學宫又御書白鹿書院額廬山白鹿洞并賜監本五經四書其河南府二程祠邵康節祠鳯翔府横渠書院建寧府紫陽書院徽州府文公闕里長沙府石鼓書院皆頒御書學達性天大字古今罕覯之盛舉也毁淫祠康熙丙寅擢江寧巡撫都御史湯斌禮部尚書掌詹事府事湯瀕行疏毁呉下淫祠五通五顯劉猛將五方賢聖等廟恭請上諭勒石上方山得俞㫖通行直省初湯以閣學遷巡撫過予邸舍予為言呉中婦女好入寺院燒香首當禁止湯以為然在呉遂力行之風俗一變若淫祠一節尤於世道人心裨益不小湯自言昔為方面時只遵寧陵吕叔簡先生從政錄行之其撫呉亦此志云戊己二官名漢元帝初元元年置戊己校尉屯田車師前王庭班書師古注自甲至癸皆有正位唯戊己寄治今所置無常居故取戊己為名或云戊己居中鎮覆四方今所置校尉亦處西域之中撫諸國也然戊己自是兩官後漢耿恭為戊校尉闗寵為己校尉是也荷蘭貢物荷蘭國自康熙六年入貢今二十五年臺灣平設郡縣其王耀漢連氏甘勃氏遣陪臣賓先吧芝復奉表進貢表詞有云外邦之丸泥尺土乃是中國飛埃異域之勺水蹄涔原屬天家滴露云云貢物大珊瑚珠一串照身大鏡二面竒秀琥珀二十四塊大哆囉絨十五疋中哆囉絨十疋織金大絨毯四領烏羽緞四疋綠倭緞一疋新機嗶嘰緞八疋中嗶嘰緞十二疋織金花緞五疋白色雜様細軟布二百一十九疋文采細織布一十五疋大細布三十疋白毛裏布三十疋大自鳴鐘一座大琉璃燈一圓聚耀燭臺一懸琉璃盞異式五百八十一塊丁香三十擔氷片三十二斤甜肉豆蔲四甕廂金小箱一隻内丁香油薔薇花油檀香油桂花油各一礶葡萄酒二桶大象牙五支廂金鳥銃二十把廂金馬銃二十把精細馬銃十把彩色皮帶二十佩廂金馬銃中用繡彩皮帶十佩精細馬銃中用精細小馬銃二十把短小馬銃二十把精細烏銃十把廂金佩刀十把起花佩刀二十把廂金雙利劔十把雙利闊劔十把起金花單利劔六把照星月水鏡一執江河照水鏡二執雕製夾板三隻起復趙昇朝野類要云已解官持服而朝廷特再推用者名起復起復即奪情也今人以禫後即吉為起復者誤試官今諸司官初選即實授唯監察御史中書舍人必先授試職一年滿内閣都察院方題實授沿明舊例也按明初范敏試吏部尚書李冕試禮部尚書徐恢試户部尚書茹常試兵部尚書開濟試刑部尚書楊靖王暹試侍郎詹徽茹太素試都御史又有試給事中至正德中陸完為試都御史此例今人不知八旗開科八旗鄉㑹試開科始於順治辛卯壬辰至丁酉停止康熙己酉庚戌復舉行至丙辰停止丁卯夏五月以亢旱肆赦再復開科之例按開科之例前後稍有不同順治壬辰乙未滿洲蒙古用滿文另為一榜壬辰狀元麻勒吉兩江總督乙未狀元圖爾宸工部侍郎庚戌癸丑滿洲蒙古槩用漢文即附漢人通為一榜辛未甲戌復開科例仍之徵聘不至康熙己未博學宏詞之徵内外薦剡百八十餘人不至者四人浙江應撝謙嗣寅江西魏禧氷叔山西范鄗鼎彪西陜西李顒中孚范登順治辛丑進士闡明絳州辛復元全先生之學與應李以理學著於南北唯魏以古文擅名其兄際瑞弟禮皆有詩名時號寧都三魏祭北海丁卯四月副都御史徐元珙疏請釐正祀典其畧云臣按歴代祀典唐望祀北海於洛州即今河南府也宋望祀北海於孟州即今懷慶府也明亦望祭於懷慶府我朝典制東海祀於萊州南海祀於廣州二祀近海誠為允當西海則於蒲州望祭蓋西海遙逺循宋明之舊而望祭之宜也至北海則仍祭於懷慶夫宋都於汴而懷慶在其北彼時幽燕皆非宋土即出國門而望北一祭亦權宜之計有明定鼎燕京仍往南而祭北海我朝因之殆非宅中以蒞四海之義伏查北鎮醫無閭山在奉天府屬今為北鎮山海闗迤北之海非北海乎況盛京發祥重地土厚水深源流綿邈皇上聲教四訖幅員之大亘古未有長白山水并烏龍鴨綠諸江亦盡朝宗於海則北海之祭不應仍在懷慶此祀典之急宜釐正者伏查順治十七年科臣粘本盛題請改祭北岳於渾源州祈下部議嗣後告祭更定於迤北近海地界云云得㫖下九卿詹事科道㑹議上言明臣丘濬言京師東北乃古碣石淪海之地於此立祀就海而祭為宜濬所云碣石今在永平府但我朝幅員廣大混同江水發源長白流入北海今北海之祭應改混同江邊望祭可也得㫖允行周張後裔康熙二十四年僉都御史姚締虞言宋儒周惇頤有開繼之功下部議得㫖以惇頤二十九代孫嘉耀世襲五經博士二十六年户科給事中汪晉徵言孔孟以來道學之統至宋周程張朱而始著乃程朱二氏久置世襲博士周惇頤子孫亦為博士其張載子孫應一體䘏錄云云九卿等覆議順治十二年八月據江南布政使司呈請朱熹裔孫煌禮部題授世襲五經博士康熙九年五月禮部覆御史傅世舟疏題授二程裔孫程宗昌程延祀世襲五經博士二十四年四月九卿詹事科道會議僉都御史姚締虞疏題授周惇頤裔孫嘉耀世襲五經博士張載闗中大儒與濓洛並重載裔孫亦應照例授世襲五經博士陜西巡撫副都御史布哈疏請以載裔孫張夢熊應詔夢熊未及襲而卒以其子從先為博士臺灣開科康熙丁卯夏四月福建提督張雲翼疏請臺灣鄉試宜照甘肅寧夏例於閩塲另編字號額中一二名禮部覆准臺灣新經歸附文教初開應將臺灣一府三縣生員照甘肅寧夏之例另編字號額外取中舉人一名得㫖允行是科五十一名蘇峨鳯山縣附學生習易經滿洲鄉試丁卯夏恩詔八旗滿洲蒙古漢軍原有定例同漢人一體開科取士前因用兵暫行停止今仍照舊舉行禮部題請於直𨽻舉人額外滿洲蒙古取中舉人十名另編滿字號漢軍取中舉人五名另編合字號漢軍稱烏金超哈故也㑹試亦於漢進士額外滿洲蒙古取中四名漢軍取中二名皆與漢人一體作文考試盛京生員附入在京八旗本年鄉試期迫俟庚午辛未科舉行云漢尚書順治初始設漢尚書吏部陳名夏户部謝啓光禮部李若琳兵部劉餘祐刑部党崇雅工部張鳯翔都察院掌院事左都御史房可壯後惟陳党二人拜相閣臣世祖時拜相者自同安洪文襄承疇外直𨽻四人涿州馮文敏銓靜海髙文端爾儼大名成公克鞏髙陽李文勤霨江南四人溧陽陳公名夏武進吕公宫呉江金文通之俊髙郵王文通永吉山東四人德州謝清義陞掖縣張文安端安丘劉公正宗聊城傅公以漸山西二人曲沃李公建泰衛文清周祚河南一人商丘宋文康權陜西一人寳雞党公崇雅浙江一人海寧陳公之遴四川一人井研胡公世安康熙已來拜相者直𨽻四人柏鄉魏公裔介寳坻杜文端立德宛平王公熙真定梁公清標江南五人長洲宋文恪德宜崑山徐公元文丹徒張公玉書合肥李公天馥桐城張公英山東三人益都孫文定廷銓臨胊馮文毅溥武定李文襄之芳山西一人沁州呉公琠湖廣三人孝感熊公賜履漢陽呉文僖正治大冶余公國柱浙江一人錢塘黄文僖機熊公罷相後再起為禮部尚書己卯復相千秋康氏本朝順治已來直省民間一産三男者嵗有數十多不勝紀定例官給米三石布十疋而已按南唐時金陵人康國輔娶司馬氏一産三男唐主以為瑞皆封將軍號千秋康氏柳子厚集有為廣南鄭尚書奏百姓一産三男狀侈為休徵想爾時此事絶少故以為祥瑞而優異如此暹羅表康熙二十三年暹羅國進表云啟奉大清國皇帝陛下伏以聖明垂統繼天立極無為而治德教孚施萬國不動而化風雅澤及諸彝巍巍莫則蕩蕩難名卑國世荷皇恩久沾德化微臣繼襲踐祚身屬遐方莫能仰瞻天顔幸遇貢期敢効輸欵顓遣正貢使坤孛述列瓦提二貢使臣坤巴實提瓦抒三貢使臣坤司吝塔瓦喳正通事坤思吝塔披彩辨事文披述嗒新禮嘑等梯航渡海齎捧金葉表文方物譯書前至廣省差官伴送京師朝貢進獻代伸拜舞之誠恪盡臣子之職恭祝皇圖鞏固帝夀遐昌伏冀俯垂鑒納存懷逺之義微臣瞻天仰聖不勝屏營之至太皇太后朝儀舊制元旦冬至及太皇太后皇太后萬夀節上詣兩宫行禮大學士尚書都統已上隨駕詣宫前行禮侍郎已下則否二十年御史任某條奏部議隨駕官如故侍郎已下於午門前行禮遂為定制裙帶官宋時親王南班之壻號曰西官又謂之裙帶官見朝野類要耏耏水在予邑東鄙古西安城下又姓也左傳文公十一年宋公於是以門賞耏班漢書功臣表有芒侯耏跖劉熙釋名曰耳耏也停止閏月楊光先者新安人明末居京師以劾陳啓新妄得敢言名實市儈之魁也康熙六年疏言西洋厯法之弊遂發大難逐欽天監監正加通政使湯若望而奪其位然光先實於厯法毫無所解所言皆舛謬如謂戊申嵗當閏十二月尋覺其非自行檢舉時已頒行來嵗厯至下詔停止閏月光先尋事敗論大辟光先刻一書曰不得已自附於亞聖之闢異端可謂無忌憚矣王蜀閏丙戌年正月後因胡秀林向隱異同求得唐厯乃閏乙酉年十二月遂改用之宋元豐元年嵗在戊午閏正月知定州薛向繳進遼國厯乃在十二月古亦有此見呉曾漫錄長白山内大臣覺羅武等謹題為遵㫖看驗長白山事康熙十六年四月十五日内大臣覺羅武黙訥一等侍衛兼親隨侍衛首領臣費耀色一等侍衛臣塞䕶禮三等侍衛臣索鼐奉上諭長白山係本朝祖宗發祥之地今乃無確知之人爾等四人前赴鎮守烏喇地方將軍處選取識路之人往看明白以便酌量行禮臣等欽遵上諭於五月初四日起行本月十四日至盛京十六日由盛京起行本月二十三日至烏喇地方轉宣上諭於將軍等隨查烏喇寧古塔及烏喇獵户所居村莊等處俱無確知長白山之人僉云曾逺望見惟都統尼雅漢之宗族戴穆布魯原係採獵之人今已老退閒口稱我輩原在額赫訥隂地方居住我雖不曾躋長白山之巔曾聞我父云如往獵於長白山脚下獲鹿肩負以歸途中三宿第四日可至家以此度之長白山離額赫訥隂地方不甚遙逺我不知其他等語因訪問雖不曾至長白山如赴額赫訥隂地方水路幾日可至陸路幾日可至亦有知往額赫訥隂地方陸路之人否據管獵户噶喇大額黑等口稱如乘馬由陸路前赴額赫訥隂地方十日可至如乘小舟由水路而往途中全無阻滯二十日可至倘遇水漲阻滯難計日期有獵戸喀喇者知赴額赫訥隂地方陸路等語臣等隨議毎人㩦三月糧而往又思或三月糧盡或馬匹倒斃不能歸家亦不可定隨語鎮守寧古塔將軍巴海可載一船米於額赫訥隂地方豫備倘我輩米盡以便於彼處取用將軍巴海云大船不能過松阿里河大險處當即載米十七小船至額赫訥隂地方豫備臣等即擬於六月初二日起行又思由水路而往倘遇水漲阻滯稽遲時日不能即至因與噶喇大額黑約我輩乘此馬匹肥壯速由陸路往看俟看過長白山回時再由水路逆流而上前赴額赫訥隂地方約定臣等帶領固山大薩布素於六月初二日起行經過文德痕河阿虎山庫勒訥林祁爾薩河滹沱河沙布爾堪河納丹佛勒地方輝發江法河木敦林巴克塔河納爾渾河敦敦山卓龍窩河等處及至訥隂地方江干不意噶喇大額黑乘小舟而行半月程途七日齊至因語固山大薩布素我輩乘小舟由江中逆流前赴額赫訥隂地方汝帶領官兵馬匹由瓦努湖河逆流而上由佛多和河順流而下前來額赫訥隂相會約定遣發去後臣等於十一日至額赫訥隂地方固山大薩布素等於初十日已至因前進無路一望林木臣等與固山大薩布素商議令薩布素閒散章京喀達與識路徑之喀喇帶領毎旗甲士二名前行伐木開路并諭如望見長白山可將行幾日方得望見有幾許路程相度明確來報我輩住二日亦即起行矣隨於十二日遣發前行去後本日據固山大薩布素差人顧素前來報稱我等别大人們行三十里至一山頂上望見長白山不甚遙逺似止有一百七八十里等語又續差艾喀來報稱先差人來後又至一髙山頂上望見長白山甚明約有百餘里山上見有片片白光等語臣等趁未有雨水之時急往看驗長白山因留噶喇大額黑督捕珠玤於十三日起行十四日與固山大薩布素等㑹於樹林中揣摩開路前進十六日黎明聞鶴鳴六七聲十七日雲霧迷漫不見山在何處因向鶴鳴處尋路而行適遇路蹊由此前進直至長白山脚下見一處周圍林密中央平坦而圓有草無木前面有水其林離住札處半里方盡自林盡處有白樺木宛如栽植香木叢生黄花燦爛臣等隨移於彼處住札歩出林外逺望雲霧迷山毫無所見臣等近前跪誦綸音禮拜甫畢雲霧開散長白山歴歴分明臣等不勝駭異又正值一路可以躋攀中間有平坦勝地如築成臺基遙望山形長闊近觀地勢頗圓所見片片白光皆氷雪也山髙約有百里山頂有池有五峰圍繞臨水而立碧水澄清波紋蕩漾殊為可觀池畔無草木臣等所立山峰去池水約有五十餘丈地週圍寛闊約有三四十里池北岸有立熊一望之甚小其繞池諸峰勢若傾頽頗駭瞻視正南一峰較諸峰稍低宛然如門池水不流山間處處有水由左流者則為扣阿里烏喇河右流者則為大訥隂河小訥隂河繞山皆平林逺望諸山皆低相視畢禮拜下山之際峰頭有鹿一羣他鹿皆奔獨有七鹿如人推狀自山峰陸續滚至山下閒散章京畢楊武里等駐立之處臣等不勝駭異因思正在乏食此殆山靈賜與欽差大臣者隨望山叩謝收其七鹿臣等上山之時原有七人也自得鹿之處退至二三十歩回首瞻望又忽然雲霧迷山臣等因清淨勝地不宜久留於十八日言旋回至先望見長白山之處因雲霧蒙籠遂不得復見山光矣二十一日回至二訥隂河合流之處二十五日回至恰庫河此河乃訥隂東流㑹合之所二十八日正行之際適遇頒到敕㫖臣等不勝歡忭捧讀敕㫖感激靡盡當經叩頭謝恩訖二十九日因馬瘦不堪馳驅自恰庫河水路乘小舟而歸經過色克騰險處圖白黑險處噶爾漢險處噶大渾險處薩滿險處薩克錫險處法克錫險處松阿里大險處多渾險處乘一葉小舟歴此大江九險得以無恙而渡者皆仰賴皇上洪福之所致也七月初二日回至烏喇地方又往看寧古塔等處地方於本月十二日至寧古塔徧看㑹寧府等處地方畢於七月十七日自寧古塔起行八月二十一日抵京師臣等奉命於人跡罕到之處創闢路徑行於不見日色深林之際無一日阻滯得見長白山皆我皇上敬念祖宗誠心感格神明之效也緣係欽差事宜謹疏奏聞奉㫖長白山祖宗發祥重地竒蹟甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意著禮部㑹同内閣詳議具奏禮部覆疏金史大定十二年封長白山為興國靈應王明昌四年又加封開天𢎞聖帝明洪武三年並去嶽鎮王公封號止稱為神今本朝祭五嶽五鎮俱稱嶽鎮之神相應將長白山封為長白山之神相擇吉地建祠照五嶽例毎年春秋二季致祭祭祀所行禮儀應用等物亦照五嶽今未建祠之前應特遣大臣往封致祭其封神祭文及毎年春秋二次祭文交與翰林院撰擬工部酌量題請建造祠宇成日始行春秋二祭可也奉㫖這建祠致祭事宜著再詳議具奏山東解元山東解元在明時仕多不達至順治戊子吾邑伊中丞翕菴闢以乙未改翰林授御史今至節鉞甲午大嵩趙庶常浮山作舟以己未丙午鄆城魏侍讀子相希徵以丙辰壬子濱州王檢討甲先鼎冕以癸丑乙卯德州李編修紫瀾濤以丙辰丁巳諸城王編修何思沛思以己未辛酉德州孫檢討子未勷以乙丑丁卯陽榖劉庶常琰以辛未凡歴十五科而入翰林者八人崇禎紀事崇禎紀事呉郡姚宗典所著其中紀載多失實而獨於宜興故相盛稱其功又見𢎞光大記一書亦多出傳聞如云某年月日劉澤清殺其叔孔和孔和長山故相國青岳先生鴻訓子部領義兵至淮澤清忌而殺之非其族也又云流賊偽制將軍某至濟南推官鍾性樸死之鍾字文子順天人癸未進士本朝順治初為濟南府推官後擢提學道予即其庚寅首取士也而謂死流賊之難何也縣名避年號順治中改嘉興府崇德縣為石門縣以避太宗年號也明穆宗朝亦改隆慶州為延慶州許重熙五陵注略曰宋時皆改郡邑名以就年號如祥符紹興之類國初亦以洪武名其門避年號非古也𤣥狐本朝極貴𤣥狐次貂次猞猁猻𤣥狐惟王公以上始得服康熙十一年重定衣服等威之制三品以上始得服貂及猞猁猻未久復故日講官每嵗賜貂自滇中告變停賜康熙十九年乃徧賜講官九人遵化改州康熙十六年以孝陵故陞遵化縣為州以豐潤縣屬之知縣鄭僑生即陞知州後歴官湖廣提學僉事鄉飲酒禮康熙己酉順天府尹疏請八旗一體行鄉飲酒禮從之池北偶談卷四
