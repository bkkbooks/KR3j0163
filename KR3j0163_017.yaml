body:
  text: 池北偶談卷十七刑部尚書王士禎撰記觀施愚山書畫辛亥秋偶觀施愚山閏章所㩦書畫東坡書二通其一與栁子玉寶覺師會金山詩又其一云吕夢得承事年八十三讀書作詩手不廢卷室如懸罄但貯古今書帖而已作詩示慈雲老師後有常熟嚴文靖公訥跋又元人趙仲穆畫竹愚山作記沈繹堂書之又徐渭畫芭蕉自題云蕉葉屠埋短後衣墨描鐵鏽虎斑皮老夫貌此堪誰比朱亥椎臨袖口時筆墨竒肆之甚二曹詩南史曹景宗賦競病二韻詩蓋與古語暗合僖七年鄭大夫孔叔言於鄭伯曰心則不競何憚於病又宋曹翰平江南後久為環衛一日內宴羣臣賦詩翰以武人不預自陳少習為詩亦乞應詔太宗限刀字韻翰援筆立成詩云三十年前學六韜英名常得預時髦曾因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陳雲高庭前昨夜秋風起羞看盤花舊戰袍太宗覽之驟遷數級二曹事絶相類大竒明懷宗御書在京師士夫家見明懷宗愍皇帝御書王維詩松風吹解帶山月照彈琴十字筆勢飛動上有崇禎建極之寶林茂之林翁茂之古度居金陵年八十餘貧甚冬夜眠敗絮中其詩有恰如孤鶴入蘆花之句方爾止文寄翁詩云積雪初晴鳥晒毛閒㩦幼女出林臯家人莫怪兒衣薄八十五翁猶緼袍及卒周櫟園侍郎亮工葬之鍾山松筠菴詩康熙庚申刑侍高公珩再致政歸淄川未行移居宣武門西松筠菴相國益都馮公溥過之流連竟日高公贈詩云戶倚雙藤禪宇開無人知是相公來相看一笑忘朝市風味依然兩秀才馮公和云隱几僧寮戶不開天親無著憶從來而今老去渾忘却祗識維摩是辨才豫亦和云二老前身二大士相逢半日畫爐灰它年古寺經行地記取寒山拾得來墓志墓志之始事祖廣記引炙轂子以為始於王戎馮鑑續事始以為起於西漢杜子春高承事物紀原以為始於比干槎上老舌引孔子之喪公西赤志之子張之喪公明儀志之之語豫按擅弓孔子之喪云云蓋職志之志猶今之主喪云爾改志作志不可也封氏聞見記青州古冢有石刻銘云青州世子東海女郎賈昊以為東海王越女嫁茍晞子又東都殖業坊王戎墓有銘曰晉司徒尚書令安豐侯王君銘凡數百字又魏侍中繆襲葬父母墓下題版文則魏晉以來例有之矣潁濱詩刻古北口一寺中有石刻蘇潁濱詩云亂山環合疑無路小徑縈回長傍溪倣佛夢中尋蜀道興州東谷鳯州西蓋公元祐間奉使契丹時所題而遼人刻石者紫泥青溪暇筆云晉朝為詔以青紙紫泥紫泥猶今泥金之類蓋泥紫色以書字也豫按漢舊儀天子信璽六皆以武都紫泥封之青囊白素裏兩端無縫西京雜記云漢以武都紫泥為璽室加緑綈其上非以書字也萟林伐山云今之紫泥古謂之芝泥皆濡印染籕之具也姚說誤宋諸帝書宋諸帝多工書如太宗及仁宗飛白而高宗其尤著者今徽宗書往往從書畫題跋見之於京口鶴林寺曾見高宗書石刻青溪暇筆記明南京舊內忠實不欺之堂扁書清徑竒古類朱熹乃理宗御筆以賜郡守馬光祖者太祖仍而不改云一技近日一技之長如雕竹則濮仲謙螺甸則姜千里嘉興銅爐則張鳴岐宜興泥壺則時大彬浮梁流霞盞則昊十九號壺隱道人江寧扇則伊莘野仰侍川裝潢書畫則莊希叔皆知名海內如陶南村所記朱碧山製銀器之類所謂雖小道必有可觀者歟鄧耀李宗城汝藩作鄧彰甫傳云彰甫名耀江陰人也其先世為唐宗人罹武瞾之亂避地日南迄宋大中時遂君其國凡八傳至昊旵無嗣其女名昭聖主國事皆李姓也閩奸人陳日煚以詭計入贅襲取之始以避女主而逋終以立女主而亡事亦竒矣昊旵遺腹子萼育於舅氏冒鄧姓實虞禍也三世以宦顯其國至司空光逺公曰明者幼岐嶷國王器之妻以女拜左參知初不知其為李氏裔也文皇帝時伊國逆臣黎季犛殺其主司空舉義師伐之竟以德報怨矣尋奉其幼主間道訴於闕廷季犛佯服懇請幼主歸國甫入境伏發復殺之并及天使上赫然震怒特遣成國公朱能英國公張輔出師討罪三禽僞王滅其國悉郡縣之司空實先內附為嚮導厥功懋焉拜行在工部尚書公先世以宗親王異域兹乃以陪臣躐九卿斯尤竒矣子師晦任州守以言事謫江陰尉遂家焉彰甫為司空九世孫虬髯白晳雙眸炯然善細書絶技擅場所書洛神賦縱橫僅寸餘竭目力始悉其縷析絲分毫芒彪炳八法精徑行伍井然又能於粒米上書一絶句異哉按後漢師宜官能於方寸間書千言頗自矜重間挈空囊過酒家書其壁觀者雲集酒大售因寬其直飲酣輒削書而去梁鵠受其法魏武重之可方駕矣康海學栁康德涵武功官師志學栁子厚先友記栁作獨孤申叔墓碣末載其友十三人姓氏與先友記同一竒格屏山詩禪劉屏山子翬朱文公師也其屏山集詩往往多禪語如牧牛頌云軟草豐苗任滿前蒼然觳觫卧寒煙直饒牧得渾純熟痛處還應著一鞭徑山寄道服云逺信殷勤到草菴却慚衰病豈能堪聊將佛日三端布為造青州一領衫粲粲休誇綺與紈紉蘭製芰亦良難此袍遍滿三千界要與寒兒共解顔此類是也先生常語文公曰吾少官莆田以疾病時接佛老之徒聞其所謂清淨寂滅者而心悅之比歸讀儒書而後知吾道之大其體用之全乃如此故文公講學初亦由禪入李鎮東書昔人評謝康樂詩如初日芙蓉顔延之詩如鏤金錯采梁武帝取其語以入書評云李鎮東書如芙蓉之出水文彩之鏤金姑溪集宋李之儀端叔姑溪文集五十卷古賦詩十一卷銘贊一卷表啓書四卷雜書一卷此上下闕數卷手簡十七卷序一卷記二卷題跋五卷祭文青詞二卷墓志三卷詞曲三卷後集二十卷古賦詩十三卷銘贊一卷序跋一卷手簡三卷志狀二卷端叔在蘇門名次六君子曩毛氏津逮祕書中刻其題跋觀全集殊下秦朝張陳逺甚然其題跋自是勝場楊鐵崖二賦楊廉夫作悲舒王賦刺王安石云舉周官之勦說兮胡獨忌夫春秋宜天有變而弗畏兮人有讒而易售聽鳴梟以為鳯兮唾窮麟以為跛羊松柏老而剪棄兮喜植榆之驟長數語曲盡安石罪狀可當爰書又摩崖碑賦云茍執溫凊之小節兮不匹馬而北方則千麾而萬旟兮肯復效忠於耄荒又云迎上皇以來歸兮呼長慶之歡聲歘南內其不祥兮起膝下之天兵使權臣其鼠變兮何李父之貸刑此殘碑之墮淚兮與凍雨而交零兩段或抑或揚尤深當肅宗功罪史筆也廉夫有東維子全集滄浪集宋蘇舜欽子美滄浪集十五卷首有歐陽序古律詩八卷志狀二卷書二卷上書疏狀啓表二卷記序雜文一卷有南宋施元之跋尾云蘇子美集十五卷歐陽文忠公為之首序子美在寶元慶厯間有大名其文章瓌竒豪邁自成一家不幸淪落早世故生平所著止此而近時亦少見之元之因俾鏤版於三衢又得尚書汪公聖錫所藏豫章先生詩為子美作也并附之左方乾道辛卯六月己巳吳興施某書徂徠集宋石介守道徂徠集二十卷詩卷辨說原釋傳録雜著五卷論二卷書六卷序一卷記一卷啓表一卷石門吳孟舉之振所貽宋刻也守道最折服者栁仲塗最詆諆者楊文公大年觀魏東郊詩怪說可見其文倔強徑質有唐人風較勝栁穆二家終未脫草昧之氣蘇子美詩滄浪集有及第後與同年宴李丞相宅詩云拔身泥滓底飄迹雲霄上氣和朝言甘夢好夕魂王軒眉失舊斂舉意有新況爽如秋後鷹榮若凱旋將一第常事而津津道之如此子美之早廢不達已略可見矣昔人議孟郊春風得意馬蹄疾之作子美何以異此皮陸唐本笠澤叢書四卷以甲乙丙丁為次前有自序及江湖散人傳後有宋政和元年毗陵朱衮序乃江西士夫家舊本黃俞邰得之金陵餅肆中自跋云出魯望手編唐本古雅殊可寶惜豫舊藏皮襲美文藪十卷有襲美自序宋栁開仲塗序亦皮所自編也凡松陵唱和集詩二編俱不載栁仲塗集宋栁開仲塗河東文集十五卷附行狀一卷門人張景所編其文多拗拙石守道極推尊之其過魏東郊詩上擬之臯䕫伊吕下擬之遷固王通韓愈殊為不倫東郊野夫傳開所自述與補亡先生傳皆載集第二卷又穆修伯長集代州馮秋水方伯如京順治中刻之金陵文拗拙亦與開類詩尤不工唐末宋初風氣如此其視歐蘇真陳涉之啓漢高耳景字晦之避難逋竄改姓名曰李田所至題曰我非東方兒木子也不是牛耕土田也欲識我蹤跡一氣萬物母景作栁集序破題云一氣萬物之母也見湘山野録龍標宫詞李太白清平調行樂詞皆用飛燕昭陽事然豫觀王少伯宫詞如平陽歌舞新承寵簾外春寒賜錦袍斜抱雲和深見月朦朧樹色隱昭陽玉顔不及寒鴉色猶帶昭陽日影來皆為太真而作皆用昭陽事蓋當時詩人之言多如此不獨太白栁開論文元盛如梓恕齊叢談載栁開論文曰古文非在詞澀言苦令人難讀在於古其理高其意然豫讀開河東集但覺苦澀初無好處豈能言之而不能行耶刋書恕齊叢談云書籍版行始於後唐昔州郡各有刋行文籍寰宇書目備載之雖為學者之便而讀書之功不及古人矣且異書多泯沒不傳後漢書注事最多所引書今十無二三如漢武秋風辭見於文選樂府文中子晦菴收入楚詞後語然史記漢書皆不載藝文志又無漢祖歌詞不知祖於何書豫按五代會要後唐長興三年四月敕差太子賓客馬縞太常丞陳觀太常博士段顒尚書屯田員外郎田敏充詳勘九經官委國子監於諸色選人中召能書人端楷寫出付匠雕刻每日五紙與減一選漢乾祐間周禮儀禮公羊穀梁四經始鏤版周廣順三年六月尚書左丞判國子監事田敏進印版九經書五經文字樣各二部顯德二年中書門下奏國子監祭酒尹拙狀校勘經典釋文三十卷雕造印版欲請兵部尚書張昭太常卿田敏同校勘葉夢得言唐栁玭訓序言在蜀見字書雕本不始馮道監本始道耳河汾燕閒録隋開皇十三年遺經悉令雕版又毋昭裔有鏤版之言蓋刋書始隋暨唐至五代宋而始盛耳文表吳郡劉欽謨昌成化中督河南學政刻中州文表一書表章元六家遺文皆中州産也許文正公衡遺稿五卷附録一卷姚文公燧內集八卷欽謨自跋云聞之李中舍應禎云文公集五十卷松江士夫家有之南北奔走竟莫能致此乃録本多殘缺視刻本不啻十之二又云在百泉召見姚裔孫鄙野質實不復事儒藝有文獻公樞手書碧色箋特寶愛紙墨如新云雍古馬文貞公祖常石田集五卷跋云得之光州兵侍霍公豫所見石田集十五卷至元五年刋行霍之居即文貞故石田莊也又云馬中丞墓在光州西南十五里碑石趙孟俯書愚按文敏殁於元英宗至治二年而文貞以順帝至元四年卒是時趙前卒已久矣疑必有誤或是集趙書耳許文忠公有壬圭塘小稿三卷王文定公惲秋澗集六卷跋云公之子公儀公孺公孺子以可皆能文而子孫墳墓漫不知其所在富珠哩文靖公翀遺文二卷跋云文靖有集六十卷今多不傳子逺死於忠逺婦死於節昌至鄧州閲士籍得其後之習業於官者猶自稱魯參政家云欽謨博雅好事嘗撰吳先賢讚若干卷此書尤可愛重睢州湯潛菴斌學士出為江蘇巡撫豫語以當重刻之惜未果授經圖崇文總目有授經圖其書不傳明周藩西亭王孫乃因章俊卿考索圖增定之為四卷卷首有自序及西亭之子勤羮一跋圖首授經世系次諸儒列傳次諸儒著述歷代經解此書舊無刋本大梁水後西亭藏書數萬卷皆付巨浸賴泉州黃俞邰家有寫本康熙間與朱檢討竹垞彝尊同較定刻之金陵其書始行於世左傳檀弓敘事劉知幾云敘事之工以簡為主因思左氏記晉平公飲酒杜蕢云辰在子卯云云幾三四十言檀弓只以十七字盡之云子卯不樂知悼子在堂斯其為子卯也大矣語益簡味愈長可為文章之法歐尹在洛同作雙桂樓臨園驛記永叔先成凡千餘言師魯止用五百許字永叔服其簡古他日志師魯曰文簡而有法又云簡而有法在六經中惟春秋足當之可知簡字不易到也又類苑載真宗御製法音集詔學僧於傳法院箋注楊大年充提舉一僧注六種震動幾三百字大年都抹去自下止二句曰地體本靜動必有變其簡當若此擬古樂府古詩不必輕擬滄溟諸賢病正坐此前人擬古莫妙於陸機江淹馮班云江陸擬古詩如搏猛虎禽生龍急與之角力不暇氣格悉敵今人擬古如牀上安牀但覺怯處種種不逮此論良是若傅𤣥艷歌行云一顧傾朝市再顧國為墟呆拙之甚所謂㸃金成鐵手也王弇州云平子四愁千古絶唱傅𤣥擬之致不足言是笑資耳𤣥又有日出東南隅一篇汰去菁英竊其常語尤可厭者本詞使君自有婦羅敷自有夫綽有餘味乃益以天地正位之語正如低措大記舊文不全時以巳意續貂罰飲墨水一斗可也諒哉王慧詩王慧字蘭韻太倉人同年長源督學發祥之女有雋才所著凝翠軒詩一卷極多佳句閨詞云輕寒薄暖暮春天小立閒庭待燕還一縷栁花飛不定和風搭在繡牀前又五言如杏花都掩屋楊栁半垂溪花陰依略彴竹色捲瀟湘風懷看緑栁愁緒比黃楊紈扇三春月緗琴五夜霜七言如别去新篁方解籜重來芳樹欲過頭蕭蕭竹影遮紅藥細細波紋映白魚才過輕雷收筍箬旋㪺新水試茶芽一枝香供宜金屋半醉紅扶待畫乂鶯粟花楊栁溪橋初過雨杏花樓閣半藏煙淚淹紅袖傷離日愁在黃昏細雨中硃添小印思題扇釧擘輕羅憶㸃籌墻角紅殘桃結子石盆青淺菊分芽栁絮飛殘青滿徑豆花零亂緑圍村棠梨謝後猶花信櫻笋過時已麥秋幾處溪山留薜荔一秋風雨在芭蕉皆佳句也又宿田家偶見粘窗破紙乃韓偓香奩詩惜而賦絶句云麗情佳句有誰知瞥見窗前字半攲為惜風流埋沒甚自㩦紅燭拂蛛絲此等懷抱亦非尋常閨閣所解會昌一品集李衛公一代偉人功業與裴晉公伯仲其會昌一品制集駢偶之中雄竒駿偉與陸宣公上下别集憶平泉五言諸詩較白樂天劉夢得不啻過之伊川尊詩小序程伊川云詩小序便是當時國史作如當時不作雖孔子亦不能知況子夏乎如大序則非聖人不能作涇野云據此則小序不可改又云問小序是何人作曰但看大序則可見矣曰莫是國史作否曰序中分明言國史明乎得失之迹蓋國史得詩於采詩之官故知其得失之迹如非國史則何以知其所美所刺之人使當時無小序雖聖人亦辨不得曰聖人刪詩時曾刪改小序否曰有害義理處也須刪改葉氏習學記言云作詩者必有所指故集詩者必有所繫或記本事或釋詩意皆在秦漢之前讀詩者以其時考之以其義斷之惟是之從可也欲盡去本序自為之說失詩意多矣題畫詩三則往見倪雲林小畫自題詩云蕭蕭風雨麥秋寒把筆臨摹強自寬賴有俞君相慰藉松肪筍脯勸加餐又在京師人家見一詩云梓樹花開破屋東鄰墻花信幾畨風閉門睡過兼旬雨春事依依是夢中末題云至正癸卯呈德機徴君右二詩皆佳又嘗見破窗風雨卷武夷山樵者錢惟善題云一鐙風雨寒窗破讀書不知秋怒號恍如扁舟在江海但覺四壁皆波濤對牀高卧無此客倚劔長歌空二毛曉看庭樹故無恙千峯雲氣落青袍金蓋山人錢嶽題云敬亭山下讀書菴破紙窗寒儘自堪但怪蛟龍嘶匣底不知風雨暗江南雲橫黑海秋帆斷花落彤樓曉夢酣五色石崩天頂漏須君手脫巨鰲鐕惟善字思復錢塘人以羅剎江賦得名號曲江居士有江月松風集又羅塞翁畫猿一軸余鏗題云拋却故山久披圖眼忽明老夫歸未得說與曉猿驚韓性題云栗葉秋未黃連臂撼山雨白晝聞清啼愁雲夢天姥數詩皆佳作也性字明善魏公八世孫居紹興卒諡莊節先生元史儒學有𫝊朱佐日張昶景春吳中人物志云武后嘗吟詩白日依山盡黃河入海流云云問是誰作李嶠對曰御史朱佐日詩也賜綵百匹子承慶嘗為昭陵挽詩入高等由是父子齊名按此詩諸集皆作王之渙之渙開元間詩人紀事詩話亦不載佐日名字張說不知何據鮑謝唐鮑防字子慎襄州人仕終工部尚書工詩與謝良弼齊名時亦稱鮑謝見全唐詩話耶律文正詩元耶律文正湛然居士集十四卷中多禪悅之語其詩亦質率間有可采者略摘數篇管城從我自燕都流落遐荒萬里餘半札秋毫裁翡翠一枝霜竹剪瓊琚鋒端但可題塵景筆下安能劃太虛聊復贈君為土物中書休笑不中書贈李那王筆昔年萍水便相尋握手臨風話素心刻燭賦成無字句按徽彈徹沒絃琴風來逺渡晚潮急雨過寒塘秋水深此樂莫教兒輩覺又成公案滿叢林寄平陽淨名院潤老班姬零落到而今聞道翻身入道林歌扇舞裙忘舊業藥爐經卷半新吟閒眠白晝三杯酒靜對青松一曲琴更看他年栖隱處蓬山樓閣五雲深過武川贈僕散令人狐死曾聞尚首丘悲豫去國十年遊崑崙碧聳日落處渤海西傾天盡頭君子云亡真我恨斯文將喪是吾憂尚期晚節回天意隱忍龍庭且強留過燕京和陳秀玉韻閒騎白馬思無窮來訪西城緑髮翁元老規模妙天下錦城風景壓河中花開杷欖芙蓉淡酒泛蒲桃琥珀濃痛飲且圖容易醉欲憑春夢到盧龍閒乘羸馬過蒲華又到西陽太守家瑪瑙瓶中簪亂錦琉璃鍾裏泛流霞品嘗春色批金橘受用秋香割木瓜此日幽歡非易得何妨終老住流沙贈富察元帥河中春晚我邀賓詩滿雲箋酒滿巡對景怕看紅日暮臨池羞照白頭新栁添翠色侵凌草花落餘香著莫人朱淑真詞無奈春寒著摸人且著新詩與芳酒西園佳處送殘春河中遊西園萬里西征出玉關詩無佳思酒瓶乾蕭條異域年初換坎軻窮途臘已殘身過碧雲遊極樂手遮西日望長安年光迅速如流水不管詩人兩鬢斑壬午元日已上數作頗有風味皆從軍西域之作也儒將詩劉後村跋總管徐汝乙詩云宋武臣能詩者賀鑄劉季孫為坡谷深許其後有劉翰武子潘柳德久尤為項平菴葉水心所賞重明景泰中有十才子湯參將𦙍績最著豫見其東谷遺稿十卷了無可取成化間金陵姚福者世襲千戶著定軒集避喧録窺豹録及青溪暇筆若干卷豫嘗見暇筆草稿福手書也記軼事頗亦可喜而論詩膚陋如自記蔡琰歸漢圖詩云若使蕃兒能念母他年好作倒戈人所取彭三吾咏明妃詩云妾分嫁單于君恩本不孤畫工休盡殺夢弼要人圖謂得風人之體真三家村學究見識可為噴飯又嘗見南皮李騰鵬撰明詩統取一詩云君王莫殺毛延夀留畫商巗夢裏賢腐儒所見略同乃爾又明名將如郭登戚繼光陳第萬表皆有詩名香奩詩眉山暗淡向殘燈一半雲鬟墜枕稜四體著人嬌欲泣自家揉碎砑繚綾楊廉夫香籢詩也見集中今訛作韓偓非是仲殊詩漫録載僧仲殊詩云瑞麟香暖玉芙蓉畫蠟凝輝到曉紅數㸃漏移衙仗北一畨雨滴甲樓東夢遊黃閣鸞巢外身卧彤幃虎帳中報道譙門初日上起來簾幕杏花風右在平江呈黃左丞安中作東坡所謂蜜殊也歌行引炙輠録云歌行引本一曲爾一曲中有此三節凡始發聲謂之引引者導引也既引矣其聲稍放故謂之行行者其聲行也既行矣於是聲音遂縱所謂歌也惟一曲備三節故引自引行自行歌自歌其音節有緩急而文義有終始故不同也正如大曲有入破滚煞之類今詩家分之各自成曲故謂之樂府無復異製矣又姜白石詩說云載始末曰引體如行書曰行放情曰歌兼之曰歌行悲如蛩螿曰吟通乎俚俗曰謡委曲盡情曰曲敷山杜牧之弔沈下賢詩云一夜小敷山下夢水如環佩月如襟坊刻訛作小孤與本題無涉按吳興掌故敷山在烏程縣西南二十里易曰震為敷敷花蒂也說卦山之東曰敷此山在福山東故名福山又名小敷山與敷山相連接唐詩人沈亞之下賢居此豫鄉華不注不作跗解亦與敷同義胡釘鉸詩派茶譜記胡生以釘鉸為業居近白蘋洲旁有古冢每茶飲必酹之忽夢一人曰吾姓栁感子茗惠教子為詩後遂名胡釘鉸詩若然則釘鉸詩派乃本栁文暢耶又雲溪友議列子墓在鄭里有胡生家貧少為磨鏡鍍釘之業遇名茶美醖輒祭忽夢一人刀劃其腹納以一卷書既覺遂工吟咏號胡釘鉸此一事而傳載異耳排律唐人省試應制排律率六韻載諸英華者可考至杜子美元白諸人始增益至數十韻或百韻近日詞林進詩動至百韻誇多鬬靡失古意矣吳惟信宋吳惟信中孚湖州人寓吳嘉定之白鶴村吳有糜先生者於九經注疏悉能成誦嘗見中孚賦絶句云白髮傷春又一年閒將心事卜金錢梨花落盡東風軟商略平生到杜鵑亟下拜曰天才也老夫每欲效顰則漢高祖唐太宗追逐筆下矣觀此可悟作詩三昧韓退之詩似論蘇子瞻詞似詩昔人謂如教坊雷大使舞終非本色正此意也劉令嫻詩梁徐悱妻劉氏令嫻孝綽之妹盛有才名其祭悱文清綺可誦及讀玉臺新詠所載令嫻詩如光宅寺云長廊欣目送廣殿悅逢迎何當曲房裏幽隱無人聲又有期不至云黃昏信使斷銜怨心悽悽回燈向下榻轉面暗中啼正如高仲武所云形質既雌詞意亦蕩勉名臣悱名士得此才女抑不幸耶妄補古碑崑山慧聚寺有毗沙門天王像唐楊惠之所塑旁二侍女尤佳徐稚山紀其事謂此像得塑工三昧具戒後人不可妄加修飾因思古人書畫詩文寧闕疑不可妄補皆如此西園雜記載杭州中天竺佛殿後壁山水王叔明所畫歲久剝落有遜齊子者補之為方棠陵豪所譏此古今通病也近見秦中諸碑如九成宮之屬下方多刓缺俗人輒以惡書補之更數十年真面目不可復識矣池北偶談卷十七
