body:
  text: 池北偶談卷九刑部尚書王士禎撰魯仲連新城東北錦秋湖上有魯仲連陂傳為魯仲連所居按前書魯仲連子十四篇在儒家轅固新城有地名牛固相傳轅固故里也未知所據前書藝文志齊后氏故二十卷齊孫氏故二十卷齊雜記十八卷轅固齊人説詩獨不見於班史史但云魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜説咸非其本義云李顒种放賜告西歸有一高士隱居三世以野蔌一盤詩一章贈放云接得山人號舍人朱衣前引到蓬門莫嫌野蔌無多味我是三追處士孫宋史列放隱逸傳中豫嘗非之若此君差無愧耳近盩厔李顒兩經徵聘不出有古人之風顒以理學倡導關中劉念臺先生劉念臺先生居常敝帷穿榻瓦竈破釜士大夫飾輿馬而來者多毁衣以入偶服紫花布衣士大夫從而效之布價頓昂會稽令趙士諤問疾至榻前見其單陋出而歎曰豈意今日得覩管幼安萬厯丁巳京察韓浚劉廷元尋怨東林士諤時為考功爭之曰劉大行之清修人所不堪此諤所親見者乃止給事中徐耀使浙渡江來見先生辭之耀曰昔人不得見劉元城以為如過泗州不得見大聖耀如徒返何顔見鄉之父老乎先生乃見之其為世所企慕如此黃少詹石齋祭告禹陵事竣謁先生及門者三先生不見曰際此亂朝豈大臣徜徉山水之日石齋聞之即行海寧吳忠節公麟徵初第時常夢至一古寺有角巾而書碑者所書乃文信國零丁洋詩問之旁人曰山隂劉宗周也後二公先後殉國沈文端公商丘沈文端公鯉家居生日族人上壽時明神宗遣使存問從弟某私語公曰兄位宰相蒙恩存問而羣從子姓濟濟如此可謂盛矣公愀然久之曰弟以為盛吾方憂其衰耳弟愕然問故公曰吾鄉宋立菴太宰纁家法可敬彼方當貴盛吾家不及也頃立菴生日吾預其家宴座中子弟數十人不聞飲啖聲昨吾生日見諸子弟飲啖不顧長者家法如此是以知其衰也後沈再傳遂不振而宋莊敏公從孫文康公權位宰相文康長子中丞犖今為江蘇巡撫商丘三張張昉字于東崇禎庚午舉人潛心伊雒之學不言而躬行甲申後居一土室不入城市時為五言詩學陶靖節書學顔平原守令欲一見不可得今七十餘尚在其兄某少慕神仙棄家訪道五十年不歸弟翮字大羽頳面修髯狀貌竒偉倜儻通輕俠一且渡江走大雄剃髮為沙門獨留其髯數年刻期端坐而逝常給事常若柱山西人順治丁亥進士改庶吉士授給事中居京邸惟孺人及一老僕供給使貧不能具饘粥居諫職數日上疏劾闖賊偽相牛金星當明正典刑以雪普天之恨坐褫即日賃一車夫婦共坐出國門老僕步從行路皆歎息李忠定公世史正綱於李忠定公殁書觀文殿大學士隴西公李綱卒於張浚則不書又引何彥澄家藏朱晦翁墨迹一帖云十年前率爾記張魏公行實當時只據渠家文字草成後見他書所記多不同常以為恨揭徯斯云宋之不能中興由張浚之逐李綱殺曲端引秦檜殺嶽飛也中興宋鑑云張魏公有不可解者二力攻李忠定而寧與汪黃同朝維揚之變國危矣曾微一言聲時相之咎一不可曉也力引姦檜使至得政而寧與趙忠簡語不相下二不可曉也中興大事記云使浚移其攻忠定之筆而攻汪黃豈不快公議哉浚徒以有子南軒至今稱為正人無識者至比之武侯謬矣江右鄧左之履中著張浚不當從祀辨語載前卷中秦檜復諡宋寧宗嘉泰四年追封嶽飛為鄂王開禧二年追奪秦檜爵諡謬醜此天下萬世公議然實韓托胄欲用兵而先有此舉也乃邊釁既開又誅托胄以媚敵遂復秦檜爵諡則悖矣王東臯逸事王東臯伯勉長文選時內大臣某嘗奉世祖皇帝旨逮工部侍郎張某至部以旨示滿洲尚書韓代尚書以無漢字召公至屬書之公難之曰以譯字命郎中出上意耶某不敢不書大臣意耶某腕雖斷不敢書也二公皆歎服其有執公嘗宿部休沐甚少而選郎章奏甚煩五鼓啓事視他司為多一羊裘著之十餘年毛盡脫滿洲同官聚謀曰王長官一寒至此奈何醵金製狐裘一貂帽一持遺公公不受曰伯勉生平不受人一錢何敢拜公等賜同官公言於冢宰冢宰力勸始受公改御史內升時都御史以兩淮鹽法敝欲舉公往公力謝不可曰內升借補之員例不奉差今必以此事相付從前弊竇不敢欺隱以負主上遂止癖阮遙集有屐癖祖約有錢癖初不辨得失後客詣約有財物拼擋未了見客至便傾身障簏詣阮阮方吹火蠟屐歎曰未知此生當著幾兩屐神色間暢於是勝負始判阮公高流何至與錢奴較優劣耶和長輿亦有錢癖當時與杜元凱王武子輩並稱典午人不顧名教流弊至此孫文定戒子益都孫文定公廷銓服官居鄉恂恂亷慎其子寶侗有高才侍公京邸每鄉試必遣歸家戒不得入京闈嘗曰吾為大臣汝又薄有文譽使或以一第相溷為結納之階平生亷隅掃地矣寶侗至今尚為諸生文定此一節真有唐質肅王忠肅二公之風楊國忠天寶九載楊國忠請復張易之兄弟官爵陸務觀詩何至詔書褒五郎是也此與宋復秦檜諡明英宗立王振廟同成相國二世厚德大名成文穆公基命大拜後改作居第購得民居有樹貞節坊者令勿毁其第遂低一隅其子青壇相國克鞏大拜後修家廟地為前明陳鴻臚之室有少卿坊適當闢門之衝當毁其後人式微召而告之曰吾亦故家也忝居相位詎忍壞故家之棹楔遂改闢門其屋當改造坊久而攲賴屋以支修屋則坊圯乃并其坊新之人稱其兩世厚德云韋蘇州韋蘇州史失為立傳宋沈明逺始補傳其生平端末終亦未詳集中有逢楊開府一篇少事武皇帝亡賴恃恩私云云後人遂疑為三衛而韻語陽秋因附會以為恃韋后宗族云云囈語武斷可笑腐儒之見乃如此葉忠節葉映榴字丙霞江南上海縣人順治辛丑進士由庶吉士改部曹出視陜西學政稍遷湖北督糧參議戊辰武昌兵變從容拜疏公服自剄死奉旨褒嘉特贈工部侍郎巳巳上南巡其子葉敷迎駕上諭禮部等衙門當楚省兵譁之際葉映榴盡節捐軀朕心深切憫悼特詔所司優贈亞卿兼豫恤廕今巡行江南見其子葉敷迎伏道旁彌增軫惻忠節之臣應特與諡以彰異數爾等會議具奏部覆特諡忠節丙霞故刑部侍郎有聲子弱不勝衣在部曹與豫為文章之交嘗以虔州圍城中詩二百餘篇屬豫序論竟未及報乃甫脫贑圍復遭楚難疾風徑草大節凛然贈官易名迥出令甲之外死不朽矣姚平仲老學叢談載陸務觀姚將軍趙宗印二詩惜不得姚名字今渭南文集有姚平仲傳庶齋豈未睹之耶郭希顔邪説明嘉靖中中允郭希顔以謫外家居上疏建儲嬰世宗之怒傳首九邊後人憐其罪酷有為請諡者又或入其疏於名臣奏議中可笑按希顔此疏本以遷謫妄有覬覦固不必言其在詞林見議禮諸臣驟貴又見相嵩以議興獻王祔廟稱宗得大拜希顔遂建言欲黜孝宗武宗二廟不與九廟之數而以興獻上接憲宗公論惡之遂以計典罷斥其人穿窬之不若而論者不察猶厠諸直諫之列何哉黃毅菴宗伯汝良野紀矇搜備詳其事且謂二祖列宗之靈實褫其魄此萬世公論論世者之所當知邊尚書𢎞治末孝宗上賓豫郡邊尚書華泉貢為兵科給事中疏劾太監張瑜太醫劉泰高廷誤用御藥逮瑜等下獄大理卿楊守隨謂同讞諸臣曰君父之事誤與故同例以春秋許世子之律不宜輕宥此事與泰昌時孫文介慎行論紅丸事相類尚書工詩博雅為𢎞正間四傑之一世但知其文章而不知其丰裁如此又先生仲子習字仲學頗能詩其佳句云野風欲落帽林雨忽沾衣又薄暑不成雨夕陽開晚晴而老鰥貧窶至不能給朝夕以死則先生清節可知也王文成王文成公為明第一流人物立德立功立言皆踞絶頂康熙中開明史館秉筆者訾謷太甚亡友葉文敏方藹時為總裁豫與之辨論反覆至於再四二十二年四月上宣諭湯侍讀荆峴斌令進所著詩文且蒙召對中有王守仁論一篇上閲之問湯意云何湯因對以守仁致良知之説與朱子不相剌謬且言守仁直節豐功不獨理學上首肯曰朕意亦如此睿鑒公明逺出流俗之外史館從此其有定論乎仁宗徽宗元臣庫庫曰宋徽宗諸事皆能獨不能為君耳炙輠録記周正夫曰仁宗皇帝百事不會只會做官家此語在庫庫之前可謂絶對蘇叔黨大節宋人議蘇過叔黨附梁師成師成妻死為服緦麻云云顧略其大節元袁伯長清容集有跋叔黨竹石牧牛圖云小坡竹石綽有父風後倅定武罵賊不屈死之其氣節不墜光於前人矣事詳揮麈録劉後村跋小米畫云叔黨之才百倍元暉元暉至侍從叔黨死小官命也夫揮麈録又載叔黨政和中召入禁中畫窠石而終不遇武陵起復豫嘗論楊武陵奪情事後人論之過刻聞之山長教授岱云其父客嚴首升周聖楷輩為武陵所抑遂騰謗書又當時與黃石齋先生矛盾故論者多少之耳豫按禮曾子問云子夏問曰三年之喪金革之事無避也者非與子曰吾聞諸老聃曰昔者魯公伯禽有為為之也注曰魯有徐戎作難喪卒哭而征之公羊傳閔子要絰以赴公難退而致位以究私恩春秋亦紀晉襄公墨縗之事漢唐以來遂有起復之禮能改齋漫録云前漢翟方進喪既葬二十六日除服起視事後漢桓焉為太子太傅以母憂自乞聽以大夫行喪踰年賜牛酒奪服宋王性之默記云本朝不獨宰相即百執事皆起復惟富鄭公以太平而辭儒臣如楊大年王元之晏元獻皆未持服富公之後如陳升之亦百日起復此蓋朝廷體貌况在兵革之際云云按已上諸公非盡有金革之事若武陵則金幸之事也顧論者不責彼而責此何歟又考明初名臣亦多起復至羅一峯論李文達後此風始息奪情固非美事然南陽以一峯武陵以石齋獨受惡名則不幸也聖楷字伯孔湘潭人有才名後為獻賊偽常德知府發掘楊相祖墓最慘卒為獻賊所殺真諦樂郊私語載楊璉真伽至海鹽州寓城北德藏寺欲發掘陸左丞朱提舉妻女之墓寺僧真諦聞之怒形於色楊五更肩輿擁衆出真諦忽起抽韋馱杵奮擊從者數百人不能拒人見真諦於衆中超躍每踰尋丈捷如鷹隼楊大懼遁去後二年真諦行腳峨眉不知所終此僧殊快人意但恨不在賊髠發諸帝陵寢時耳浙江人物西園雜記論兩浙人物劉文成為謀臣之首宋文憲為文臣之首方正學為忠臣之首于忠肅為功臣之首宸濠之變孫忠烈首輸忠死節王文成首倡義戡亂此皆韙也獨謂世宗之初張羅峯首建議以成大禮此所謂貂不足狗尾續者耶兩薛居正五代宋初有兩薛居正其一錢唐人仕吳越武肅王官太尉卒諡貞顯神魚井何騰蛟字雲從明末以都御史撫楚其先山隂人戍貴州黎平衛遂為黎平人所居有神魚井素無魚騰蛟生魚忽滿井五色巨鱗大者至尺餘居人異之後騰蛟盡節死井忽無魚野紀矇搜黃毅菴尚書汝良作野紀矇搜明二百餘年間大事稍備其持論頗正然不可解者二事其一謂李西涯與劉文靖謝文正為三仁其一嘉靖初大禮議主張桂輩而詆楊文忠也吳康齋李文達世論吳康齋太刻野紀矇搜云與弼以布衣老儒一旦授五品侍從人皆詫為殊榮寧復過望蓋與弼之聘薦自石亨亨小人後來敗露輿論推求能無為盛德之纍如蔡雍受知董卓遂喪生平故不受耳與弼好遁不汙見險能止見地優於楊時多矣此論甚公矇搜又云王文恪評李文達云國朝三楊後得君最久者無如李賢亦能展布才猷然當時亦以賄聞云云文達相業視三楊有過無不及後王亦入閣相業如何勿亦不自見其睫乎頃見施愚山閏章在史館作文逹列傳頗致微辭不敢謂然施或未覩毅菴此論耳司空表聖史謂司空表聖躁於進取前人辨之屢矣考一鳴集有答孫郃書益證史官之妄書略云古之山林者必能簡於情纍而後可久今吾少也岔然不能自勝於胸中乃不誠於退者然亦窮而不搖辱而不進者蓋自審已熟雖進亦不足救時耳彼一飰之罄或請濟於其鄰雖童子不可以空器紿之也矧當艱否之運吾君吾相方以爵秩來天下之賢將與之共拯其可沽虛而自售耶又云愚雖不佞為士大夫獨任其恥者久矣其可老而冒之耶韓吏部激李桂州之必行責楊道州無勇雖致二賢適自困亦何救於大患哉觀此書躁進者肯為此語否史之妄不辨可知峴山幢宋人題名襄陽峴山羊公祠有石幢一枚凡六面高六尺每面濶九寸有蓋有座一面直書下第一行刻使帖襄陽縣第二行刻準慶厯七年十一月六日中書劄子襄州奏當州城南五里有峴山一所上有古祠碑又有晉太傅已下俱磨滅僅存聖旨字末行上存帖到速採石大字書刻上件其四面界作六層刻詩下題名又一面大書題名又幢一臥峴山上其文可辨者十三字曰石於山巔播清芬而不已餘盡漫漶末云開國男張九齡撰前一幢詩可辨者三首尚書工部員外郎直龍圖閣知襄州事王洙七言古詩云襄陽南出大路奔小山曰峴名特尊山形卑墮不峻極屹若巨首臨江濆大山半宫不成霍絶水闕左非為亹砠巔贔屓戴危石箕踞曼衍羅芳蓀漢流長騖濱其足東望瀰迤皆平原槎頭下瞰罟罶集蔡洲近眺田園蕃何物兹山匪秀出得使今古聞聽喧自昔羊公好登覽山名直為賢者存鹿門望楚鎮區境鳳林冠蓋延山樊丹巖翠壁互幽勝日月虧蔽煙嵐屯公胡遺彼而樂此談者未始聊診綸吾謂聖達竟超豁高覽便欲周乾坤孔登泰山小天下阮升廣武􅸅豎缺一字會稽探穴禹書出之罘望海雲濤翻此中風景亦虛遠極目見盡江山源東吳未定勞機䇿置酒嘯咏紓勞煩數顧溫甫恤躬後誓將百歲遊精魂對公盛德與山永正惟湛輩如公言今兹去公僅千載凛然英氣猶軒軒我來追古一長息舊迹廢毁成悲吞民豪占山童其木嘉植不得容本根利取薪蘇積稛絭粥之陶旊供燒燔羊公無廟忽不祀但縱淫鬼歆牲蘩中亭有碑即墮淚至今觀者懷仁恩於民何誅不足問非民忘德由官惛下教里邑復祠宇敘諸祭典躋之元思仁愛樹恭所茇禁止樵伐修壖垣且欲王命得守固謄言狀事馳九閽書聞天子缺一字報可金石款刻垂後昆缺五字遺愛朂爾風化常缺二字給事中知蔡州事吳育絶句羊公千載得清吟芳迹雖遙契昔心更與峴山為故事凛然風格照來今尚書屯田員外郎知光化軍事李宗易律詩叔子祠荒歲已深異時賢守重登臨峴山岑寂瞻風槩漢水靈長想德音奉詔始聞新締葺有知那復歎湮沉又刋翠琰留南夏先後功名照古今其端明殿學士尚書禮部侍郎李淑諸人詩皆缺已上每面十一行十二字名字可辨者范仲淹李淑吳育劉敞李宗易張去惑孫抗韋不伐李康伯賈黯裴昱馬雲黃通連庠又宋人飲餞題名甚多知名者張唐英趙德麟魏道輔岑巖起李方叔已上凡七則大者方員徑寸小者殺其半字畫端徑非俗書也豫以康熙壬子過襄陽徘徊祠下未及摹拓止録諸公題名豫門人淮隂張力臣弨有嗜古之癖辛亥過襄曾有拓本頃索之略録如右蘇汝霖陳光龍廣西孫延齡馬雄之亂死節者前則巡撫馬公雄鎮富川知縣劉公欽鄰後則巡撫將軍傅公𢎞烈又有間關賊中百折不回乃心王室如提學道僉事蘇公汝霖平樂縣知縣陳公光龍亦疾風徑草也蘇棄家逃至肇慶軍前題補布政使部議以品級太懸不允蘇尋死於粵然軍前題補品級相懸者不可勝計如胡一璉以僉事題補布政使是也獨蘇格於部議可歎陳僅題授梧州府同知尋以病請一妾鄧氏一子粵郎皆死猺洞中讀其與袁太常書甚可悲也蘇字鶴洲石埭人壬辰進士陳黃陂人舉人王秋澄王秋澄先生教萬厯中官吏部文選郎中力持公法政府權璫無所措手繼者為顧涇陽孟雲浦馮思豸生虞皆效之遂相繼黜逐伍袁萃林居漫録云然又嘗薦起鄒忠介趙忠毅諸公為正人所倚先生吾鄉淄川人也王邦直王邦直字子魚又字東𬈑即墨人以歲貢官鹽山丞上疏罷歸殫精聲律之學聚書千百卷坐臥一小閣二十年成律吕正聲六十卷其説謂君聲最清管以三寸九分本吕氏春秋其數配之揚子雲太玄縷析比合而以諸家九寸之説為非是萬厯甲午詔修國史翰林周公如砥上其書史館深為大學士南充陳公所歎賞周公云班固律厯志載即墨徐萬且氏治太初厯第一而子魚追配之於千載之後其外孫黃御史宗昌序刻之康熙十八年豫在明史館亦上其書楊襄毅蒲州東門外有兩阜蜿蜒形家相傳以為貴地楊襄毅公博為吏部尚書時命堪輿擇吉壤得此地以告公曰此關闔郡文章科第我曷為私之即於其地建文昌祠人皆服公厚德不可及後公長子俊民官至户部尚書第四子俊卿官錦衣餘三子皆官監司俊卿子元祥元祥子世芳皆官詹翰世以為公厚德之報云元祥未弱冠登第入翰林早死母哭之慟一夕見夢曰母勿過傷兒當復來未幾生遺腹子即世芳也未弱冠亦登第入翰林母猶及見之吳天章雯説大椿堂蒲州有大椿堂為楊襄毅博王襄毅崇古張文毅四維三公讀書之所其後三公相繼登進士第一大拜一至吏書一至兵書張即王之甥也山西至今傳為盛事黃詩黃先生端伯江西人精禪理少時見其瑶光閣集一卷皆宗門語乙酉以給事中殉節金陵將授命有報恩寺僧一輪趨過黃呼令代書一絶云對面絶思量獨露金剛王若問安身處刀兵是道場書畢從容就義死此詩載甲乙事案兩蕭后遼聖道二宗享國皆最久皆有宫闈之變聖宗仁德皇后善琵琶法天后訥木錦誣其與琵琶工燕文顯李文福通投書聖宗寢帳聖宗不之信其後竟為訥木錦所殺道宗宣懿皇后工詩尤善琵琶耶律伊遜誣其與伶官趙惟一通搆死才藝足為婦德之纍况可耽音樂乎仁德事載契丹國志遼史本傳不載宣懿事詳焚椒録王若之王若之字湘客益都人明南京户部尚書基冢孫為人瀟灑疏誕有晉人風致工尺牘好彈琴善五言詩嘗刻尺牘五言四卷以門廕入官仕至長蘆都轉運使南渡官金陵大兵渡江若之轉徙寓姑熟佛寺以書畫鼎彝古金石文字自隨車尚兼兩洪文襄公承疇諭之降不屈死王所寶古琴名桐笙今尚在其家徐鉉南唐以徐鉉使北請緩師後主曰卿行當止上江救兵勿令東下鉉對曰今社稷所賴惟此救兵何可輒止臣此行未必能紓國難但置之度外耳此不惟純臣之誼亦識事機後金人圍汴京唐恪耿南仲輩專主和議止各道勤王兵遂致二帝北狩之禍非鉉之罪人乎李師中蘇明允預識荆舒之姦人皆服其先見同時李待制師中因邸吏報包希仁參政或曰朝廷自此多事矣師中曰包公無能為今鄞令王安石者眼多白甚似王敦他日亂天下必此人明允擬之王夷甫盧杞師中擬之王敦其識不相上下皆不減張安道吕獻可今人但知老泉何也馬驌馬驌字驄御一字宛斯濟南鄒平人順治己亥進士仕為淮安推官終靈壁令生而清羸博雅嗜古尤精春秋左氏學撰辨例三卷圖表一卷隨筆一卷名氏譜一卷又著繹史凡分五部一曰太古三皇五帝計十篇二曰三代夏商西周計二十篇三曰春秋十二公時事計七十篇四曰戰國春秋以後至秦亡計五十篇五曰外録紀天官地志名物制度等計十篇合一百六十篇篇為一卷始開闢原始迄古今人表其書最為精博時人稱為馬三代崑山顧亭林炎武尤服之康熙癸丑歲卒於官靈壁人皆為制服云蕪湖烈婦江南初入版圖時有禆將於蕪湖掠一婦人義不受辱衣服上下縫紉周密其夫訪贖之主將堅不許婦悲憤投水死至晚泊舟舵前窸窣有聲則婦尸已在次日泊舟復然以篙逐之俄頃復至又次日復然乃舁而棄之岸月餘此將在船頭納涼忽大叫曰婦又至矣翻身落水而死二尹成化間歷城尹恭簡公旻為小人所擠尹直著瑣綴録尤極誹謗其書久行於世至有不辨二尹邪正者一日閲李文鳳月山叢談公道較然因録於左方李云成化末小人用事南昌李孜省挾左道干進位尚書掌通政司託言神降有江西人赤心報國之語以太宰歷城尹公不右江西人乃計謀極力擠罷而用豐城李裕代之及薦泰和尹直入內閣起永新劉敷長憲臺高安黃景二禮部四人皆世稱寡亷鮮恥者而新建謝一夔安成劉宣俱不保晚節一夔進工部尚書宣二吏部物議沸然不平獨服旴江何公喬新節行介特未幾孜省誅死直等相繼免公論始明云當時謡曰公道不如王恕選法不如尹旻張昭張昭濟南蒲臺人忠義前衛右千户所司吏英宗復辟石亨曹吉祥等恃寵賣官至三千餘員昭奏之直𨽻山東大飢復上書言六事上皆從之後任南昌府司獄學士張元禎謂之曰君昔三疏位卑而議論甚高官小而事業則大已寫入金縢令名無窮矣蒲志出庸手恐遺此公因讀月山叢談録之以存其人圖文襄厚德大學士諡文襄圖海公既定平涼軍中論功取諸將偏禆士卒記功牌報部記過牌悉聚焚之不以語人其厚德如此子諾敏公今為刑部尚書人以為隂德之報前寶雞令高君某云在軍前親見之鈞陽二老一日與客談及逆瑾時閣老劉宇曹元不知何許人及考列卿年表元南直𨽻含山人宇則河南鈞州人與馬端肅公同時同里馬公勳德如泰山北斗至今人稱鈞陽公而宇曾不得比於蚍蜉之細官位之不足重人如此光孝寺鐵塔文廣州府光孝寺有鐵塔一乃劉鋹所造上有文曰大漢皇帝以大寶十年丁卯歲敕有司烏金鑄造千佛寶塔一所七層并相輪蓮花座高二丈二尺保龍闕有慶祈鳳厯無疆萬方咸底於清平八表永承於交泰善資三有福被四恩以四月乾德節設齋慶讚謹記後列中官姓名豫廣州逰覽小志别詳之三帝陵詩一路荒山秋草裏行人惟拜漢文陵唐人詩也四十二年如夢覺春風吹淚過昭陵宋人詩也祠官如可乞長奉泰陵園先帝侍臣空灑淚泰陵春望已糢糊明人詩也文帝仁宗孝宗三君德澤感人之深如此至誠古來名臣多矣然千百年後讀史至諸葛忠武侯司馬文正公之薨輒感動流涕者至誠為之也朱忠莊公遺疏明中丞朱忠莊公諱之馮本名之裔字德止號勉齋京師人金忠潔公鉉其妹之夫也二公平日以理學相砥礪後皆死甲申之變公子丁未進士敦厚示公殉節時遺疏及家書各一通敬録之疏云我國家金甌全盛不謂人心離散財用困窮一至于此此臣之所為痛哭流涕也臣力已竭臣罪滋深南望九叩一死以報我皇上念我太祖高皇帝功德高厚我皇上憂勤獨深厯數無疆中興可待唯以收人心培節義二者為先務而已收人心在愛民力愛民力在拔亷官此大學所以反覆於用人理財也我朝士氣原振自逆璫摧折遂致亷恥風微從來仗節死義之士多在敢言極諫之中此宋朝所以待士仁厚也云云遺書云吾弟吾兒讀書須讀經世書占畢之學無用也吕新吾先生呻吟語不可不讀我以死報國此心慊然朝聞夕死原無二也勿以為念公死時有宣府諸生姚時中同日自經於學宫在疚記忠莊朱公著在疚記一卷語多精詣略載數條於左深山靜坐十年使習與性離塵世順應十年使外與內合為學之事或幾化矣人自晝至夜當知何所事知者則性命生死俱了鳶飛戾天魚躍於淵即是仕止久速古之人修身見於世非誠不能誠則貫微顯通天人一世不盡見百世必有見者紀綱之壞存乎風化氣節之壞存乎培養人心之壞補偏救弊存乎執中約言之存乎朝廷聖人之死還之太虛賢人即不能無物而况衆人乎實變氣質方是修身士憎兹多口則何以故曰持介行者不周世緣務獨立者不協衆志小人相仇同類相忌一人扇謗百人吠聲豫嘗身試其苦者數矣故君子觀人則衆惡必察自修惟正已而不求於人待小人尤宜寬乃君子之有容不然反欲小人容我哉中者不落一物庸者不遺一物隨事無私皆可盡性至命而忠孝其大者平日操持非實試之當境決難自信隱惡揚善聖人也好善惡惡賢人也分别善惡無當者庸人也顛倒善惡以快其讒謗者小人也赴大機者速斷成大功者善藏同是中庸而有君子小人之别微矣哉池北偶談卷九
