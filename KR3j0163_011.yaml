body:
  text: 池北偶談卷十一刑部尚書王士禎撰公文介公詩吾鄉公文介公鼒萬厯中為詞林宿望詩文淹雅絶句尤工如習家池云峴首岧嶤漢水長習池煙樹野亭荒羊公流涕山公醉並枕殘碑臥夕陽西郊金主釣臺云化石遺綱入戰圖薊門衰草釣臺孤不知艮嶽宫前叟得見南軍入蔡無畿南問宋遼戰地云戰勝河東下薊丘髙梁失御陳雲愁六飛不入燕山府直見鑾輿下廣州明湖獨眺云窄岸平橋萬栁斜半城春水半人家東風吹雨宵來急一片鄉心到海涯别邢子願云南浦分攜暮雨微平林望斷送將歸新詩一一題團扇隴首秋雲片片飛衍元白詩寄馮用韞云千里襟期付此詞郵筒珍重寄相思將來莫遣玲瓏唱淚盡夷陵緩棹時生平有意皆成幻死去憑誰得報君燈影幢幢對疏雨一聲哀雁入秋雲濟南晤李季重云一望并州雁影沈三年幽夢㟙湖隂歷城四面寒泉水堪照青陵臺下心泉林寺云百里天涯一夕分月華中斷悵離羣坐聞莊子城頭水却憶夷吾臺上雲蘭溪望金華山水云新安水色括蒼煙煜煜金華婺女連靈異果應仙路近始知此是蔚藍天杜子美梓州金華山詩上有蔚藍天謂潼川之金華山此乃借用百折桐江繞釣臺四明雲起接天台半空突出冰輪湧定是龍湫雁宕開南樓云十二樓開列玉京分明天上落層城簷前寂寂三珠樹半夜鶴飛來上鳴掖縣道中云齊疆行盡海雲生處處看山自問名麥秀漸漸桑柘緑馬頭不見曲侯城襄陽云江上輕帆落浴鳬鏡中倒影數峰孤林鶯送客巖花笑曽見銅鞮歌舞無南竺寺云晚霞挂重塔微月碧殿空林壑松檜響十里聞秋風皆不減唐人風致而列朝詩取之甚少不可解蓋南人多抑西北也安磐詩安磐字松溪𢎞嘉間為都給事中有直聲蜀之嘉定州人升菴先生友也其詩風神獨絶而世罕知之豫登凌雲寺石壁刻詩甚夥惟松溪四絶句最為髙唱記其二云青衣江上水溶溶隔岸遙聞戒夜鐘暫借竹牀聽梵放月華初到第三峰林竹斑斑日上遲鳥啼花暝暮春時青衣不是蒼梧野却有蛾睂望九疑蓋凌雲九峰枕青衣江之東而蛾睂三山正直其西至其地知其詩為工也彭西園彭堯諭號西園公子河南鹿邑人官通判崇禎末頗擅詩名豫年十八九時與先兄考功同上公車於北道逆旅見壁上畫蘭石甚有風致其旁細字注曰西園侍兒喬施同寫中書舍人吳郡文啓美震亨題其後云令人羡煞西園老攜得西施共小喬後十餘年重過之畫猶宛然題一詩云無復湘中見汜人西園蘭石愴如新低回十五年前事只有蛛絲絡暗塵此詩不復憶在京師彭庶子羡門為子誦之附識於此黃徐詩黃魯直晚自刋定其詩止三百八篇徐昌國自選迪功集亦止三百餘首昔人自愛其名如此倪仁吉女郎倪仁吉義烏人善寫山水尤工篇什豫嘗見其宫意圖詩其一云調入蒼梧斑竹枝瀟湘渺渺水雲思聽來記得華清夜疏雨銀缸獨坐時先考功兄曽得其全集倪手㮔方竹數十竿甚愛惜萊陽董樵處士遊婺郡倪髙其人斫一枝贈之岐梁倡和集蘇文忠公鳳翔八觀詩古今竒作與杜子美韓退之鼎峙文定皆有和作謂之岐梁倡和集然魄力不逮文忠矣文定作文忠墓志謂自黃州後其文一變如川之方至而轍瞪乎不能及然此早歲之作亦自不敵也潁濱集中如魏佛貍湖隂曲等篇亦是髙作紀映淮金陵紀青字竺遠能詩少為諸生棄去入天台國清寺為僧久之復捨去其子映鍾伯紫尤負詩名女名映淮字阿男嘗有秦淮竹枝云栖鴉流水㸃秋光愛此蕭疏樹幾行不與行人綰離别賦成謝女雪飛香及笄嫁莒州杜氏早寡年五十餘以節終豫在儀制時下有司旌表之豫昔在秦淮賦詩云十里清淮水蔚藍板橋斜日柳毿毿栖鴉流水空蕭瑟不見題詩紀阿男伯紫見之殊不喜後二十年從子啓大官莒學正訪得其遺詩數篇其一云清溪有桃葉流水載佳人名以王郎久花猶古渡新楫搖秦代月枝帶晉時春莫謂供憑攬因之可結鄰又李花一孤村流水數間屋夕陽不見人牯牛麥中宿錦秋亭辨自夏莊橋渡時水俗名烏河而東並河北行內河外湖浩渺無際十里至灣頭新博二邑分界處也時水自南而北小清故河自西而東滙於灣頭與湖相望中亘長堤灣頭煙火數百家夾河以居鹺舟漁艇鱗次市橋再渡灣頭橋而北市廛盡處堤直如弦屬於博昌城凡十里櫸柳夾之兩岸皆稻塍荷塘籬落菜圃與緯蕭交錯時十月下浣過之煙雨空濛水禽矯翼黃葉滿地人行其中宛若畫圖時見牧人蓑笠御觳觫歸村落間邈然有吳越間意明日晴遂由東城騎行而南舍騎過石梁登架筆山山疊土為之三峰起伏雜植桃柳錦秋亭在東峰此亭元中統所建齊乘以為在東南城上而山乃嘉靖甲辰僉事黃鼇所築則亭之移當在是時也北枕城堞西望河堤東南俯臨極浦備煙波曠渺之趣因憶徐隱君夜舊示豫錦秋亭辨具録於此以備兹亭故實使來者有所考焉北湖名錦秋新城博興二縣志皆以為本於坡詩其所謂詩即今志所載霜風收緑錦五言八句者是也豫獨疑詩中北闕字不類宋時事跡而東坡全集及單刻膠西集都無此首詩之氣格亦不類然無據以奪之及閲元兵部侍郎于公欽齊乘錦秋亭一則乃知此詩即于公作所謂取坡詩命名者非此詩乃取和文與可橫湖絶句而名之也後來作志者據欽書采入不細詳文義牽連讀去以致承襲訛誤而不之改據欽所記亭為中統間邑人所建中統乃元初年號後蘇公百數十年當時豈遂有亭可賦詩耶然何以知其取詩即橫湖絶句也以其篇中連綴錦秋二字而知之也今欽詩霜錦雲秋等字亦仍本此輒録欽原文并録蘇詩於後齊乘一則錦秋亭博興東南城上中統中邑人所建取坡詩命名此下于目敘述蓋齊地淄時般濼諸水滙為馬車瀆以入海博興宛在水中舟楫交通魚稻成市昔嘗過之愛其風景絶類江南賦詩亭上云霜風收緑錦萬頃水雲秋海氣朝成市山光晚對樓舟車通北闕圖畫入南州且食鱸魚美吾盟在白鷗其鱸雖小亦四腮不減松江有蓴菜齊人不識目鱸為豸云蘇公橫湖絶句貪看翠蓋擁紅糚不覺湖邊一夜霜卷却天機雲錦段從教匹練寫秋光外祖季木王公世目博洽公北湖遊記載欽常自濟南華不注山下經小清河東入此湖折而南入時水至索鎮舍舟歸益都此亦本齊乘時水條下所載則知欽過此賦詩是其常所往來之地矣獨記中於此詩偶失撿察尚沿舊志之訛而外伯祖康宇先生作志亦仍之安知後來不有據此而編入蘇集者是不可不辨也謂宜於湖之北岸勝處祠蘇于二公額以盟鷗更榜卷雲寫練四大字於其上庶俾後來知此緣起特為筆述俟吾地之大人君子有志乘籍者折衷焉歲在庚戌五月九日湖上老漁徐夜記康宇先生即先祖方伯公也雷雨津雷兵部雨津起劔蜀之井研人明崇禎甲戌進士嘗過楚題洞庭廟云我是人龍君亦龍吾今胡為乎泥中憑君借得青驄雨手攬風雲滿太空甲申後從張公玉笥監軍死豫識其子吳江知縣珽珽字笏山張鯤詩鄒平長白山醴泉寺即范文正公畫粥處四山環合一溪帶瀠溪上有范公祠祠中多前代石刻有嘉靖十三年嵩少山人張鯤八絶句最佳節録於左危閣煙霞出峰簷麋鹿來春泉落西澗聲繞讀書臺臺前碧玉樹葉葉上青霄工師求大木隆棟萬年朝風晝溪楊色煙春巖蕙香人言背絶壑才是上書堂山護埋金窟泉通畫粥廚傳燈衣鉢在曽伴老龍圖靈剎羣峰合名祠半日遊難逢浮海術易集下山愁鯤河南鈞州人詩名不甚著而詩之工如此張閃滇永昌張含愈光集升菴先生所定又閃繼修允迪亦永昌産在啓禎間有詩名端簡王公𢎞祚以二公皆其鄉前輩常欲合刻其詩丁未戊申間公為大司農以二公集屬豫選較刻之豫謂閃集可刪者過半非張匹敵當專刻張集而以閃集附後公以為然庚戌公乞骸骨歸臥金陵不知竟果此志否李因篤富平李天生因篤年三十棄諸生博學强記十三經注疏尤極貫穿長律得少陵家法常以四十韻詩贈曹秋嶽曹歎曰數百年無此作矣李有句云林谷關音本乾坤老彖才豫謂理語經語最不易下坡公寫杜詩至致遠恐終泥停筆謂學人云此句不足為法王敬美云曹子建後作者多能入史語不能入經語謝康樂出而易辭莊語無不為用然則用經固以康樂為宗也陳伯璣陳伯璣允衡建昌南城人御史本子清羸如不勝衣五言詩古淡自成一家如寒日明孤城斜風下飛鳥又籃輿望歸鳥日暮空城曲此類二十餘篇不減王韋亂後寓黃山移鳩兹再移白下貧甚撰詩慰國雅及婁堅徐世溥遺文之類凡十餘種又著古人幾部若干卷康熙癸卯歸豫章時施愚山閏章周伯衡體觀皆為江西監司為卜築蘇雲卿東湖故居後數十年竟羸病死滕王閣詩南州滕王閣毁於金聲桓之亂順治中蔡尚書士英開府江右重新之海內名流多賦詩惟海鹽彭羡門孫遹擅場其警句云依然極浦生秋水終古寒潮送夕陽彭今為內閣學士兼禮部侍郎詩帳施愚山分守湖西製苧帳題詩其上寄林翁茂之一時名士多屬和名曰詩帳或一絶句云斗帳殷勤白苧裁使君親自寫詩來孤山處士朝眠穩朝日烘門懶未開飛廉館瓦元王文定惲秋澗集有飛廉館瓦硯歌略云劉郎杳杳秋風客神鳥冥飛憶初格豹章爵首尾蟠蛇建章千門風冽冽云云此亦在銅雀之前知漢瓦無不可為硯也趙州畫水趙州畫水世傳是吳道子筆陸儼山大駕北還録云宣德間定州何生作也施宋康熙已來詩人無出南施北宋之右宣城施閏章愚山萊陽宋琬荔裳也昔人論古詩十九首以為驚心動魄一字千金施五言云秋風一夕起庭樹葉皆飛孤宦百憂集故人千里歸嶽雲寒不散江雁去還稀遲暮兼離别愁君雪滿衣此雖近體豈愧十九首耶己未在京師登堂再拜求豫定其全集宋浙江後詩頗擬放翁五古歌行時闖杜韓之奧康熙壬子春在京師求豫定其詩筆為三十卷其秋與豫先後入蜀豫歸之明年宋以臬使入覲蜀亂妻孥皆寄成都宋鬱鬱殁於京邸此集不知流落何地矣二戴戴本孝字務旃和州人詩畫皆超絶嘗在京師夜與友人談華山之勝晨起即襆被往遊其髙曠如此弟移孝字無忝四十不娶亦有詩名皆老於布衣本孝貽豫畫自題詩云叢薄何蓊薉喬木無餘陰斧斤向天地悲風摧我心不知時榮者何以答高深又云草木自爭榮攀援與依附凌霄桑寄生滋蔓尚可懼惜哉不防微良材化枯樹鄺露鄺露字湛若南海人狂生也負才不羈常敝衣趿履行歌市上旁若無人順治初王師入粵生抱其所寶古琴不食死其詩名嶠雅過賈誼宅三閭廟云浮湘七澤下靈渠牢落殘雲伴索居庚子日斜聞鵩鳥重陽沙淈見江魚天高未敢重相問年少何勞更上書此去樊城望京國定從王粲賦歸與露少客金陵遊阮大鋮之門嘗為阮序其集下僚能文近下僚中往往多才人婁縣縣丞施鴻字則威閩邵武人著史測十卷論南北朝事甚可聽又雄縣馬之驦字旻徠兩為江都壽張管河主簿撰詩防及張秋志各若干卷泰州州同知趙三麒字乾符韓城人頗能詩有絶句云虞舜昔南巡不見南巡跡但餘此墓旁一片瀟湘石詩兆順治己亥客京師日聽劉公㦷吏部鼓琴賦詩贈之云與君更作他年約黃鵠山中訪戴行至壬寅歲相遇於京口京口有黃鵠山在城南五六里即招𨼆寺宋戴顒故居也始悟前詩蓋有定數云對句小說載李空同督學江西有一生姓名偶同李出對句云藺相如司馬相如名相如實不相如生應聲云費無忌長孫無忌公無忌我亦無忌空同喜不知此對自宋有之見齊東野語云司馬相如藺相如果相如否長孫無忌費無忌能無忌乎蓋後人傅㑹空同如夏忠靖尚書給事之對耳史辰伯史兆斗字辰伯吳江人處士明古鑑之後徙居長洲博雅多藏書少及與劉子威王百榖交尤熟吳中典故康熙初卒年八十餘汪苕文曰此翁死吳中文獻絶矣秦中諸志志以簡核為得體康德涵武功志最稱於世嗣是關中繼起者則有趙浚谷之平涼府志胡可泉之秦州志汪來之北地志喬三石之耀州志王渼陂之鄠志莒人劉璞增益韓五泉之朝邑志邑人王學謨增益張光孝號左華山人對山之甥之華州志馬慥之同州志劉九經之郿志皆稱作者而渭南史蓮勺記事嘗知汾州之介休作志七卷義例精核以上皆秦人而北地又秦疆也何大復雍大記亦與康同時作於關中韓畕韓畕字石耕北平人亂後遊江南遍歷台宕諸勝客死平湖畕善鼓琴尤工五言詩有句云春愁當二月酒渴起三更程明房宣城梅淵公清常遺豫墨朴一其堅如石文曰程明房造云程君房初字明房此蓋其早年所製右車自廣武君後古今人多以左車命名者漢功臣表有中牟共侯單右車嚴感遇嚴感遇烏程人少豪宕舉止與俗異常畜一白鵲行止與俱鵲死哭之數日老而貧居山中窮僻處忍飢賦詩一日米盡友人遺白金一餅攜之市米遇小漢玉器輒買以歸玩弄之餓而僵仆幾絶髙鐈髙鐈字淵潁保定人少從孫鍾元先生學嗜酒好遊名山水自負鎚鑿每得詩必題石手鐫之常遊林慮竟日忘返聞峰下耕者喧呼回視向所來處乃知衝虎過也鐈有集數十卷其門人陳僖藹公編集張文峙張可仕字文寺更名文峙字紫淀楚人家金陵能詩與歸安茅元儀善茅死有姬楊宛以才色稱戚畹田𢎞遇欲得之以千金壽文寺求喻意文寺絶弗與通范文貞公禮為上客公殉國文寺設位雨花臺為文哭之崇禎末集子史成句為四言詩一卷諷切時事號擊磬集弟可度字罽筏好佞佛一食清齊逌然終日費密費密字此度成都人少遇逆獻之亂竄身西域不毛之地已乃溯漢江下遊吳楚居淮南老焉常寓泰州泰州守知其賢為除徭役豫曽見友人几上一卷偶取視之其首篇云大江流漢水孤艇接殘春詢之乃密作也遂賦詩與定交密跛一足後往蘇門謁孫鍾元稱弟子著鹿峰集馬黃馬應龍字伯光安丘人都御史文煒子萬厯壬辰進士歷禮部郎中卒博雅好古注道德經二卷考訂古本周禮六卷參同契二卷尚書七卷毛詩七卷藝林鈎𤣥録二十六卷初為杞令纂杞乘四十八卷今安丘舊志二十八卷最精贍有體裁署其父文煒撰實應龍少時手筆也黃楨字德兆亦安丘人嘉靖癸未進士歷文選郎中與樂安李大僕舜臣齊名號為李黃有擬騷行於世伏生光武二圖王維畫伏生圖今藏北平孫侍郎退谷承澤家吳道子畫光武燎衣圖今藏新安程穆倩邃家和韻詞先吏部兄作長調往往好壓險韻一調疊韻有至十餘闋者在杭州與宋荔裳曹顧菴倡和滿江紅詞同用上杖狀等字兄句云雨滲一犁田犢喜波添三尺河魚上用史記河魚大上語也又自課織簾還有手便從荷蓧非無杖又易得濁醪謀若下難逢春水如天上又司馬髙才元和腐彥淵博學真須杖怪吾徒底事昵蟲魚臣無狀又堤栁已隨坡老沒竹枝誰駕廉夫上又漆後斷紋仍可鼓削餘方竹還堪杖又顧我已甘居廡下如公才合居樓上疊出不窮皆竒句也後在揚州與陳其年輩倡和念奴嬌詞同用屋字亦至十餘往復如還似離騷傳屈子句裏龍堂鱗屋削迹艱虞擅場風雅未遣中書禿又十載名場相掎角戎子支駒逐鹿又我似小乘初禪愧他杯渡肆噉人間肉羡汝機鋒殊自有已似南能稻熟又更貪清曉晶簾臥看膏沐此類甚多兄嘗自跋云右小詞諸闋皆雜次諸公韻諸公率謬許其押韻之工僕則自謂此實欲省思力如昔人云匆匆不暇草書耳嘗謂詩不宜次韻次韻則慮傷逸氣詞不妨次韻次韻或逼出妙思其持論如此髙司寇詩淄川髙念東侍郎少時與兄解元繩東瑋同舉省試公車北上謁鄒平尚書華東張公延登公言君輩少年登第不啻登仙老夫少年意氣亦爾今老矣回憶五十年中功名官職都如嚼蠟更數十年君閲歷當自知之公辛巳以南總憲考滿過家薨於里第司寇及兄癸未丙戌先後成進士司寇入翰林十年至佐銓已乃以事左遷又十餘年再二司寇憶尚書之語慨然賦詩云翹車北指五雲邊緒論追陪豈偶然晚節功名如嚼蠟少年科第似登仙曠懷久矣推先輩微語還堪悟後賢畢竟山中煨芋好十年宰相亦堪憐白墮琴髙葉石林舉東坡獨看紅蕖傾白墮白墮人名此正如吳下饌鵝設客云請共過食右軍不知此例正多如山谷詩春網薦琴髙琴髙亦人名皆自曹瞞惟有杜康作俑文太青文光祿太青翔鳯戲作口吃詩云黠子向客共哆口漆栗筆蜜手柳酒本墨客揮犀鳳州有三出手柳酒宣州有四出漆栗筆蜜也子使蜀過鳳縣彈丸小邑在棧道中所謂妓手纎白固無從見之驛酒殊薄劣柳自入棧亦頗稀少豫近和海鹽門人陳子文奕禧咏鳳縣金絲柳詩云鳳州三絶無纎手又少旗亭酒共傾惟有金絲幾株柳臨江映驛拂人行龔陳詩先兄考功嘗云合肥公流水青山送六朝才子語也陳其年維嵩浪捲前朝去英雄語也龔公自東粵歸過金陵賦詩云綺閣臨春玉樹飄空江鐵鎖野煙消興亡何限蘭亭感流水青山送六朝陳有烏絲詞三卷多瓌竒閨房游俠之詞尤妙如春隂簾外天如墨又玉梅花下交三九雖秦李不能過也一絇絲往在京師吳門文㸃為豫作讀書圖汪苕文題詩云借問鄰家競笙管一絇能絡幾多絲後改作一絇絲絡幾多時一日讀馬永卿懶真子云諺云一絇絲能得幾時絡喻小人逐目前之樂也絇字當作緰太𤣥經絡之次五曰蜘蛛之務不如蠶一緰之利緰音七侯反與絇音同阿字音宋人謂漢唐人多以阿字為發語如阿嬌阿誰阿家阿房宫之類則阿房之阿亦當作去聲又山谷詩語言不韻無阿堵阿字反作平聲子蜀道集詩有句云緑苔未央瓦黃土阿房宫本此韓翃詩句韓翃詩春衣晚入青楊巷細馬春過皂莢橋按青楊巷在荆州梁何妥居白楊巷蕭眘居青楊巷時人語曰時有二俊白楊何妥青楊蕭眘皂莢橋在揚州朝無咎揚州詩曰皂莢村南三四里春江不隔一程遙雙陂鬭起如牛角知是隋家萬里橋裹鮓帖王右軍裹鮓帖真蹟裹鮓味佳一一致君所須可示勿難當以語虞令凡十九字後有米友仁跋趙子昂諸人圖記藏北平孫侍郎退谷家前有亡宋南廊庫經手人郭墨印記鳬翁黃詩春溪蒲薭沒鳬翁樂府化為白鳬如老翁急就篇春草雞翹鳬翁濯顔師古注翁頸上毛也象鳬在水中引濯其毛也黃詩蓋出此與老翁義别漢郊祀志鳬翁雜五采文又北齊武成帝湛小字鳬翁北齊童謠云中興寺內白鳬翁四方側聽聲噰噰道人聞之夜打鐘三六王彬工篆𨽻與王志齊名時人語曰三真六草為天下寶劉孝綽稱其兄弟孝儀孝威曰三筆六詩僧詩在京師出城送客偶憩野菴見壁上題詩甚有意義詩云春風迢遞憶天台五月冰寒說五臺無數好山遊未盡秋霜又欲上眉來考之乃明嘉善西林寺僧雪溪圓映作也映有西林集林程詩句林君復詩陰沈畫軸林間寺零亂棊枰葑上田寫景最工近程孟陽嘉燧有句云古寺正如昏壁畫層湖都作水田衣語意本林而工又過之五代史草徐東癡夜髙士冬夜過宿因及從叔祖季木考功象春昔所藏書畫云曽見有歐陽公五代史草藁一卷又楊廉夫詩草一卷塗乙宛然歐卷其後人漫送一許姓武辨不知流落何處矣又叔祖立宇中丞象恆家有王右軍畫紡績圖朱璧揭鉢圖揭鉢圖凡見數本最後見朱璧本有鄧文原趙仲穆及秋壑鈐山二相圖書最為竒古舊為先伯祖太師公所藏今歸徐𨼆君東癡後有董思白書寶積經賓伽羅事又有吳匏菴沈石田二跋豫所見太師故物此卷與李伯時摹支道元十六應真周文矩說劔圖而三耳說劔圖今入祕府按張昶吳中人物志云朱玉字君璧崑山人王振鵬界畫見稱於時玉盡得其技至順壬午奉中宫教金圖藏經佛像方不盈矩曲盡其妙所居虹月樓楊廉夫作記劉璋明書畫史云何景髙善界畫宗朱君璧玉蓋以字行也阮懷寧金陵八十老人丁𦙍常與豫遊祖堂寺憩呈劔堂指示豫曰此阮懷寧度曲處也阮避人於此山每夕與狎客飲以三鼓為節客倦罷去阮挑燈作傳竒達旦不寢以為常燕子箋雙金榜獅子賺諸傳竒皆成於此所知録云大鋮既降本朝在營中諸公聞其有春燈謎諸劇問能自度曲否大鋮即起執板頓足而唱以侑酒池北偶談卷十一
