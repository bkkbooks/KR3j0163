body:
  text: 池北偶談卷十九刑部尚書王士禎撰宋人絶句偶為朱錫鬯太史彛尊舉宋人絶句可追蹤唐賢者得數十首聊記於此亭亭畫舸繫春潭只待行人酒半酣不管煙波與風雨載將離恨過江南春陰垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生冷於陂水淡於秋逺陌初窮見渡頭賴是丹青無畫處畫成應遣一生愁竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時黃葉西陂水漫流籧篨風急滯扁舟夕陽暝色來千里人語雞聲共一丘露白霜紅郭外田山濃水淡欲寒天參軍抱病陪清賞一檄呼歸亦可憐斷腸聲裏無形影畫出無聲亦斷腸想得陽關更西路北風低草見牛羊梁州一曲當時事記得曾拈玉笛吹端正樓空春晝永小桃猶學淡燕支斷雲一葉洞庭帆玉破鱸魚霜破柑好作新詩寄桑苧垂虹秋色滿東南投荒萬死鬢毛斑生入瞿唐灧澦關未到江南先一笑嶽陽樓上對君山江上荒城猿鳥悲隔江便是屈原祠一千五百年間事只有灘聲似舊時夜雨連明春水生嬌雲濃暖弄微晴簾虛日薄花竹靜時有乳鳩相對鳴目盡孤鴻落照邊遙知風雨不同川此中有句無人見送與襄陽孟浩然獨憑危堞望蒼梧落日君山似畫圖無數栁花飛滿岸晚風吹過洞庭湖來時秋雨滿江樓歸日春風度客舟回首荆南天一角月明吹笛下揚州梨花淡白栁深青栁絮飛時花滿城怊悵西闌一株雪人生看得幾清明到處相逢是偶然夢中相對兩華顛還來共醉西湖雨不見跳珠十五年烏塘渺渺路平堤堤上行人各有㩦試問春風何處好辛夷如雪柘岡西掃地焚香閉閣眠簟紋如水帳如煙客來夢覺知何處挂起西窗浪接天曾作金陵爛漫遊北歸塵土變衣裘芰荷聲裏孤舟雨卧入江南第一州皂莢村南三四里春江不隔一程遙雙堤鬬起如牛角知是隋家萬里橋去年此日泊瓜洲衰栁蕭蕭客繫舟白髮天涯歎流落今宵聽雨古宣州山驛蕭條酒倦傾嘉陵相背去無情臨流未忍輕相别吟聽潺湲坐到明照江丹葉一林霜折得黃花更斷腸商略此時須痛飲細腰宫畔過重陽洞庭木落萬波秋説與南人亦自愁欲指吳淞何處是一行征雁海山頭陌上花開蝴蝶飛江山猶是昔人非遺民幾度垂垂老遊女還歌緩緩歸白髮先朝舊史官風爐煮茗暮江寒蒼龍不復從天下拭淚看君小鳯團濯錦江邊憶舊遊纒頭百萬醉青樓而今莫索梅花笑古驛燈前各自愁濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽關腸斷聲琵琶絃急滚梁州羯鼓聲高舞臂鞲破費八姨三百萬大唐天子要纒頭逍遙堂後千章木常送中宵風雨聲誤喜對牀尋舊約不知漂泊在彭城秋來東閣涼如水客去山公醉似泥困卧北窗呼不醒風吹松竹雨凄凄千詩織就回文錦如此陽臺墓雨何只有聰明蘇蕙子更無悔過竇連波落日同騎􅍁段遊倦依松石弄清流蓬萊漢殿春分手一笑相逢太華秋舟中一雨掃飛蠅半脫綸巾卧翠藤殘夢未醒窗日晚數聲柔櫓下巴陵何人把酒慰深幽開自無聊落更愁幸有清溪三百曲不辭相送到黃州向來松檜欣無恙坐久復聞南澗鐘隱隱修廊人語絶四山滴瀝雪鳴風自愛新詞韻最嬌小紅低唱我吹簫曲終過盡松陵路回首煙波十四橋夜暗歸雲繞柁牙江涵星影雁團沙行人悵望蘇臺栁曾與吳王掃落花征帆一似白鷗輕起揭船篷看晚晴梅子著花霜壓岸自披風帽過臨平蘇詞注東坡詞行憂寶瑟僵乃用漢書金日磾傳行觸寶瑟僵語解者顧引楊行密紿朱延夀病目行觸柱僵有何干涉乃知注書之難東坡放翁猶不敢居有以也胡恢書南唐書今止傳陸遊馬令二本胡恢書久不傳惟江陰赤岸李氏有之李即忠毅公應升之叔忘其名矣按恢金陵人夢溪筆談稱恢博物強記善篆𨽻韓魏公當國恢獻詩云建業關山千里逺長安風雪一家寒公憐之令篆太學石經官華州推官而卒僧作制義明時南京五大寺僧每季考校於禮部命題即法華楞嚴等經其文則仿舉子制義文義優者選充僧録等官某寺僧耳疑者曾刻其制義黃俞邰云曾見之孟子逸語孟子逸句有云人之所知不如人之所不知信矣見梁武帝答臣下神滅論又見釋道安教指通局又君王無好智君王無好勇勇智之過生平患禍所遵正當仁義為本見蕭子良與孔中丞書謝廷讚維園鉛摘載之其語殊不類法言語法言春木之芚兮援我手之鶉兮二語全仿原壤歌貍首之斑然執女手之卷然瓏􅌑劉節之孔和有詩云虛堂微月影竛竮茗粥筵中解靜聽已許來年仍小泊未須催曉唱瓏􅌑瓏􅌑二字出揚子法言瓏􅌑其聲者其質玉乎則商玲瓏作商瓏玲亦何不可之有荀子語李廣射虎沒石飲羽荀子解蔽篇已云冥冥而行者見寢石以為伏虎也唐詩山風吹空林颯颯如有人荀子已云見植林以為後人也船蜀人謂衣紐曰船蓋方言也海鹽陸處士冰修嘉淑贈豫詩有洗足到門衣不船之句用此谷水談林釋杜詩天子呼來不上船乃引方言鑿矣劉李中州集中如劉迎無黨之歌行李汾長源之七律皆不減唐人及北宋大家南宋自陸務觀外無其匹敵爾時中原人才可謂極盛非江南所及詩僧新城釋成楚字荆菴受五戒於法慶今居靈巗頗能小詩落花云高枝忍别離逝水隨飄蕩雨後云青猿臨澗飲白鳥向空翻秋日云風來夕沼緑荷敗霜落秋山黃葉多山居云險崖句後參宗旨陷虎機前驗作家新霽云嵐氣千重縈嶂背清流萬道出雲根贈奚林大師云派衍靈山第一枝無言得髓是吾師偶然豎拂天花落絶勝空生晏坐時記之當續訪其全云同時僧智泉者亦新城人有移竹詩云别去寒山寺來依明月樓亦有致詔語似詩漢光武諸書詔最有情態西京所無沿及明章亦然光武賜侯霸璽書云崇山幽都何可偶黃鉞一下無處所古徑絶似漢人詩句又范書語往往有似詩者如柴門絶賓客楊震傳僕妾盈紈素楊秉傳之類是也光武微時嘗歎曰仕宦當作執金吾娶妻當得陰麗華亦似漢人樂府語蟛蜞集閩人林小眉嵋明崇禎癸未進士才高雋異以伉直死獄與余賡之同難著蟛蜞集十卷同年張給事赤菴松齡及其子人中走七千里以序相屬引歐陽公序穆伯長袁石公序徐文長為比會豫使東粵失其集聊識之俟索其本為序之肅府淳化帖豫記陳卓曼仙補刻肅府淳化閣帖事門人海寧陳奕禧子文適寄所著臯蘭載筆至中述蘭帖始末甚詳采録其略用備參考肅府淳化閣本自莊王受封太祖賜之宋刻相傳有龍膽壺鳯喙巵并帖而三憲王時洮岷道潁川張鶴鳴得李子崇本於白下材官本於臯蘭請肅王賜帖校讐見古法帖數段久缺而兹獨全知為馬房光怪以前物也姑蘇溫如玉南唐張應台為之雙鈎鶴鳴㩦之黔陽憲王乃鐫石於蘭未竟而薨世子識鋐卒業於萬厯辛酉先後七年其初拓用太史紙程君房墨人間難得榻工間有私購者直五十千刻用富平石一百四十四葉二百五十三藏府東書園殿鼎革時石幾淪缺順治甲午洮岷道揚州陳卓補刻復成全璧然神明不備視初拓徑庭矣乙卯平涼逆焰及蘭靖逆奮威二將軍自河西來軍於龍尾臯蘭之間攻城不下賊欲破石為炮偽知州徐某力救得免今移置州學有張尚書鶴鳴王尚書鐸憲王父子四跋云進西嶽賦表杜甫進封西嶽賦表有云維嶽授陛下元弼克生司空按舊書紀天寶九載正月羣臣請封西嶽從之二月辛亥西嶽廟災制停封二月右相楊國忠守司空天雨黃土霑於朝服杜所謂元弼司空謂國忠也國忠以椒房進夤緣三公天下知其非據而甫獨引大雅甫申之詞以諛之可謂無恥他日作麗人行又云慎莫近前丞相嗔乃自為矛盾杜固詩史其人品未可知顧自許稷契亦妄矣蔡狀元詩庚戌狀元蔡崑暘啓僔公車過淮安謁山陽令邵某邵其鄉人也批其名刺云查明回報蔡怒而去至京遂狀元及第題一絶句於扇寄邵云去冬風雪上長安舉世誰憐范叔寒寄語山陽賢令尹查名須向榜頭看蔡後官春坊中允假歸卒指掌圖東坡先生指掌圖於五代之君書法各異於梁曰梁太祖朱溫於唐曰後唐莊宗諱某於晉周曰晉高祖姓石氏名某周太祖姓郭氏名某字仲文於漢則曰漢高祖睿文聖武昭肅皇帝姓劉氏名某豈非以五代惟後唐及漢得國差正而異其書法耶郭周七國條下書放鍾離謨歸江南按史鍾謨傳但云其先會稽人不言本姓鍾離離字豈誤書抑衍文耶羅鄂州宋羅鄂州願古文南渡後第一為朱文公所推重其爾雅翼後序通篇用韻尤屬竒創宋文憲公序鄂州小集因效其體亦韓文公志樊紹述之意然竒崛出鄂州下矣二內禪頌宋高宗紹興內禪羅願端良作帝統孝宗淳熙內禪王子後才臣作內禪頌皆仿典引貞符之體帝統有云神器大寶一朝可付十世必復留無嫌久報無移德俾我太宗之志獲明於二百載之後又云選世至七復遇厥聖還之於宸極大統以正頌中有諷蓋深致不滿太宗之意此文似在王作之右近梁溪顧修逺宸撰宋文選止取王頌而不載帝統豈未覩鄂州文集耶避諱當改正古今避諱有沿襲不改者如秦始皇諱政以正月為征月晉避司馬昭諱樂府以昭君為明君唐祖諱虎改虎林為武林吕后諱雉以雉為野雞武后諱曌以詔書為制書鮑照為鮑昭楊行密據揚州州人改蜜為蜂糖錢元瓘據浙浙人改一貫為一千之類皆當改正西施程良孺讀書考定云管子小稱篇毛嬙西施天下之美人也自管子至吳越二百一十三年矣如果一西施不應先及相鼠鼫鼠詩相鼠孫奕云相地名陸璣云河東有大鼠能人立交前兩腳於頭上跳舞善鳴按地志相州與河東相鄰荀子鼯鼠五技而窮本草廣雅皆謂螻蛄一名鼫鼠易晉如鼫鼠孔穎達正義引蔡雍勸學篇云鼫鼠五能不成一技荀子云云並為螻蛄也蜀恙泥妍媸爾雅釋山獨者蜀蜀蟲名好獨行無恙恙亦蟲名風俗通云恙毒蟲也春傷人神異經北大荒中有獸咋人則病名曰㺊㺊恙也如泥泥亦蟲名妍媸皆蟲名妍螢類身有光采蚩形蠢蠢然也魏南陽畢萬之魏今蒲州之永樂鎮非大名元城也韓愈之南陽今修武之南陽非南陽鄧州也漢書地理志修武應劭曰晉始啓南陽今南陽城是也秦昭紀魏入南陽以和白起傳攻南陽太行道絶之張儀傳魏絶南陽皆是䣜酇菽園雜記酇有二音一則旰切一才何切才何者縣屬沛國蕭何初封邑則旰者縣屬南陽蕭何子孫所封也讀書考定蕭何封䣜侯今世家作酇侯字相似之誤也䣜才何切孟堅泗水亭碑文昌四友漢有蕭何敘功第一受封於䣜古今字韻全書䣜酇二字並見十五歌注云䣜縣名在譙郡或作酇酇本音鹺前漢書功臣表酇直音贊史記功臣侯年表并同索隱曰酇縣在沛方以智通雅云當時在南陽今在襄陽之光化者蕭何封邑也沛縣之酇本作䣜音嵯今在考城縣漢地理志載南陽酇縣侯國不言沛之䣜侯國非其明驗乎升菴弱侯定以沛䣜為何封邑而云師古無據者謬也按䣜酇兩音自是兩字菽園混而一之讀書考定主沛之䣜與楊焦旨同以何起沛封必近之而以班碑為據通雅則以師古注為據南陽蕭何封邑音酇本春秋陰國唐為懷州陰城縣有何廟高后封何夫人同為酇侯小子延為築陽侯酇與築陽同𨽻南陽郡也二説正相剌謬至沛郡之酇應劭音嵯師古曰此縣本為䣜應音是也中古以來借酇字為之耳讀皆為䣜而莽呼為贊治則此縣亦有酇音然功臣表元符三年共侯慶以何曾孫紹封酇不言别是一酇菽園之説未知何據又按劉肅唐世説云凡封功臣多就本土張良封留是為成例按班固泗州亭碑云云漢書班氏所修泗州碑孟堅所作何須穿鑿更制别音此駁師古注與楊焦二説同王蘋歷城秀才王蘋字秋史少年能詩頗清拔絶俗常有亂泉聲裏誰通屐黃葉林間自著書黃葉下時牛背晚青山缺處酒人行之句蘋師田中丞漪亭雯而友吳徴士天章雯丙寅秋寄詩於豫豫偶以書寓巡撫張中丞南溟鵬言蘋之才中丞特召見引之客座且贈金焉蘋之才中丞之誼皆塵中所少故記之月泉吟社宋末浦江吳渭倡月泉吟社賦田園雜興近體詩名士謝翺輩第其高下詩傳者六十人清新尖刻别自一家豫幼於外祖鄒平孫公家見古刋本後始見琴川毛氏本常遍和之竊謂臯羽所品高下未盡當意因戲為易置次第如左春日田園雜興第一名子進本名魏新之號石川第二名魏子大梁必大第三名全泉翁全璧字君玉第四名山南隱逸劉應龜字元益第五名躡雲翁合老仲嘉第六名仙村人第七名方賞方德麟號藏六第八名高宇梁相字必大第九名俞自得第十名槐窗居士黃景昌十一名東湖散人十二名徐端甫十三名仇近村仇逺字仁近十四名陳希邵陳舜道十五名子直魏石川十六名司馬澄翁馮澄字澄翁十七名陳緯孫何十八名聞人仲伯陳希聲十九名君瑞二十名田起東劉汝鈞號蒙山二十一名羅公福連文鳯號應山原第一名谷音谷音二卷元清江杜本清碧所輯其人皆節俠跅弛之士詩亦岸異可喜常疑清碧自撰託名於人及得其清江碧嶂集觀之殊庸膚無足取與所輯迥不類谷音吾友施愚山為湖西監司時亦嘗刻於臨江韋蘇州李元賓集有代人上韋蘇州書二篇刺韋褊急躁露殊不類其為人今録於左月日於法司上書郎中閣下彛不耽書嗜酒已至於老東西南北無立錐之地竊以閣下有經濟之器因敷小人直戅之性非敢失色於左右僥求於去就不圖行絓時禁坐貽伊戚惶怖無暇縶維不安仰天椎心收血續淚所言奔鹿觸網飛蛾蹈火顛蹶糜排彛何以堪彛知過矣舉家十口兒女幼弱寺中僑寄目下絶粒閣下錮彛在此令吏推責反覆憂難詞理俱屈衰髮一夕如經十秋素來無業只慣飲博罔曾負纍以至訊問事過竒喘無禍不有且彛於天下何異株塊比於閣下纍螻蟻如國家之事肉食者謀雖鞭之長胡及馬腹況中籌之子如何敢及早聞閣下清節玉立洪量海納軍謀在握文藻盈帙中外騰口聲歸其高彛是用闕微誠庶彼知己不測閣下以言罪之嘗聞不以言廢人閣下何必取威於懦夫而後行令且明主有誹謗之木諸侯有鄉校之議今主上何愧於禹閣下何短於鄭卿伏惟念彛之失寬彛之責使得闕便當鉗口匍匐鈴下以救前非則伏諸忠信越境不敢留也彛死罪死罪又代李圖南上蘇州韋使君論戴察書文多不具録夢山詩海豐楊夢山宫保太宰巍有存家稿八卷五言最簡古得陶體明人所少豫喜其一絶云前年視我山中病落日獨騎驄馬來記得任家亭子上連翹花發共銜杯豫在京師日曾選訂其集為三卷謝員外方山重輝刻之黃夫人詩楊升菴夫人黃寄外詩曰歸曰歸愁歲暮其雨其雨怨朝陽乃黃魯直答初和甫詩句也見豫章外集詩云君吟春風花草香我愛春夜璧月涼美人美人隔湘水其雨其雨怨朝陽蘭荃盈懷報瓊玖冠纓自潔非滄浪道人四十心如水那復夢為蝴蝶狂隃糜隃靡墨名後漢書西羌傳有隃糜相曹鳯注云隃糜屬右扶風今汧陽縣也孫豹人詩孫豹人枝蔚遊焦山中流風浪大作舟人失色孫長嘯詠詩云風起中流浪打船秦人失色海雲邊也知賦命元窮薄尚欲西歸太華眠孫三原人流寓江都遼宫詞萊州趙伯濬士哲嘗作遼宫詞百首可與周憲王元宫詞頡頏伯濬隱居登之松椒山躬耕著書去家五百里終身不歸著皇綱録建文年譜平陵城後山叢談云齊之龍山鎮有平陸故城高五丈四方五里附城有走馬臺其高半之濶五之三上下如一其西與南則在內東北則在外莫曉其理今平陵城故址尚在在歷城章丘界所謂走馬臺者不可復識矣坡公詩濟南春好雪初晴行到龍山馬足輕即此地孟子之平陸則在今汶上縣此城本東平陵唐齊王祐反縣人不從太宗嘉之詔改縣名為全節後山云平陸亦訛也終南草堂圖程幼洪邑邸中閲宣和御府所藏摩詰終南草堂圖上方橫書王維終南闕峯草堂圖九字闕一為道君御書倪元鎮題云豫讀岑參集有歸終南草堂詩今摩詰之寫是圖也豈其贈别之作耶大抵高賢達士於謝政歸間之際不能無詠歌圖繪以贈之昔盧鴻有嵩山草堂十圖亦猶是也故徽廟標書以便後之覽者此幅向為杜南谷先生所藏豫得之日夕展對不惟諸品為之減色而吾儕之進取深有藉於斯圖矣黃子久題云右丞此圖與雪溪捕魚二卷同一筆致而秀婉過之豈其後先之分耶又梅道人吳仲圭紫芝俞和詩各一篇潞王琴故明潞藩敬一主人風尚高雅嘗造琴三千張豫猶見長安市上售其一有𨽻書中和二字又常仿宣和博古圖式造銅器數千枚瘞地中豫昔在金陵登𢎞濟寺見臨江石壁上刻其畫蘭極工焦山鼎詩焦山海雲堂有古鼎一高一尺三寸二分腹徑一尺五寸八分口徑一尺四寸五分耳高三寸濶四寸二分足六寸一分深八寸二分腹有銘其詞曰惟九月既望甲戌王及還於周宓子闕于圖室司徒疑治征南仲佑闕惠闕立中庭王呼史受册命闕惠曰官司治王闕側闕作錫汝玄衣束帶戈雕戟縞韠彤矢鋚闕鑾旗世惠敢對揚天子丕顯敷休用作尊鼎用享于闕烈考用周簋簠夀萬年子孫永寶用此豫兄弟手拓屬新安程穆倩邃譯本凡蝕二字疑六字闕九字秀水朱竹垞彛尊云其曰立中庭按毛伯敦銘文亦有之薛尚功釋為立而楊南仲謂古立位同字古文春秋書公即位為公即立則是銘立字亦當讀作位也鼎故京口某公家物分宜枋國時聞此鼎欲之某公不即獻因嫁禍焉鼎遂入嚴氏嚴氏敗鼎復歸江南因置焦山寺中家兄摹為圖賦長歌紀之豫亦有五言古詩三十韻記事汪鈍翁琬序之志公碑常白山醴泉寺志公碑唐開元乙卯立文作齊梁體可辨者十之三書法圓徑在歐虞間每行凡七十九字其下多斷齾不存其碑陰乃志公像也碑可辨者録於此大唐齊州章丘縣常白山醴泉寺志公之碑闕二字京大薦福寺奉敕闕一字慶闕一字綴文沙門玄􅏛闕五字薦福寺闕二字翻經院校勘沙門正智寺都維闕一字僧道寂建此寺闕三十字闕二字曇花未出庸詎知寂滅之名覺日猶闕一字曷嘗識苦空之相闕一字夫金儀下降舍靈闕一字淨月之光寶教旁流闕四字雲之潤三車闕一字駕闕二十九字化工闕三字香不息所以化身周流於别土神闕三字於塵沙或十大聲聞駐形闕二字一方菩薩納景涼臺觀闕一字背嶺以宣慈清辨起闕二十六字未掩白足闕二字佛法之闕三字月闕一字咸闕一字王城之舍蓋闕一字生闕一字道闕一字境發闕一字若不人闕一字具闕四字諦幢高闕一字者與今此醴泉寺者是宋齊闕二十八字經文師即闕二字身之菩薩闕一字遊神境來屆兹山棲託巗阿聿修禪寂以為此地玄武之分青龍闕四字首以開疆據天齊而劃野却闕二十六字尚父之闕一字居九合一匡齊桓公之霸國爾其常白山者乃摩天闕一字地暗映蔽虧抱泉石以娛神出雲霞而養性山毛地髮名花將軟草連芳闕二十九字人闕二字繪闕二字形勝闕二字招提自後七級崇圖闕一字起舍佉之五層闕一字重標戰勝之門海目山亭妙相殫於變態虹梁鳥革大壯闕三十字綵畫闕二字塵凡闕二字香闕一字水調八解之闕一字風闕一字五音之説息心之輩見流注以超升回面之徒仰幽關而悟入時逢闕二字代屬闕三十二字金林玉闕一字寥落幽巗我國家灌頂四天纂圖千帝以佛乘為象馬用道品為城郭八方起塔闕二字道形九闕一字聚鹽情殷闕三十二字佛闕二字此精廬闕一字通堯日三齊族姓向梵境以翹誠四履闕二字仰釋天而矯首又屬中宗孝和皇帝龍興漢道入天經闕二十七字周法界去景龍二年歲次闕子爰有齊州正智寺都維僧仁萬俗姓李字道寂慨兹隳墜抗表闕一字宗天鑒至誠特賜名闕三十三字否而還泰山靈掩以重開法俗歡康人神一悅初師之行進表也夢乘船上山及翌闕一字赴朝所刀無礙豈非興廢闕一字定通闕一字懸期闕二十九字俶裝東上將闕二字州闕二字三藏義淨法師各代高僧天下重德先奉敕於大薦佛寺闕三字律以闕六字勝緣闕一字城在東倍增闕二十六字四闕一字降靈五闕一字德闕一字人天之表名揚宇宙之間聖闕一字難闕一字神功叵測及將命星發載達京闕十字時有闕三十四字身闕二字輟絃歌歲闕三字即以二月八日親率合境老幼大會新寺表慶天恩又於闕二字之闕一字尊卑就列鴈行齊聽闕三十三字忽見有醴泉闕四字三四尺深淺三尺餘色淨味甘爰符瑞典挹酌同飲咸覺蠲疴豈不以闕一字福闕一字圓三靈允答光揚寶闕一字滋液金場故闕二十七字上聞闕二字垂感有敕改名為醴寺仍更抽入册九僧住持行道自玄波再委王題重開日殿赫而闕一字升月宫華而桂滿若乃闕二十八字海精勤以齊深戒月澄空闕二字密霧禪燈焰室巧避輕風濯闕二字之龍闕一字洗毗闕一字之鳥眼長袪五住逺效四心刷闕一字鴈以飛雲轡闕二十七字捨生之地續桂闕二字有情根軌足方闕一字鳴金鼓闕一字功不朽流福無窮斯並先帝之本願莊嚴法師幽贊威神之所致也又師遊戲生死示闕二十五字儼如親對即平時所將黑犬亦絫具闕二字厥闕二字無願不從乃至有患心痛者但取廟前少土和水服之應時便愈遺形是託神靈保持由是闕二十五字梁寺史傳師本俗姓朱氏金城人也少出家闕二字道林寺僧儉法師為和上業存禪闕一字宋太始初漸彰異迹居止不定飲食無時長髮跣足每闕二十七字詞同讖記言不虛發應驗如神或闕一字視通於北闕一字分形遍於南國竒怪忽恍不可殫論以天監十三年歲次甲午十二月八日闕二十九字相奄然示終時有異香闕二字芬馥特敕厚加殯送葬於鍾山獨龍阜仍於墓所闕一字開善精舍敕陸倕製銘於冢內王筠勒碑於寺陰闕二十六字生及其去也以精靈度物哀憐庶類福祚皇王且彼託鍾山此依常白彼葬龍阜此闕一字龍臺前王挹風建開善之墳闕一字後帝傾闕二字醴闕二十五字至今大唐太極元年歲次壬子皇帝御天下之三載凡一百九十九年化化之緣古今無盡明明之德日月彌新其所變現之梗概闕二十七字之闕一字衆所未諒恭敬者隨時受福疑慢者應念立徵事迹繁夥不可備載當嘉聲上徹先帝令左臺監察御史宋務先親加檢覆闕二十八字八正所以知歸一屬闕一字緣獲未曾有闕二字復命倍沃天心刺史楊元禧分符北極露冕東藩闕一字雨逐於行車仁風隨於轉扇黃金闕二十八字追鳥迹於上乘想闕六字繩寶地闕一字動天宫薦瑞香園延光帝載縣丞主簿縣尉闕一字舍闕四十三字羣物揚舲彼岸録事闕二字鄉闕一字等門滋蘭闕四字芽忠信滿於州閭因果闕一字於闕四字虔命闕一字奉闕三十六字九地荷於津通貝樹披春帝王之遺文秩矣金闕三字諸佛之正道通矣迷津闕一字路菩薩運載之乘行矣闕八字之闕二十七字況玄天大造充溢於盡空淨域鴻緣牢籠於無外昔迦闕三字如來垂讚歎之闕一字彌勒當闕三字表歌揚之偈若稽古訓式樹闕一字碑仍於闕二十七字銘曰義天兆昧優花未披但迷五藴孰辨三伊闕二字火宅耀我金儀神足繼軌闕二字揚㽔其一闕一字有闕一字成觀方闕二字戴表靈闕二字開闕二十七字綱燬我寶地壞我金場花殘鷺沼煙輟龍香霞標歇滅石徑荒涼其三萬宇乘皇千齡纂帝日月連闕一字飛行闕一字契闕一字念新闕五字高闕二十八字精標五門玉墀俶感銀闕一字輿存其五欲赴天泉闕一字規國德寄誠墳廟傳詞翰墨瑞醴通流嘉祥允塞重光佛闕二字題宸極其六紺軒加闕二十八字沙其七先帝聖靈聿資神境冥扶默贊分形散影既墓彼山又墳兹嶺寶鐸雙振金繩共炳化闕三字真身永永其八功闕一字泉闕五字天闕二十七字宣聞諸典故鐫金鏤玉道該緇素式讚王猷闕二字淨度勒像賢劫刋碑覺路其十開元三年歲次乙卯二月己酉朔十五日癸亥下闕米太僕研山米太僕友石萬鍾家藏一研山有七十二峯洞壑竒絶每天欲雨則水出欲霽則先燥太僕以五百金購之明末流寇入京師米氏奔迸以古器數簏寄親戚家此物遂為一士夫所得又寶一風字硯太僕知六合縣時嘗入覲北京往返兩月餘硯墨猶未燥也康熙戊午夏公孫紫來漢雯知長葛縣行取入都出硯示豫為説如此紫來今官翰林侍講池北偶談卷十九
